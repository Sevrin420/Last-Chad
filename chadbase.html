<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chad Base — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── Scene container ── */
    #scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* ── Shared zone styles ── */
    .zone {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
      background: transparent;
    }

    .zone:hover {
      transform: scale(1.08);
    }

    /* Glow lives on ::before so the label text is never blurred */
    .zone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      filter: blur(22px);
      z-index: 0;
    }

    .zone-label {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: clamp(0.45rem, 1.4vw, 0.75rem);
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.03em;
      pointer-events: none;
      text-shadow:
        0 0 6px currentColor,
        0 1px 3px rgba(0,0,0,0.9);
    }

    /* ── North opening — Quests — RED ── */
    .zone-quests { left: 28%; top: 4%; width: 44%; height: 24%; }
    .zone-quests .zone-label { color: #ff7070; }
    .zone-quests::before {
      background: radial-gradient(ellipse at center,
        rgba(200, 30, 30, 0.55) 0%,
        rgba(200, 30, 30, 0.20) 45%,
        transparent 70%);
      animation: pulse-red 2.8s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }

    /* ── Market stall — Marketplace — GREEN ── */
    .zone-market { left: 1%; top: 28%; width: 34%; height: 34%; }
    .zone-market .zone-label { color: #6dffaa; }
    .zone-market::before {
      background: radial-gradient(ellipse at center,
        rgba(20, 180, 60, 0.50) 0%,
        rgba(20, 180, 60, 0.18) 45%,
        transparent 70%);
      animation: pulse-green 3.2s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }

    /* ── Forge — Actions — YELLOW ── */
    .zone-forge { right: 1%; top: 26%; width: 34%; height: 36%; }
    .zone-forge .zone-label { color: #ffe96a; }
    .zone-forge::before {
      background: radial-gradient(ellipse at center,
        rgba(220, 185, 20, 0.52) 0%,
        rgba(220, 185, 20, 0.18) 45%,
        transparent 70%);
      animation: pulse-yellow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-yellow {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }

    /* ── Pot over fire — Eat/Rest — PURPLE ── */
    .zone-rest { left: 28%; bottom: 4%; width: 44%; height: 26%; }
    .zone-rest .zone-label { color: #d58fff; }
    .zone-rest::before {
      background: radial-gradient(ellipse at center,
        rgba(160, 50, 220, 0.58) 0%,
        rgba(160, 50, 220, 0.20) 45%,
        transparent 70%);
      animation: pulse-purple 3.0s ease-in-out infinite;
    }
    @keyframes pulse-purple {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }
  </style>
</head>
<body>
  <div id="scene">
    <img src="assets/chadhome.jpg" alt="Chad Base" draggable="false" />

    <!-- North opening — Quests -->
    <a class="zone zone-quests" href="quest.html">
      <span class="zone-label">QUESTS</span>
    </a>

    <!-- Market stall — Marketplace -->
    <a class="zone zone-market" href="enter.html">
      <span class="zone-label">MARKET-<br>PLACE</span>
    </a>

    <!-- Forge — Actions -->
    <a class="zone zone-forge" href="game.html">
      <span class="zone-label">ACTIONS</span>
    </a>

    <!-- Pot over fire — Eat/Rest -->
    <a class="zone zone-rest" href="#">
      <span class="zone-label">EAT/<br>REST</span>
    </a>
  </div>
</body>
</html>

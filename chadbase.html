<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chad Base — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── Scene container ── */
    #scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* ── Shared zone styles ── */
    .zone {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .zone:hover {
      transform: scale(1.08);
    }

    .zone-label {
      color: #fff;
      font-size: clamp(0.45rem, 1.4vw, 0.75rem);
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.03em;
      pointer-events: none;
      text-shadow:
        0 0 6px currentColor,
        0 1px 3px rgba(0,0,0,0.9);
    }

    /* ── North opening — Quests — RED ── */
    .zone-quests {
      left: 28%;
      top: 4%;
      width: 44%;
      height: 24%;
      background: radial-gradient(ellipse at center,
        rgba(200, 30, 30, 0.18) 0%,
        rgba(200, 30, 30, 0.06) 55%,
        transparent 75%);
      box-shadow:
        0 0 40px 8px rgba(200, 30, 30, 0.25),
        inset 0 0 30px rgba(200, 30, 30, 0.1);
      animation: pulse-red 2.8s ease-in-out infinite;
    }

    .zone-quests .zone-label { color: #ff7070; }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 40px 8px rgba(200,30,30,0.25), inset 0 0 30px rgba(200,30,30,0.1); }
      50%       { box-shadow: 0 0 60px 16px rgba(200,30,30,0.45), inset 0 0 45px rgba(200,30,30,0.2); }
    }

    /* ── Market stall — Marketplace — GREEN ── */
    .zone-market {
      left: 1%;
      top: 28%;
      width: 34%;
      height: 34%;
      background: radial-gradient(ellipse at center,
        rgba(20, 180, 60, 0.16) 0%,
        rgba(20, 180, 60, 0.05) 55%,
        transparent 75%);
      box-shadow:
        0 0 35px 6px rgba(20, 180, 60, 0.22),
        inset 0 0 25px rgba(20, 180, 60, 0.08);
      animation: pulse-green 3.2s ease-in-out infinite;
    }

    .zone-market .zone-label { color: #6dffaa; }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 35px 6px rgba(20,180,60,0.22), inset 0 0 25px rgba(20,180,60,0.08); }
      50%       { box-shadow: 0 0 55px 14px rgba(20,180,60,0.40), inset 0 0 40px rgba(20,180,60,0.18); }
    }

    /* ── Forge — Actions — YELLOW ── */
    .zone-forge {
      right: 1%;
      top: 26%;
      width: 34%;
      height: 36%;
      background: radial-gradient(ellipse at center,
        rgba(220, 185, 20, 0.17) 0%,
        rgba(220, 185, 20, 0.05) 55%,
        transparent 75%);
      box-shadow:
        0 0 35px 6px rgba(220, 185, 20, 0.24),
        inset 0 0 25px rgba(220, 185, 20, 0.09);
      animation: pulse-yellow 2.5s ease-in-out infinite;
    }

    .zone-forge .zone-label { color: #ffe96a; }

    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 35px 6px rgba(220,185,20,0.24), inset 0 0 25px rgba(220,185,20,0.09); }
      50%       { box-shadow: 0 0 55px 14px rgba(220,185,20,0.44), inset 0 0 40px rgba(220,185,20,0.2); }
    }

    /* ── Pot over fire — Eat/Rest — PURPLE ── */
    .zone-rest {
      left: 28%;
      bottom: 4%;
      width: 44%;
      height: 26%;
      background: radial-gradient(ellipse at center,
        rgba(160, 50, 220, 0.20) 0%,
        rgba(160, 50, 220, 0.07) 55%,
        transparent 75%);
      box-shadow:
        0 0 40px 8px rgba(160, 50, 220, 0.28),
        inset 0 0 30px rgba(160, 50, 220, 0.12);
      animation: pulse-purple 3.0s ease-in-out infinite;
    }

    .zone-rest .zone-label { color: #d58fff; }

    @keyframes pulse-purple {
      0%, 100% { box-shadow: 0 0 40px 8px rgba(160,50,220,0.28), inset 0 0 30px rgba(160,50,220,0.12); }
      50%       { box-shadow: 0 0 65px 18px rgba(160,50,220,0.50), inset 0 0 50px rgba(160,50,220,0.24); }
    }
  </style>
</head>
<body>
  <div id="scene">
    <img src="assets/chadhome.jpg" alt="Chad Base" draggable="false" />

    <!-- North opening — Quests -->
    <a class="zone zone-quests" href="quest.html">
      <span class="zone-label">QUESTS</span>
    </a>

    <!-- Market stall — Marketplace -->
    <a class="zone zone-market" href="enter.html">
      <span class="zone-label">MARKET-<br>PLACE</span>
    </a>

    <!-- Forge — Actions -->
    <a class="zone zone-forge" href="game.html">
      <span class="zone-label">ACTIONS</span>
    </a>

    <!-- Pot over fire — Eat/Rest -->
    <a class="zone zone-rest" href="#">
      <span class="zone-label">EAT/<br>REST</span>
    </a>
  </div>
</body>
</html>

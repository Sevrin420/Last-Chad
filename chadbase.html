<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chad Base — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── Scene container ── */
    #scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      pointer-events: none;
      filter: blur(12px) brightness(0.6);
      transition: filter 1.2s ease;
    }

    #scene.revealed img {
      filter: blur(0px) brightness(1);
    }

    /* ── Enter Camp overlay ── */
    #enter-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #enter-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #enter-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.8rem, 2.5vw, 1.2rem);
      color: #ffe96a;
      background: rgba(10, 10, 15, 0.75);
      border: 2px solid #ffe96a;
      padding: 1.2em 2em;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px #ffe96a, 0 0 24px rgba(220,185,20,0.5);
      box-shadow: 0 0 20px rgba(220,185,20,0.3), inset 0 0 20px rgba(220,185,20,0.05);
      animation: btn-pulse 2s ease-in-out infinite;
      transition: transform 0.15s ease;
    }

    #enter-btn:hover {
      transform: scale(1.06);
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(220,185,20,0.3), inset 0 0 20px rgba(220,185,20,0.05); }
      50%       { box-shadow: 0 0 40px rgba(220,185,20,0.6), inset 0 0 30px rgba(220,185,20,0.12); }
    }

    /* ── Nav positioned over scene ── */
    .nav-wrapper { position: absolute; top: 12px; left: 12px; z-index: 200; }

    /* ── Mute button ── */
    #mute-btn {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 200;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 8px 12px;
      background: rgba(10,10,15,0.7);
      border: 1px solid #555;
      border-radius: 4px;
      color: #ffe96a;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #mute-btn:hover { border-color: #ffe96a; }

    /* ── Shared zone styles ── */
    .zone {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      transition: transform 0.2s ease, opacity 0.8s ease;
      background: transparent;
      opacity: 0;
      pointer-events: none;
    }

    #scene.revealed .zone {
      opacity: 1;
      pointer-events: auto;
    }

    .zone:hover {
      transform: scale(1.08);
    }

    /* Glow lives on ::before so the label text is never blurred */
    .zone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      filter: blur(22px);
      z-index: 0;
    }

    .zone-label {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: clamp(0.75rem, 2.3vw, 1.15rem);
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.03em;
      pointer-events: none;
      align-self: flex-start;
      margin-top: 18%;
      text-shadow:
        0 0 6px currentColor,
        0 1px 3px rgba(0,0,0,0.9);
    }

    .zone-docs .zone-label { margin-top: 8%; }

    /* ── North opening — Quests — RED ── */
    .zone-quests { left: 28%; top: 4%; width: 44%; height: 24%; }
    .zone-quests .zone-label { color: #ff7070; }
    .zone-quests::before {
      background: radial-gradient(ellipse at center,
        rgba(200, 30, 30, 0.55) 0%,
        rgba(200, 30, 30, 0.20) 45%,
        transparent 70%);
      animation: pulse-red 2.8s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }

    /* ── Market stall — Marketplace — GREEN ── */
    .zone-market { left: 1%; top: 28%; width: 34%; height: 34%; }
    .zone-market .zone-label { color: #6dffaa; }
    .zone-market::before {
      background: radial-gradient(ellipse at center,
        rgba(20, 180, 60, 0.50) 0%,
        rgba(20, 180, 60, 0.18) 45%,
        transparent 70%);
      animation: pulse-green 3.2s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }

    /* ── Forge — Actions — YELLOW ── */
    .zone-forge { right: 1%; top: 26%; width: 34%; height: 36%; }
    .zone-forge .zone-label { color: #ffe96a; }
    .zone-forge::before {
      background: radial-gradient(ellipse at center,
        rgba(220, 185, 20, 0.52) 0%,
        rgba(220, 185, 20, 0.18) 45%,
        transparent 70%);
      animation: pulse-yellow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-yellow {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }

    /* ── Pot over fire — Eat/Rest — PURPLE ── */
    .zone-rest { left: 28%; bottom: 4%; width: 44%; height: 26%; }
    .zone-rest .zone-label { color: #d58fff; }
    .zone-rest::before {
      background: radial-gradient(ellipse at center,
        rgba(160, 50, 220, 0.58) 0%,
        rgba(160, 50, 220, 0.20) 45%,
        transparent 70%);
      animation: pulse-purple 3.0s ease-in-out infinite;
    }
    @keyframes pulse-purple {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }

    /* ── Boxes left of pot — Docs — GRAY ── */
    .zone-docs { left: 1%; bottom: 4%; width: 24%; height: 26%; }
    .zone-docs .zone-label { color: #c8c8d0; }
    .zone-docs::before {
      background: radial-gradient(ellipse at center,
        rgba(160, 160, 180, 0.55) 0%,
        rgba(160, 160, 180, 0.20) 45%,
        transparent 70%);
      animation: pulse-gray 3.4s ease-in-out infinite;
    }
    @keyframes pulse-gray {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }

    /* ── Bottom-right — Gamble — ORANGE ── */
    .zone-gamble { right: 1%; bottom: 4%; width: 24%; height: 26%; }
    .zone-gamble .zone-label { color: #ffaa40; }
    .zone-gamble::before {
      background: radial-gradient(ellipse at center,
        rgba(255, 150, 30, 0.58) 0%,
        rgba(255, 150, 30, 0.22) 45%,
        transparent 70%);
      animation: pulse-orange 2.4s ease-in-out infinite;
    }
    @keyframes pulse-orange {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1.0; }
    }
  </style>
</head>
<body>
  <div id="scene">
    <img src="assets/chadhome.jpg" alt="Chad Base" draggable="false" />

    <!-- North opening — Quests -->
    <a class="zone zone-quests" href="adventure.html">
      <span class="zone-label">QUESTS</span>
    </a>

    <!-- Market stall — Marketplace -->
    <a class="zone zone-market" href="market.html">
      <span class="zone-label">MARKET</span>
    </a>

    <!-- Forge — Actions -->
    <a class="zone zone-forge" href="mint.html">
      <span class="zone-label">MINT</span>
    </a>

    <!-- Pot over fire — Eat/Rest -->
    <a class="zone zone-rest" href="recharge.html">
      <span class="zone-label">RECHARGE</span>
    </a>

    <!-- Boxes left of pot — Docs -->
    <a class="zone zone-docs" href="docs.html">
      <span class="zone-label">DOCS</span>
    </a>

    <!-- Bottom-right — Gamble -->
    <a class="zone zone-gamble" href="gamble.html">
      <span class="zone-label">GAMBLE</span>
    </a>
  </div>

  <!-- Enter Camp overlay -->
  <div id="enter-overlay">
    <button id="enter-btn">ENTER CAMP</button>
  </div>

  <button id="mute-btn">🔊</button>

  <!-- Nav menu -->
  <div id="nav-placeholder"></div>

  <audio id="bg-music" src="music/moody.mp3" loop></audio>
  <script>
    const music = document.getElementById('bg-music');
    const overlay = document.getElementById('enter-overlay');
    const scene = document.getElementById('scene');

    music.volume = 0.5;

    function reveal() {
      music.play().catch(() => {});
      overlay.classList.add('hidden');
      scene.classList.add('revealed');
    }

    // Auto-reveal when coming from the Enter button on index.html
    if (new URLSearchParams(window.location.search).get('autoplay') === '1') {
      reveal();
    }

    document.getElementById('enter-btn').addEventListener('click', reveal);

    const muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', () => {
      music.muted = !music.muted;
      muteBtn.textContent = music.muted ? '🔇' : '🔊';
    });
  </script>
  <script src="nav.js"></script>
</body>
</html>

    const deployBtn = document.getElementById('deployBtn');
    const status = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const contractAddr = document.getElementById('contractAddr');
    const copyBtn = document.getElementById('copyBtn');
    const baseUriInput = document.getElementById('baseUri');

    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = type || '';
    }

    deployBtn.addEventListener('click', async () => {
      const rawProvider = window.ethereum || window.avalanche;
      if (!rawProvider) {
        setStatus('No wallet detected. Open this page in your Rabby or wallet browser.', 'error');
        return;
      }

      try {
        deployBtn.disabled = true;
        deployBtn.textContent = 'CONNECTING...';

        // Connect wallet
        const accounts = await rawProvider.request({ method: 'eth_requestAccounts' });
        if (!accounts || !accounts.length) throw new Error('No accounts');

        // Switch to Avalanche
        try {
          await rawProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: AVAX_CHAIN_ID }] });
        } catch (err) {
          if (err.code === 4902) {
            await rawProvider.request({ method: 'wallet_addEthereumChain', params: [AVAX_CHAIN] });
          } else throw err;
        }

        const provider = new ethers.providers.Web3Provider(rawProvider);
        const signer = provider.getSigner();
        const baseUri = baseUriInput.value.trim() || 'https://lastchad.xyz/metadata/';

        setStatus('Deploying contract... Please confirm in your wallet.', '');
        deployBtn.textContent = 'DEPLOYING...';

        // Deploy
        const factory = new ethers.ContractFactory(CONTRACT_ABI, BYTECODE, signer);
        const contract = await factory.deploy(baseUri);

        setStatus('Waiting for confirmation...', '');
        deployBtn.textContent = 'CONFIRMING...';
        await contract.deployed();

        // Success
        const addr = contract.address;
        setStatus('Contract deployed successfully!', 'success');
        deployBtn.textContent = 'DEPLOYED!';
        contractAddr.textContent = addr;
        resultBox.style.display = 'block';

        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(addr).then(() => {
            copyBtn.textContent = 'COPIED!';
            setTimeout(() => { copyBtn.textContent = 'COPY ADDRESS'; }, 2000);
          }).catch(() => {
            // Fallback for mobile
            const ta = document.createElement('textarea');
            ta.value = addr;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            copyBtn.textContent = 'COPIED!';
            setTimeout(() => { copyBtn.textContent = 'COPY ADDRESS'; }, 2000);
          });
        });

      } catch (err) {
        console.error('Deploy failed:', err);
        if (err.code === 4001 || err.code === 'ACTION_REJECTED') {
          setStatus('Deployment cancelled.', 'error');
        } else {
          setStatus('Deploy failed: ' + (err.reason || err.message || err), 'error');
        }
        deployBtn.disabled = false;
        deployBtn.textContent = 'DEPLOY CONTRACT';
      }
    });
  </script>

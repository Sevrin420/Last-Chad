name: Reset HashCash Leaderboard

on:
  workflow_dispatch:

jobs:
  reset:
    name: Wipe Leaderboard
    runs-on: ubuntu-latest
    steps:
      - name: Reset leaderboard via worker API
        env:
          ORACLE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
          WORKER_URL: https://last-chad-runner.severin20.workers.dev
        run: |
          ADMIN_KEY="${ORACLE_KEY:0:16}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$WORKER_URL/hashcash/admin/reset-leaderboard" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"$ADMIN_KEY\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY (HTTP $HTTP_CODE)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Reset failed with HTTP $HTTP_CODE"
            exit 1
          fi

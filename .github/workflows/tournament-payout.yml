name: Tournament Payout

# Manual trigger — distributes AVAX to locked chads and advances month
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network'
        required: true
        default: 'avalanche'
        type: choice
        options:
          - fuji
          - avalanche

jobs:
  payout:
    name: Distribute & Reset (${{ inputs.network }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tournament payout
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/tournamentPayout.js --network ${{ inputs.network }}

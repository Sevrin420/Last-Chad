name: Sync Main Branch

# Trigger manually from GitHub Actions tab:
# Repo → Actions → "Sync Main Branch" → Run workflow → pick source branch
#
# ONE-TIME SETUP (do manually in GitHub):
#   1. Settings > General > Default branch → main
#   2. Settings > Pages > Source → main / (root)
on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to sync into main'
        required: true
        default: 'claude/craps-game-onchain-SDPba'
        type: string

jobs:
  sync-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Create/update main from source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git push -u origin main --force

      - name: Summary
        run: |
          echo "## Main branch synced" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** \`${{ inputs.source_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Main updated:** yes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If this is your first time, set default branch + Pages source to \`main\` in repo Settings." >> $GITHUB_STEP_SUMMARY

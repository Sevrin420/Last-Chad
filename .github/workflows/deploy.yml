name: Deploy

# Trigger manually from GitHub Actions tab:
# Repo → Actions → "Deploy" → Run workflow → pick target + network
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all-contracts'
        type: choice
        options:
          - all-contracts    # Deploy LastChad + LastChadItems + QuestRewards (full redeploy)
          - lastchad-only    # Re-deploy LastChad only (e.g. stat point changes), re-auth QuestRewards
          - quest-only       # Deploy QuestRewards only (LastChad + Items already deployed)
          - gamble           # Deploy Gamble only (LastChad already deployed)
          - worker           # Cloudflare Worker only
          - authorize        # Re-authorize already-deployed QuestRewards in LastChad + Items
          - verify           # Verify all contracts on Snowtrace (no deploy)
          - validate         # On-chain validation: confirm all contracts are live and wired
          - release-escrow   # Return all NFTs locked in QuestRewards escrow to their owners
          - gamble-open      # Open the gambling den (authorize Gamble in LastChad)
          - gamble-close     # Close the gambling den / maintenance mode (de-authorize Gamble)
          - award-owner-cells # Award 100 open cells to every Chad in the owner wallet
          - fix-worker       # Sync config.js addresses into worker + redeploy (safe, no contract changes)
          - approve-market   # Whitelist LastChad + Items on the Market contract
          - reset-tables     # Reset all 6 public craps tables (nuke stuck game state)
      network:
        description: 'Network (ignored if target=worker)'
        required: true
        default: 'fuji'
        type: choice
        options:
          - fuji
          - avalanche

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub secrets (Repo → Settings → Secrets and variables → Actions):
#
#   DEPLOYER_PRIVATE_KEY  — deployer wallet private key (hex, no 0x prefix)
#   ORACLE_ADDRESS        — oracle wallet public address (for setOracle on-chain)
#   CF_API_TOKEN          — Cloudflare API token (Workers:Edit permission)
#   CF_ACCOUNT_ID         — Cloudflare account ID
#   ORACLE_PRIVATE_KEY    — oracle private key stored inside the Worker
#   AGORA_APP_CERT        — Agora App Certificate for RTC token generation
#   KV_NAMESPACE_ID       — RUNNER_KV production namespace ID
#   KV_PREVIEW_ID         — RUNNER_KV preview namespace ID
#   SNOWTRACE_API_KEY     — Snowtrace API key for contract verification
#                           (free key from https://snowtrace.io/myapikey)
#                           Fuji testnet works without a real key
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy contracts
  # ───────────────────────────────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'all-contracts' || inputs.target == 'lastchad-only' || inputs.target == 'quest-only' || inputs.target == 'gamble'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Deploy all contracts (LastChad + Items + QuestRewards)
        if: inputs.target == 'all-contracts'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployAll.js --network ${{ inputs.network }}

      - name: Re-deploy LastChad only (re-auth existing QuestRewards)
        if: inputs.target == 'lastchad-only'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployLastChad.js --network ${{ inputs.network }}

      - name: Deploy QuestRewards only
        if: inputs.target == 'quest-only'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployQuestRewards.js --network ${{ inputs.network }}

      - name: Deploy Gamble only
        if: inputs.target == 'gamble'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployGamble.js --network ${{ inputs.network }}

      - name: Commit updated js/config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/config.js js/quest-globals.js
          if git diff --cached --quiet; then
            echo "config files unchanged — skipping commit"
          else
            git commit -m "chore: update contract addresses after deploy on ${{ inputs.network }} [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy Cloudflare Worker
  # always() lets this run even when deploy-contract was skipped (target=worker)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: |
      always() &&
      (inputs.target == 'worker' ||
       (inputs.target == 'all-contracts' && needs.deploy-contract.result != 'failure'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Patch KV namespace IDs into wrangler.toml
        working-directory: worker
        env:
          KV_ID:      ${{ secrets.KV_NAMESPACE_ID }}
          KV_PREVIEW: ${{ secrets.KV_PREVIEW_ID }}
        run: |
          sed -i "s|REPLACE_WITH_KV_NAMESPACE_ID|${KV_ID}|g" wrangler.toml
          sed -i "s|REPLACE_WITH_KV_PREVIEW_ID|${KV_PREVIEW}|g" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Push ORACLE_PRIVATE_KEY secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ORACLE_PRIVATE_KEY:    ${{ secrets.ORACLE_PRIVATE_KEY }}
        run: printf '%s' "$ORACLE_PRIVATE_KEY" | npx wrangler secret put ORACLE_PRIVATE_KEY

      - name: Push AGORA_APP_CERT secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AGORA_APP_CERT:        ${{ secrets.AGORA_APP_CERT }}
        run: |
          if [ -n "$AGORA_APP_CERT" ]; then
            printf '%s' "$AGORA_APP_CERT" | npx wrangler secret put AGORA_APP_CERT
          else
            echo "AGORA_APP_CERT not set — skipping"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Re-authorize an already-deployed QuestRewards contract
  # ───────────────────────────────────────────────────────────────────────────
  authorize-contracts:
    name: Authorize Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'authorize'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Authorize QuestRewards in LastChad + LastChadItems
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/authorizeContracts.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Verify contracts on Snowtrace
  # Reads addresses from js/config.js — no private key needed
  # ───────────────────────────────────────────────────────────────────────────
  verify-contracts:
    name: Verify Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'verify'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify all contracts on Snowtrace
        env:
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
        run: npx hardhat run scripts/verifyAll.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4b: Validate contracts on-chain (read-only, no secrets needed)
  # Confirms all 5 contracts are live and correctly wired together.
  # ───────────────────────────────────────────────────────────────────────────
  validate-contracts:
    name: Validate Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'validate'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate all contracts on-chain
        run: npx hardhat run scripts/validateContracts.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 5: Release all locked NFTs from QuestRewards escrow
  # ───────────────────────────────────────────────────────────────────────────
  release-escrow:
    name: Release Escrow (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'release-escrow'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Release all NFTs in escrow back to their owners
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/releaseEscrow.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 6: Open or close the gambling den
  # ───────────────────────────────────────────────────────────────────────────
  toggle-gamble:
    name: ${{ inputs.target == 'gamble-open' && 'Open Gambling Den' || 'Close Gambling Den (Maintenance)' }} (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'gamble-open' || inputs.target == 'gamble-close'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Toggle gambling den authorization
        env:
          PRIVATE_KEY:  ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          GAMBLE_OPEN:  ${{ inputs.target == 'gamble-open' && 'true' || 'false' }}
        run: npx hardhat run scripts/toggleGamble.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 7: Award 100 open cells to every Chad in the owner wallet
  # ───────────────────────────────────────────────────────────────────────────
  award-owner-cells:
    name: Award 100 Cells to Owner Chads (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'award-owner-cells'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Award 100 cells to each Chad in owner wallet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/awardOwnerCells.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 8: Whitelist LastChad + Items on the Market contract
  # Run this after deploying a new Market, or after an all-contracts redeploy
  # if the Market address was already set in js/config.js beforehand.
  # ───────────────────────────────────────────────────────────────────────────
  approve-market:
    name: Approve Contracts on Market (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'approve-market'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Whitelist LastChad + Items on Market contract
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/approveMarketContracts.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job: Fix Worker — sync addresses from js/config.js and redeploy
  # Safe to run anytime — no on-chain transactions.
  # ───────────────────────────────────────────────────────────────────────────
  fix-worker:
    name: Fix & Redeploy Worker
    runs-on: ubuntu-latest
    if: inputs.target == 'fix-worker'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync contract addresses from js/config.js → wrangler.toml
        working-directory: worker
        run: |
          LASTCHAD=$(grep "CONTRACT_ADDRESS\b" ../js/config.js | head -1 | sed "s/.*'\(0x[a-fA-F0-9]*\)'.*/\1/")
          QUESTREWARDS=$(grep "QUEST_REWARDS_ADDRESS" ../js/config.js | head -1 | sed "s/.*'\(0x[a-fA-F0-9]*\)'.*/\1/")
          GAMBLE=$(grep "GAMBLE_ADDRESS" ../js/config.js | head -1 | sed "s/.*'\(0x[a-fA-F0-9]*\)'.*/\1/")
          RPC=$(grep "READ_RPC" ../js/config.js | head -1 | sed "s/.*'\(https[^']*\)'.*/\1/")

          echo "LastChad:     $LASTCHAD"
          echo "QuestRewards: $QUESTREWARDS"
          echo "Gamble:       $GAMBLE"
          echo "RPC:          $RPC"

          sed -i "s|LASTCHAD_ADDRESS.*=.*\"0x[a-fA-F0-9]*\"|LASTCHAD_ADDRESS      = \"${LASTCHAD}\"|" wrangler.toml
          sed -i "s|QUEST_REWARDS_ADDRESS.*=.*\"0x[a-fA-F0-9]*\"|QUEST_REWARDS_ADDRESS = \"${QUESTREWARDS}\"|" wrangler.toml
          sed -i "s|GAMBLE_ADDRESS.*=.*\"0x[a-fA-F0-9]*\"|GAMBLE_ADDRESS        = \"${GAMBLE}\"|" wrangler.toml
          sed -i "s|READ_RPC.*=.*\"https[^\"]*\"|READ_RPC              = \"${RPC}\"|" wrangler.toml

          echo "--- Updated wrangler.toml ---"
          cat wrangler.toml

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Patch KV namespace IDs into wrangler.toml
        working-directory: worker
        env:
          KV_ID:      ${{ secrets.KV_NAMESPACE_ID }}
          KV_PREVIEW: ${{ secrets.KV_PREVIEW_ID }}
        run: |
          sed -i "s|REPLACE_WITH_KV_NAMESPACE_ID|${KV_ID}|g" wrangler.toml
          sed -i "s|REPLACE_WITH_KV_PREVIEW_ID|${KV_PREVIEW}|g" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Push ORACLE_PRIVATE_KEY secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ORACLE_PRIVATE_KEY:    ${{ secrets.ORACLE_PRIVATE_KEY }}
        run: printf '%s' "$ORACLE_PRIVATE_KEY" | npx wrangler secret put ORACLE_PRIVATE_KEY

      - name: Push AGORA_APP_CERT secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AGORA_APP_CERT:        ${{ secrets.AGORA_APP_CERT }}
        run: |
          if [ -n "$AGORA_APP_CERT" ]; then
            printf '%s' "$AGORA_APP_CERT" | npx wrangler secret put AGORA_APP_CERT
          else
            echo "AGORA_APP_CERT not set — skipping"
          fi

      - name: Commit synced wrangler.toml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worker/wrangler.toml
          if git diff --cached --quiet; then
            echo "wrangler.toml already up to date — skipping commit"
          else
            git commit -m "chore: sync worker contract addresses from config.js [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job: Reset all public craps tables (nuke stuck game state in DOs)
  # ───────────────────────────────────────────────────────────────────────────
  reset-tables:
    name: Reset All Craps Tables
    runs-on: ubuntu-latest
    if: inputs.target == 'reset-tables'

    steps:
      - name: Reset all 6 public tables via /tables/reset-all
        env:
          ORACLE_PRIVATE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
        run: |
          WORKER_URL="https://last-chad-runner.severin20.workers.dev"
          echo "Resetting all public craps tables..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${WORKER_URL}/tables/reset-all" \
            -H "Authorization: Bearer ${ORACLE_PRIVATE_KEY}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP ${HTTP_CODE}"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Reset failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "All tables reset successfully."

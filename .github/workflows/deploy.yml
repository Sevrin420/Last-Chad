name: Deploy QuestRewards

# Trigger manually from GitHub mobile app or web UI:
# Repo → Actions → "Deploy QuestRewards" → Run workflow
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'fuji'
        type: choice
        options:
          - fuji
          - avalanche

jobs:
  deploy:
    name: Deploy & Wire Contracts
    runs-on: ubuntu-latest

    # Only allow the repo owner to trigger production deploys
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access to commit the updated config back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy QuestRewards
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          npx hardhat run scripts/deployQuestRewards.js --network ${{ inputs.network }}

      - name: Commit updated js/config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/config.js
          # Only commit if the address actually changed
          if git diff --cached --quiet; then
            echo "config.js unchanged — skipping commit"
          else
            git commit -m "Deploy: update QUEST_REWARDS_ADDRESS on ${{ inputs.network }} [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "config.js committed and pushed"
          fi

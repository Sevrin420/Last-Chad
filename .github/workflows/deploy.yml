name: Deploy

# Trigger manually from GitHub mobile app:
# Repo → Actions → "Deploy" → Run workflow → pick what to deploy
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'worker'
        type: choice
        options:
          - worker           # Cloudflare Worker only
          - contract         # QuestRewards contract only
          - both             # Contract + Worker (full redeploy)
      network:
        description: 'Contract network (ignored if target=worker)'
        required: true
        default: 'fuji'
        type: choice
        options:
          - fuji
          - avalanche

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub secrets:
#
#   DEPLOYER_PRIVATE_KEY  — wallet private key (hex, no 0x) for contract deploy
#   ORACLE_ADDRESS        — oracle wallet address (for setOracle on-chain)
#   CF_API_TOKEN          — Cloudflare API token (Workers:Edit permission)
#   CF_ACCOUNT_ID         — Cloudflare account ID
#   ORACLE_PRIVATE_KEY    — oracle private key (hex, no 0x) stored in Worker
#   KV_NAMESPACE_ID       — RUNNER_KV production namespace ID
#   KV_PREVIEW_ID         — RUNNER_KV preview namespace ID
#
# Set secrets at: Repo → Settings → Secrets and variables → Actions
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy QuestRewards contract
  # ───────────────────────────────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Contract (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'contract' || inputs.target == 'both'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Deploy QuestRewards
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: |
          npx hardhat run scripts/deployQuestRewards.js --network ${{ inputs.network }}

      - name: Commit updated js/config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/config.js
          if git diff --cached --quiet; then
            echo "config.js unchanged — skipping commit"
          else
            git commit -m "Deploy: update QUEST_REWARDS_ADDRESS on ${{ inputs.network }} [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy Cloudflare Worker
  # always() lets this run even when deploy-contract was skipped (target=worker)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: |
      always() &&
      (inputs.target == 'worker' ||
       (inputs.target == 'both' && needs.deploy-contract.result != 'failure'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Patch KV namespace IDs into wrangler.toml
        working-directory: worker
        env:
          KV_ID:      ${{ secrets.KV_NAMESPACE_ID }}
          KV_PREVIEW: ${{ secrets.KV_PREVIEW_ID }}
        run: |
          sed -i "s|REPLACE_WITH_KV_NAMESPACE_ID|${KV_ID}|g" wrangler.toml
          sed -i "s|REPLACE_WITH_KV_PREVIEW_ID|${KV_PREVIEW}|g" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Push ORACLE_PRIVATE_KEY secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ORACLE_PRIVATE_KEY:    ${{ secrets.ORACLE_PRIVATE_KEY }}
        run: echo "$ORACLE_PRIVATE_KEY" | npx wrangler secret put ORACLE_PRIVATE_KEY

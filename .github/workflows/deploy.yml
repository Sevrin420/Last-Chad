name: Deploy

# Trigger manually from GitHub Actions tab:
# Repo → Actions → "Deploy" → Run workflow → pick target + network
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all-contracts'
        type: choice
        options:
          - all-contracts    # Deploy LastChad + LastChadItems + QuestRewards (full redeploy)
          - quest-only       # Deploy QuestRewards only (LastChad + Items already deployed)
          - gamble           # Deploy Gamble only (LastChad already deployed)
          - worker           # Cloudflare Worker only
          - authorize        # Re-authorize already-deployed QuestRewards in LastChad + Items
          - verify           # Verify all contracts on Snowtrace (no deploy)
          - release-escrow   # Return all NFTs locked in QuestRewards escrow to their owners
          - gamble-open      # Open the gambling den (authorize Gamble in LastChad)
          - gamble-close     # Close the gambling den / maintenance mode (de-authorize Gamble)
          - award-owner-cells # Award 100 open cells to every Chad in the owner wallet
      network:
        description: 'Network (ignored if target=worker)'
        required: true
        default: 'fuji'
        type: choice
        options:
          - fuji
          - avalanche

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub secrets (Repo → Settings → Secrets and variables → Actions):
#
#   DEPLOYER_PRIVATE_KEY  — deployer wallet private key (hex, no 0x prefix)
#   ORACLE_ADDRESS        — oracle wallet public address (for setOracle on-chain)
#   CF_API_TOKEN          — Cloudflare API token (Workers:Edit permission)
#   CF_ACCOUNT_ID         — Cloudflare account ID
#   ORACLE_PRIVATE_KEY    — oracle private key stored inside the Worker
#   KV_NAMESPACE_ID       — RUNNER_KV production namespace ID
#   KV_PREVIEW_ID         — RUNNER_KV preview namespace ID
#   SNOWTRACE_API_KEY     — Snowtrace API key for contract verification
#                           (free key from https://snowtrace.io/myapikey)
#                           Fuji testnet works without a real key
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy contracts
  # ───────────────────────────────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'all-contracts' || inputs.target == 'quest-only' || inputs.target == 'gamble'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Deploy all contracts (LastChad + Items + QuestRewards)
        if: inputs.target == 'all-contracts'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployAll.js --network ${{ inputs.network }}

      - name: Deploy QuestRewards only
        if: inputs.target == 'quest-only'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployQuestRewards.js --network ${{ inputs.network }}

      - name: Deploy Gamble only
        if: inputs.target == 'gamble'
        env:
          PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: npx hardhat run scripts/deployGamble.js --network ${{ inputs.network }}

      - name: Commit updated js/config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/config.js
          if git diff --cached --quiet; then
            echo "js/config.js unchanged — skipping commit"
          else
            git commit -m "chore: update contract addresses after deploy on ${{ inputs.network }} [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy Cloudflare Worker
  # always() lets this run even when deploy-contract was skipped (target=worker)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: |
      always() &&
      (inputs.target == 'worker' ||
       (inputs.target == 'all-contracts' && needs.deploy-contract.result != 'failure'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Patch KV namespace IDs into wrangler.toml
        working-directory: worker
        env:
          KV_ID:      ${{ secrets.KV_NAMESPACE_ID }}
          KV_PREVIEW: ${{ secrets.KV_PREVIEW_ID }}
        run: |
          sed -i "s|REPLACE_WITH_KV_NAMESPACE_ID|${KV_ID}|g" wrangler.toml
          sed -i "s|REPLACE_WITH_KV_PREVIEW_ID|${KV_PREVIEW}|g" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Push ORACLE_PRIVATE_KEY secret to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ORACLE_PRIVATE_KEY:    ${{ secrets.ORACLE_PRIVATE_KEY }}
        run: echo "$ORACLE_PRIVATE_KEY" | npx wrangler secret put ORACLE_PRIVATE_KEY

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Re-authorize an already-deployed QuestRewards contract
  # ───────────────────────────────────────────────────────────────────────────
  authorize-contracts:
    name: Authorize Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'authorize'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Authorize QuestRewards in LastChad + LastChadItems
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/authorizeContracts.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Verify contracts on Snowtrace
  # Reads addresses from js/config.js — no private key needed
  # ───────────────────────────────────────────────────────────────────────────
  verify-contracts:
    name: Verify Contracts (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'verify'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify all contracts on Snowtrace
        env:
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
        run: npx hardhat run scripts/verifyAll.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 5: Release all locked NFTs from QuestRewards escrow
  # ───────────────────────────────────────────────────────────────────────────
  release-escrow:
    name: Release Escrow (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'release-escrow'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Release all NFTs in escrow back to their owners
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/releaseEscrow.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 6: Open or close the gambling den
  # ───────────────────────────────────────────────────────────────────────────
  toggle-gamble:
    name: ${{ inputs.target == 'gamble-open' && 'Open Gambling Den' || 'Close Gambling Den (Maintenance)' }} (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'gamble-open' || inputs.target == 'gamble-close'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Toggle gambling den authorization
        env:
          PRIVATE_KEY:  ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          GAMBLE_OPEN:  ${{ inputs.target == 'gamble-open' && 'true' || 'false' }}
        run: npx hardhat run scripts/toggleGamble.js --network ${{ inputs.network }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 7: Award 100 open cells to every Chad in the owner wallet
  # ───────────────────────────────────────────────────────────────────────────
  award-owner-cells:
    name: Award 100 Cells to Owner Chads (${{ inputs.network }})
    runs-on: ubuntu-latest
    if: inputs.target == 'award-owner-cells'
    environment: ${{ inputs.network == 'avalanche' && 'mainnet' || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Award 100 cells to each Chad in owner wallet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx hardhat run scripts/awardOwnerCells.js --network ${{ inputs.network }}

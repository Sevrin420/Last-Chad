<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest Builder | Last Chad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      color: #f5e6c8;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #0a0a0f;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(92, 68, 9, 0.15) 0%, transparent 60%);
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10, 10, 15, 0.9);
      border-bottom: 2px solid #3d2e0a;
      backdrop-filter: blur(8px);
    }

    .header-title {
      font-size: 0.9rem;
      color: #c9a84c;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .main {
      position: relative;
      z-index: 1;
      margin-top: 80px;
      padding: 24px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 40px;
    }

    /* Quest Title Section */
    .quest-title-section {
      background: rgba(30, 20, 10, 0.8);
      border: 2px solid #c9a84c;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.2);
    }

    .quest-title-section h1 {
      font-size: 0.6rem;
      color: #7ee8d4;
      margin-bottom: 12px;
      text-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
    }

    .quest-title-section input,
    .quest-title-section textarea {
      width: 100%;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #7ee8d4;
      color: #f5e6c8;
      padding: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      border-radius: 2px;
      min-height: 40px;
    }

    .quest-title-section textarea {
      min-height: 80px;
      resize: vertical;
      max-height: 200px;
    }

    .quest-title-section input:focus,
    .quest-title-section textarea:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.4);
    }

    /* Section Container */
    .section-container {
      background: rgba(30, 20, 10, 0.6);
      border: 2px solid #7ee8d4;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.15);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid #7ee8d4;
      padding-bottom: 12px;
    }

    .section-num {
      font-size: 0.5rem;
      color: #c9a84c;
      background: rgba(201, 168, 76, 0.2);
      padding: 6px 12px;
      border-radius: 2px;
      border: 1px solid #c9a84c;
    }

    .section-delete-btn {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
      padding: 8px 12px;
      font-size: 0.3rem;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
    }

    .section-delete-btn:hover {
      background: rgba(255, 107, 107, 0.3);
    }

    /* Section Form Groups */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.4rem;
      color: #7ee8d4;
      margin-bottom: 8px;
      text-shadow: 0 0 4px rgba(126, 232, 212, 0.2);
    }

    .form-group input[type="text"],
    .form-group textarea {
      width: 100%;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #7ee8d4;
      color: #f5e6c8;
      padding: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      border-radius: 2px;
      min-height: 40px;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
      max-height: 200px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.4);
    }

    /* Photo Upload */
    .photo-upload {
      border: 2px dashed #7ee8d4;
      border-radius: 4px;
      padding: 16px;
      text-align: center;
      background: rgba(126, 232, 212, 0.05);
      cursor: pointer;
      transition: all 0.3s;
    }

    .photo-upload:hover {
      background: rgba(126, 232, 212, 0.1);
      border-color: #c9a84c;
    }

    .photo-upload input[type="file"] {
      display: none;
    }

    .photo-upload-text {
      color: #a0963d;
      font-size: 0.3rem;
      pointer-events: none;
    }

    .photo-preview {
      width: 100%;
      max-width: 300px;
      height: 200px;
      object-fit: cover;
      border: 1px solid #7ee8d4;
      border-radius: 2px;
      margin-top: 12px;
      display: none;
    }

    .photo-preview.visible {
      display: block;
    }

    /* Choice Options Grid */
    .choices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .choice-option {
      background: rgba(20, 15, 5, 0.8);
      border: 2px solid rgba(126, 232, 212, 0.5);
      border-radius: 4px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .choice-option:hover {
      border-color: #7ee8d4;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.3);
      transform: translateY(-2px);
    }

    .choice-option.selected {
      background: rgba(126, 232, 212, 0.2);
      border-color: #7ee8d4;
    }

    .choice-icon {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .choice-title {
      font-size: 0.35rem;
      color: #7ee8d4;
      margin-bottom: 8px;
      text-shadow: 0 0 4px rgba(126, 232, 212, 0.2);
    }

    .choice-desc {
      font-size: 0.25rem;
      color: #a0963d;
    }

    .choice-type {
      font-size: 0.2rem;
      color: #f5e6c8;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Choice Configuration */
    .choice-config {
      background: rgba(126, 232, 212, 0.1);
      border: 1px solid rgba(126, 232, 212, 0.3);
      border-radius: 4px;
      padding: 16px;
      margin-top: 20px;
      display: none;
    }

    .choice-config.visible {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .choice-config label {
      display: block;
      font-size: 0.4rem;
      color: #7ee8d4;
      margin-bottom: 8px;
      text-shadow: 0 0 4px rgba(126, 232, 212, 0.2);
    }

    .choice-config select {
      width: 100%;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #7ee8d4;
      color: #f5e6c8;
      padding: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .choice-config select:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.4);
    }

    .choice-config select option {
      background: #0a0a0f;
      color: #f5e6c8;
    }

    .section-music-select {
      width: 100%;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #c9a84c;
      color: #f5e6c8;
      padding: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      border-radius: 2px;
    }
    .section-music-select:focus { outline: none; border-color: #7ee8d4; }
    .section-music-select option { background: #0a0a0f; color: #f5e6c8; }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .button-row input {
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #7ee8d4;
      color: #f5e6c8;
      padding: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      border-radius: 2px;
    }

    .button-row input:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.4);
    }

    .dice-placeholder {
      background: rgba(20, 15, 5, 0.9);
      border: 2px dashed #7ee8d4;
      border-radius: 4px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .dice-placeholder:hover {
      background: rgba(126, 232, 212, 0.05);
      border-color: #c9a84c;
    }

    .dice-placeholder input[type="file"] {
      display: none;
    }

    .dice-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .dice-text {
      color: #a0963d;
      font-size: 0.3rem;
      line-height: 1.4;
    }

    /* Button Preview */
    .button-preview {
      margin-top: 20px;
      padding: 16px;
      background: rgba(126, 232, 212, 0.05);
      border: 1px solid rgba(126, 232, 212, 0.3);
      border-radius: 4px;
    }

    .button-preview-label {
      font-size: 0.3rem;
      color: #7ee8d4;
      margin-bottom: 12px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .single-button-preview {
      display: inline-block;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 12px 24px;
      font-size: 0.35rem;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
      min-width: 150px;
      text-align: center;
    }

    .double-buttons-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .double-button-preview {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 12px 16px;
      font-size: 0.3rem;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
      text-align: center;
      word-break: break-word;
    }

    /* Add Section Button */
    .add-section-btn {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.2) 0%, rgba(126, 232, 212, 0.1) 100%);
      border: 2px solid #7ee8d4;
      color: #7ee8d4;
      padding: 16px 32px;
      font-size: 0.4rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      margin: 30px auto;
      display: block;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
    }

    .add-section-btn:hover {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.3) 0%, rgba(126, 232, 212, 0.2) 100%);
      box-shadow: 0 0 16px rgba(126, 232, 212, 0.4);
    }

    .add-section-btn:active {
      transform: scale(0.98);
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      justify-content: center;
    }

    .primary-btn, .secondary-btn {
      padding: 12px 24px;
      font-size: 0.35rem;
      font-family: 'Press Start 2P', monospace;
      border: 2px solid;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
    }

    .primary-btn {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.4) 0%, rgba(201, 168, 76, 0.2) 100%);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.3);
    }

    .secondary-btn {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.2) 0%, rgba(126, 232, 212, 0.1) 100%);
      border-color: #7ee8d4;
      color: #7ee8d4;
    }

    .secondary-btn:hover {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.3) 0%, rgba(126, 232, 212, 0.2) 100%);
      box-shadow: 0 0 16px rgba(126, 232, 212, 0.3);
    }

    /* Tree View Button */
    .tree-view-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border: 2px solid #c9a84c;
      color: #c9a84c;
      font-size: 1.5rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
      box-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
    }

    .tree-view-btn:hover {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.4) 0%, rgba(201, 168, 76, 0.2) 100%);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
      transform: scale(1.05);
    }

    .tree-view-btn:active {
      transform: scale(0.95);
    }

    /* Tree View Modal */
    .tree-view-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      backdrop-filter: blur(4px);
    }

    .tree-view-modal.open {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .tree-view-content {
      background: rgba(10, 10, 15, 0.95);
      border: 2px solid #c9a84c;
      border-radius: 8px;
      width: 90%;
      max-width: 900px;
      height: 80vh;
      max-height: 700px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
    }

    .tree-view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 2px solid #c9a84c;
    }

    .tree-view-header h2 {
      font-size: 0.5rem;
      color: #c9a84c;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .tree-view-close {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
    }

    .tree-view-close:hover {
      background: rgba(255, 107, 107, 0.3);
    }

    .tree-view-body {
      flex: 1;
      overflow: auto;
      padding: 20px;
      background: rgba(20, 15, 10, 0.5);
    }

    /* Quest Published Modal */
    .quest-published-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 400;
      backdrop-filter: blur(4px);
    }

    .quest-published-modal.open {
      display: flex;
      animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .quest-published-content {
      background: rgba(10, 10, 15, 0.95);
      border: 2px solid #7ee8d4;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 0 40px rgba(126, 232, 212, 0.4);
      overflow: hidden;
    }

    .published-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 2px solid #7ee8d4;
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.1) 0%, rgba(126, 232, 212, 0.05) 100%);
    }

    .published-header h2 {
      font-size: 0.55rem;
      color: #7ee8d4;
      text-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
      margin: 0;
    }

    .published-close {
      background: rgba(126, 232, 212, 0.2);
      border: 1px solid #7ee8d4;
      color: #7ee8d4;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
    }

    .published-close:hover {
      background: rgba(126, 232, 212, 0.3);
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.3);
    }

    .published-body {
      padding: 24px;
      background: rgba(20, 15, 10, 0.5);
    }

    .published-message {
      font-size: 0.35rem;
      color: #f5e6c8;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .published-link-box {
      background: rgba(126, 232, 212, 0.05);
      border: 1px solid rgba(126, 232, 212, 0.3);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .published-label {
      font-size: 0.3rem;
      color: #7ee8d4;
      margin-bottom: 12px;
      text-shadow: 0 0 4px rgba(126, 232, 212, 0.2);
    }

    .link-container {
      display: flex;
      gap: 8px;
    }

    .quest-link-input {
      flex: 1;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #c9a84c;
      color: #c9a84c;
      padding: 10px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.25rem;
      border-radius: 2px;
      word-break: break-all;
    }

    .copy-btn {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.2) 0%, rgba(126, 232, 212, 0.1) 100%);
      border: 1px solid #7ee8d4;
      color: #7ee8d4;
      padding: 10px 12px;
      font-size: 0.3rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.3) 0%, rgba(126, 232, 212, 0.2) 100%);
      box-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
    }

    .published-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .published-btn-primary {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 12px 16px;
      font-size: 0.3rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .published-btn-primary:hover {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.4) 0%, rgba(201, 168, 76, 0.2) 100%);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.3);
    }

    .published-btn-secondary {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.2) 0%, rgba(126, 232, 212, 0.1) 100%);
      border: 2px solid #7ee8d4;
      color: #7ee8d4;
      padding: 12px 16px;
      font-size: 0.3rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
    }

    .published-btn-secondary:hover {
      background: linear-gradient(135deg, rgba(126, 232, 212, 0.3) 0%, rgba(126, 232, 212, 0.2) 100%);
      box-shadow: 0 0 16px rgba(126, 232, 212, 0.3);
    }

    /* Publish Progress Modal */
    .publish-progress-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(4px);
    }

    .publish-progress-modal.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .publish-progress-content {
      background: rgba(10, 10, 15, 0.97);
      border: 2px solid #c9a84c;
      border-radius: 8px;
      width: 90%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
    }

    .publish-progress-title {
      font-size: 0.5rem;
      color: #c9a84c;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
      margin-bottom: 20px;
      text-align: center;
    }

    .progress-bar-track {
      background: rgba(201, 168, 76, 0.15);
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 4px;
      height: 18px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a84c, #f5e6c8);
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
    }

    .progress-step-label {
      font-size: 0.28rem;
      color: #7ee8d4;
      text-align: center;
      margin-bottom: 8px;
      min-height: 1.4em;
      line-height: 1.4;
    }

    .progress-counter {
      font-size: 0.25rem;
      color: #a0963d;
      text-align: center;
    }

    /* Stat Bonus Checkboxes */
    .stat-bonus-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-cb-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.35rem;
      color: #f5e6c8;
      cursor: pointer;
      padding: 8px 10px;
      background: rgba(20, 15, 5, 0.8);
      border: 1px solid rgba(126, 232, 212, 0.4);
      border-radius: 2px;
      transition: all 0.2s;
    }

    .stat-cb-label:hover {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
    }

    .stat-cb-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #c9a84c;
      cursor: pointer;
      flex-shrink: 0;
    }

    .stat-cb-label.checked {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.15);
      color: #c9a84c;
    }

    .difficulty-input {
      width: 80px;
      background: rgba(20, 15, 5, 0.9);
      border: 1px solid #7ee8d4;
      color: #f5e6c8;
      padding: 10px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .difficulty-input:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main {
        padding: 16px;
      }

      .choices-grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 0.6rem;
      }

      .tree-view-btn {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .tree-view-content {
        width: 95%;
        height: 90vh;
      }
    }
  </style>
  <script src="github-api.js"></script>
</head>
<body>
  <div class="bg"></div>

  <!-- Tree View Button -->
  <button class="tree-view-btn" id="treeViewBtn" title="View Quest Tree Logic">!</button>

  <!-- Tree View Modal -->
  <div class="tree-view-modal" id="treeViewModal">
    <div class="tree-view-content">
      <div class="tree-view-header">
        <h2>Quest Logic Tree</h2>
        <button class="tree-view-close" id="treeViewClose">✕</button>
      </div>
      <div class="tree-view-body" id="treeViewBody">
        <svg id="treeViewSvg" style="width: 100%; height: 100%; min-height: 400px;"></svg>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="header-title">⚔️ QUEST BUILDER</div>
    <div class="nav-menu" id="navMenu"></div>
  </div>

  <div class="main">
    <!-- Quest Title & Intro -->
    <div class="quest-title-section">
      <h1>📜 Quest Name</h1>
      <input type="text" id="questName" placeholder="Enter quest name..." maxlength="50">
      <h1 style="margin-top: 24px;">🖼️ Intro Image</h1>
      <div class="photo-upload" id="introPhotoUpload">
        <input type="file" accept="image/*" id="introPhotoInput">
        <div class="photo-upload-text">📷 Click to upload intro image</div>
      </div>
      <img class="photo-preview" id="introPhotoPreview" src="" alt="Intro image">
      <h1 style="margin-top: 24px;">🗺️ Intro Dialogue</h1>
      <textarea id="introDialogue" placeholder="Opening text shown on the START screen before the quest begins... (optional)"></textarea>
      <h1 style="margin-top: 24px;">⚙️ Worker URL</h1>
      <input type="text" id="workerUrl" placeholder="https://last-chad-runner.YOUR-ACCOUNT.workers.dev" style="font-size:0.45rem;">
    </div>

    <!-- Sections Container -->
    <div id="sectionsContainer"></div>

    <!-- Add Section Button -->
    <button class="add-section-btn" id="addSectionBtn">➕ Add Section</button>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="secondary-btn" id="exportBtn">📥 Export JSON</button>
      <button class="primary-btn" id="saveBtn">💾 Save Quest</button>
    </div>
  </div>

  <!-- Publish Progress Modal -->
  <div class="publish-progress-modal" id="publishProgressModal">
    <div class="publish-progress-content">
      <div class="publish-progress-title">🚀 Publishing Quest...</div>
      <div class="progress-step-label" id="progressStepLabel">Preparing...</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>
      <div class="progress-counter" id="progressCounter">0 / 0</div>
    </div>
  </div>

  <!-- Quest Published Modal -->
  <div class="quest-published-modal" id="questPublishedModal">
    <div class="quest-published-content">
      <div class="published-header">
        <h2>✅ Quest Published!</h2>
        <button class="published-close" id="publishedClose">✕</button>
      </div>
      <div class="published-body">
        <p class="published-message" id="publishedMessage"></p>
        <div class="published-link-box">
          <p class="published-label">🎮 Test your quest on Vercel:</p>
          <div class="link-container">
            <input type="text" id="questLinkInput" class="quest-link-input" readonly>
            <button class="copy-btn" id="copyLinkBtn">📋 Copy</button>
          </div>
        </div>
        <div class="published-actions">
          <button class="published-btn-primary" id="openQuestBtn">🚀 Open Quest</button>
          <button class="published-btn-secondary" id="closePublishedBtn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="nav.js"></script>
  <script>
    // HTML escaping helpers
    function escAttr(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    function escContent(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    // Escape text for inside a <textarea> (prevent early close)
    function escTextarea(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }

    const MAX_XP_PER_QUEST = 50; // matches worker hard cap

    // State management
    const state = {
      questName: '',
      introDialogue: '',
      introPhoto: null,
      sections: []
    };

    // Music tracks loaded from music/manifest.json
    let musicTracks = [];

    // Games loaded from games/manifest.json
    let gameFiles = [];

    // Resize an image data URL to 2/3 of its original dimensions
    function resizeImage(dataUrl, callback) {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.naturalWidth  * 2 / 3);
        canvas.height = Math.round(img.naturalHeight * 2 / 3);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = dataUrl;
    }

    // Initialize
    function init() {
      loadQuestData();
      document.getElementById('questName').addEventListener('input', handleQuestNameChange);
      document.getElementById('introDialogue').addEventListener('input', handleIntroDialogueChange);

      // Intro photo upload
      const introUpload = document.getElementById('introPhotoUpload');
      introUpload.addEventListener('click', () => document.getElementById('introPhotoInput').click());
      document.getElementById('introPhotoInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          resizeImage(ev.target.result, (resized) => {
            state.introPhoto = resized;
            const preview = document.getElementById('introPhotoPreview');
            preview.src = resized;
            preview.classList.add('visible');
            saveQuestAuto();
          });
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      });
      document.getElementById('addSectionBtn').addEventListener('click', addSection);
      document.getElementById('saveBtn').addEventListener('click', saveQuest);
      document.getElementById('exportBtn').addEventListener('click', exportQuest);
      document.getElementById('treeViewBtn').addEventListener('click', openTreeView);
      document.getElementById('treeViewClose').addEventListener('click', closeTreeView);
      document.getElementById('treeViewModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('treeViewModal')) closeTreeView();
      });

      // Choice selection — single delegation, attached once here in init()
      document.getElementById('sectionsContainer').addEventListener('change', (e) => {
        const select = e.target.closest('.section-action-type-select');
        if (select) {
          const sectionId = parseInt(select.dataset.sectionId);
          const choice = select.value || null;
          const section = state.sections.find(s => s.id === sectionId);
          if (section) {
            section.selectedChoice = choice;
            renderSections();
            saveQuestAuto();
          }
        }
      });

      renderSections();

      // Load music track list for dropdowns
      fetch('music/manifest.json')
        .then(r => r.json())
        .then(tracks => {
          musicTracks = tracks || [];
          // Re-render so dropdowns populate with the loaded tracks
          renderSections();
        })
        .catch(() => { musicTracks = []; console.warn('music/manifest.json not found — music dropdowns will be empty.'); });

      // Load game list from games/manifest.json
      fetch('games/manifest.json')
        .then(r => r.json())
        .then(games => {
          gameFiles = games || [];
          renderSections();
        })
        .catch(() => { gameFiles = []; console.warn('games/manifest.json not found — game dropdowns will be empty.'); });
    }

    // Load saved data
    function loadQuestData() {
      const saved = localStorage.getItem('questBuilderData');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          state.questName = data.questName || '';
          state.introDialogue = data.introDialogue || '';
          state.introPhoto = data.introPhoto || null;
          state.sections = (data.sections || []).map(section => ({
            id: section.id,
            name: section.name || '',
            photo: section.photo || null,
            dialogue: section.dialogue || '',
            selectedChoice: section.selectedChoice || null,
            buttonName: section.buttonName || 'Continue',
            button1Name: section.button1Name || 'Choice A',
            button2Name: section.button2Name || 'Choice B',
            diceImage: section.diceImage || null,
            nextSectionId: section.nextSectionId || null,
            choice1NextSectionId: section.choice1NextSectionId || null,
            choice2NextSectionId: section.choice2NextSectionId || null,
            passNextSectionId: section.passNextSectionId || null,
            failNextSectionId: section.failNextSectionId || null,
            statBonus: section.statBonus || null,
            difficulty: section.difficulty !== undefined ? section.difficulty : 8,
            music: section.music || null,
            itemAward: section.itemAward || null,
            gameFile: section.gameFile || null
          }));
          document.getElementById('questName').value = state.questName;
          document.getElementById('introDialogue').value = state.introDialogue;
          if (state.introPhoto) {
            const preview = document.getElementById('introPhotoPreview');
            preview.src = state.introPhoto;
            preview.classList.add('visible');
          }
        } catch (e) {
          console.error('Error loading quest data:', e);
          state.sections = [];
        }
      }

      // Ensure at least one section
      if (state.sections.length === 0) {
        addSection();
      }
    }

    function handleQuestNameChange(e) {
      state.questName = e.target.value;
      saveQuestAuto();
    }

    function handleIntroDialogueChange(e) {
      state.introDialogue = e.target.value;
      saveQuestAuto();
    }

    function addSection() {
      const newSection = {
        id: Date.now(),
        name: `Section ${state.sections.length + 1}`,
        photo: null,
        dialogue: '',
        selectedChoice: null, // 'single', 'double', or 'dice'
        // Single button config
        buttonName: 'Continue',
        nextSectionId: null,
        // Double button config
        button1Name: 'Choice A',
        button2Name: 'Choice B',
        choice1NextSectionId: null,
        choice2NextSectionId: null,
        // Dice config
        diceImage: null,
        passNextSectionId: null,
        failNextSectionId: null,
        statBonus: null,
        difficulty: 8,
        sectionXp: 0,
        music: null,
        itemAward: null,
        gameFile: null
      };
      state.sections.push(newSection);
      renderSections();
      saveQuestAuto();
    }

    function deleteSection(id) {
      state.sections = state.sections.filter(s => s.id !== id);
      renderSections();
      saveQuestAuto();
    }

    function renderSections() {
      const container = document.getElementById('sectionsContainer');
      container.innerHTML = '';

      state.sections.forEach((section, idx) => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'section-container';
        sectionEl.innerHTML = `
          <div class="section-header">
            <span class="section-num">Section ${idx + 1}</span>
            ${state.sections.length > 1 ? `<button class="section-delete-btn" onclick="deleteSection(${section.id})">✕ Delete</button>` : ''}
          </div>

          <!-- Section Name -->
          <div class="form-group">
            <label>Section Name</label>
            <input type="text" placeholder="e.g., The Forest Entrance" value="${escAttr(section.name)}" data-section-id="${section.id}" class="section-name-input">
          </div>

          <!-- Photo Upload (hidden when dice action is selected) -->
          <div class="form-group" ${section.selectedChoice === 'dice' ? 'style="display:none"' : ''} data-photo-group="${section.id}">
            <label>Section Image</label>
            <div class="photo-upload" data-section-id="${section.id}">
              <input type="file" accept="image/*" data-section-id="${section.id}">
              <div class="photo-upload-text">📷 Click to upload image</div>
            </div>
            <img class="photo-preview ${section.photo ? 'visible' : ''}" src="${section.photo || ''}" alt="Section image" data-section-id="${section.id}">
          </div>

          <!-- Dialogue Box -->
          <div class="form-group">
            <label>Dialogue / Story Text</label>
            <textarea placeholder="What does the NPC say? Describe the scene..." data-section-id="${section.id}" class="section-dialogue-input">${escTextarea(section.dialogue)}</textarea>
          </div>

          <!-- Section XP -->
          <div class="form-group">
            <label>⭐ Section XP (awarded at quest end)</label>
            <input type="number" class="section-xp-input" min="0" max="${MAX_XP_PER_QUEST}" value="${section.sectionXp !== undefined ? section.sectionXp : 0}" data-section-id="${section.id}" placeholder="0">
          </div>

          <!-- Music for this section -->
          <div class="form-group">
            <label>♪ Background Music</label>
            <select class="section-music-select" data-section-id="${section.id}">
              <option value="">— none —</option>
              ${musicTracks.map(t => `<option value="music/${t.file}" ${section.music === 'music/' + t.file ? 'selected' : ''}>${escAttr(t.name)}</option>`).join('')}
            </select>
          </div>

          <!-- Item Award -->
          <div class="form-group">
            <label>🎁 Item Award</label>
            <select class="section-item-award-select" data-section-id="${section.id}">
              <option value="">-- No Item --</option>
              <option value="1" ${section.itemAward === '1' ? 'selected' : ''}>1: Cindy's Code</option>
            </select>
          </div>

          <!-- Embedded Game -->
          <div class="form-group">
            <label>🎮 Embedded Game</label>
            <select class="section-game-select" data-section-id="${section.id}">
              <option value="">-- No Game --</option>
              ${gameFiles.map(g => `<option value="${escAttr(g.file)}" ${section.gameFile === g.file ? 'selected' : ''}>${escContent(g.name)}</option>`).join('')}
            </select>
          </div>

          <!-- Choice Options -->
          <div class="form-group">
            <label>Choose Action Type</label>
            <select class="section-action-type-select" data-section-id="${section.id}">
              <option value="">-- Choose action type --</option>
              <option value="single" ${section.selectedChoice === 'single' ? 'selected' : ''}>🔘 Single Button → Next Section</option>
              <option value="double" ${section.selectedChoice === 'double' ? 'selected' : ''}>⚖️ Double Button → Branch</option>
              <option value="dice" ${section.selectedChoice === 'dice' ? 'selected' : ''}>🎲 Roll Dice → 0-12 XP</option>
            </select>
          </div>

          <!-- Single Button Config -->
          <div class="choice-config ${section.selectedChoice === 'single' ? 'visible' : ''}" data-config="single" data-section-id="${section.id}">
            <label>Button Text</label>
            <input type="text" class="button-name-input" placeholder="e.g., Continue, Accept Quest" value="${escAttr(section.buttonName || 'Continue')}" data-section-id="${section.id}">
            <label style="margin-top: 16px;">Leads To Section</label>
            <select class="next-section-select" data-section-id="${section.id}" data-choice-type="single">
              <option value="">-- No next section --</option>
              ${state.sections.map((s, i) => `<option value="${s.id}" ${section.nextSectionId == s.id ? 'selected' : ''}>Section ${i + 1}: ${escContent(s.name)}</option>`).join('')}
            </select>
          </div>

          <!-- Double Button Config -->
          <div class="choice-config ${section.selectedChoice === 'double' ? 'visible' : ''}" data-config="double" data-section-id="${section.id}">
            <label>First Choice Button</label>
            <input type="text" class="button1-name-input" placeholder="e.g., Accept" value="${escAttr(section.button1Name || 'Choice A')}" data-section-id="${section.id}" style="margin-bottom: 12px;">
            <label style="margin-bottom: 8px;">Leads To Section</label>
            <select class="choice1-next-section-select" data-section-id="${section.id}">
              <option value="">-- No next section --</option>
              ${state.sections.map((s, i) => `<option value="${s.id}" ${section.choice1NextSectionId == s.id ? 'selected' : ''}>Section ${i + 1}: ${escContent(s.name)}</option>`).join('')}
            </select>

            <label style="margin-top: 16px;">Second Choice Button</label>
            <input type="text" class="button2-name-input" placeholder="e.g., Decline" value="${escAttr(section.button2Name || 'Choice B')}" data-section-id="${section.id}" style="margin-bottom: 12px;">
            <label style="margin-bottom: 8px;">Leads To Section</label>
            <select class="choice2-next-section-select" data-section-id="${section.id}">
              <option value="">-- No next section --</option>
              ${state.sections.map((s, i) => `<option value="${s.id}" ${section.choice2NextSectionId == s.id ? 'selected' : ''}>Section ${i + 1}: ${escContent(s.name)}</option>`).join('')}
            </select>
          </div>

          <!-- Dice Config -->
          <div class="choice-config ${section.selectedChoice === 'dice' ? 'visible' : ''}" data-config="dice" data-section-id="${section.id}">
            <label>Dice Placeholder Image</label>
            <div class="dice-placeholder" data-section-id="${section.id}">
              <input type="file" accept="image/*" data-section-id="${section.id}" class="dice-image-input">
              <div class="dice-icon">🎲</div>
              <div class="dice-text">Click to upload dice visual<br>(or use placeholder)</div>
            </div>
            ${section.diceImage ? `<img src="${section.diceImage}" style="width: 100%; max-width: 200px; margin-top: 16px; border: 1px solid #7ee8d4; border-radius: 2px;">` : ''}

            <label style="margin-top: 20px;">Stat Bonus</label>
            <div class="stat-bonus-grid">
              <label class="stat-cb-label ${section.statBonus === 'strength' ? 'checked' : ''}">
                <input type="checkbox" class="stat-bonus-cb" value="strength" data-section-id="${section.id}" ${section.statBonus === 'strength' ? 'checked' : ''}> STR
              </label>
              <label class="stat-cb-label ${section.statBonus === 'intelligence' ? 'checked' : ''}">
                <input type="checkbox" class="stat-bonus-cb" value="intelligence" data-section-id="${section.id}" ${section.statBonus === 'intelligence' ? 'checked' : ''}> INT
              </label>
              <label class="stat-cb-label ${section.statBonus === 'dexterity' ? 'checked' : ''}">
                <input type="checkbox" class="stat-bonus-cb" value="dexterity" data-section-id="${section.id}" ${section.statBonus === 'dexterity' ? 'checked' : ''}> DEX
              </label>
              <label class="stat-cb-label ${section.statBonus === 'charisma' ? 'checked' : ''}">
                <input type="checkbox" class="stat-bonus-cb" value="charisma" data-section-id="${section.id}" ${section.statBonus === 'charisma' ? 'checked' : ''}> CHA
              </label>
            </div>

            <label>Roll Difficulty (2–12)</label>
            <input type="number" class="difficulty-input" min="2" max="12" value="${section.difficulty !== undefined ? section.difficulty : 8}" data-section-id="${section.id}">

            <label style="margin-top: 20px;">On Pass</label>
            <select class="pass-next-section-select" data-section-id="${section.id}">
              <option value="">-- No next section --</option>
              ${state.sections.map((s, i) => `<option value="${s.id}" ${section.passNextSectionId == s.id ? 'selected' : ''}>Section ${i + 1}: ${escContent(s.name)}</option>`).join('')}
            </select>

            <label style="margin-top: 16px;">On Fail</label>
            <select class="fail-next-section-select" data-section-id="${section.id}">
              <option value="">-- No next section --</option>
              ${state.sections.map((s, i) => `<option value="${s.id}" ${section.failNextSectionId == s.id ? 'selected' : ''}>Section ${i + 1}: ${escContent(s.name)}</option>`).join('')}
            </select>
          </div>

          <!-- Button Preview -->
          ${section.selectedChoice === 'single' ? `
            <div class="button-preview">
              <div class="button-preview-label">📦 Button Preview</div>
              <div class="single-button-preview">${escContent(section.buttonName || 'Continue')}</div>
            </div>
          ` : ''}

          ${section.selectedChoice === 'double' ? `
            <div class="button-preview">
              <div class="button-preview-label">📦 Button Preview</div>
              <div class="double-buttons-preview">
                <div class="double-button-preview">${escContent(section.button1Name || 'Choice A')}</div>
                <div class="double-button-preview">${escContent(section.button2Name || 'Choice B')}</div>
              </div>
            </div>
          ` : ''}

          ${section.selectedChoice === 'dice' ? `
            <div class="button-preview">
              <div class="button-preview-label">🎲 Dice Roll Preview</div>
              <div style="text-align: center; color: #a0963d; font-size: 0.3rem;">Player will roll dice and calculate XP</div>
            </div>
          ` : ''}
        `;

        container.appendChild(sectionEl);
      });

      // Attach event listeners
      attachSectionEventListeners();
    }

    function attachSectionEventListeners() {
      // Section name input
      document.querySelectorAll('.section-name-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const sectionId = parseInt(e.target.dataset.sectionId);

    function saveQuest() {
      saveQuestAuto();

      // Validate quest before publishing
      if (!state.questName || state.questName.trim() === '') {
        alert('⚠️ Please enter a quest name!');
        return;
      }

      if (!state.sections || state.sections.length === 0) {
        alert('⚠️ Please add at least one section!');
        return;
      }

      // Validate each section has required fields
      const sectionIds = new Set(state.sections.map(s => s.id));
      for (const section of state.sections) {
        if (!section.name || section.name.trim() === '') {
          alert(`⚠️ Section ${section.id} is missing a name!`);
          return;
        }
        if (!section.dialogue || section.dialogue.trim() === '') {
          alert(`⚠️ Section "${section.name}" is missing dialogue!`);
          return;
        }
        if (!section.selectedChoice) {
          alert(`⚠️ Section "${section.name}" is missing a choice type!`);
          return;
        }

        // Validate next section references
        if (section.selectedChoice === 'single' && section.nextSectionId) {
          if (!sectionIds.has(parseInt(section.nextSectionId))) {
            alert(`⚠️ Section "${section.name}" references a non-existent next section!`);
            return;
          }
        } else if (section.selectedChoice === 'double') {
          if (section.choice1NextSectionId && !sectionIds.has(parseInt(section.choice1NextSectionId))) {
            alert(`⚠️ Section "${section.name}" has invalid Choice 1 next section!`);
            return;
          }
          if (section.choice2NextSectionId && !sectionIds.has(parseInt(section.choice2NextSectionId))) {
            alert(`⚠️ Section "${section.name}" has invalid Choice 2 next section!`);
            return;
          }
        } else if (section.selectedChoice === 'dice') {
          if (section.passNextSectionId && !sectionIds.has(parseInt(section.passNextSectionId))) {
            alert(`⚠️ Section "${section.name}" has invalid pass outcome section!`);
            return;
          }
          if (section.failNextSectionId && !sectionIds.has(parseInt(section.failNextSectionId))) {
            alert(`⚠️ Section "${section.name}" has invalid fail outcome section!`);
            return;
          }
        }
      }

      // Show loading dialog
      const questName = state.questName;
      const confirmed = confirm(`🚀 Publish "${questName}" to lastchad.xyz?\n\nThis will create a new quest folder and make it playable!`);

      if (!confirmed) return;

      // Get GitHub token from localStorage or prompt user
      let token = localStorage.getItem('githubToken');
      if (!token) {
        token = prompt('Enter your GitHub Personal Access Token (stored in browser):\n\nGet one at: https://github.com/settings/tokens?type=beta');
        if (!token) return;
        localStorage.setItem('githubToken', token);
      }

      // Disable button and show progress modal during publish
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ Publishing...';
      showPublishProgress(true);

      function onPublishProgress(step, total, message) {

        document.getElementById('progressBarFill').style.width = pct + '%';
        document.getElementById('progressStepLabel').textContent = message;
        document.getElementById('progressCounter').textContent = `Step ${step} of ${total}`;
      }

      try {
        // Initialize GitHub API (publish to landing page branch so GitHub Pages can serve the quests)
        const github = new GitHubAPI(token, 'Sevrin420', 'Last-Chad', 'claude/create-landing-page-1qjhB');

        // Publish quest
        const QUEST_REWARDS_ADDRESS = '0x24e80b24aecd3e4230f294c932fb5e63b6bd3650';
        const WORKER_URL = (document.getElementById('workerUrl')?.value || '').trim() || 'https://last-chad-runner.severin20.workers.dev';
        github.publishQuest(questName, state.sections, onPublishProgress, state.introDialogue || '', state.introPhoto || null, QUEST_REWARDS_ADDRESS, WORKER_URL)
          .then(data => {

            // Build detailed error message
            let detailedMsg = `${errorMsg}\n\n🔍 DEBUG INFO:\n`;
            detailedMsg += `Repository: Sevrin420/Last-Chad\n`;
            detailedMsg += `Branch: claude/create-landing-page-1qjhB\n`;
            detailedMsg += `Token: ${token ? '✓ Provided' : '✗ Missing'}\n`;

            // Add specific troubleshooting based on error
            if (errorMsg.includes('Not Found')) {
              detailedMsg += `\n⚠️ LIKELY CAUSES:\n`;
              detailedMsg += `• Repository may not exist\n`;
              detailedMsg += `• Branch 'claude/create-landing-page-1qjhB' doesn't exist\n`;
              detailedMsg += `• Token lacks 'repo' scope\n`;

    function buildTreeStructure() {
      // Build a map of section ids to their indices
      const sectionMap = {};
      state.sections.forEach((section, idx) => {
        sectionMap[section.id] = idx;
      });

      // Build tree nodes with parent-child relationships
      const nodes = state.sections.map((section, idx) => {
        const node = {
          id: section.id,
          name: section.name,
          selectedChoice: section.selectedChoice,
          index: idx,
          children: []
        };

        // Add children based on choice type
        if (section.selectedChoice === 'single' && section.nextSectionId) {
          node.children.push({
            type: 'single',
            targetId: section.nextSectionId,
            label: section.buttonName || 'Continue'
          });
        } else if (section.selectedChoice === 'double') {
          if (section.choice1NextSectionId) {
            node.children.push({
              type: 'choice1',
              targetId: section.choice1NextSectionId,
              label: section.button1Name || 'Choice A'
            });
          }
          if (section.choice2NextSectionId) {
            node.children.push({
              type: 'choice2',
              targetId: section.choice2NextSectionId,
              label: section.button2Name || 'Choice B'
            });
          }
        } else if (section.selectedChoice === 'dice') {
          if (section.passNextSectionId) {
            node.children.push({
              type: 'pass',
              targetId: section.passNextSectionId,
              label: 'Pass'
            });
          }
          if (section.failNextSectionId) {
            node.children.push({
              type: 'fail',
              targetId: section.failNextSectionId,
              label: 'Fail'
            });
          }
        }

        return node;
      });

      return { nodes, sectionMap };
    }

    function getChoiceColor(choiceType) {
      if (choiceType === 'single') return '#7ee8d4'; // green/teal
      if (choiceType === 'double') return '#5ba3ff'; // blue
      if (choiceType === 'dice') return '#8b7355'; // brown
      return '#f5e6c8'; // default
    }

    function renderTreeView() {
      const { nodes, sectionMap } = buildTreeStructure();
      const svg = document.getElementById('treeViewSvg');
      svg.innerHTML = '';

      if (nodes.length === 0) {
        svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#a0963d" font-size="16">No sections yet</text>';
        return;
      }

      // Calculate positions for nodes
      const nodePositions = {};
      const levelWidths = {};
      const levelCounts = {};

      // First pass: determine levels
      const levels = {};
      function assignLevel(nodeId, level = 0) {
        const node = nodes.find(n => n.id === nodeId);
        if (!node) return;
        if (levels[nodeId] !== undefined) return;
        levels[nodeId] = level;

        if (!levelCounts[level]) levelCounts[level] = 0;
        levelCounts[level]++;

        node.children.forEach(child => {
          assignLevel(child.targetId, level + 1);
        });
      }

      assignLevel(nodes[0].id);

      // Place any orphaned sections (not reachable from section 1) at their own levels
      let orphanLevel = Object.keys(levelCounts).length;
      nodes.forEach(node => {
        if (levels[node.id] === undefined) {
          levels[node.id] = orphanLevel;
          levelCounts[orphanLevel] = (levelCounts[orphanLevel] || 0) + 1;
          orphanLevel++;
        }
      });

      // Calculate positions
      const nodeWidth = 140;
      const nodeHeight = 80;
      const xSpacing = nodeWidth + 60;
      const ySpacing = nodeHeight + 60;

      const maxLevel = Math.max(...Object.values(levels));
      // Width based on max depth; height based on tallest column of nodes
      const maxNodesInLevel = Math.max(...Object.values(levelCounts));
      const svgWidth = Math.max(900, (maxLevel + 1) * xSpacing + 40);
      const svgHeight = Math.max(700, maxNodesInLevel * ySpacing + 40);

      svg.setAttribute('viewBox', `0 0 ${svgWidth} ${svgHeight}`);
      svg.setAttribute('width', svgWidth);
      svg.setAttribute('height', svgHeight);

      // Position nodes within their levels
      const levelPositions = {};
      nodes.forEach(node => {
        const level = levels[node.id] || 0;
        if (!levelPositions[level]) levelPositions[level] = 0;
        const xPos = level * xSpacing + 50;
        const yPos = levelPositions[level] * ySpacing + 50;
        nodePositions[node.id] = { x: xPos, y: yPos };
        levelPositions[level]++;
      });

      // Draw edges first (so they appear behind nodes)
      nodes.forEach(node => {
        if (!nodePositions[node.id]) return;
        const fromPos = nodePositions[node.id];

        node.children.forEach(child => {
          if (!nodePositions[child.targetId]) return;
          const toPos = nodePositions[child.targetId];

          // Determine edge color based on child type
          let edgeColor = '#7ee8d4';
          if (child.type === 'choice1' || child.type === 'choice2') edgeColor = '#5ba3ff';
          if (child.type === 'pass' || child.type === 'fail') edgeColor = '#8b7355';

          // Draw line
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', fromPos.x + nodeWidth / 2);
          line.setAttribute('y1', fromPos.y + nodeHeight);
          line.setAttribute('x2', toPos.x + nodeWidth / 2);
          line.setAttribute('y2', toPos.y);
          line.setAttribute('stroke', edgeColor);
          line.setAttribute('stroke-width', '2');
          line.setAttribute('opacity', '0.6');
          svg.appendChild(line);

          // Add edge label
          const midX = (fromPos.x + toPos.x) / 2 + nodeWidth / 2;
          const midY = (fromPos.y + toPos.y) / 2;
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', midX);
          label.setAttribute('y', midY);
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('fill', edgeColor);
          label.setAttribute('font-size', '12');
          label.setAttribute('font-family', 'monospace');
          label.textContent = child.label;
          svg.appendChild(label);
        });
      });

      // Draw nodes
      nodes.forEach(node => {
        if (!nodePositions[node.id]) return;
        const pos = nodePositions[node.id];
        const color = getChoiceColor(node.selectedChoice);

        // Draw box
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', pos.x);
        rect.setAttribute('y', pos.y);
        rect.setAttribute('width', nodeWidth);
        rect.setAttribute('height', nodeHeight);
        rect.setAttribute('fill', 'rgba(20, 15, 10, 0.8)');
        rect.setAttribute('stroke', color);
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('rx', '4');
        svg.appendChild(rect);

        // Draw section name
        const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        nameText.setAttribute('x', pos.x + nodeWidth / 2);
        nameText.setAttribute('y', pos.y + 25);
        nameText.setAttribute('text-anchor', 'middle');
        nameText.setAttribute('fill', color);
        nameText.setAttribute('font-size', '14');
        nameText.setAttribute('font-weight', 'bold');
        nameText.setAttribute('font-family', 'monospace');
        nameText.textContent = node.name.substring(0, 12);
        svg.appendChild(nameText);

        // Draw choice type icon
        const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        icon.setAttribute('x', pos.x + nodeWidth / 2);
        icon.setAttribute('y', pos.y + 50);
        icon.setAttribute('text-anchor', 'middle');
        icon.setAttribute('font-size', '18');
        if (node.selectedChoice === 'single') icon.textContent = '🔘';
        else if (node.selectedChoice === 'double') icon.textContent = '⚖️';
        else if (node.selectedChoice === 'dice') icon.textContent = '🎲';
        svg.appendChild(icon);

        // Draw choice type label
        const typeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        typeText.setAttribute('x', pos.x + nodeWidth / 2);
        typeText.setAttribute('y', pos.y + 70);
        typeText.setAttribute('text-anchor', 'middle');
        typeText.setAttribute('fill', '#a0963d');
        typeText.setAttribute('font-size', '10');
        typeText.setAttribute('font-family', 'monospace');
        if (node.selectedChoice === 'single') typeText.textContent = 'Single';
        else if (node.selectedChoice === 'double') typeText.textContent = 'Double';
        else if (node.selectedChoice === 'dice') typeText.textContent = 'Dice';
        svg.appendChild(typeText);
      });
    }

    // Initialize on load
    init();
  </script>
</body>
</html>

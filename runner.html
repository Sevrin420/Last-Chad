<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race To The Sewers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 2px solid #333;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions
const W = 480;
const H = 720;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit screen
function resizeCanvas() {
  const scaleX = window.innerWidth / W;
  const scaleY = window.innerHeight / H;
  const scale = Math.min(scaleX, scaleY) * 0.95;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Asset Loading ──
const spriteNames = [
  'Character', 'Obstacle_01', 'Obstacle_02',
  'Enemy_01', 'Enemy_02', 'Enemy_03',
  'Hazard_01', 'Hazard_02', 'Hazard_03',
  'Barrier_01', 'Barrier_02', 'Barrier_03'
];
const sprites = {};
let loadedCount = 0;
const totalAssets = spriteNames.length;

spriteNames.forEach(name => {
  const img = new Image();
  img.onload = () => { loadedCount++; };
  img.src = 'endless runner/' + name + '.png';
  sprites[name] = img;
});

// Music
const music = new Audio('music/hopefull.mp3');
music.loop = true;
music.volume = 0.5;

// ── Game State ──
const GAME_DURATION = 120; // 2 minutes in seconds
const LANE_COUNT = 5;
const LANE_WIDTH = 64;
const ROAD_LEFT = (W - LANE_COUNT * LANE_WIDTH) / 2;
const ROAD_RIGHT = ROAD_LEFT + LANE_COUNT * LANE_WIDTH;
const SPRITE_SIZE = 48;

let state = 'title'; // title, playing, dead, win
let player = { lane: 2, x: 0, y: 0, targetX: 0, moveSpeed: 8 };
let obstacles = [];
let bgOffset = 0;
let gameTime = 0;
let lastTime = 0;
let deathCount = 0;
let sewerSpawned = false;
let sewerObj = null;
let flashTimer = 0;
let deathFlash = 0;
let particles = [];
let startTime = 0;

// Background elements - ruined buildings, debris
let bgBuildings = [];
let bgDebris = [];
let bgCracks = [];

// ── Keys ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'title' && (e.key === 'Enter' || e.key === ' ')) startGame();
  if (state === 'dead' && (e.key === 'Enter' || e.key === ' ')) respawn();
  if (state === 'win' && (e.key === 'Enter' || e.key === ' ')) { state = 'title'; }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  if (state === 'title') startGame();
  if (state === 'dead') respawn();
  if (state === 'win') { state = 'title'; }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchStartX;
  if (dx > 30) { keys['ArrowRight'] = true; keys['ArrowLeft'] = false; touchStartX = e.touches[0].clientX; }
  if (dx < -30) { keys['ArrowLeft'] = true; keys['ArrowRight'] = false; touchStartX = e.touches[0].clientX; }
});
canvas.addEventListener('touchend', () => { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; });

// ── Background Generation ──
function generateBackground() {
  bgBuildings = [];
  bgDebris = [];
  bgCracks = [];
  // Left side buildings
  for (let y = -200; y < H + 400; y += 80 + Math.random() * 60) {
    bgBuildings.push({
      x: ROAD_LEFT - 60 - Math.random() * 40,
      y: y,
      w: 50 + Math.random() * 30,
      h: 60 + Math.random() * 50,
      shade: 20 + Math.random() * 30,
      broken: Math.random() > 0.4,
      windowRows: 1 + Math.floor(Math.random() * 3),
      side: 'left'
    });
  }
  // Right side buildings
  for (let y = -200; y < H + 400; y += 80 + Math.random() * 60) {
    bgBuildings.push({
      x: ROAD_RIGHT + 10 + Math.random() * 20,
      y: y,
      w: 50 + Math.random() * 30,
      h: 60 + Math.random() * 50,
      shade: 20 + Math.random() * 30,
      broken: Math.random() > 0.4,
      windowRows: 1 + Math.floor(Math.random() * 3),
      side: 'right'
    });
  }
  // Road cracks
  for (let i = 0; i < 40; i++) {
    bgCracks.push({
      x: ROAD_LEFT + Math.random() * (ROAD_RIGHT - ROAD_LEFT),
      y: Math.random() * (H + 400) - 200,
      len: 10 + Math.random() * 30,
      angle: Math.random() * Math.PI,
      width: 1 + Math.random() * 2
    });
  }
  // Debris on road edges
  for (let i = 0; i < 25; i++) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    bgDebris.push({
      x: side === 'left' ? ROAD_LEFT + Math.random() * 25 : ROAD_RIGHT - 25 + Math.random() * 25,
      y: Math.random() * (H + 400) - 200,
      size: 3 + Math.random() * 8,
      shade: 30 + Math.random() * 40
    });
  }
}
generateBackground();

// ── Helper Functions ──
function laneToX(lane) {
  return ROAD_LEFT + lane * LANE_WIDTH + LANE_WIDTH / 2 - SPRITE_SIZE / 2;
}

function getDifficulty() {
  const t = gameTime / GAME_DURATION; // 0 to 1
  return {
    spawnRate: Math.max(0.3, 1.2 - t * 0.9),       // seconds between spawns: 1.2 → 0.3
    scrollSpeed: 150 + t * 250,                       // pixels/sec: 150 → 400
    multiSpawn: t > 0.3 ? (t > 0.6 ? 3 : 2) : 1,   // max obstacles per wave
    sideSpeed: t > 0.5 ? 30 + t * 40 : 0             // lateral drift speed
  };
}

function getObstacleSprite() {
  const obstNames = spriteNames.filter(n => n !== 'Character');
  return obstNames[Math.floor(Math.random() * obstNames.length)];
}

// ── Game Functions ──
function startGame() {
  state = 'playing';
  player.lane = 2;
  player.x = laneToX(2);
  player.y = H - 90;
  player.targetX = player.x;
  obstacles = [];
  gameTime = 0;
  sewerSpawned = false;
  sewerObj = null;
  deathCount = 0;
  particles = [];
  lastSpawnTime = 0;
  generateBackground();
  music.currentTime = 0;
  music.play().catch(() => {});
  startTime = performance.now();
}

function respawn() {
  state = 'playing';
  player.lane = 2;
  player.x = laneToX(2);
  player.y = H - 90;
  player.targetX = player.x;
  deathFlash = 0;
  // Clear nearby obstacles so player doesn't instantly die
  obstacles = obstacles.filter(o => o.y < H - 180);
}

function spawnObstacle() {
  const diff = getDifficulty();
  const count = 1 + Math.floor(Math.random() * diff.multiSpawn);
  const usedLanes = [];
  for (let i = 0; i < count; i++) {
    let lane;
    let tries = 0;
    do {
      lane = Math.floor(Math.random() * LANE_COUNT);
      tries++;
    } while (usedLanes.includes(lane) && tries < 10);
    // Never block ALL lanes - leave at least 1 gap
    if (usedLanes.length >= LANE_COUNT - 1) break;
    usedLanes.push(lane);
    const spriteName = getObstacleSprite();
    obstacles.push({
      x: laneToX(lane),
      y: -SPRITE_SIZE,
      lane: lane,
      sprite: spriteName,
      driftSpeed: diff.sideSpeed > 0 ? (Math.random() - 0.5) * diff.sideSpeed : 0,
      driftDir: 1
    });
  }
}

function spawnSewer() {
  sewerSpawned = true;
  sewerObj = {
    x: W / 2 - 40,
    y: -80,
    w: 80,
    h: 60,
    glow: 0
  };
}

// ── Particles ──
function spawnDeathParticles(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: x + SPRITE_SIZE / 2,
      y: y + SPRITE_SIZE / 2,
      vx: (Math.random() - 0.5) * 200,
      vy: (Math.random() - 0.5) * 200,
      life: 0.5 + Math.random() * 0.5,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#f44' : '#fa0'
    });
  }
}

// ── Drawing ──
function drawPixelText(text, x, y, size, color, align) {
  ctx.save();
  ctx.fillStyle = color || '#fff';
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  // Shadow for chunky look
  ctx.fillStyle = '#000';
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = color || '#fff';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawChunkyTitle(text, x, y, size) {
  ctx.save();
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Black outline
  for (let ox = -3; ox <= 3; ox++) {
    for (let oy = -3; oy <= 3; oy++) {
      ctx.fillStyle = '#000';
      ctx.fillText(text, x + ox, y + oy);
    }
  }
  // Red inner shadow
  ctx.fillStyle = '#800';
  ctx.fillText(text, x + 1, y + 1);
  // Main color
  ctx.fillStyle = '#e33';
  ctx.fillText(text, x, y);
  // Highlight
  ctx.fillStyle = '#f77';
  ctx.fillText(text, x - 1, y - 1);
  ctx.restore();
}

function drawBackground(dt, scrollSpeed) {
  // Sky/ground base
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  // Sidewalks
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(ROAD_LEFT - 20, 0, 20, H);
  ctx.fillRect(ROAD_RIGHT, 0, 20, H);

  // Road
  ctx.fillStyle = '#333';
  ctx.fillRect(ROAD_LEFT, 0, ROAD_RIGHT - ROAD_LEFT, H);

  // Road lines (scrolling)
  bgOffset = (bgOffset + scrollSpeed * dt) % 40;
  ctx.fillStyle = '#555';
  for (let lane = 1; lane < LANE_COUNT; lane++) {
    const lx = ROAD_LEFT + lane * LANE_WIDTH;
    for (let y = -40 + bgOffset; y < H + 40; y += 40) {
      ctx.fillRect(lx - 1, y, 2, 20);
    }
  }

  // Road edges
  ctx.fillStyle = '#666';
  ctx.fillRect(ROAD_LEFT, 0, 2, H);
  ctx.fillRect(ROAD_RIGHT - 2, 0, 2, H);

  // Buildings (scroll slower for parallax)
  const buildScroll = (bgOffset * 0.3) % 140;
  bgBuildings.forEach(b => {
    const by = ((b.y + buildScroll) % (H + 600)) - 200;
    ctx.fillStyle = `rgb(${b.shade},${b.shade},${b.shade + 5})`;
    ctx.fillRect(b.x, by, b.w, b.h);
    // Broken top
    if (b.broken) {
      ctx.fillStyle = '#1a1a1a';
      const cutW = b.w * 0.3 + Math.random() * b.w * 0.2;
      ctx.fillRect(b.x + b.w - cutW, by, cutW, 10 + Math.random() * 15);
    }
    // Dark windows
    for (let row = 0; row < b.windowRows; row++) {
      for (let col = 0; col < 2; col++) {
        const wx = b.x + 6 + col * (b.w / 2 - 4);
        const wy = by + 10 + row * 18;
        ctx.fillStyle = Math.random() > 0.85 ? '#553' : '#111';
        ctx.fillRect(wx, wy, 8, 6);
      }
    }
  });

  // Road cracks
  ctx.strokeStyle = '#222';
  bgCracks.forEach(c => {
    const cy = ((c.y + bgOffset) % (H + 400)) - 200;
    ctx.lineWidth = c.width;
    ctx.beginPath();
    ctx.moveTo(c.x, cy);
    ctx.lineTo(c.x + Math.cos(c.angle) * c.len, cy + Math.sin(c.angle) * c.len);
    ctx.stroke();
  });

  // Debris
  bgDebris.forEach(d => {
    const dy = ((d.y + bgOffset) % (H + 400)) - 200;
    ctx.fillStyle = `rgb(${d.shade},${d.shade},${d.shade - 5})`;
    ctx.fillRect(d.x, dy, d.size, d.size * 0.7);
  });
}

function drawSewer() {
  if (!sewerObj) return;
  const s = sewerObj;
  // Glow pulse
  s.glow = (s.glow + 0.05) % (Math.PI * 2);
  const glowAlpha = 0.3 + Math.sin(s.glow) * 0.2;
  // Red glow aura
  const grad = ctx.createRadialGradient(s.x + s.w/2, s.y + s.h/2, 10, s.x + s.w/2, s.y + s.h/2, 60);
  grad.addColorStop(0, `rgba(255, 30, 0, ${glowAlpha})`);
  grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(s.x - 30, s.y - 30, s.w + 60, s.h + 60);
  // Tunnel arch
  ctx.fillStyle = '#1a0000';
  ctx.beginPath();
  ctx.ellipse(s.x + s.w/2, s.y + s.h, s.w/2, s.h * 0.8, 0, Math.PI, 0);
  ctx.fill();
  // Tunnel dark interior
  ctx.fillStyle = '#0a0000';
  ctx.beginPath();
  ctx.ellipse(s.x + s.w/2, s.y + s.h, s.w/2 - 6, s.h * 0.65, 0, Math.PI, 0);
  ctx.fill();
  // Brick border
  ctx.strokeStyle = '#600';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.ellipse(s.x + s.w/2, s.y + s.h, s.w/2, s.h * 0.8, 0, Math.PI, 0);
  ctx.stroke();
  // Red glow from inside
  const innerGrad = ctx.createRadialGradient(s.x + s.w/2, s.y + s.h - 10, 5, s.x + s.w/2, s.y + s.h - 10, 30);
  innerGrad.addColorStop(0, `rgba(255, 50, 0, ${0.4 + Math.sin(s.glow * 2) * 0.2})`);
  innerGrad.addColorStop(1, 'rgba(100, 0, 0, 0)');
  ctx.fillStyle = innerGrad;
  ctx.beginPath();
  ctx.ellipse(s.x + s.w/2, s.y + s.h, s.w/2 - 6, s.h * 0.6, 0, Math.PI, 0);
  ctx.fill();
  // Label
  ctx.fillStyle = '#f33';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SEWER', s.x + s.w/2, s.y - 5);
}

function drawSprite(name, x, y, size) {
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    ctx.fillStyle = name === 'Character' ? '#48f' : '#f44';
    ctx.fillRect(x, y, size, size);
  }
}

function drawHUD() {
  const elapsed = Math.min(gameTime, GAME_DURATION);
  const remaining = Math.max(0, GAME_DURATION - elapsed);
  const min = Math.floor(remaining / 60);
  const sec = Math.floor(remaining % 60);
  const timeStr = `${min}:${sec.toString().padStart(2, '0')}`;

  // Timer bar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 32);

  // Progress bar
  const progress = elapsed / GAME_DURATION;
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 8, W - 20, 16);
  const barColor = progress < 0.5 ? '#4a4' : progress < 0.8 ? '#aa4' : '#a44';
  ctx.fillStyle = barColor;
  ctx.fillRect(10, 8, (W - 20) * progress, 16);

  // Sewer icon at end of bar
  ctx.fillStyle = '#f33';
  ctx.fillRect(W - 20, 6, 10, 20);
  ctx.fillStyle = '#800';
  ctx.fillRect(W - 18, 10, 6, 12);

  drawPixelText(timeStr, W / 2, 16, 14, '#fff');
  drawPixelText(`Deaths: ${deathCount}`, 60, 16, 11, '#f88', 'center');

  // Difficulty indicator
  const diff = getDifficulty();
  const diffLevel = gameTime < 30 ? 'EASY' : gameTime < 60 ? 'MEDIUM' : gameTime < 90 ? 'HARD' : 'INSANE';
  const diffColor = gameTime < 30 ? '#4a4' : gameTime < 60 ? '#aa4' : gameTime < 90 ? '#a44' : '#f44';
  drawPixelText(diffLevel, W - 50, 16, 10, diffColor, 'center');
}

// ── Update ──
let lastSpawnTime = 0;

function update(dt) {
  if (state !== 'playing') return;

  gameTime += dt;
  const diff = getDifficulty();

  // Player movement
  if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.lane > 0) {
    player.lane--;
    keys['ArrowLeft'] = false;
    keys['a'] = false;
    keys['A'] = false;
  }
  if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.lane < LANE_COUNT - 1) {
    player.lane++;
    keys['ArrowRight'] = false;
    keys['d'] = false;
    keys['D'] = false;
  }
  player.targetX = laneToX(player.lane);
  // Smooth movement
  const dx = player.targetX - player.x;
  if (Math.abs(dx) > 1) {
    player.x += dx * 0.2;
  } else {
    player.x = player.targetX;
  }

  // Spawn obstacles
  lastSpawnTime += dt;
  if (lastSpawnTime >= diff.spawnRate && !sewerSpawned) {
    lastSpawnTime = 0;
    spawnObstacle();
  }

  // Update obstacles
  obstacles.forEach(o => {
    o.y += diff.scrollSpeed * dt;
    // Lateral drift for later difficulty
    if (o.driftSpeed) {
      o.x += o.driftSpeed * o.driftDir * dt;
      if (o.x < ROAD_LEFT) { o.x = ROAD_LEFT; o.driftDir = 1; }
      if (o.x > ROAD_RIGHT - SPRITE_SIZE) { o.x = ROAD_RIGHT - SPRITE_SIZE; o.driftDir = -1; }
    }
  });
  obstacles = obstacles.filter(o => o.y < H + 50);

  // Sewer spawning at 2 minutes
  if (gameTime >= GAME_DURATION && !sewerSpawned) {
    spawnSewer();
    // Stop spawning obstacles
  }

  // Update sewer
  if (sewerObj) {
    sewerObj.y += diff.scrollSpeed * dt * 0.4; // Slower so player can reach it
  }

  // Collision with obstacles
  const pBox = { x: player.x + 8, y: player.y + 8, w: SPRITE_SIZE - 16, h: SPRITE_SIZE - 16 };
  for (const o of obstacles) {
    const oBox = { x: o.x + 8, y: o.y + 8, w: SPRITE_SIZE - 16, h: SPRITE_SIZE - 16 };
    if (pBox.x < oBox.x + oBox.w && pBox.x + pBox.w > oBox.x &&
        pBox.y < oBox.y + oBox.h && pBox.y + pBox.h > oBox.y) {
      // Death!
      state = 'dead';
      deathCount++;
      deathFlash = 0.5;
      spawnDeathParticles(player.x, player.y);
      break;
    }
  }

  // Collision with sewer (win!)
  if (sewerObj) {
    const sx = sewerObj.x;
    const sy = sewerObj.y;
    if (pBox.x < sx + sewerObj.w - 10 && pBox.x + pBox.w > sx + 10 &&
        pBox.y < sy + sewerObj.h && pBox.y + pBox.h > sy) {
      state = 'win';
      music.pause();
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Death flash timer
  if (deathFlash > 0) deathFlash -= dt;
}

// ── Render ──
function render() {
  const scrollSpeed = state === 'playing' ? getDifficulty().scrollSpeed : 100;
  const dt = 1 / 60;

  drawBackground(dt, state === 'playing' || state === 'dead' ? scrollSpeed : (state === 'title' ? 50 : 0));

  if (state === 'title') {
    // Darken
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    drawChunkyTitle('RACE TO', W / 2, H / 2 - 60, 42);
    drawChunkyTitle('THE SEWERS', W / 2, H / 2 - 10, 42);
    drawPixelText('Dodge the ruins. Reach the sewer.', W / 2, H / 2 + 50, 13, '#aaa');
    drawPixelText('Arrow Keys / A-D to move', W / 2, H / 2 + 80, 12, '#888');
    // Pulsing start text
    const pulse = Math.sin(performance.now() / 300) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    drawPixelText('[ PRESS ENTER OR TAP TO START ]', W / 2, H / 2 + 130, 14, '#f44');
    ctx.globalAlpha = 1;
    // Draw character preview
    drawSprite('Character', W / 2 - SPRITE_SIZE / 2, H / 2 + 160, SPRITE_SIZE);
    return;
  }

  if (state === 'playing' || state === 'dead') {
    // Draw sewer
    drawSewer();

    // Draw obstacles
    obstacles.forEach(o => {
      drawSprite(o.sprite, o.x, o.y, SPRITE_SIZE);
    });

    // Draw player (flash when recently died)
    if (state === 'playing') {
      drawSprite('Character', player.x, player.y, SPRITE_SIZE);
    }

    // Death particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Death flash
    if (deathFlash > 0) {
      ctx.fillStyle = `rgba(255, 0, 0, ${deathFlash * 0.6})`;
      ctx.fillRect(0, 0, W, H);
    }

    drawHUD();

    // Death overlay
    if (state === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, H / 2 - 60, W, 120);
      drawPixelText('WASTED', W / 2, H / 2 - 20, 36, '#f33');
      drawPixelText('Press ENTER or Tap to respawn', W / 2, H / 2 + 25, 13, '#ccc');
    }
  }

  if (state === 'win') {
    drawBackground(0, 0);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    drawChunkyTitle('YOU MADE IT', W / 2, H / 2 - 60, 36);
    drawPixelText('You reached the sewers!', W / 2, H / 2, 16, '#4f4');
    drawPixelText(`Deaths: ${deathCount}`, W / 2, H / 2 + 35, 14, '#f88');
    const rating = deathCount === 0 ? 'FLAWLESS!' : deathCount < 3 ? 'LEGENDARY' : deathCount < 10 ? 'SURVIVOR' : 'PERSISTENT';
    const ratingColor = deathCount === 0 ? '#ff0' : deathCount < 3 ? '#f80' : deathCount < 10 ? '#4a4' : '#888';
    drawPixelText(rating, W / 2, H / 2 + 65, 20, ratingColor);
    const pulse = Math.sin(performance.now() / 300) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    drawPixelText('[ PRESS ENTER OR TAP ]', W / 2, H / 2 + 110, 13, '#aaa');
    ctx.globalAlpha = 1;
  }
}

// ── Game Loop ──
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = timestamp;

  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// Wait for assets then start loop
function waitAndStart() {
  if (loadedCount >= totalAssets) {
    requestAnimationFrame(gameLoop);
  } else {
    // Show loading
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    drawPixelText(`Loading... ${loadedCount}/${totalAssets}`, W / 2, H / 2, 16, '#666');
    requestAnimationFrame(waitAndStart);
  }
}
waitAndStart();
</script>
</body>
</html>

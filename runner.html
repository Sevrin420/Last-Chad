<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race To The Sewers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 2px solid #333;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions
const W = 480;
const H = 720;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit screen
function resizeCanvas() {
  const scaleX = window.innerWidth / W;
  const scaleY = window.innerHeight / H;
  const scale = Math.min(scaleX, scaleY) * 0.95;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Asset Loading ──
const spriteNames = [
  'Character', 'Obstacle_01', 'Obstacle_02',
  'Enemy_01', 'Enemy_02', 'Enemy_03',
  'Hazard_01', 'Hazard_02', 'Hazard_03',
  'Barrier_01', 'Barrier_02', 'Barrier_03'
];
const sprites = {};
let loadedCount = 0;
const totalAssets = spriteNames.length + 1; // +1 for bg image

// Background image
const bgImg = new Image();
bgImg.onload = () => { loadedCount++; };
bgImg.onerror = () => { loadedCount++; }; // graceful fallback if missing
bgImg.src = 'endless runner/bg.png';

spriteNames.forEach(name => {
  const img = new Image();
  img.onload = () => { loadedCount++; };
  img.src = 'endless runner/' + name + '.png';
  sprites[name] = img;
});

// Music
const music = new Audio('music/hopefull.mp3');
music.loop = true;
music.volume = 0.5;

// ── Game State ──
const GAME_DURATION = 120; // 2 minutes in seconds
const LANE_COUNT = 5;
const LANE_WIDTH = 64;
const ROAD_LEFT = (W - LANE_COUNT * LANE_WIDTH) / 2;
const ROAD_RIGHT = ROAD_LEFT + LANE_COUNT * LANE_WIDTH;
const SPRITE_SIZE = 48;

let state = 'title'; // title, playing, dead, win
let player = { lane: 2, x: 0, y: 0, targetX: 0, moveSpeed: 8 };
let obstacles = [];
let enemies = [];
let lastEnemySpawnTime = 0;
let bgOffset = 0;
let gameTime = 0;
let lastTime = 0;
let deathCount = 0;
let sewerSpawned = false;
let sewerObj = null;
let flashTimer = 0;
let deathFlash = 0;
let particles = [];
let startTime = 0;
let wallDeathTimer = 0;


// ── Keys ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'title' && (e.key === 'Enter' || e.key === ' ')) startGame();
  if (state === 'dead' && (e.key === 'Enter' || e.key === ' ')) respawn();
  if (state === 'win' && (e.key === 'Enter' || e.key === ' ')) { state = 'title'; }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  if (state === 'title') startGame();
  if (state === 'dead') respawn();
  if (state === 'win') { state = 'title'; }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchStartX;
  if (dx > 30) { keys['ArrowRight'] = true; keys['ArrowLeft'] = false; touchStartX = e.touches[0].clientX; }
  if (dx < -30) { keys['ArrowLeft'] = true; keys['ArrowRight'] = false; touchStartX = e.touches[0].clientX; }
});
canvas.addEventListener('touchend', () => { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; });


// ── Helper Functions ──
function laneToX(lane) {
  return ROAD_LEFT + lane * LANE_WIDTH + LANE_WIDTH / 2 - SPRITE_SIZE / 2;
}

function getDifficulty() {
  const t = gameTime / GAME_DURATION; // 0 to 1
  return {
    spawnRate: Math.max(0.3, 1.2 - t * 0.9),       // seconds between spawns: 1.2 → 0.3
    scrollSpeed: 150 + t * 250,                       // pixels/sec: 150 → 400
    multiSpawn: t > 0.3 ? (t > 0.6 ? 3 : 2) : 1,   // max obstacles per wave
    sideSpeed: t > 0.5 ? 30 + t * 40 : 0             // lateral drift speed
  };
}

function getObstacleSprite() {
  const obstNames = spriteNames.filter(n => n !== 'Character' && !n.startsWith('Enemy'));
  return obstNames[Math.floor(Math.random() * obstNames.length)];
}

// ── Game Functions ──
function startGame() {
  state = 'playing';
  player.lane = 2;
  player.x = laneToX(2);
  player.y = H - 90;
  player.targetX = player.x;
  obstacles = [];
  enemies = [];
  gameTime = 0;
  sewerSpawned = false;
  sewerObj = null;
  deathCount = 0;
  particles = [];
  lastSpawnTime = 0;
  lastEnemySpawnTime = 0;
  music.currentTime = 0;
  music.play().catch(() => {});
  startTime = performance.now();
}

function respawn() {
  state = 'playing';
  player.lane = 2;
  player.x = laneToX(2);
  player.y = H - 90;
  player.targetX = player.x;
  deathFlash = 0;
  obstacles = obstacles.filter(o => o.y < H - 180);
  enemies = enemies.filter(e => e.y < H - 180);
}

function spawnObstacle() {
  const diff = getDifficulty();
  const count = 1 + Math.floor(Math.random() * diff.multiSpawn);
  const usedLanes = [];
  for (let i = 0; i < count; i++) {
    let lane;
    let tries = 0;
    do {
      lane = Math.floor(Math.random() * LANE_COUNT);
      tries++;
    } while (usedLanes.includes(lane) && tries < 10);
    // Never block ALL lanes - leave at least 1 gap
    if (usedLanes.length >= LANE_COUNT - 1) break;
    usedLanes.push(lane);
    const spriteName = getObstacleSprite();
    obstacles.push({
      x: laneToX(lane),
      y: -SPRITE_SIZE,
      lane: lane,
      sprite: spriteName
    });
  }
}

// Gap = center lane (lane 2), one lane wide
const WALL_GAP_X = ROAD_LEFT + 2 * LANE_WIDTH;
const WALL_GAP_W = LANE_WIDTH;
const WALL_THICK = 18;

function spawnSewer() {
  sewerSpawned = true;
  sewerObj = {
    y: -120,     // top of the whole structure
    glow: 0
  };
}

const ENEMY_SPRITES = ['Enemy_01', 'Enemy_02', 'Enemy_03'];
function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  enemies.push({
    x: laneToX(lane),
    y: -SPRITE_SIZE,
    sprite: ENEMY_SPRITES[Math.floor(Math.random() * ENEMY_SPRITES.length)],
    chaseSpeed: 55 + Math.random() * 45   // px/s lateral chase speed
  });
}

// ── Particles ──
function spawnDeathParticles(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: x + SPRITE_SIZE / 2,
      y: y + SPRITE_SIZE / 2,
      vx: (Math.random() - 0.5) * 200,
      vy: (Math.random() - 0.5) * 200,
      life: 0.5 + Math.random() * 0.5,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#f44' : '#fa0'
    });
  }
}

// ── Drawing ──
function drawPixelText(text, x, y, size, color, align) {
  ctx.save();
  ctx.fillStyle = color || '#fff';
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  // Shadow for chunky look
  ctx.fillStyle = '#000';
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = color || '#fff';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawChunkyTitle(text, x, y, size) {
  ctx.save();
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Black outline
  for (let ox = -3; ox <= 3; ox++) {
    for (let oy = -3; oy <= 3; oy++) {
      ctx.fillStyle = '#000';
      ctx.fillText(text, x + ox, y + oy);
    }
  }
  // Red inner shadow
  ctx.fillStyle = '#800';
  ctx.fillText(text, x + 1, y + 1);
  // Main color
  ctx.fillStyle = '#e33';
  ctx.fillText(text, x, y);
  // Highlight
  ctx.fillStyle = '#f77';
  ctx.fillText(text, x - 1, y - 1);
  ctx.restore();
}

function drawBackground(dt, scrollSpeed) {
  bgOffset = (bgOffset + scrollSpeed * dt) % H;

  // ── Scrolling background image ──
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    // Scale image to cover full canvas width, preserving aspect ratio
    const imgAspect = bgImg.naturalWidth / bgImg.naturalHeight;
    const drawW = W;
    const drawH = Math.round(W / imgAspect);

    // Tile vertically: draw enough copies to fill the canvas
    const tileH = drawH;
    const startY = (bgOffset % tileH) - tileH;
    for (let y = startY; y < H + tileH; y += tileH) {
      ctx.drawImage(bgImg, 0, y, drawW, drawH);
    }
  } else {
    // Fallback solid color
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, W, H);
  }

  // ── Road overlay on top of background image ──
  // Semi-transparent dark tint over road area to make lanes readable
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.fillRect(ROAD_LEFT, 0, ROAD_RIGHT - ROAD_LEFT, H);

  // Lane dividers (scrolling dashes)
  ctx.fillStyle = 'rgba(200, 190, 120, 0.6)';
  for (let lane = 1; lane < LANE_COUNT; lane++) {
    const lx = ROAD_LEFT + lane * LANE_WIDTH;
    for (let y = -40 + (bgOffset % 40); y < H + 40; y += 40) {
      ctx.fillRect(lx - 1, y, 2, 20);
    }
  }

  // Road edge lines
  ctx.fillStyle = 'rgba(220, 210, 140, 0.7)';
  ctx.fillRect(ROAD_LEFT, 0, 2, H);
  ctx.fillRect(ROAD_RIGHT - 2, 0, 2, H);
}

function drawSewer() {
  if (!sewerObj) return;
  const s = sewerObj;
  s.glow = (s.glow + 0.05) % (Math.PI * 2);
  const glowAlpha = 0.3 + Math.sin(s.glow) * 0.2;

  const wallY = s.y + 60;           // Y of the wall bar
  const gapCX = WALL_GAP_X + WALL_GAP_W / 2;  // center X of gap
  const archW = WALL_GAP_W / 2;
  const archH = 60;

  // ── Tunnel arch above the gap (drawn before wall) ──
  // Red glow halo
  const halo = ctx.createRadialGradient(gapCX, wallY, 4, gapCX, wallY, 55);
  halo.addColorStop(0, `rgba(255,40,0,${glowAlpha})`);
  halo.addColorStop(1, 'rgba(180,0,0,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(gapCX - 60, wallY - 70, 120, 80);

  // Arch body (dark)
  ctx.fillStyle = '#150000';
  ctx.beginPath();
  ctx.ellipse(gapCX, wallY, archW, archH, 0, Math.PI, 0);
  ctx.fill();

  // Arch interior glow
  const innerG = ctx.createRadialGradient(gapCX, wallY - 10, 4, gapCX, wallY - 10, archW - 4);
  innerG.addColorStop(0, `rgba(255,60,0,${0.35 + Math.sin(s.glow * 2) * 0.15})`);
  innerG.addColorStop(1, 'rgba(80,0,0,0)');
  ctx.fillStyle = innerG;
  ctx.beginPath();
  ctx.ellipse(gapCX, wallY, archW - 5, archH - 8, 0, Math.PI, 0);
  ctx.fill();

  // Arch border
  ctx.strokeStyle = `rgba(220,60,0,${0.6 + glowAlpha * 0.4})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(gapCX, wallY, archW, archH, 0, Math.PI, 0);
  ctx.stroke();

  // ── Full-road wall bar ──
  // Left block: ROAD_LEFT → gap start
  ctx.fillStyle = '#2a0000';
  ctx.fillRect(ROAD_LEFT, wallY, WALL_GAP_X - ROAD_LEFT, WALL_THICK);
  // Right block: gap end → ROAD_RIGHT
  ctx.fillRect(WALL_GAP_X + WALL_GAP_W, wallY, ROAD_RIGHT - (WALL_GAP_X + WALL_GAP_W), WALL_THICK);

  // Brick pattern on wall blocks
  ctx.fillStyle = '#3d0000';
  for (let bx = ROAD_LEFT; bx < WALL_GAP_X; bx += 16) {
    ctx.fillRect(bx, wallY, 14, WALL_THICK / 2 - 1);
    ctx.fillRect(bx + 8, wallY + WALL_THICK / 2, 14, WALL_THICK / 2 - 1);
  }
  for (let bx = WALL_GAP_X + WALL_GAP_W; bx < ROAD_RIGHT; bx += 16) {
    ctx.fillRect(bx, wallY, 14, WALL_THICK / 2 - 1);
    ctx.fillRect(bx + 8, wallY + WALL_THICK / 2, 14, WALL_THICK / 2 - 1);
  }

  // Wall top highlight
  ctx.fillStyle = 'rgba(255,80,0,0.25)';
  ctx.fillRect(ROAD_LEFT, wallY, WALL_GAP_X - ROAD_LEFT, 2);
  ctx.fillRect(WALL_GAP_X + WALL_GAP_W, wallY, ROAD_RIGHT - (WALL_GAP_X + WALL_GAP_W), 2);

  // "SEWER" label above arch
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.fillText('SEWER', gapCX + 1, s.y + 1);
  ctx.fillStyle = '#f55';
  ctx.fillText('SEWER', gapCX, s.y);
}

function drawSprite(name, x, y, size) {
  const img = sprites[name];
  if (img && img.complete) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    ctx.fillStyle = name === 'Character' ? '#48f' : '#f44';
    ctx.fillRect(x, y, size, size);
  }
}

function drawHUD() {
  const elapsed = Math.min(gameTime, GAME_DURATION);
  const remaining = Math.max(0, GAME_DURATION - elapsed);
  const min = Math.floor(remaining / 60);
  const sec = Math.floor(remaining % 60);
  const timeStr = `${min}:${sec.toString().padStart(2, '0')}`;

  // Timer bar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 32);

  // Progress bar
  const progress = elapsed / GAME_DURATION;
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 8, W - 20, 16);
  const barColor = progress < 0.5 ? '#4a4' : progress < 0.8 ? '#aa4' : '#a44';
  ctx.fillStyle = barColor;
  ctx.fillRect(10, 8, (W - 20) * progress, 16);

  // Sewer icon at end of bar
  ctx.fillStyle = '#f33';
  ctx.fillRect(W - 20, 6, 10, 20);
  ctx.fillStyle = '#800';
  ctx.fillRect(W - 18, 10, 6, 12);

  drawPixelText(timeStr, W / 2, 16, 14, '#fff');
  drawPixelText(`Deaths: ${deathCount}`, 60, 16, 11, '#f88', 'center');

  // Difficulty indicator
  const diff = getDifficulty();
  const diffLevel = gameTime < 30 ? 'EASY' : gameTime < 60 ? 'MEDIUM' : gameTime < 90 ? 'HARD' : 'INSANE';
  const diffColor = gameTime < 30 ? '#4a4' : gameTime < 60 ? '#aa4' : gameTime < 90 ? '#a44' : '#f44';
  drawPixelText(diffLevel, W - 50, 16, 10, diffColor, 'center');
}

// ── Update ──
let lastSpawnTime = 0;

function update(dt) {
  // Auto-restart after wall death
  if (state === 'wall_death') {
    wallDeathTimer -= dt;
    particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
    particles = particles.filter(p => p.life > 0);
    if (wallDeathTimer <= 0) startGame();
    return;
  }
  if (state !== 'playing') return;

  gameTime += dt;
  const diff = getDifficulty();

  // Player movement
  if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.lane > 0) {
    player.lane--;
    keys['ArrowLeft'] = false;
    keys['a'] = false;
    keys['A'] = false;
  }
  if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.lane < LANE_COUNT - 1) {
    player.lane++;
    keys['ArrowRight'] = false;
    keys['d'] = false;
    keys['D'] = false;
  }
  player.targetX = laneToX(player.lane);
  // Smooth movement
  const dx = player.targetX - player.x;
  if (Math.abs(dx) > 1) {
    player.x += dx * 0.2;
  } else {
    player.x = player.targetX;
  }

  // Spawn obstacles
  lastSpawnTime += dt;
  if (lastSpawnTime >= diff.spawnRate && !sewerSpawned) {
    lastSpawnTime = 0;
    spawnObstacle();
  }

  // Spawn enemies (one at a time, every 6s early → 3s late)
  lastEnemySpawnTime += dt;
  const enemySpawnRate = Math.max(3, 6 - (gameTime / GAME_DURATION) * 3);
  if (lastEnemySpawnTime >= enemySpawnRate && !sewerSpawned) {
    lastEnemySpawnTime = 0;
    spawnEnemy();
  }

  // Update obstacles (no drift - stay in lanes)
  obstacles.forEach(o => { o.y += diff.scrollSpeed * dt; });
  obstacles = obstacles.filter(o => o.y < H + 50);

  // Update enemies — scroll down and home toward player X
  enemies.forEach(e => {
    e.y += diff.scrollSpeed * dt;
    const targetX = player.x;
    const edx = targetX - e.x;
    const step = e.chaseSpeed * dt;
    e.x += Math.abs(edx) > step ? Math.sign(edx) * step : edx;
    // clamp to road
    e.x = Math.max(ROAD_LEFT, Math.min(ROAD_RIGHT - SPRITE_SIZE, e.x));
  });
  enemies = enemies.filter(e => e.y < H + 50);

  // Sewer spawning at 2 minutes
  if (gameTime >= GAME_DURATION && !sewerSpawned) {
    spawnSewer();
    // Stop spawning obstacles
  }

  // Update sewer wall (scrolls down at half speed so player can reach it)
  if (sewerObj) {
    sewerObj.y += diff.scrollSpeed * dt * 0.45;
  }

  const pBox = { x: player.x + 8, y: player.y + 8, w: SPRITE_SIZE - 16, h: SPRITE_SIZE - 16 };

  // Collision with obstacles
  for (const o of obstacles) {
    const oBox = { x: o.x + 8, y: o.y + 8, w: SPRITE_SIZE - 16, h: SPRITE_SIZE - 16 };
    if (pBox.x < oBox.x + oBox.w && pBox.x + pBox.w > oBox.x &&
        pBox.y < oBox.y + oBox.h && pBox.y + pBox.h > oBox.y) {
      state = 'dead';
      deathCount++;
      deathFlash = 0.5;
      spawnDeathParticles(player.x, player.y);
      break;
    }
  }

  // Enemy collision
  if (state === 'playing') {
    for (const e of enemies) {
      const eBox = { x: e.x + 6, y: e.y + 6, w: SPRITE_SIZE - 12, h: SPRITE_SIZE - 12 };
      if (pBox.x < eBox.x + eBox.w && pBox.x + pBox.w > eBox.x &&
          pBox.y < eBox.y + eBox.h && pBox.y + pBox.h > eBox.y) {
        state = 'dead';
        deathCount++;
        deathFlash = 0.5;
        spawnDeathParticles(player.x, player.y);
        break;
      }
    }
  }

  // Wall collision — player must enter the gap to win, hits the wall = auto-restart
  if (sewerObj && state === 'playing') {
    const wallTop = sewerObj.y + 60;  // tunnel arch sits above the wall line
    const wallBot = wallTop + WALL_THICK;
    const pCX = pBox.x + pBox.w / 2;
    const inGap = pCX >= WALL_GAP_X && pCX <= WALL_GAP_X + WALL_GAP_W;
    if (pBox.y < wallBot && pBox.y + pBox.h > wallTop) {
      if (inGap) {
        state = 'win';
        music.pause();
      } else {
        state = 'wall_death';
        wallDeathTimer = 1.2;
        deathCount++;
        spawnDeathParticles(player.x, player.y);
      }
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Death flash timer
  if (deathFlash > 0) deathFlash -= dt;
}

// ── Render ──
function render() {
  const scrollSpeed = state === 'playing' ? getDifficulty().scrollSpeed : 100;
  const dt = 1 / 60;

  const isActive = state === 'playing' || state === 'dead' || state === 'wall_death';
  drawBackground(dt, isActive ? scrollSpeed : (state === 'title' ? 50 : 0));

  if (state === 'title') {
    // Darken
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    drawChunkyTitle('RACE TO', W / 2, H / 2 - 60, 42);
    drawChunkyTitle('THE SEWERS', W / 2, H / 2 - 10, 42);
    drawPixelText('Dodge the ruins. Reach the sewer.', W / 2, H / 2 + 50, 13, '#aaa');
    drawPixelText('Arrow Keys / A-D to move', W / 2, H / 2 + 80, 12, '#888');
    // Pulsing start text
    const pulse = Math.sin(performance.now() / 300) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    drawPixelText('[ PRESS ENTER OR TAP TO START ]', W / 2, H / 2 + 130, 14, '#f44');
    ctx.globalAlpha = 1;
    // Draw character preview
    drawSprite('Character', W / 2 - SPRITE_SIZE / 2, H / 2 + 160, SPRITE_SIZE);
    return;
  }

  if (state === 'playing' || state === 'dead' || state === 'wall_death') {
    drawSewer();

    obstacles.forEach(o => { drawSprite(o.sprite, o.x, o.y, SPRITE_SIZE); });

    // Draw enemies with a red tint indicator
    enemies.forEach(e => {
      ctx.save();
      // Red overlay to distinguish from obstacles
      ctx.globalCompositeOperation = 'source-over';
      drawSprite(e.sprite, e.x, e.y, SPRITE_SIZE);
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = 'rgba(255, 80, 80, 0.45)';
      ctx.fillRect(e.x, e.y, SPRITE_SIZE, SPRITE_SIZE);
      ctx.restore();
    });

    if (state === 'playing') {
      drawSprite('Character', player.x, player.y, SPRITE_SIZE);
    }

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    if (deathFlash > 0) {
      ctx.fillStyle = `rgba(255, 0, 0, ${deathFlash * 0.6})`;
      ctx.fillRect(0, 0, W, H);
    }

    drawHUD();

    if (state === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, H / 2 - 60, W, 120);
      drawPixelText('WASTED', W / 2, H / 2 - 20, 36, '#f33');
      drawPixelText('Press ENTER or Tap to respawn', W / 2, H / 2 + 25, 13, '#ccc');
    }

    if (state === 'wall_death') {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, H / 2 - 50, W, 100);
      drawPixelText('YOU HIT THE WALL', W / 2, H / 2 - 15, 26, '#f33');
      const restartPulse = Math.sin(performance.now() / 150) * 0.3 + 0.7;
      ctx.globalAlpha = restartPulse;
      drawPixelText('RESTARTING...', W / 2, H / 2 + 25, 16, '#fa0');
      ctx.globalAlpha = 1;
    }
  }

  if (state === 'win') {
    drawBackground(0, 0);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    drawChunkyTitle('YOU MADE IT', W / 2, H / 2 - 60, 36);
    drawPixelText('You reached the sewers!', W / 2, H / 2, 16, '#4f4');
    drawPixelText(`Deaths: ${deathCount}`, W / 2, H / 2 + 35, 14, '#f88');
    const rating = deathCount === 0 ? 'FLAWLESS!' : deathCount < 3 ? 'LEGENDARY' : deathCount < 10 ? 'SURVIVOR' : 'PERSISTENT';
    const ratingColor = deathCount === 0 ? '#ff0' : deathCount < 3 ? '#f80' : deathCount < 10 ? '#4a4' : '#888';
    drawPixelText(rating, W / 2, H / 2 + 65, 20, ratingColor);
    const pulse = Math.sin(performance.now() / 300) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    drawPixelText('[ PRESS ENTER OR TAP ]', W / 2, H / 2 + 110, 13, '#aaa');
    ctx.globalAlpha = 1;
  }
}

// ── Game Loop ──
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = timestamp;

  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// Wait for assets then start loop
function waitAndStart() {
  if (loadedCount >= totalAssets) {
    requestAnimationFrame(gameLoop);
  } else {
    // Show loading
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    drawPixelText(`Loading... ${loadedCount}/${totalAssets}`, W / 2, H / 2, 16, '#666');
    requestAnimationFrame(waitAndStart);
  }
}
waitAndStart();
</script>

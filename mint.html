<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint | Last Chad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Press Start 2P', monospace;
      color: #f5e6c8;
      overflow-x: hidden;
    }

    /* --- Background --- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: brightness(0.35) blur(2px);
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10, 10, 15, 0.5) 0%,
        rgba(10, 10, 15, 0.7) 50%,
        rgba(10, 10, 15, 0.9) 100%
      );
    }

    /* --- Header --- */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10, 10, 15, 0.85);
      border-bottom: 2px solid #3d2e0a;
      backdrop-filter: blur(8px);
    }

    .wallet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 18px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow:
        inset 0 1px 0 rgba(255, 220, 120, 0.4),
        0 2px 6px rgba(0, 0, 0, 0.5);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 220, 120, 0.5),
        0 2px 10px rgba(201, 168, 76, 0.4);
    }

    .wallet-btn.connected {
      background: linear-gradient(180deg, #2e5c2e 0%, #1a3d1a 100%);
      border-color: #4caf50;
      color: #a5d6a7;
      font-size: 0.5rem;
    }

    .wallet-wrapper {
      position: relative;
    }

    .disconnect-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 110;
      min-width: 160px;
    }

    .disconnect-dropdown.show {
      display: block;
    }

    .disconnect-btn {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #e53935;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .disconnect-btn:hover {
      background: rgba(229, 57, 53, 0.15);
    }

    /* --- Main content --- */
    .main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
    }

    /* --- Mint card --- */
    .mint-card {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(
        180deg,
        rgba(30, 22, 8, 0.95) 0%,
        rgba(20, 15, 5, 0.98) 100%
      );
      border: 3px solid #5c4409;
      border-radius: 8px;
      padding: 32px 28px;
      box-shadow:
        0 0 30px rgba(0, 0, 0, 0.6),
        0 0 60px rgba(139, 105, 20, 0.1),
        inset 0 1px 0 rgba(201, 168, 76, 0.15);
    }

    .card-title {
      text-align: center;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: #c9a84c;
      margin-bottom: 6px;
      text-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
    }

    .card-subtitle {
      text-align: center;
      font-size: 0.5rem;
      color: #8a7a5a;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* --- Supply bar --- */
    .supply-section {
      margin-bottom: 24px;
    }

    .supply-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.5rem;
      color: #8a7a5a;
      margin-bottom: 8px;
    }

    .supply-label span:last-child {
      color: #c9a84c;
    }

    .supply-bar {
      width: 100%;
      height: 16px;
      background: #1a1005;
      border: 2px solid #3d2e0a;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .supply-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4caf50, #66bb6a, #4caf50);
      border-radius: 1px;
      position: relative;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
    }

    .supply-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    /* --- Divider --- */
    .divider {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, #5c4409, transparent);
      margin: 24px 0;
    }

    /* --- Price row --- */
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .price-label {
      font-size: 0.55rem;
      color: #8a7a5a;
    }

    .price-value {
      font-size: 0.75rem;
      color: #c9a84c;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .price-eth {
      font-size: 0.5rem;
      color: #8a7a5a;
      margin-left: 4px;
    }

    /* --- Quantity section --- */
    .quantity-section {
      margin-bottom: 28px;
    }

    .quantity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .quantity-label {
      font-size: 0.55rem;
      color: #8a7a5a;
    }

    .quantity-display {
      font-size: 1rem;
      color: #f5e6c8;
      min-width: 40px;
      text-align: center;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .qty-btn {
      width: 40px;
      height: 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      background: linear-gradient(180deg, #3d2e0a 0%, #1a1005 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #c9a84c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .qty-btn:hover {
      background: linear-gradient(180deg, #5c4409 0%, #3d2e0a 100%);
      border-color: #8b6914;
      box-shadow: 0 0 8px rgba(139, 105, 20, 0.3);
    }

    .qty-btn:active {
      transform: scale(0.9);
      background: linear-gradient(180deg, #1a1005 0%, #3d2e0a 100%);
    }

    .qty-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* --- Slider --- */
    .slider-container {
      flex: 1;
      position: relative;
    }

    .slider-track {
      position: relative;
      height: 12px;
      background: #1a1005;
      border: 2px solid #3d2e0a;
      border-radius: 2px;
      overflow: hidden;
    }

    .slider-fill-bar {
      height: 100%;
      background: linear-gradient(90deg, #8b6914, #c9a84c);
      border-radius: 1px;
      transition: width 0.1s;
      box-shadow: 0 0 6px rgba(201, 168, 76, 0.3);
    }

    .slider-fill-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 12px;
      background: transparent;
      cursor: pointer;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: linear-gradient(180deg, #dabb5e, #8b6914);
      border: 2px solid #f5e6c8;
      border-radius: 3px;
      cursor: grab;
      box-shadow:
        0 0 8px rgba(201, 168, 76, 0.5),
        0 2px 4px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow:
        0 0 14px rgba(201, 168, 76, 0.7),
        0 2px 6px rgba(0, 0, 0, 0.5);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
      background: linear-gradient(180deg, #f5e6c8, #c9a84c);
      box-shadow:
        0 0 20px rgba(201, 168, 76, 0.9),
        0 2px 4px rgba(0, 0, 0, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: linear-gradient(180deg, #dabb5e, #8b6914);
      border: 2px solid #f5e6c8;
      border-radius: 3px;
      cursor: grab;
      box-shadow:
        0 0 8px rgba(201, 168, 76, 0.5),
        0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .slider-pips {
      display: flex;
      justify-content: space-between;
      padding: 6px 2px 0;
    }

    .slider-pips span {
      font-size: 0.35rem;
      color: #5c4409;
      width: 20px;
      text-align: center;
    }

    .slider-pips span.active {
      color: #c9a84c;
    }

    /* --- Total --- */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: rgba(92, 68, 9, 0.15);
      border: 1px solid #3d2e0a;
      border-radius: 4px;
    }

    .total-label {
      font-size: 0.6rem;
      color: #8a7a5a;
    }

    .total-value {
      font-size: 0.85rem;
      color: #f5e6c8;
      text-shadow: 0 0 10px rgba(245, 230, 200, 0.2);
    }

    /* --- Mint button --- */
    .mint-btn {
      width: 100%;
      padding: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      color: #fff;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 50%, #5c4409 100%);
      border: 4px solid #d4a017;
      border-radius: 0;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      text-shadow:
        1px 1px 0 #000,
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000;
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #3d2e0a,
        0 6px 0 #2a1f08,
        0 8px 15px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(139, 105, 20, 0.2);
    }

    .mint-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: none;
    }

    .mint-btn:hover {
      background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 50%, #6b5010 100%);
      border-color: #f5e6c8;
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        0 4px 0 #3d2e0a,
        0 6px 0 #2a1f08,
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 30px rgba(201, 168, 76, 0.4);
    }

    .mint-btn:hover::after {
      left: 120%;
      transition: left 0.5s ease;
    }

    .mint-btn:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.5),
        0 1px 0 #3d2e0a,
        0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 25px rgba(255, 200, 50, 0.5);
      background: linear-gradient(180deg, #7a5c10 0%, #8b6914 50%, #c9a84c 100%);
    }

    .mint-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .mint-btn:disabled:hover {
      transform: none;
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #3d2e0a,
        0 6px 0 #2a1f08,
        0 8px 15px rgba(0, 0, 0, 0.6);
    }

    .mint-btn .btn-text {
      position: relative;
      z-index: 2;
    }

    /* --- Ripple --- */
    @keyframes ripple {
      0% { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(5); opacity: 0; }
    }

    .ripple-fx {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 120, 0.6), transparent);
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 3;
      animation: ripple 0.6s ease-out forwards;
    }

    /* --- Glow pulse on mint button --- */
    @keyframes glow-pulse {
      0%, 100% { box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #3d2e0a,
        0 6px 0 #2a1f08,
        0 8px 15px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(139, 105, 20, 0.2);
      }
      50% { box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #3d2e0a,
        0 6px 0 #2a1f08,
        0 8px 15px rgba(0, 0, 0, 0.6),
        0 0 25px rgba(201, 168, 76, 0.4);
      }
    }

    .mint-btn.ready {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    .mint-btn.ready:hover {
      animation: none;
    }

    /* --- Contract info --- */
    .contract-info {
      margin-top: 20px;
      text-align: center;
      font-size: 0.4rem;
      color: #5c4409;
      line-height: 2;
    }

    .contract-info a {
      color: #8a7a5a;
      text-decoration: none;
      border-bottom: 1px dotted #5c4409;
    }

    .contract-info a:hover {
      color: #c9a84c;
    }

    /* --- Wallet modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 3px solid #5c4409;
      border-radius: 8px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 105, 20, 0.15);
    }

    .modal-title {
      font-size: 0.7rem;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 24px;
    }

    .wallet-option {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #f5e6c8;
      background: rgba(61, 46, 10, 0.3);
      border: 2px solid #3d2e0a;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .wallet-option:hover {
      border-color: #8b6914;
      background: rgba(92, 68, 9, 0.3);
      box-shadow: 0 0 10px rgba(139, 105, 20, 0.2);
    }

    .wallet-option:active {
      transform: scale(0.97);
    }

    .wallet-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .modal-close {
      display: block;
      margin: 16px auto 0;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #5c4409;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }

    .modal-close:hover { color: #c9a84c; }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .mint-card { padding: 24px 18px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <img src="assets/last_chad_background.jpg" alt="">
  </div>

  <!-- Header -->
  <header class="header">
    <div id="nav-placeholder"></div>
    <div class="wallet-wrapper">
      <button class="wallet-btn" id="walletBtn">Connect Wallet</button>
      <div class="disconnect-dropdown" id="disconnectDropdown">
        <button class="disconnect-btn" id="disconnectBtn">DISCONNECT</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="mint-card">
      <h1 class="card-title">Last Chad</h1>
      <p class="card-subtitle">Mint a Last Chad NFT<br>Only 70 will ever exist</p>

      <!-- Supply -->
      <div class="supply-section">
        <div class="supply-label">
          <span>MINTED</span>
          <span id="supplyText">0 / 70</span>
        </div>
        <div class="supply-bar">
          <div class="supply-fill" id="supplyFill"></div>
        </div>
      </div>

      <hr class="divider">

      <!-- Price -->
      <div class="price-row">
        <span class="price-label">PRICE</span>
        <span class="price-value">0.02<span class="price-eth"> AVAX</span></span>
      </div>

      <!-- Quantity -->
      <div class="quantity-section">
        <div class="quantity-header">
          <span class="quantity-label">QUANTITY</span>
          <span class="quantity-display" id="qtyDisplay">1</span>
        </div>
        <div class="slider-row">
          <button class="qty-btn" id="qtyMinus" disabled>-</button>
          <div class="slider-container">
            <div class="slider-track">
              <div class="slider-fill-bar" id="sliderFill" style="width: 0%"></div>
            </div>
            <input type="range" min="1" max="5" value="1" id="qtySlider">
          </div>
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
        <div class="slider-pips" id="sliderPips"></div>
      </div>

      <!-- Total -->
      <div class="total-row">
        <span class="total-label">TOTAL</span>
        <span class="total-value" id="totalValue">3 AVAX</span>
      </div>

      <!-- Mint button -->
      <button class="mint-btn" id="mintBtn" disabled>
        <span class="btn-text">MINT</span>
      </button>

      <div class="contract-info">
        Contract: <a href="#" id="contractLink">0x1a2b...9z0x</a>
      </div>
    </div>
  </main>

  <!-- Wallet Modal -->
  <div class="modal-overlay" id="walletModal">
    <div class="modal">
      <h2 class="modal-title">Connect Wallet</h2>
      <button class="wallet-option" data-wallet="rabby">
        <span class="wallet-icon" style="background:#7c6be6;">&#128176;</span>
        Rabby
      </button>
      <button class="wallet-option" data-wallet="core">
        <span class="wallet-icon" style="background:#e84142;">&#9889;</span>
        Core
      </button>
      <button class="wallet-option" data-wallet="metamask">
        <span class="wallet-icon" style="background:#f6851b;">&#129418;</span>
        MetaMask
      </button>
      <button class="wallet-option" data-wallet="walletconnect">
        <span class="wallet-icon" style="background:#3b99fc;">&#128279;</span>
        WalletConnect
      </button>
      <button class="modal-close" id="modalClose">CANCEL</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script>
    // ========== CONFIG ==========
    const PRICE = 0.02;
    const MAX_SUPPLY = 70;
    const MAX_MINT_PER_WALLET = 5;
    const AVAX_CHAIN_ID = '0xa869'; // 43113
    const AVAX_CHAIN = {
      chainId: AVAX_CHAIN_ID,
      chainName: 'Avalanche Fuji Testnet',
      nativeCurrency: { name: 'Avalanche', symbol: 'AVAX', decimals: 18 },
      rpcUrls: ['https://api.avax-test.network/ext/bc/C/rpc'],
      blockExplorerUrls: ['https://testnet.snowtrace.io/']
    };

    const CONTRACT_ADDRESS = '0xE6A490A8D7fd9AAa70d095CC3e28a4974f9AfcE2';

    // Contract ABI — matches LastChad.sol
    const CONTRACT_ABI = [
      'function mint(uint256 quantity) external payable',
      'function totalSupply() external view returns (uint256)',
      'function MAX_SUPPLY() external view returns (uint256)',
      'function MINT_PRICE() external view returns (uint256)',
      'function balanceOf(address owner) external view returns (uint256)',
      'function ownerOf(uint256 tokenId) external view returns (address)',
      'function tokenURI(uint256 tokenId) external view returns (string)'
    ];

    // Read-only provider for fetching supply even when wallet not connected
    const READ_RPC = 'https://api.avax-test.network/ext/bc/C/rpc';

    // TODO: Set your WalletConnect project ID from https://cloud.walletconnect.com
    const WALLETCONNECT_PROJECT_ID = '3aa99496af6ef381ca5d78f464777c45';

    // ========== DOM ==========
    const slider = document.getElementById('qtySlider');
    const qtyDisplay = document.getElementById('qtyDisplay');
    const totalValue = document.getElementById('totalValue');
    const sliderFill = document.getElementById('sliderFill');
    const mintBtn = document.getElementById('mintBtn');
    const walletBtn = document.getElementById('walletBtn');
    const walletModal = document.getElementById('walletModal');
    const modalClose = document.getElementById('modalClose');
    const qtyMinus = document.getElementById('qtyMinus');
    const qtyPlus = document.getElementById('qtyPlus');
    const pipsContainer = document.getElementById('sliderPips');
    const btnText = mintBtn.querySelector('.btn-text');
    const supplyText = document.getElementById('supplyText');
    const supplyFill = document.getElementById('supplyFill');

    // ========== STATE ==========
    let provider = null;
    let signer = null;
    let userAddress = null;
    let quantity = 1;
    let minted = 0;
    let maxQty = MAX_SUPPLY;

    // ========== HELPERS ==========
    function isMobile() {
      return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }

    function getDappUrl() {
      return window.location.href;
    }

    function getDappHost() {
      return window.location.host + window.location.pathname;
    }

    // ========== SUPPLY TRACKING ==========
    async function updateSupply() {
      if (!CONTRACT_ADDRESS) return;
      try {
        const readProvider = new ethers.providers.JsonRpcProvider(READ_RPC);
        const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, readProvider);
        const supply = await contract.totalSupply();
        minted = supply.toNumber();
        const remaining = MAX_SUPPLY - minted;

        // Update supply display
        supplyText.textContent = minted + ' / ' + MAX_SUPPLY;
        supplyFill.style.width = (minted / MAX_SUPPLY * 100) + '%';

        // Update max quantity slider
        maxQty = Math.min(remaining, MAX_MINT_PER_WALLET);
        if (maxQty < 1) maxQty = 0;
        slider.max = maxQty > 0 ? maxQty : 1;
        if (quantity > maxQty) {
          quantity = Math.max(maxQty, 1);
        }

        // Rebuild pips for new max
        rebuildPips();
        updateUI();

        // If sold out, disable minting
        if (minted >= MAX_SUPPLY) {
          mintBtn.disabled = true;
          btnText.textContent = 'SOLD OUT';
          mintBtn.classList.remove('ready');
        }

        // Update contract link
        if (CONTRACT_ADDRESS) {
          const contractLink = document.getElementById('contractLink');
          contractLink.textContent = CONTRACT_ADDRESS.slice(0, 6) + '...' + CONTRACT_ADDRESS.slice(-4);
          contractLink.href = 'https://testnet.snowtrace.io/address/' + CONTRACT_ADDRESS;
          contractLink.target = '_blank';
        }
      } catch (err) {
        console.error('Failed to read supply:', err);
      }
    }

    // ========== QUANTITY UI ==========
    function rebuildPips() {
      pipsContainer.innerHTML = '';
      const max = parseInt(slider.max);
      for (let i = 1; i <= max; i++) {
        const pip = document.createElement('span');
        pip.textContent = i;
        if (i <= quantity) pip.classList.add('active');
        pipsContainer.appendChild(pip);
      }
    }

    // Initial pips
    for (let i = 1; i <= MAX_MINT_PER_WALLET; i++) {
      const pip = document.createElement('span');
      pip.textContent = i;
      if (i === 1) pip.classList.add('active');
      pipsContainer.appendChild(pip);
    }

    function updateUI() {
      const max = parseInt(slider.max);
      qtyDisplay.textContent = quantity;
      totalValue.textContent = (quantity * PRICE) + ' AVAX';
      sliderFill.style.width = max > 1 ? ((quantity - 1) / (max - 1) * 100) + '%' : '0%';
      slider.value = quantity;
      qtyMinus.disabled = quantity <= 1;
      qtyPlus.disabled = quantity >= max;
      const pips = pipsContainer.querySelectorAll('span');
      pips.forEach((p, i) => p.classList.toggle('active', i + 1 <= quantity));
    }

    slider.addEventListener('input', () => { quantity = parseInt(slider.value); updateUI(); });
    qtyMinus.addEventListener('click', () => { if (quantity > 1) { quantity--; updateUI(); } });
    qtyPlus.addEventListener('click', () => { if (quantity < parseInt(slider.max)) { quantity++; updateUI(); } });

    // ========== WALLET HELPERS ==========
    function truncateAddress(addr) {
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    async function switchToAvalanche(rawProvider) {
      try {
        await rawProvider.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: AVAX_CHAIN_ID }]
        });
      } catch (err) {
        if (err.code === 4902) {
          await rawProvider.request({
            method: 'wallet_addEthereumChain',
            params: [AVAX_CHAIN]
          });
        } else {
          throw err;
        }
      }
    }

    function onConnected(addr) {
      userAddress = addr;
      walletBtn.textContent = truncateAddress(addr);
      walletBtn.classList.add('connected');
      if (minted < MAX_SUPPLY) {
        mintBtn.disabled = false;
        btnText.textContent = 'MINT NOW';
        mintBtn.classList.add('ready');
      }
      walletModal.classList.remove('show');
      updateSupply();
    }

    function onDisconnected() {
      provider = null;
      signer = null;
      userAddress = null;
      walletBtn.textContent = 'Connect Wallet';
      walletBtn.classList.remove('connected');
      mintBtn.disabled = true;
      btnText.textContent = 'MINT';
      mintBtn.classList.remove('ready');
      try { document.getElementById('disconnectDropdown').classList.remove('show'); } catch(e) {}
    }

    // ========== MOBILE DEEP LINKS ==========
    function getMobileDeepLink(walletName) {
      const url = getDappHost();
      const fullUrl = getDappUrl();
      switch (walletName) {
        case 'metamask':
          return 'https://metamask.app.link/dapp/' + url;
        case 'core':
          return 'https://core.app/browser?url=' + encodeURIComponent(fullUrl);
        case 'rabby':
          return 'https://rabby.io';
        default:
          return null;
      }
    }

    // ========== CONNECT WALLET ==========
    async function connectWallet(walletName) {
      const hasInjected = window.ethereum || window.avalanche;

      if (!hasInjected && isMobile() && walletName !== 'walletconnect') {
        const deepLink = getMobileDeepLink(walletName);
        if (deepLink) {
          window.location.href = deepLink;
          return;
        }
      }

      if (walletName === 'walletconnect') {
        await connectWalletConnect();
        return;
      }

      await connectInjected(walletName);
    }

    // ========== INJECTED WALLET (Rabby, Core, MetaMask) ==========
    async function connectInjected(walletName) {
      let rawProvider = null;

      if (walletName === 'core' && (window.avalanche || (window.core && window.core.ethereum))) {
        rawProvider = window.avalanche || window.core.ethereum;
      } else if (window.ethereum) {
        if (window.ethereum.providers && window.ethereum.providers.length) {
          for (const p of window.ethereum.providers) {
            if (walletName === 'rabby' && p.isRabby) { rawProvider = p; break; }
            if (walletName === 'metamask' && p.isMetaMask && !p.isRabby) { rawProvider = p; break; }
            if (walletName === 'core' && (p.isAvalanche || p.isCoreWallet)) { rawProvider = p; break; }
          }
        }
        if (!rawProvider) {
          if (walletName === 'rabby' && window.ethereum.isRabby) rawProvider = window.ethereum;
          else if (walletName === 'metamask' && window.ethereum.isMetaMask) rawProvider = window.ethereum;
          else if (walletName === 'core' && (window.ethereum.isAvalanche || window.ethereum.isCoreWallet)) rawProvider = window.ethereum;
          else rawProvider = window.ethereum;
        }
      }

      if (!rawProvider) {
        if (isMobile()) {
          const deepLink = getMobileDeepLink(walletName);
          if (deepLink) {
            window.location.href = deepLink;
            return;
          }
        }
        const urls = {
          rabby: 'https://rabby.io',
          core: 'https://core.app',
          metamask: 'https://metamask.io'
        };
        alert(walletName.charAt(0).toUpperCase() + walletName.slice(1) +
          ' wallet not detected.\n\nOn mobile: install the app and open this site in its built-in browser.\n\nOn desktop: install the browser extension from ' +
          (urls[walletName] || ''));
        return;
      }

      try {
        const accounts = await rawProvider.request({ method: 'eth_requestAccounts' });
        if (!accounts || accounts.length === 0) throw new Error('No accounts returned');

        await switchToAvalanche(rawProvider);

        provider = new ethers.providers.Web3Provider(rawProvider);
        signer = provider.getSigner();
        onConnected(accounts[0]);

        rawProvider.on('accountsChanged', (accs) => {
          if (accs.length === 0) onDisconnected();
          else onConnected(accs[0]);
        });
        rawProvider.on('chainChanged', () => window.location.reload());

      } catch (err) {
        console.error('Connection failed:', err);
        if (err.code !== 4001) {
          alert('Failed to connect: ' + (err.message || err));
        }
      }
    }

    // ========== WALLETCONNECT ==========
    async function connectWalletConnect() {
      if (!WALLETCONNECT_PROJECT_ID) {
        alert('WalletConnect project ID not configured.\n\nGet one free at:\nhttps://cloud.walletconnect.com\n\nThen set WALLETCONNECT_PROJECT_ID in mint.html');
        return;
      }

      try {
        const { EthereumProvider } = await import('https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.17.0/+esm');
        const wcProvider = await EthereumProvider.init({
          projectId: WALLETCONNECT_PROJECT_ID,
          chains: [43113],
          showQrModal: true,
          rpcMap: { 43113: 'https://api.avax-test.network/ext/bc/C/rpc' }
        });

        await wcProvider.connect();
        provider = new ethers.providers.Web3Provider(wcProvider);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        onConnected(addr);

        wcProvider.on('accountsChanged', (accs) => {
          if (accs.length === 0) onDisconnected();
          else onConnected(accs[0]);
        });
        wcProvider.on('disconnect', onDisconnected);
      } catch (err) {
        console.error('WalletConnect failed:', err);
        alert('WalletConnect failed to connect. Please try again or use a different wallet.');
        if (err.message && !err.message.includes('User closed')) {
          alert('WalletConnect failed: ' + err.message);
        }
      }
    }

    // ========== MODAL EVENTS ==========
    const disconnectDropdown = document.getElementById('disconnectDropdown');
    const disconnectBtn = document.getElementById('disconnectBtn');

    walletBtn.addEventListener('click', () => {
      if (userAddress) {
        disconnectDropdown.classList.toggle('show');
        return;
      }
      walletModal.classList.add('show');
    });

    disconnectBtn.addEventListener('click', () => {
      disconnectDropdown.classList.remove('show');
      onDisconnected();
    });

    // Close dropdowns when tapping elsewhere
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.wallet-wrapper')) {
        disconnectDropdown.classList.remove('show');
      }
    });

    modalClose.addEventListener('click', () => walletModal.classList.remove('show'));
    walletModal.addEventListener('click', (e) => {
      if (e.target === walletModal) walletModal.classList.remove('show');
    });

    document.querySelectorAll('.wallet-option').forEach(opt => {
      opt.addEventListener('click', () => {
        walletModal.classList.remove('show');
        connectWallet(opt.dataset.wallet);
      });
    });

    // ========== MINT ==========
    mintBtn.addEventListener('click', async function (e) {
      if (this.disabled || !signer) return;

      // Ripple effect
      const ripple = document.createElement('div');
      ripple.classList.add('ripple-fx');
      const rect = this.getBoundingClientRect();
      ripple.style.left = (e.clientX - rect.left - 20) + 'px';
      ripple.style.top = (e.clientY - rect.top - 20) + 'px';
      this.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      // Check contract is configured
      if (!CONTRACT_ADDRESS) {
        alert('Mint contract not deployed yet.\n\nDeploy LastChad.sol and set CONTRACT_ADDRESS in mint.html.');
        return;
      }

      try {
        mintBtn.disabled = true;
        btnText.textContent = 'MINTING...';
        mintBtn.classList.remove('ready');

        const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        const totalCost = ethers.utils.parseEther((quantity * PRICE).toString());

        // Track supply before minting to determine minted token IDs
        const supplyBefore = minted;

        const tx = await contract.mint(quantity, { value: totalCost });
        btnText.textContent = 'CONFIRMING...';
        await tx.wait();

        // Refresh supply after successful mint
        await updateSupply();

        // Calculate the token IDs that were just minted
        const mintedIds = [];
        for (let i = 1; i <= quantity; i++) {
          mintedIds.push(supplyBefore + i);
        }

        btnText.textContent = 'MINTED!';

        // Redirect to stats page after a short delay
        setTimeout(() => {
          window.location.href = 'stats.html?tokens=' + mintedIds.join(',');
        }, 1500);

      } catch (err) {
        console.error('Mint failed:', err);
        let msg = err.reason || err.message || 'Unknown error';
        if (err.code === 'ACTION_REJECTED' || err.code === 4001) {
          btnText.textContent = 'MINT NOW';
        } else if (msg.includes('Exceeds max supply')) {
          btnText.textContent = 'SOLD OUT';
          await updateSupply();
          return;
        } else if (msg.includes('Exceeds max per wallet')) {
          alert('You can only mint up to ' + MAX_MINT_PER_WALLET + ' NFTs per wallet.');
          btnText.textContent = 'MINT NOW';
        } else if (msg.includes('Insufficient payment')) {
          alert('Insufficient AVAX. You need ' + (quantity * PRICE) + ' AVAX to mint.');
          btnText.textContent = 'MINT NOW';
        } else {
          btnText.textContent = 'FAILED';
          setTimeout(() => { btnText.textContent = 'MINT NOW'; }, 2000);
        }
        mintBtn.disabled = false;
        mintBtn.classList.add('ready');
      }
    });

    // ========== AUTO-RECONNECT ==========
    (async () => {
      // Fetch supply on page load (works without wallet)
      await updateSupply();

      const rawProvider = window.ethereum || window.avalanche;
      if (rawProvider) {
        try {
          const accounts = await rawProvider.request({ method: 'eth_accounts' });
          if (accounts && accounts.length > 0) {
            await switchToAvalanche(rawProvider);
            provider = new ethers.providers.Web3Provider(rawProvider);
            signer = provider.getSigner();
            onConnected(accounts[0]);
          }
        } catch (e) {}
      }
    })();

    // Poll supply every 15 seconds to keep it fresh
    setInterval(updateSupply, 15000);
  </script>
  <script src="nav.js"></script>
</body>
</html>

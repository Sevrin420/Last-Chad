<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craps Table — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      width:100vw;height:100vh;overflow:hidden;
      background:#0a0a0f;
      font-family:'Press Start 2P',monospace;
      color:#ffe96a;
    }

    :root{
      --p1-color:#4caf50;--p2-color:#42a5f5;--p3-color:#ab47bc;--p4-color:#ef5350;
      --p1-glow:rgba(76,175,80,0.5);--p2-glow:rgba(66,165,245,0.5);
      --p3-glow:rgba(171,71,188,0.5);--p4-glow:rgba(239,83,80,0.5);
      --felt:#1a6b1a;--felt-dark:#145214;--felt-border:#c9a84c;
    }

    /* ── Header ── */
    .game-header{
      position:fixed;top:0;left:0;right:0;z-index:300;
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 14px;
      background:rgba(10,10,15,0.95);
      border-bottom:2px solid #2a5a1a;
      backdrop-filter:blur(8px);height:40px;
    }
    .header-left{display:flex;align-items:center;gap:10px}
    .header-title{font-size:0.5rem;color:#4caf50;text-shadow:0 0 10px rgba(76,175,80,0.4);display:none}
    .header-action-btn{
      font-family:'Press Start 2P',monospace;font-size:0.35rem;
      padding:6px 12px;border-radius:5px;cursor:pointer;
      border:2px solid #2e7d32;color:#fff;
      background:linear-gradient(180deg,#4caf50 0%,#2e7d32 100%);
      box-shadow:inset 0 1px 0 rgba(150,255,150,0.2),0 2px 6px rgba(0,0,0,0.5);
      white-space:nowrap;
    }
    .header-action-btn:hover{background:linear-gradient(180deg,#66bb6a 0%,#388e3c 100%)}
    .header-action-btn.cashout-mode{
      border-color:#e53935;
      background:linear-gradient(180deg,#e53935 0%,#b71c1c 100%);
      color:#fff;
    }
    .header-action-btn.cashout-mode:hover{background:linear-gradient(180deg,#ef5350 0%,#c62828 100%)}
    .wallet-btn{
      font-family:'Press Start 2P',monospace;font-size:0.35rem;
      padding:6px 12px;border-radius:5px;cursor:pointer;
      border:2px solid #5c4409;color:#1a1005;
      background:linear-gradient(180deg,#c9a84c 0%,#8b6914 100%);
      box-shadow:inset 0 1px 0 rgba(255,220,120,0.4),0 2px 6px rgba(0,0,0,0.5);
    }
    .wallet-btn:hover{background:linear-gradient(180deg,#dabb5e 0%,#a07d1e 100%)}
    .nav-wrapper{position:static}

    /* ── Main Layout ── */
    .table-wrapper{
      width:100%;height:calc(100vh - 40px);
      margin-top:40px;
      display:flex;flex-direction:column;
    }

    /* ── Felt Table Area ── */
    .table-area{
      flex:0 0 auto;position:relative;
      display:flex;flex-direction:column;
    }
    .felt-container{
      flex:0 0 auto;position:relative;
      background-color:#0a0a0f;
      border:3px solid var(--felt-border);
      border-top:none;
      border-radius:0 0 8px 8px;
      margin:0 4px 2px 4px;
      overflow:hidden;
      box-shadow:inset 0 0 40px rgba(0,0,0,0.3), 0 0 20px rgba(0,0,0,0.5);
    }
    /* Wrapper — craps table image, fill middle naturally */
    .table-image-wrap{
      position:relative;
      width:100%;
      overflow:hidden;
    }
    .table-image-wrap > .table-bg{
      display:block; width:100%; height:auto;
    }

    /* ── Player Bar (below chat) ── */
    .player-bar{
      flex:1;
      display:flex;align-items:stretch;
      background:rgba(10,10,15,0.9);
      border-top:2px solid #2a3a1a;
      min-height:0;
    }
    .remote-card{
      flex:1;
      display:flex;flex-direction:column;align-items:center;justify-content:stretch;
      gap:4px;padding:6px 4px;
      border-right:1px solid #1a2a0a;
      min-width:0;
    }
    .remote-card[data-seat="1"]{--slot-color:var(--p2-color)}
    .remote-card[data-seat="2"]{--slot-color:var(--p3-color)}
    .remote-card[data-seat="3"]{--slot-color:var(--p4-color)}
    .remote-avatar{
      flex:1;
      width:100%;
      aspect-ratio:3/4;
      border:3px solid var(--slot-color,#333);
      border-radius:6px;
      background:rgba(0,0,0,0.4);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      image-rendering:pixelated;
    }
    .remote-avatar img{width:100%;height:100%;object-fit:cover;display:none}
    .remote-avatar img.visible{display:block}
    .remote-name{
      font-size:0.22rem;color:var(--slot-color,#555);
      text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:100%;
    }
    .local-card{--slot-color:var(--p1-color)}
    .remote-card.shooter .remote-avatar{
      border-color:#c9a84c;
      box-shadow:0 0 12px rgba(201,168,76,0.7),0 0 24px rgba(201,168,76,0.35);
      animation:shooterGlow 1.8s ease-in-out infinite alternate;
    }
    @keyframes shooterGlow{
      from{box-shadow:0 0 10px rgba(201,168,76,0.5),0 0 20px rgba(201,168,76,0.25)}
      to{box-shadow:0 0 16px rgba(201,168,76,0.9),0 0 32px rgba(201,168,76,0.45)}
    }

    /* ── Announcer Overlay (over craps table) ── */
    .announcer-overlay{
      position:absolute;top:0;left:0;right:0;bottom:0;
      z-index:30;pointer-events:none;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.3s ease;
    }
    .announcer-overlay.visible{opacity:1}
    .announcer-inner{
      display:flex;align-items:center;gap:10px;
      background:rgba(0,0,0,0.85);
      border:3px solid #c9a84c;border-radius:10px;
      padding:10px 18px;
      box-shadow:0 0 30px rgba(201,168,76,0.4), inset 0 0 20px rgba(0,0,0,0.5);
      max-width:90%;
    }
    .announcer-portrait{
      width:112px;height:132px;image-rendering:pixelated;
      border:2px solid #5c4409;border-radius:4px;
      box-shadow:0 2px 8px rgba(0,0,0,0.6);
      flex-shrink:0;
    }
    .announcer-content{
      display:flex;flex-direction:column;gap:6px;
      min-width:0;
    }
    .announcer-call{
      font-size:0.8rem;color:#ffe96a;
      text-shadow:0 0 10px rgba(255,233,106,0.6), 2px 2px 4px rgba(0,0,0,0.9);
      line-height:1.4;
    }
    .announcer-sub{
      font-size:0.4rem;color:#f5e6c8;
      line-height:1.3;opacity:0.85;
    }
    .announcer-dice{
      display:flex;gap:10px;align-items:center;
    }
    .announcer-die{
      width:56px;height:56px;
      background:#e8e8e8;
      background-image:linear-gradient(145deg,#f8f8f8 0%,#d2d2d2 50%,#a2a2a2 100%);
      border:2px solid #9a9a9a;border-radius:6px;
      display:flex;align-items:center;justify-content:center;
    }
    .announcer-die .die-face{
      width:100%;height:100%;display:grid;
      grid-template-rows:1fr 1fr 1fr;grid-template-columns:1fr 1fr 1fr;
      padding:14%;gap:1px;
    }
    .announcer-die .dot{
      width:100%;aspect-ratio:1;background:#111;border-radius:50%;
      box-shadow:inset 1px 1px 2px rgba(0,0,0,0.9);
      visibility:hidden;
    }
    @media(max-width:600px){
      .announcer-inner{padding:8px 12px;gap:8px}
      .announcer-portrait{width:80px;height:96px}
      .announcer-call{font-size:0.55rem}
      .announcer-sub{font-size:0.3rem}
      .announcer-die{width:40px;height:40px}
    }

    /* ── Press Button (appears on winning bets) ── */
    .press-btn{
      position:absolute;z-index:12;
      font-family:'Press Start 2P',monospace;font-size:0.2rem;
      padding:4px 8px;border-radius:4px;cursor:pointer;
      background:linear-gradient(180deg,#4caf50,#2e7d32);
      border:2px solid #66bb6a;color:#fff;
      box-shadow:0 0 8px rgba(76,175,80,0.5);
      animation:press-pulse 1s ease-in-out infinite;
      white-space:nowrap;
    }
    .press-btn:hover{background:linear-gradient(180deg,#66bb6a,#388e3c);transform:scale(1.1)}
    @keyframes press-pulse{0%,100%{box-shadow:0 0 6px rgba(76,175,80,0.4)}50%{box-shadow:0 0 14px rgba(76,175,80,0.8)}}

    /* ── Puck ── */
    .puck{position:absolute;width:42px;height:42px;top:1%;right:10px;z-index:20;transition:left 0.3s ease, top 0.3s ease}
    .puck img{width:100%;height:100%;object-fit:contain}
    .puck.on-glow{
      filter:drop-shadow(0 0 10px rgba(255,215,0,0.9)) drop-shadow(0 0 20px rgba(255,180,0,0.6));
      animation:puck-glow 1.5s ease-in-out infinite;
    }
    @keyframes puck-glow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,215,0,0.7)) drop-shadow(0 0 16px rgba(255,180,0,0.4))}50%{filter:drop-shadow(0 0 14px rgba(255,215,0,1)) drop-shadow(0 0 28px rgba(255,180,0,0.8))}}

    /* ── Bet Zone Overlay (positioned on crapstable image) ── */
    .bet-grid{
      position:absolute;
      inset:0;
      z-index:5;
    }

    .bet-zone{
      position:absolute;
      border:2px solid transparent;
      border-radius:3px;cursor:pointer;
      transition:all 0.15s;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;
      background:transparent;
    }
    .bet-zone:hover{
      border-color:rgba(255,233,106,0.6);
      background:rgba(255,233,106,0.08);
      box-shadow:inset 0 0 12px rgba(255,233,106,0.15);
    }
    .bet-zone .zone-label{
      font-size:0.3rem;color:transparent;
      line-height:1.3;
      pointer-events:none;
    }
    .bet-zone:hover .zone-label{
      color:rgba(255,233,106,0.9);
      text-shadow:1px 1px 2px rgba(0,0,0,0.9);
    }
    .bet-zone .zone-payout{
      font-size:0.16rem;color:transparent;
      pointer-events:none;
    }
    .bet-zone:hover .zone-payout{
      color:rgba(255,233,106,0.6);
    }

    /* ── Place Bets — full green felt boxes (4,5,6,8,9,10) ── */
    .bet-place4  {left:1.5%;  top:8%;  width:16%;  height:19%}
    .bet-place5  {left:17.5%; top:8%;  width:16%;  height:19%}
    .bet-place6  {left:33.5%; top:8%;  width:16%;  height:19%}
    .bet-place8  {left:51%;   top:8%;  width:16%;  height:19%}
    .bet-place9  {left:67%;   top:8%;  width:16%;  height:19%}
    .bet-place10 {left:83%;   top:8%;  width:17%;  height:19%}

    /* ── FIELD — tall left green rectangle ── */
    .bet-field{left:1.5%; top:32%; width:27%; height:53%}

    /* ── Hard Ways — 4 square green felt boxes (4,6,8,10) ── */
    .bet-hard4  {left:37%;  top:43%; width:15%; height:16%}
    .bet-hard6  {left:52%;  top:43%; width:15%; height:16%}
    .bet-hard8  {left:67%;  top:43%; width:15%; height:16%}
    .bet-hard10 {left:82%;  top:43%; width:15%; height:16%}

    /* ── Pass Line — bottom-right green rectangle ── */
    .bet-pass{left:38%; top:63%; width:58%; height:20%}

    /* Win/lose flash */
    .bet-zone.win-flash{animation:zone-win 0.5s ease 3;border-color:#4caf50;background:rgba(76,175,80,0.2)}
    .bet-zone.lose-flash{animation:zone-lose 0.5s ease 3;border-color:#e53935;background:rgba(229,57,53,0.2)}
    @keyframes zone-win{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 20px rgba(76,175,80,0.5)}}
    @keyframes zone-lose{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 20px rgba(229,57,53,0.5)}}

    /* ── Bet chips on felt ── */
    .bet-chips-container{
      position:absolute;inset:0;pointer-events:none;z-index:10;
    }
    .bet-chip-token{
      position:absolute;
      width:28px;height:28px;border-radius:50%;
      font-size:0.18rem;display:flex;align-items:center;justify-content:center;
      font-family:'Press Start 2P',monospace;
      box-shadow:0 0 6px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.15);
      border:3px solid;
      z-index:11;
    }
    .bet-chip-token.p0{background:#1a1a1a;border-color:var(--p1-color);color:var(--p1-color)}
    .bet-chip-token.p1{background:#1a1a1a;border-color:var(--p2-color);color:var(--p2-color)}
    .bet-chip-token.p2{background:#1a1a1a;border-color:var(--p3-color);color:var(--p3-color)}
    .bet-chip-token.p3{background:#1a1a1a;border-color:var(--p4-color);color:var(--p4-color)}
    .bet-chip-token.off{opacity:0.35;filter:grayscale(0.6)}
    /* ── Place Bets chip positions — inside boxes ──
       p0 (local): top-left, p1 (remote1): top-right, p2 (remote2): bottom-left */
    .bet-chip-token.pos-0{top:8%;left:2%}
    .bet-chip-token.pos-1{top:8%;right:2%;left:auto}
    .bet-chip-token.pos-2{bottom:8%;left:2%;top:auto}
    .bet-chip-token.pos-3{bottom:8%;right:2%;top:auto;left:auto}
    /* Nudge 4,5,6 local player chips left, remote chips right */
    .bet-place4 .bet-chip-token.pos-0{left:-8%}
    .bet-place5 .bet-chip-token.pos-0{left:-8%}
    .bet-place6 .bet-chip-token.pos-0{left:-8%}
    .bet-place4 .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place5 .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place6 .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place4 .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    .bet-place5 .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    .bet-place6 .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    /* Nudge 8,9,10 — green left, blue right, purple down-left */
    .bet-place8  .bet-chip-token.pos-0{left:-8%}
    .bet-place9  .bet-chip-token.pos-0{left:-8%}
    .bet-place10 .bet-chip-token.pos-0{left:-8%}
    .bet-place8  .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place9  .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place10 .bet-chip-token.pos-1{right:-8%;left:auto}
    .bet-place8  .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    .bet-place9  .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    .bet-place10 .bet-chip-token.pos-2{left:-8%;bottom:-8%;top:auto}
    /* p3 red: bottom-right (blue right × purple bottom) */
    .bet-place4  .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}
    .bet-place5  .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}
    .bet-place6  .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}
    .bet-place8  .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}
    .bet-place9  .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}
    .bet-place10 .bet-chip-token.pos-3{right:-8%;bottom:-8%;top:auto;left:auto}

    /* ── Hardways — chips inside box, spread by player ── */
    /* p0 green: up-left (nudged up) */
    .bet-hard4  .bet-chip-token.pos-0,
    .bet-hard6  .bet-chip-token.pos-0,
    .bet-hard8  .bet-chip-token.pos-0,
    .bet-hard10 .bet-chip-token.pos-0{top:5%;left:20%;transform:translate(-50%,-50%);z-index:13}
    /* p1 blue: up-right (nudged up) */
    .bet-hard4  .bet-chip-token.pos-1,
    .bet-hard6  .bet-chip-token.pos-1,
    .bet-hard8  .bet-chip-token.pos-1,
    .bet-hard10 .bet-chip-token.pos-1{top:5%;left:65%;transform:translate(-50%,-50%);z-index:12}
    /* p2 purple: down-left (nudged down) */
    .bet-hard4  .bet-chip-token.pos-2,
    .bet-hard6  .bet-chip-token.pos-2,
    .bet-hard8  .bet-chip-token.pos-2,
    .bet-hard10 .bet-chip-token.pos-2{top:75%;left:20%;transform:translate(-50%,-50%);z-index:11}
    /* p3 red: down-right (blue horizontal × purple vertical) */
    .bet-hard4  .bet-chip-token.pos-3,
    .bet-hard6  .bet-chip-token.pos-3,
    .bet-hard8  .bet-chip-token.pos-3,
    .bet-hard10 .bet-chip-token.pos-3{top:75%;left:65%;transform:translate(-50%,-50%);z-index:10}

    /* ── Field — stack chips vertically in the tall left column ── */
    .bet-field .bet-chip-token.pos-0{top:30%;left:50%;transform:translate(-50%,-50%)}
    .bet-field .bet-chip-token.pos-1{top:50%;left:50%;transform:translate(-50%,-50%)}
    .bet-field .bet-chip-token.pos-2{top:70%;left:50%;transform:translate(-50%,-50%)}
    .bet-field .bet-chip-token.pos-3{top:90%;left:50%;transform:translate(-50%,-50%)}

    /* ── Pass line — all chips left of the "1:1" text ── */
    .bet-pass .bet-chip-token.pos-0{top:50%;left:10%;transform:translate(-50%,-50%)}
    .bet-pass .bet-chip-token.pos-1{top:50%;left:25%;transform:translate(-50%,-50%)}
    .bet-pass .bet-chip-token.pos-2{top:50%;left:40%;transform:translate(-50%,-50%)}
    .bet-pass .bet-chip-token.pos-3{top:30%;left:10%;transform:translate(-50%,-50%)}

    /* ── On-table HUD — bottom strip of image ── */
    .table-hud{
      position:absolute;bottom:0;left:0;right:0;
      height:22%;z-index:14;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 3%;
      pointer-events:none;
    }
    .table-hud > *{pointer-events:auto}

    /* Stack display — bottom-left */
    .table-stack{
      display:flex;flex-direction:column;align-items:center;gap:2px;
    }
    .table-stack-label{
      font-size:0.5rem;color:#8a7a5a;text-shadow:1px 1px 2px #000;
    }
    .table-stack-value{
      font-size:1.4rem;color:#ffe96a;
      text-shadow:0 0 10px rgba(255,233,106,0.5),2px 2px 4px rgba(0,0,0,0.9);
    }

    /* Chip tray — bottom-center (on felt) */
    .table-chip-tray{
      display:flex;gap:8px;align-items:center;
    }
    .table-chip-tray .chip{
      width:clamp(40px,10vw,64px);height:clamp(40px,10vw,64px);
      border-radius:50%;cursor:pointer;
      border:3px solid transparent;transition:all 0.15s;
      position:relative;overflow:hidden;
      background-image:url('assets/Oldjipt/Craps/jiptchips.png');
      background-size:340% 340%;
    }
    .chip-1-sprite  {background-position:3% 3%}
    .chip-5-sprite  {background-position:50% 3%}
    .chip-10-sprite {background-position:97% 3%}
    .chip-25-sprite {background-position:3% 50%}
    .chip-50-sprite {background-position:50% 50%}
    .chip-100-sprite{background-position:97% 50%}
    .table-chip-tray .chip:hover{transform:scale(1.15);filter:brightness(1.2)}
    .table-chip-tray .chip.selected{border-color:var(--p1-color);box-shadow:0 0 14px var(--p1-glow);transform:scale(1.15)}

    /* ── Dice on felt — bottom-right ── */
    .table-dice{
      position:relative;
      display:flex;flex-direction:row;gap:10px;z-index:15;
      cursor:pointer;
    }
    .table-dice.can-roll{
      filter:drop-shadow(0 0 12px rgba(255,233,106,0.7));
      animation:dice-pulse 1.2s ease-in-out infinite;
    }
    .table-dice.locked{cursor:not-allowed;opacity:0.85}
    @keyframes dice-pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(255,233,106,0.4))}50%{filter:drop-shadow(0 0 18px rgba(255,233,106,0.9))}}
    .die{
      width:clamp(60px,14vw,96px);height:clamp(60px,14vw,96px);
      background:#e8e8e8;
      background-image:linear-gradient(145deg,#f8f8f8 0%,#e6e6e6 18%,#d2d2d2 36%,#c4c4c4 52%,#b2b2b2 68%,#a2a2a2 82%,#929292 100%);
      border:2px solid #9a9a9a;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      position:relative;transition:border-color 0.2s, box-shadow 0.2s;
      opacity:1;
      box-shadow:inset 3px 3px 8px rgba(255,255,255,0.88),inset -2px -2px 6px rgba(0,0,0,0.28),2px 2px 0 #878787,3px 3px 0 #767676,4px 4px 0 #656565,5px 5px 12px rgba(0,0,0,0.72);
    }
    @keyframes dice-tumble{0%{transform:rotateX(0deg) rotateZ(0deg)}100%{transform:rotateX(360deg) rotateZ(270deg)}}
    .die.rolling{
      animation:dice-tumble 0.28s linear infinite;

<script type="module">
import { connectWallet as walletConnect, autoReconnect, disconnect,
         getSigner, getUserAddress, truncateAddress } from './js/wallet.js';
import { GAMBLE_ADDRESS, GAMBLE_ABI } from './js/config.js';

/* ===================================================================
   CRAPS TABLE — Last Chad
   Multiplayer craps with text chat
   Server-side dice via Cloudflare Worker — no client-side RNG
   =================================================================== */

const WORKER_URL = 'https://last-chad-runner.severin20.workers.dev';

function fetchWithTimeout(url, opts = {}, timeoutMs = 15000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...opts, signal: controller.signal }).finally(() => clearTimeout(timer));
}

// ── Bet Placement ──
async function placeBet(zone) {
  if (STATE.isRolling || betsLocked) return;
  const amount = STATE.selectedChip;
  if (STATE.stack < amount) { dealerSay("Not enough chips!", 'sad'); return; }
  // Client-side phase validation (fast feedback; DO re-validates server-side)
  if (zone.startsWith('place') && STATE.phase === 'comeout') {
    dealerSay("Place bets open after point.", 'neutral'); return;
  }
  if (zone === 'pass' && STATE.phase === 'point') {
    dealerSay("Pass line only on come-out roll.", 'neutral'); return;
  }
  if (zone === 'passOdds' && STATE.phase === 'comeout') {
    dealerSay("Pass odds only after point is set.", 'neutral'); return;
  }
  if (zone === 'come' && STATE.phase === 'comeout') {
    dealerSay("Come bets only after point is set.", 'neutral'); return;
  }
  // Optimistic update (will be corrected by bet-ok / bet-rejected from DO)
  STATE.stack -= amount;
  STATE.bets[zone] = (STATE.bets[zone] || 0) + amount;
  renderAllBetChips();
  updateLocalPlayerUI();
  // Send to DO for authoritative validation
  wsSend({ type: 'bet', zone, amount });
  onFirstBet();
}

function formatBetName(zone) {
  const names = {
    pass:'PASS LINE', field:'FIELD',
    place4:'PLACE 4', place5:'PLACE 5', place6:'PLACE 6',
    place8:'PLACE 8', place9:'PLACE 9', place10:'PLACE 10',
    hard4:'HARD 4', hard6:'HARD 6', hard8:'HARD 8', hard10:'HARD 10'
  };
  return names[zone] || zone.toUpperCase();
}

function movePuckToPoint(point) {
  const placeZone = document.querySelector('.bet-place' + point);
  const puck = document.getElementById('puck');
  if (!placeZone || !puck) return;
  const zoneLeft = parseFloat(placeZone.style.left || getComputedStyle(placeZone).left);
  const zoneWidth = parseFloat(placeZone.style.width || getComputedStyle(placeZone).width);
  const parent = placeZone.offsetParent || placeZone.parentElement;
  const parentW = parent.offsetWidth;
  const puckW = puck.offsetWidth;
  const centerPx = placeZone.offsetLeft + (placeZone.offsetWidth / 2) - (puckW / 2);
  const topPx = placeZone.offsetTop - puckW + 8;
  puck.style.left = centerPx + 'px';
  puck.style.top = topPx + 'px';
  puck.style.right = 'auto';
}

function resetPuckPosition() {
  const puck = document.getElementById('puck');
  if (!puck) return;
  puck.style.left = '';
  puck.style.top = '2%';
  puck.style.right = '10px';
}

function renderAllBetChips() {
  const zones = ['pass','field','place4','place5','place6','place8','place9','place10','hard4','hard6','hard8','hard10'];
  const offZones = new Set(['place4','place5','place6','place8','place9','place10','hard4','hard6','hard8','hard10']);
  const isComeout = STATE.phase === 'comeout';
  for (const zone of zones) {
    const container = document.getElementById('chips-' + zone);
    if (!container) continue;
    container.innerHTML = '';
    const betKey = zone;
    const isOff = isComeout && offZones.has(zone);
    if (STATE.bets[betKey] && STATE.bets[betKey] > 0) {
      const chip = document.createElement('div');
      chip.className = 'bet-chip-token p0 pos-0' + (isOff ? ' off' : '');
      chip.textContent = STATE.bets[betKey];
      container.appendChild(chip);
    }
    for (let s = 1; s <= 2; s++) {
      const rb = STATE.remoteBets[s];
      if (rb && rb[betKey] && rb[betKey] > 0) {
        const chip = document.createElement('div');
        chip.className = 'bet-chip-token p' + s + ' pos-' + s + (isOff ? ' off' : '');
        chip.textContent = rb[betKey];
        container.appendChild(chip);
      }
    }
  }
}

// ── Press Button System ──
function renderPressButtons() {
  // Remove existing press buttons
  document.querySelectorAll('.press-btn').forEach(el => el.remove());
  for (const [zone, winnings] of Object.entries(STATE.pressOptions)) {
    const zoneEl = document.querySelector(`[data-bet="${zone}"]`);
    if (!zoneEl) continue;
    const currentBet = STATE.bets[zone] || 0;
    const btn = document.createElement('button');
    btn.className = 'press-btn';
    btn.textContent = `PRESS ${currentBet}\u2192${currentBet * 2}`;
    btn.style.bottom = '-22px';
    btn.style.left = '50%';
    btn.style.transform = 'translateX(-50%)';
    btn.onclick = (e) => { e.stopPropagation(); pressBet(zone); };
    zoneEl.appendChild(btn);
  }
}

function pressBet(zone) {
  const winnings = STATE.pressOptions[zone];
  if (!winnings) return;
  const currentBet = STATE.bets[zone] || 0;
  const pressAmount = currentBet; // double the bet
  if (STATE.stack < pressAmount) {
    dealerSay("Not enough chips to press!", 'sad');
    return;
  }
  // Optimistic update
  STATE.stack -= pressAmount;
  STATE.bets[zone] = currentBet + pressAmount;
  delete STATE.pressOptions[zone];
  renderAllBetChips();
  renderPressButtons();
  updateLocalPlayerUI();
  // Send to DO for authoritative tracking
  wsSend({ type: 'press', zone });
}

function clearPressButtons() {
  if (window._pressTimeout) { clearTimeout(window._pressTimeout); window._pressTimeout = null; }
  STATE.pressOptions = {};
  document.querySelectorAll('.press-btn').forEach(el => el.remove());
}

function clearBets() {
  if (STATE.isRolling || betsLocked) return;
  // Optimistic local clear (server is authoritative — bet-ok corrects)
  for (const zone of Object.keys(STATE.bets)) {
    if (zone === 'pass') continue;
    STATE.stack += STATE.bets[zone];
    delete STATE.bets[zone];
  }
  STATE._pendingBets = {};
  renderAllBetChips();
  updateLocalPlayerUI();
  wsSend({ type: 'clear-bets' });
}

function updateLocalPlayerUI() {
  const tableStack = document.getElementById('tableStackDisplay');
  if (tableStack) tableStack.textContent = STATE.stack;
  updateHeaderButton();
}

function hasNonPassBets() {
  for (const zone of Object.keys(STATE.bets)) {
    if (zone !== 'pass' && STATE.bets[zone] > 0) return true;

  return false;
}

function updateHeaderButton() {

  } else {

// Shooter is tracked server-side by playerId. Each client resolves it to a local seat.

function isLocalShooter() {

}

function shooterSeat() {
  if (shooterPlayerId === STATE.playerId) return 0;
  for (let s = 1; s <= 3; s++) {

  }
  return -1; // shooter not visible (hasn't synced yet)
}

function getShooterName() {
  const seat = shooterSeat();
  if (seat === 0) return STATE.nftName || STATE.playerName || 'Chad';
  if (seat > 0) return remotePlayers[seat].nftName || 'Player ' + (seat + 1);

// ── Turn Phase System ──
// Solo: no bet timer, no auto-roll. Multi: 20s bets, 10s auto-roll.
let turnTimer = null;
let turnPhase = 'betting';
let betsLocked = false;
let betTimerStarted = false;

function startBetPhase() {
  turnPhase = 'betting';
  betsLocked = false;
  betTimerStarted = false;
  clearPressButtons();
  const diceEl = document.getElementById('tableDice');
  diceEl.classList.remove('can-roll');
  diceEl.classList.add('locked');
  document.getElementById('rollPrompt').style.display = 'none';
  hideTimer();
  if (STATE.phase === 'comeout') {
    // Check if any place/hardway bets are still on table
    const offKeys = ['place4','place5','place6','place8','place9','place10','hard4','hard6','hard8','hard10'];
    const hasOffBets = offKeys.some(k => STATE.bets[k] > 0);
    if (hasOffBets) {
      dealerSay("Come-out roll — all bets OFF except Pass Line and Field.", 'neutral');
    } else {
      dealerSay("Come-out roll — place your bets!", 'happy');
    }
  } else {
    dealerSay("Place your bets!", 'happy');
  }
  renderAllBetChips();
  // No timer yet — waits for first bet via onFirstBet()
}

function getRemotePlayerCount() {
  let n = 0;
  for (const s of [1, 2, 3]) { if (remotePlayers[s].uid) n++; }
  return n;
}

function onFirstBet() {
  if (betTimerStarted || turnPhase !== 'betting') return;
  betTimerStarted = true;
  const multi = getRemotePlayerCount() > 0;
  if (!multi) {
    // Solo — don't lock bets; just enable dice so player can keep
    // placing bets and roll whenever they're ready.
    const diceEl = document.getElementById('tableDice');
    if (isLocalShooter()) {
      diceEl.classList.add('can-roll');
      diceEl.classList.remove('locked');
      document.getElementById('rollPrompt').style.display = '';
    }
    return;
  }
  startTimer(20, 'PLACE BETS', () => {
    turnPhase = 'no-more-bets';
    betsLocked = true;
    showNoMoreBets();
    setTimeout(() => { startRollPhase(); }, 1500);
  });
}

function showNoMoreBets() {
  hideTimer();
  const label = document.getElementById('timerLabel');
  label.textContent = 'NO MORE BETS';
  label.className = 'timer-label no-more-bets';
  label.style.display = '';
}

function startRollPhase() {
  turnPhase = 'rolling';
  const diceEl = document.getElementById('tableDice');
  const shooter = isLocalShooter();
  const multi = getRemotePlayerCount() > 0;

  if (shooter) {
    diceEl.classList.add('can-roll');
    diceEl.classList.remove('locked');
    document.getElementById('rollPrompt').style.display = '';
    if (multi) {
      startTimer(10, 'ROLL', () => { rollDice(); });
    } else {
      hideTimer();
    }
  } else {
    // Not the shooter — dice locked, show waiting timer
    diceEl.classList.remove('can-roll');
    diceEl.classList.add('locked');
    document.getElementById('rollPrompt').style.display = 'none';
    startTimer(10, getShooterName() + ' ROLLING', () => {
      // Auto-roll triggers on the shooter's client; we just wait
    });
  }
}

function startTimer(seconds, label, onComplete) {
  clearTimer();
  const bar = document.getElementById('timerBar');
  const fill = document.getElementById('timerBarFill');
  const lbl = document.getElementById('timerLabel');
  bar.style.display = '';
  lbl.style.display = '';
  lbl.className = 'timer-label';
  fill.classList.remove('urgent');
  let remaining = seconds * 10;
  const total = remaining;
  function tick() {
    remaining--;
    const pct = (remaining / total) * 100;
    fill.style.width = pct + '%';
    const secs = Math.ceil(remaining / 10);
    lbl.textContent = `${label}: ${secs}s`;
    if (remaining <= 30) fill.classList.add('urgent');
    if (remaining <= 0) { clearTimer(); onComplete(); }
  }
  tick();
  turnTimer = setInterval(tick, 100);
}

function clearTimer() {
  if (turnTimer) { clearInterval(turnTimer); turnTimer = null; }
}

function hideTimer() {
  clearTimer();
  document.getElementById('timerBar').style.display = 'none';
  document.getElementById('timerLabel').style.display = 'none';
  document.getElementById('timerBarFill').style.width = '100%';
}

// ── Dice Roll ──
// Shooter sends { type: 'roll' } via WS; DO generates dice, resolves ALL
// players, and sends personalized roll-result back to each. The dice
// animation + result handling is in handleRollResult() below.
function rollDice() {
  if (STATE.isRolling) return;
  if (!isLocalShooter()) return;
  if (!STATE.bets.pass) {
    dealerSay("Pass line bet required to roll!", 'neutral'); return;
  }
  STATE.isRolling = true;
  turnPhase = 'waiting';
  betsLocked = true;
  hideTimer();
  document.getElementById('rollPrompt').style.display = 'none';
  const diceEl = document.getElementById('tableDice');
  diceEl.classList.remove('can-roll');
  diceEl.classList.add('locked');

  // Start local spin animation immediately (DO sends 'rolling' to others)
  const die1El = document.getElementById('die1');
  const die2El = document.getElementById('die2');
  die1El.classList.remove('settled');
  die2El.classList.remove('settled');
  die1El.classList.add('rolling');
  die2El.classList.add('rolling');
  window._rollCycleInterval1 = setInterval(() => {
    renderDie(document.getElementById('face1'), Math.floor(Math.random()*6)+1);
  }, 60);
  window._rollCycleInterval2 = setInterval(() => {
    renderDie(document.getElementById('face2'), Math.floor(Math.random()*6)+1);
  }, 60);

  // Tell the DO to roll — result comes back via WS 'roll-result'
  wsSend({ type: 'roll' });

  // Safety: if roll-result never arrives, stop spinning after 15s
  if (window._rollingSafetyTimeout) clearTimeout(window._rollingSafetyTimeout);
  window._rollingSafetyTimeout = setTimeout(() => {
    if (window._rollCycleInterval1) { clearInterval(window._rollCycleInterval1); window._rollCycleInterval1 = null; }
    if (window._rollCycleInterval2) { clearInterval(window._rollCycleInterval2); window._rollCycleInterval2 = null; }
    const d1 = document.getElementById('die1');
    const d2 = document.getElementById('die2');
    d1.classList.remove('rolling'); d1.classList.add('settled');
    d2.classList.remove('rolling'); d2.classList.add('settled');
    STATE.isRolling = false;
    document.getElementById('tableDice').classList.remove('locked');
    startBetPhase();
  }, 15000);
}

// Called by WS handler when DO sends personalized 'roll-result' to this player
async function handleRollResult(data) {
  const [d1, d2] = data.dice;
  const total = data.total;

  // Clear safety timeout for non-shooters
  if (window._rollingSafetyTimeout) { clearTimeout(window._rollingSafetyTimeout); window._rollingSafetyTimeout = null; }

  // Ensure rolling state is set (handles race where roll-result arrives before rolling)
  STATE.isRolling = true;
  betsLocked = true;

  // Stop spin animation (shooter or remote)
  if (window._rollCycleInterval1) { clearInterval(window._rollCycleInterval1); window._rollCycleInterval1 = null; }
  if (window._rollCycleInterval2) { clearInterval(window._rollCycleInterval2); window._rollCycleInterval2 = null; }
  if (_remoteCycleInterval) { clearInterval(_remoteCycleInterval); _remoteCycleInterval = null; }

  const die1El = document.getElementById('die1');
  const die2El = document.getElementById('die2');

  // If dice weren't spinning yet (rolling msg missed), start a brief spin
  const wasAlreadyRolling = die1El.classList.contains('rolling');
  if (!wasAlreadyRolling) {
    die1El.classList.remove('settled');
    die2El.classList.remove('settled');
    die1El.classList.add('rolling');
    die2El.classList.add('rolling');
  }

  // Staggered settle: die1 first, die2 after delay
  // Shorter delay if animation was just started (rolling msg was missed)
  await new Promise(r => setTimeout(r, wasAlreadyRolling ? 2500 : 800));
  if (window._rollCycleInterval1) { clearInterval(window._rollCycleInterval1); window._rollCycleInterval1 = null; }
  STATE.dice = [d1, d2];
  renderDie(document.getElementById('face1'), d1);
  die1El.classList.remove('rolling');
  die1El.classList.add('settled');

  await new Promise(r => setTimeout(r, 2400));
  if (window._rollCycleInterval2) { clearInterval(window._rollCycleInterval2); window._rollCycleInterval2 = null; }
  renderDie(document.getElementById('face2'), d2);
  die2El.classList.remove('rolling');
  die2El.classList.add('settled');

  // Update local state from server-authoritative response
  const prevPoint = STATE.point;
  const prevPhase = STATE.phase;
  STATE.stack = data.stack;
  if (data.bets) STATE.bets = data.bets;
  for (const k of Object.keys(STATE.bets)) {
    if (STATE.bets[k] === 0) delete STATE.bets[k];
  }

  // Phase/point comes from the phase-update message, but also available here
  if (data.phase) STATE.phase = data.phase;
  if (data.point !== undefined) STATE.point = data.point || null;

  // Puck
  if (STATE.phase === 'point' && STATE.point) {
    document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jipton.png';
    document.getElementById('puck').classList.add('on-glow');
    document.getElementById('pointDisplay').textContent = 'POINT: ' + STATE.point;
    movePuckToPoint(STATE.point);
  } else {
    document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jiptoff.png';
    document.getElementById('puck').classList.remove('on-glow');
    document.getElementById('pointDisplay').textContent = '';
    resetPuckPosition();
  }

  // Announcer
  const r = data.resolution || {};
  let announcerSub = '';
  if (prevPhase === 'comeout' && !prevPoint && !!STATE.point) {
    announcerSub = 'Point is ' + STATE.point;
  } else if (prevPhase === 'point' && prevPoint && total === prevPoint) {
    announcerSub = 'Point ' + prevPoint + ' made!';
  } else if (r.message) {
    announcerSub = r.message;
  }
  const isNewPoint = prevPhase === 'comeout' && !prevPoint && !!STATE.point;
  showAnnouncer(d1, d2, prevPhase, announcerSub, isNewPoint);

  // Win/loss flashes
  await new Promise(r2 => setTimeout(r2, 200));
  for (const key of (r.wins || [])) {
    document.querySelectorAll(`[data-bet="${key}"]`).forEach(z => z.classList.add('win-flash'));
  }
  for (const key of (r.losses || [])) {
    document.querySelectorAll(`[data-bet="${key}"]`).forEach(z => z.classList.add('lose-flash'));
  }

  renderAllBetChips();
  updateLocalPlayerUI();

  // Press buttons
  if (data.pressOptions && Object.keys(data.pressOptions).length > 0) {
    STATE.pressOptions = data.pressOptions;
    renderPressButtons();
    if (window._pressTimeout) clearTimeout(window._pressTimeout);
    window._pressTimeout = setTimeout(() => clearPressButtons(), 5000);
  }

  // Toast
  const netWin = r.netWin || 0;
  if (netWin > 0) showToast(`+${netWin}`, 'win', `Total: ${total}`);
  else if (netWin < 0) showToast(`${netWin}`, 'lose', `Total: ${total}`);

  setTimeout(() => {
    document.querySelectorAll('.win-flash,.lose-flash').forEach(el => {
      el.classList.remove('win-flash','lose-flash');
    });
  }, 1500);

  // Auto-cashout on bust
  if (STATE.stack <= 0 && Object.keys(STATE.bets).length === 0) {
    dealerSay("You're busted! Better luck next time.", 'sad');
    STATE.isRolling = false;
    try {
      await fetchWithTimeout(WORKER_URL + '/craps/cashout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenId: STATE.tokenId, nonce: STATE.nonce, sessionToken: STATE.sessionToken, tableCode: currentTableCode }),
      });
    } catch (_) {}
    sessionStorage.removeItem('craps_session');
    STATE.nonce = null;
    setTimeout(() => { window.location.href = 'chadbase.html'; }, 3000);
    return;
  }

  STATE.isRolling = false;
  document.getElementById('tableDice').classList.remove('locked');
  // Seven-out rotation is now handled server-side by the DO roll handler.
  // The client just needs to start the next bet phase after a delay.
  const hasPress = data.pressOptions && Object.keys(data.pressOptions).length > 0;
  setTimeout(() => {
    startBetPhase();
  }, hasPress ? 5000 : 2000);
}

  return [Math.min(d1,d2), Math.max(d1,d2)].join(',');
}

let announcerTimeout = null;

function showAnnouncer(d1, d2, phase, sub, isNewPoint) {
  const key = getDiceCallKey(d1, d2);
  const entry = DICE_CALLS[key];
  if (!entry) return;

  let callText, mood;

  if (isNewPoint) {
    const total = d1 + d2;
    const isHard = d1 === d2;
    const hardWayNums = [4, 6, 8, 10];
    callText = 'New Point. Point of ' + total + '.';
    if (hardWayNums.includes(total)) {
      callText += ' ' + (isHard ? 'Hard ' : 'Easy ') + total;
    }
    mood = 'neutral';
  } else {
    callText = entry.call;
    if (entry.comeout && phase === 'comeout') callText = entry.comeout;
    else if (entry.point && phase === 'point') callText = entry.point;
    mood = (callText.includes('Winner') || callText === 'Yo, 11 Yo') ? 'happy'
      : (callText.includes('Out') || callText.includes('Snake') || callText === 'Boxcars 12' || callText === 'Craps 3') ? 'sad'
      : entry.mood || 'neutral';
  }
  const moodMap = {neutral:'chazzypneutral.jpg',happy:'chazzyphappy.jpg',sad:'chazzypsad.jpg',concerned:'chazzypconcerned.jpg'};

  const overlay = document.getElementById('announcerOverlay');
  const img = document.getElementById('announcerImg');
  const call = document.getElementById('announcerCall');
  const subEl = document.getElementById('announcerSub');
  const diceContainer = document.getElementById('announcerDice');

  img.src = 'assets/chazzyp/' + (moodMap[mood] || moodMap.neutral);
  call.textContent = callText;
  subEl.textContent = sub || '';

  // Render mini dice
  diceContainer.innerHTML = '';
  for (const val of [d1, d2]) {
    const dieEl = document.createElement('div');
    dieEl.className = 'announcer-die';
    const faceEl = document.createElement('div');
    faceEl.className = 'die-face';
    const layout = dotLayouts[val];
    for (let i = 0; i < 9; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      if (layout[i]) dot.style.visibility = 'visible';
      faceEl.appendChild(dot);
    }
    dieEl.appendChild(faceEl);
    diceContainer.appendChild(dieEl);
  }

  overlay.classList.add('visible');

  if (announcerTimeout) clearTimeout(announcerTimeout);
  announcerTimeout = setTimeout(() => {
    overlay.classList.remove('visible');
    announcerTimeout = null;
  }, 6000);
}

// ── Cash Out ──
async function cashOut() {
  if (STATE.isRolling) return;

  let betsOnTable = 0;
  for (const val of Object.values(STATE.bets)) betsOnTable += val;
  const totalPayout = STATE.stack + betsOnTable;

  if (!STATE.nonce) { dealerSay("No active session!", 'sad'); return; }

  if (!confirm(`Cash out ${totalPayout} cells?`)) return;

  hideTimer();
  betsLocked = true;
  document.getElementById('tableDice').classList.add('locked');
  dealerSay("Cashing out...", 'neutral');

  try {
    const res = await fetchWithTimeout(WORKER_URL + '/craps/cashout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tokenId: STATE.tokenId,
        nonce: STATE.nonce,
        sessionToken: STATE.sessionToken,
        tableCode: currentTableCode,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Cashout failed');

    if (data.payout === 0) {
      dealerSay("Better luck next time.", 'sad');
      sessionStorage.removeItem('craps_session');
      STATE.nonce = null;
      setTimeout(() => { window.location.href = 'chadbase.html'; }, 2000);
      return;
    }

    dealerSay("Claiming cells on-chain...", 'neutral');
    const signer = getSigner();
    if (!signer) throw new Error('Wallet not connected');
    const gamble = new ethers.Contract(GAMBLE_ADDRESS, GAMBLE_ABI, signer);
    const tx = await gamble.claimWinnings(STATE.tokenId, data.payout, data.nonce, data.signature);
    dealerSay("Confirming transaction...", 'neutral');
    await tx.wait();

    const profit = data.payout - STATE.buyIn;
    if (profit > 0) {
      dealerSay("Winner! See ya around, partner.", 'happy');
      showToast(`+${profit}`, 'win', 'Profit!');
    } else {
      dealerSay("See ya around, partner.", 'neutral');
    }

    sessionStorage.removeItem('craps_session');
    STATE.nonce = null;
    STATE.bets = {};
    STATE.stack = 0;
    renderAllBetChips();
    broadcastState('cashed out');
    setTimeout(() => { window.location.href = 'chadbase.html'; }, 2000);

  } catch (err) {
    dealerSay('Cashout failed: ' + (err.reason || err.message || 'Unknown error'), 'sad');
    startBetPhase();
  }
}

// ── Multiplayer State Sync (WebSocket) ──

let _tableWs = null;        // WebSocket connection to Durable Object
let _wsReconnectTimer = null;
let _remoteCycleInterval = null;

function wsUrl(table) {
  // Convert REST worker URL to WebSocket URL
  const base = WORKER_URL.replace(/^http/, 'ws');
  return base + '/craps/ws?table=' + encodeURIComponent(table) +
    '&playerId=' + encodeURIComponent(STATE.playerId) +
    '&name=' + encodeURIComponent(STATE.nftName || STATE.playerName || 'Unknown') +
    '&chadId=' + encodeURIComponent(STATE.chadId || 0);
}

function wsSend(data) {
  if (_tableWs && _tableWs.readyState === WebSocket.OPEN) {
    _tableWs.send(JSON.stringify(data));
  }
}

// broadcastState/broadcastRolling are now handled by the DO.
// Keep as no-ops for any remaining call sites.
function broadcastState(extra) {}
function broadcastRolling() {}

function connectTable(tableCode) {
  if (_tableWs) {
    try { _tableWs.close(); } catch (_) {}
    _tableWs = null;
  }
  if (_wsReconnectTimer) { clearTimeout(_wsReconnectTimer); _wsReconnectTimer = null; }

  const ws = new WebSocket(wsUrl(tableCode));
  _tableWs = ws;

  ws.onopen = () => {
    // Authenticate with the DO — include full session data for self-registration
    // (player may have picked table after /craps/start, so DO might not have them yet;
    // the DO verifies the HMAC token before trusting any client-supplied data)
    if (STATE.nonce && STATE.sessionToken) {
      wsSend({
        type: 'auth',
        nonce: STATE.nonce,
        sessionToken: STATE.sessionToken,
        player: STATE.player,
        tokenId: STATE.tokenId,
        stack: STATE.stack,
        buyIn: STATE.buyIn,
      });
    }
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch (_) { return; }
    handleWsMessage(data);
  };

  ws.onclose = (e) => {
    if (e.code === 4001) {
      // Table is full
      alert('Table is full!');
      return;
    }
    // Auto-reconnect after 2s if we're still on this table
    if (currentTableCode === tableCode) {
      _wsReconnectTimer = setTimeout(() => connectTable(tableCode), 2000);
    }
  };

  ws.onerror = () => {
    // onclose will fire after this — reconnect handled there
  };
}

function disconnectTable() {
  if (_wsReconnectTimer) { clearTimeout(_wsReconnectTimer); _wsReconnectTimer = null; }
  if (_tableWs) {
    try { _tableWs.close(); } catch (_) {}
    _tableWs = null;
  }
}

function handleWsMessage(data) {
  switch (data.type) {

    case 'init': {
      // Initial state: all current players + shooter
      for (const p of data.players || []) {
        if (String(p.playerId) === String(STATE.playerId)) continue;
        _seatPlayer(p);
      }
      if (data.shooter) updateShooter(data.shooter);
      renderAllBetChips();
      break;
    }

    case 'join': {
      if (String(data.playerId) === String(STATE.playerId)) break;
      _seatPlayer(data);
      addChatMsg('system', `${data.name} joined the table.`);
      renderAllBetChips();
      break;
    }

    case 'leave': {
      if (String(data.playerId) === String(STATE.playerId)) break;
      for (let s = 1; s <= 3; s++) {
        if (remotePlayers[s].uid === data.playerId) {
          const name = remotePlayers[s].nftName || 'A player';
          clearPlayerPanel(s);
          remotePlayers[s].uid = null;
          remotePlayers[s].name = '';
          remotePlayers[s].nftName = '';
          remotePlayers[s].chadId = null;
          remotePlayers[s].stack = 0;
          delete STATE.remoteBets[s];
          addChatMsg('system', name + ' left the table.');
          break;
        }
      }
      renderAllBetChips();
      break;
    }

    case 'state': {
      if (String(data.playerId) === String(STATE.playerId)) break;
      // Update remote player's bets/stack
      for (let s = 1; s <= 3; s++) {
        if (remotePlayers[s].uid === data.playerId) {
          if (data.stack !== undefined) {
            remotePlayers[s].stack = data.stack;
            setPlayerStack(s, data.stack);
          }
          const remoteBetMap = {};
          if (data.bets) Object.assign(remoteBetMap, data.bets);
          if (data.comeBets) {
            for (const [num, amt] of Object.entries(data.comeBets)) {
              const key = 'place' + num;
              remoteBetMap[key] = (remoteBetMap[key] || 0) + amt;
            }
          }
          STATE.remoteBets[s] = remoteBetMap;
          break;
        }
      }
      renderAllBetChips();
      break;
    }

    // ── Auth confirmed by DO ──
    case 'auth-ok': {
      STATE.stack = data.stack;
      STATE.bets = data.bets || {};
      STATE.phase = data.phase || 'comeout';
      STATE.point = data.point || null;
      updateLocalPlayerUI();
      renderAllBetChips();
      break;
    }

    // ── Bet confirmed by DO ──
    case 'bet-ok': {
      // Sync authoritative state from DO
      STATE.stack = data.stack;
      STATE.bets = data.bets || {};
      if (data.comeBets) STATE.comeBets = data.comeBets;
      renderAllBetChips();
      updateLocalPlayerUI();
      break;
    }

    // ── Bet rejected by DO ──
    case 'bet-rejected': {
      // Revert optimistic update — re-sync from last known good state
      dealerSay(data.reason || 'Bet rejected', 'sad');
      // Request current state (the next bet-ok or auth-ok will correct it)
      break;
    }

    // ── Rolling animation (from DO, for non-shooters) ──
    case 'rolling': {
      if (!isLocalShooter()) {
        STATE.isRolling = true;
        betsLocked = true;
        const die1El = document.getElementById('die1');
        const die2El = document.getElementById('die2');
        die1El.classList.remove('settled');
        die2El.classList.remove('settled');
        die1El.classList.add('rolling');
        die2El.classList.add('rolling');
        if (_remoteCycleInterval) clearInterval(_remoteCycleInterval);
        _remoteCycleInterval = setInterval(() => {
          renderDie(document.getElementById('face1'), Math.floor(Math.random()*6)+1);
          renderDie(document.getElementById('face2'), Math.floor(Math.random()*6)+1);
        }, 60);
        // Safety: if roll-result never arrives, stop spinning after 15s
        if (window._rollingSafetyTimeout) clearTimeout(window._rollingSafetyTimeout);
        window._rollingSafetyTimeout = setTimeout(() => {
          if (_remoteCycleInterval) { clearInterval(_remoteCycleInterval); _remoteCycleInterval = null; }
          die1El.classList.remove('rolling'); die1El.classList.add('settled');
          die2El.classList.remove('rolling'); die2El.classList.add('settled');
          STATE.isRolling = false;
          betsLocked = false;
          startBetPhase();
        }, 15000);
      }
      break;
    }

    // ── Personalized roll result (from DO, sent to ALL players) ──
    case 'roll-result': {
      if (data.dice) {
        handleRollResult(data);
      }
      break;
    }

    // ── Phase/point update (from DO, after roll resolves) ──
    case 'phase-update': {
      STATE.phase = data.phase || 'comeout';
      STATE.point = data.point || null;
      if (STATE.phase === 'point' && STATE.point) {
        document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jipton.png';
        document.getElementById('puck').classList.add('on-glow');
        document.getElementById('pointDisplay').textContent = 'POINT: ' + STATE.point;
        movePuckToPoint(STATE.point);
      } else {
        document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jiptoff.png';
        document.getElementById('puck').classList.remove('on-glow');
        document.getElementById('pointDisplay').textContent = '';
        resetPuckPosition();
      }
      break;
    }

    case 'chat': {
      if (String(data.playerId) === String(STATE.playerId)) break;
      let seatIdx = 1;
      for (let s = 1; s <= 3; s++) {
        if (remotePlayers[s].uid === data.playerId) { seatIdx = s; break; }
      }
      addChatMsg('chat', data.text, data.name, seatIdx);
      break;
    }

    case 'shooter': {
      updateShooter(data.playerId);
      break;
    }

    case 'full': {
      alert('Table is full!');
      break;
    }

    default:
      break;
  }
}

// Seat a remote player into the first available slot
function _seatPlayer(p) {
  if (String(p.playerId) === String(STATE.playerId)) return;
  // Check if already seated
  for (let s = 1; s <= 3; s++) {
    if (remotePlayers[s].uid === p.playerId) {
      // Update existing seat
      remotePlayers[s].nftName = p.name;
      remotePlayers[s].stack = p.stack || 0;
      setPlayerName(s, p.name);
      setPlayerStack(s, p.stack || 0);
      if (p.chadId) { remotePlayers[s].chadId = p.chadId; setChadPortrait(s, p.chadId); }
      return;
    }
  }
  // Find empty seat
  for (let s = 1; s <= 3; s++) {
    if (!remotePlayers[s].uid) {
      remotePlayers[s].uid = p.playerId;
      remotePlayers[s].nftName = p.name;
      remotePlayers[s].chadId = p.chadId;
      remotePlayers[s].stack = p.stack || 0;
      setChadPortrait(s, p.chadId);
      setPlayerName(s, p.name);
      setPlayerStack(s, p.stack || 0);
      const remoteBetMap = {};
      if (p.bets) Object.assign(remoteBetMap, p.bets);
      STATE.remoteBets[s] = remoteBetMap;
      return;
    }
  }
}

function broadcastMessage(msg) {
  if (!currentTableCode || !msg) return;
  wsSend({ type: 'chat', text: msg.text || '' });
}

        const err = document.createElement('div');
        err.style.cssText = 'color:#ff5252;font-size:11px;margin-top:12px;font-family:monospace';
        err.textContent = 'Error: Game script failed to load. Check browser console (F12).';
        lobby.querySelector('.lobby-box').appendChild(err);
      }
    }
  }, 2000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craps Table — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <!-- Ethers.js for on-chain interaction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <!-- Agora Web SDK 4.x (audio only + optional shooter video) -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      width:100vw;height:100vh;overflow:hidden;
      background:#0a0a0f;
      font-family:'Press Start 2P',monospace;
      color:#ffe96a;
    }

    /* ── Player Colors ── */
    :root{
      --p1-color:#4caf50;  /* green — local player (you) */
      --p2-color:#42a5f5;  /* blue — remote 1 */
      --p3-color:#ab47bc;  /* purple — remote 2 */
      --p4-color:#ef5350;  /* red — remote 3 */
      --p1-glow:rgba(76,175,80,0.5);
      --p2-glow:rgba(66,165,245,0.5);
      --p3-glow:rgba(171,71,188,0.5);
      --p4-glow:rgba(239,83,80,0.5);
    }

    /* ── Header ── */
    .game-header{
      position:fixed;top:0;left:0;right:0;z-index:300;
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 14px;
      background:rgba(10,10,15,0.95);
      border-bottom:2px solid #2a5a1a;
      backdrop-filter:blur(8px);
      height:40px;
    }
    .header-left{display:flex;align-items:center;gap:10px}
    .header-title{font-size:0.5rem;color:#4caf50;text-shadow:0 0 10px rgba(76,175,80,0.4)}
    .wallet-btn{
      font-family:'Press Start 2P',monospace;font-size:0.35rem;
      padding:6px 12px;border-radius:5px;cursor:pointer;
      border:2px solid #5c4409;color:#1a1005;
      background:linear-gradient(180deg,#c9a84c 0%,#8b6914 100%);
      box-shadow:inset 0 1px 0 rgba(255,220,120,0.4),0 2px 6px rgba(0,0,0,0.5);
    }
    .wallet-btn:hover{background:linear-gradient(180deg,#dabb5e 0%,#a07d1e 100%)}
    .nav-wrapper{position:static}

    /* ── Main Layout: Vertical Stack ── */
    .table-wrapper{
      width:100%;height:calc(100vh - 40px);
      margin-top:40px;
      display:flex;flex-direction:column;
    }

    /* ── Remote Players Row (top bar) ── */
    .remote-players-row{
      display:flex;justify-content:center;align-items:center;
      gap:20px;padding:6px 10px;
      background:rgba(10,10,15,0.95);
      border-bottom:2px solid #2a3a1a;
      flex-shrink:0;
    }
    .remote-slot{
      display:flex;align-items:center;gap:6px;
      padding:4px 8px;border-radius:6px;
      background:rgba(0,0,0,0.3);
      border:2px solid #333;
      min-width:100px;
    }
    .remote-slot.occupied{border-color:var(--slot-color,#555)}
    .remote-slot .slot-portrait{
      width:36px;height:44px;
      border:2px solid var(--slot-color,#555);border-radius:4px;
      overflow:hidden;background:#111;flex-shrink:0;
      box-shadow:0 0 6px var(--slot-glow,transparent);
    }
    .remote-slot .slot-portrait img{
      width:100%;height:100%;object-fit:cover;
      image-rendering:pixelated;display:block;
    }
    .remote-slot.empty .slot-portrait{opacity:0.3;border-color:#333}
    .remote-slot .slot-info{display:flex;flex-direction:column;gap:2px}
    .remote-slot .slot-name{
      font-size:0.22rem;color:var(--slot-color,#555);
      max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .remote-slot .slot-stack{font-size:0.2rem;color:#8a8a6a}
    .remote-slot.empty .slot-name{color:#555}

    /* Seat-specific colors */
    .remote-slot[data-seat="1"]{--slot-color:var(--p2-color);--slot-glow:var(--p2-glow)}
    .remote-slot[data-seat="2"]{--slot-color:var(--p3-color);--slot-glow:var(--p3-glow)}
    .remote-slot[data-seat="3"]{--slot-color:var(--p4-color);--slot-glow:var(--p4-glow)}

    /* ── Felt Table Area (fills ~75% of remaining space) ── */
    .table-area{
      flex:3;position:relative;overflow:hidden;
      display:flex;flex-direction:column;
      min-height:0;
    }
    .felt-container{
      flex:1;position:relative;
      background:url('assets/Oldjipt/Craps/felt.png') center/contain no-repeat;
      background-color:#1a5a1a;
    }

    /* Puck */
    .puck{position:absolute;width:36px;height:36px;top:8%;right:12%;z-index:10}
    .puck img{width:100%;height:100%;object-fit:contain}

    /* Dice on table */
    .table-dice{
      position:absolute;bottom:18%;left:50%;transform:translateX(-50%);
      display:flex;gap:14px;z-index:10;
    }
    .die{
      width:52px;height:52px;background:#fff;border-radius:7px;
      border:3px solid #c00;
      display:flex;align-items:center;justify-content:center;
      box-shadow:2px 3px 8px rgba(0,0,0,0.5);
      transition:transform 0.3s;position:relative;
    }
    .die.rolling{animation:dice-roll 0.4s ease-in-out}
    @keyframes dice-roll{
      0%{transform:rotate(0deg) scale(1)}
      25%{transform:rotate(90deg) scale(1.2)}
      50%{transform:rotate(180deg) scale(0.9)}
      75%{transform:rotate(270deg) scale(1.1)}
      100%{transform:rotate(360deg) scale(1)}
    }
    .die-face{
      width:100%;height:100%;display:grid;
      grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:5px;
    }
    .pip{
      width:9px;height:9px;background:#c00;border-radius:50%;
      align-self:center;justify-self:center;display:none;
    }

    /* Dealer */
    .dealer-area{
      position:absolute;top:4px;left:50%;transform:translateX(-50%);
      display:flex;align-items:flex-start;gap:6px;z-index:15;
    }
    .dealer-portrait{
      width:64px;height:76px;image-rendering:pixelated;
      border:2px solid #5c4409;border-radius:4px;
      box-shadow:0 2px 8px rgba(0,0,0,0.6);
    }
    .dealer-speech{
      max-width:180px;background:rgba(0,0,0,0.85);
      border:2px solid #5c4409;border-radius:6px;
      padding:6px 8px;font-size:0.3rem;color:#f5e6c8;line-height:1.6;position:relative;
    }
    .dealer-speech::before{
      content:'';position:absolute;left:-7px;top:16px;
      border:5px solid transparent;border-right-color:#5c4409;
    }

    /* ── Bet Zones ── */
    .bet-zone{
      position:absolute;border:2px solid transparent;border-radius:4px;
      cursor:pointer;transition:all 0.2s;z-index:5;
    }
    .bet-zone:hover{border-color:rgba(255,233,106,0.5);background:rgba(255,233,106,0.08)}
    .bet-pass{bottom:2%;left:5%;width:90%;height:12%}
    .bet-field{bottom:16%;left:5%;width:60%;height:10%}
    .bet-place4{top:10%;left:5%;width:12%;height:18%}
    .bet-place5{top:10%;left:18%;width:12%;height:18%}
    .bet-place6{top:10%;left:31%;width:12%;height:18%}
    .bet-place8{top:10%;left:44%;width:12%;height:18%}
    .bet-place9{top:10%;left:57%;width:12%;height:18%}
    .bet-place10{top:10%;left:70%;width:12%;height:18%}
    .bet-hardways{top:32%;left:20%;width:45%;height:14%}

    /* Bet chips on felt — colored per player */
    .bet-chips-row{
      position:absolute;bottom:2px;left:4px;right:4px;
      display:flex;gap:3px;flex-wrap:wrap;
      pointer-events:none;
    }
    .bet-chip-token{
      width:22px;height:22px;border-radius:50%;
      font-size:0.18rem;display:flex;align-items:center;justify-content:center;
      color:#fff;font-family:'Press Start 2P',monospace;
      box-shadow:1px 1px 4px rgba(0,0,0,0.5);
      border:2px solid;
    }
    .bet-chip-token.p0{background:var(--p1-color);border-color:#fff}
    .bet-chip-token.p1{background:var(--p2-color);border-color:#fff}
    .bet-chip-token.p2{background:var(--p3-color);border-color:#fff}
    .bet-chip-token.p3{background:var(--p4-color);border-color:#fff}

    /* ── Chat Box (below table) ── */
    .chat-box{
      flex-shrink:0;
      height:100px;
      display:flex;flex-direction:column;
      background:rgba(10,10,15,0.95);
      border-top:2px solid #2a3a1a;
      border-bottom:2px solid #2a3a1a;
    }
    .chat-header{padding:4px 8px;font-size:0.3rem;color:#4caf50;border-bottom:1px solid #1a2a0a;flex-shrink:0}
    .chat-messages{flex:1;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:2px}
    .chat-msg{font-size:0.22rem;line-height:1.4;padding:2px 4px;border-radius:3px;background:rgba(0,0,0,0.3)}
    .chat-msg .msg-name{font-weight:bold}
    .chat-msg .msg-text{color:#ccc}
    .chat-msg.system-msg{color:#8a7a5a;font-style:italic;background:none}
    .chat-msg.roll-msg .msg-text{color:#ffe96a}
    .chat-msg.win-msg .msg-text{color:#4caf50}
    .chat-msg.lose-msg .msg-text{color:#e53935}
    .chat-msg .msg-name.p0{color:var(--p1-color)}
    .chat-msg .msg-name.p1{color:var(--p2-color)}
    .chat-msg .msg-name.p2{color:var(--p3-color)}
    .chat-msg .msg-name.p3{color:var(--p4-color)}
    .chat-input-area{display:flex;gap:3px;padding:4px 6px;border-top:1px solid #1a2a0a;flex-shrink:0}
    .chat-input{
      flex:1;font-family:'Press Start 2P',monospace;font-size:0.22rem;
      padding:4px;background:#111;border:1px solid #333;border-radius:3px;color:#ccc;outline:none;
    }
    .chat-input:focus{border-color:#4caf50}
    .chat-send{
      font-family:'Press Start 2P',monospace;font-size:0.22rem;
      padding:4px 8px;background:#2e7d32;border:1px solid #4caf50;border-radius:3px;color:#fff;cursor:pointer;
    }

    /* ── Bottom Controls Row ── */
    .bottom-row{
      display:flex;align-items:center;
      background:rgba(10,10,15,0.95);
      padding:6px 10px;gap:8px;
      flex-shrink:0;
    }
    /* Local player portrait (small) */
    .local-player{
      display:flex;align-items:center;gap:6px;
      padding:4px 8px;
      border-right:1px solid #2a3a1a;
      flex-shrink:0;
    }
    .local-player .portrait-frame{
      width:40px;height:48px;
      border:2px solid var(--p1-color);border-radius:4px;
      overflow:hidden;background:#000;flex-shrink:0;
      box-shadow:0 0 6px var(--p1-glow);
    }
    .local-player .portrait-frame img{
      width:100%;height:100%;object-fit:cover;
      image-rendering:pixelated;display:block;
    }
    .local-player .player-info{display:flex;flex-direction:column;gap:2px}
    .local-player .nft-name{font-size:0.25rem;color:var(--p1-color);white-space:nowrap}
    .local-player .player-stack-lbl{font-size:0.22rem;color:var(--p1-color)}

    /* Chip tray */
    .chip-tray{display:flex;gap:4px;align-items:center;padding:0 6px}
    .chip{
      width:36px;height:36px;border-radius:50%;cursor:pointer;
      border:3px solid transparent;transition:all 0.15s;
      position:relative;overflow:hidden;
      background-image:url('assets/Oldjipt/Craps/jiptchips.png');
      background-size:300% 300%;
    }
    .chip:hover{transform:scale(1.15);filter:brightness(1.2)}
    .chip.selected{border-color:var(--p1-color);box-shadow:0 0 14px var(--p1-glow);transform:scale(1.15)}
    .chip-1-sprite{background-position:0% 0%}
    .chip-5-sprite{background-position:50% 0%}
    .chip-10-sprite{background-position:100% 0%}
    .chip-25-sprite{background-position:0% 50%}

    .point-display{font-size:0.3rem;color:#ffe96a;padding:0 4px}

    /* Control buttons */
    .controls{display:flex;gap:4px;margin-left:auto;align-items:center}
    .ctrl-btn{
      font-family:'Press Start 2P',monospace;font-size:0.35rem;
      padding:8px 12px;border-radius:5px;cursor:pointer;
      border:2px solid;transition:all 0.2s;
    }
    .btn-roll{
      background:linear-gradient(180deg,#4caf50,#2e7d32);
      border-color:#66bb6a;color:#fff;
      box-shadow:0 3px 10px rgba(76,175,80,0.4);
    }
    .btn-roll:hover{background:linear-gradient(180deg,#66bb6a,#388e3c)}
    .btn-roll:disabled{opacity:0.4;cursor:not-allowed}
    .btn-clear{background:linear-gradient(180deg,#e53935,#b71c1c);border-color:#ef5350;color:#fff}
    .btn-clear:hover{background:linear-gradient(180deg,#ef5350,#c62828)}
    .btn-cashout{background:linear-gradient(180deg,#c9a84c,#8b6914);border-color:#d4a017;color:#1a1005}
    .btn-cashout:hover{background:linear-gradient(180deg,#dabb5e,#a07d1e)}

    /* Audio / PTT / Shooter cam buttons */
    .audio-btn{
      font-family:'Press Start 2P',monospace;font-size:0.25rem;
      padding:6px 8px;border:2px solid #555;border-radius:4px;
      background:#1a1a2e;color:#ccc;cursor:pointer;white-space:nowrap;
    }
    .audio-btn:hover{border-color:#4caf50;color:#4caf50}
    .audio-btn.active{border-color:#4caf50;background:#1a3a1a;color:#4caf50}
    .audio-btn.ptt{border-color:#e67e22;color:#e67e22}
    .audio-btn.ptt.talking{background:#5a3a0a;border-color:#f39c12;color:#f39c12;animation:pulse-ptt 0.8s infinite}
    @keyframes pulse-ptt{0%,100%{box-shadow:0 0 4px #f39c12}50%{box-shadow:0 0 16px #f39c12}}
    .audio-btn.cam-btn{border-color:#42a5f5;color:#42a5f5;font-size:0.2rem}
    .audio-btn.cam-btn.active{background:#1a2a3a;border-color:#64b5f6;color:#64b5f6}
    .btn-exit{
      font-family:'Press Start 2P',monospace;font-size:0.25rem;
      padding:6px 10px;border:2px solid #e53935;border-radius:4px;
      background:rgba(229,57,53,0.15);color:#e53935;cursor:pointer;
    }
    .btn-exit:hover{background:rgba(229,57,53,0.3)}

    /* Shooter video overlay (small PiP on the felt) */
    .shooter-video-pip{
      position:absolute;bottom:4px;right:4px;
      width:100px;height:75px;
      border:2px solid #42a5f5;border-radius:4px;
      background:#000;z-index:20;overflow:hidden;
      display:none;
    }
    .shooter-video-pip.active{display:block}
    .shooter-video-pip video{width:100%;height:100%;object-fit:cover}

    /* ── Result Toast ── */
    .result-toast{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
      z-index:500;padding:20px 36px;border-radius:10px;
      font-size:0.9rem;text-align:center;transition:transform 0.3s;
    }
    .result-toast.show{transform:translate(-50%,-50%) scale(1)}
    .result-toast.win{background:rgba(46,125,50,0.95);border:3px solid #4caf50;color:#fff}
    .result-toast.lose{background:rgba(183,28,28,0.95);border:3px solid #e53935;color:#fff}
    .result-toast .toast-sub{font-size:0.35rem;margin-top:6px;opacity:0.8}

    /* ── Table Lobby Overlay ── */
    .table-lobby{
      position:fixed;inset:0;z-index:400;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.92);
    }
    .table-lobby.hidden{display:none}
    .lobby-box{
      background:linear-gradient(180deg,#1e1608,#0a0a0f);
      border:2px solid #5c4409;border-radius:10px;
      padding:28px 32px;max-width:500px;width:90%;
      text-align:center;
    }
    .lobby-title{
      font-size:0.7rem;color:#4caf50;margin-bottom:16px;
      text-shadow:0 0 12px rgba(76,175,80,0.4);
    }
    .lobby-subtitle{font-size:0.35rem;color:#8a7a5a;margin-bottom:20px;line-height:1.8}
    .lobby-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .lobby-btn{
      font-family:'Press Start 2P',monospace;font-size:0.4rem;
      padding:14px 20px;border-radius:6px;cursor:pointer;
      border:2px solid;transition:all 0.2s;text-align:center;
    }
    .lobby-btn.public{
      background:linear-gradient(180deg,#4caf50,#2e7d32);
      border-color:#66bb6a;color:#fff;
    }
    .lobby-btn.public:hover{background:linear-gradient(180deg,#66bb6a,#388e3c)}
    .lobby-btn.private{
      background:linear-gradient(180deg,#c9a84c,#8b6914);
      border-color:#d4a017;color:#1a1005;
    }
    .lobby-btn.private:hover{background:linear-gradient(180deg,#dabb5e,#a07d1e)}
    .lobby-btn.join{
      background:linear-gradient(180deg,#42a5f5,#1565c0);
      border-color:#64b5f6;color:#fff;
    }
    .lobby-btn.join:hover{background:linear-gradient(180deg,#64b5f6,#1e88e5)}
    .lobby-divider{font-size:0.3rem;color:#555;margin:8px 0}
    .lobby-invite-area{
      display:none;margin-top:12px;
      background:rgba(0,0,0,0.4);border:1px solid #333;border-radius:6px;padding:10px;
    }
    .lobby-invite-area.show{display:block}
    .lobby-invite-label{font-size:0.3rem;color:#4caf50;margin-bottom:6px}
    .lobby-invite-link{
      font-family:'Press Start 2P',monospace;font-size:0.25rem;
      width:100%;padding:8px;background:#111;border:1px solid #4caf50;
      border-radius:4px;color:#4caf50;text-align:center;
      cursor:pointer;word-break:break-all;
    }
    .lobby-invite-link:hover{background:#1a2a1a}
    .lobby-copied{font-size:0.25rem;color:#ffe96a;margin-top:4px;opacity:0;transition:opacity 0.3s}
    .lobby-copied.show{opacity:1}
    .lobby-join-input{
      font-family:'Press Start 2P',monospace;font-size:0.3rem;
      width:100%;padding:10px;background:#111;border:1px solid #333;
      border-radius:4px;color:#ccc;text-align:center;margin-top:8px;outline:none;
    }
    .lobby-join-input:focus{border-color:#42a5f5}
    .lobby-join-go{
      font-family:'Press Start 2P',monospace;font-size:0.3rem;
      padding:8px 16px;margin-top:6px;
      background:#1565c0;border:1px solid #42a5f5;
      border-radius:4px;color:#fff;cursor:pointer;
    }
    .lobby-join-go:hover{background:#1e88e5}
    .lobby-public-list{margin-top:12px;max-height:150px;overflow-y:auto}
    .lobby-table-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 10px;border:1px solid #333;border-radius:4px;
      margin-bottom:4px;background:rgba(0,0,0,0.3);cursor:pointer;
      transition:all 0.2s;
    }
    .lobby-table-row:hover{border-color:#4caf50;background:rgba(76,175,80,0.08)}
    .lobby-table-name{font-size:0.3rem;color:#ccc}
    .lobby-table-players{font-size:0.25rem;color:#4caf50}

    /* ── Responsive ── */
    @media(max-width:600px){
      .remote-players-row{gap:8px;padding:4px 6px}
      .remote-slot{min-width:70px;padding:3px 5px;gap:4px}
      .remote-slot .slot-portrait{width:28px;height:34px}
      .remote-slot .slot-name{font-size:0.18rem;max-width:50px}
      .remote-slot .slot-stack{font-size:0.16rem}
      .bottom-row{flex-wrap:wrap;justify-content:center;gap:6px;padding:4px 6px}
      .local-player .portrait-frame{width:32px;height:38px}
      .chip{width:30px;height:30px}
      .ctrl-btn{font-size:0.3rem;padding:6px 8px}
      .chat-box{height:80px}
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="game-header">
  <div class="header-left">
    <div id="nav-placeholder"></div>
    <span class="header-title">CRAPS TABLE</span>
  </div>
  <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">CONNECT WALLET</button>
</div>

<!-- ── Table Lobby ── -->
<div class="table-lobby" id="tableLobby">
  <div class="lobby-box">
    <div class="lobby-title">CRAPS TABLE</div>
    <div class="lobby-subtitle">Choose how you want to play</div>
    <div class="lobby-btns">
      <button class="lobby-btn public" onclick="joinPublicTable()">JOIN PUBLIC TABLE <span id="lobbyPlayerCount" style="color:#4caf50"></span></button>
      <div class="lobby-divider">— or —</div>
      <button class="lobby-btn private" onclick="createPrivateTable()">CREATE PRIVATE TABLE</button>
      <button class="lobby-btn join" onclick="showJoinPrivate()">JOIN PRIVATE TABLE</button>
    </div>
    <div class="lobby-invite-area" id="inviteArea">
      <div class="lobby-invite-label">INVITE LINK (click to copy)</div>
      <div class="lobby-invite-link" id="inviteLink" onclick="copyInviteLink()"></div>
      <div class="lobby-copied" id="copiedMsg">Copied!</div>
      <button class="lobby-btn public" style="margin-top:10px" onclick="enterTable()">ENTER TABLE</button>
    </div>
    <div class="lobby-invite-area" id="joinPrivateArea">

<script src="nav.js"></script>
<script type="module">
import { connectWallet as walletConnect, autoReconnect, disconnect,
         getSigner, getUserAddress, truncateAddress } from './js/wallet.js';
import { GAMBLE_ADDRESS, GAMBLE_ABI } from './js/config.js';

/* ===================================================================
   CRAPS TABLE — Last Chad
   4-player multiplayer with Agora audio (PTT) + optional shooter video
   Server-side dice via Cloudflare Worker — no client-side RNG
   Players: Seat 0 = local (green, bottom)
            Seat 1 = remote (blue)
            Seat 2 = remote (purple)
            Seat 3 = remote (red)
   =================================================================== */

const WORKER_URL = 'https://last-chad-runner.severin20.workers.dev';

// Fetch with timeout (15s default)
function fetchWithTimeout(url, opts = {}, timeoutMs = 15000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...opts, signal: controller.signal }).finally(() => clearTimeout(timer));
}

// Player color names for CSS classes
const PLAYER_COLORS = ['#4caf50','#42a5f5','#ab47bc','#ef5350'];

// ── Load session from gamble.html ──
const crapsSession = JSON.parse(sessionStorage.getItem('craps_session') || 'null');

// ── State ──
const STATE = {
  stack: crapsSession ? crapsSession.stack : 0,
  selectedChip: 1,
  bets: {},           // { pass: 50, field: 10, ... } — local player bets
  remoteBets: {},     // { 1: {pass:30}, 2: {field:10}, 3: {} } — remote player bets by seat
  phase: 'comeout',
  point: null,
  dice: [5, 5],
  isRolling: false,
  playerName: 'Player',
  nftName: crapsSession ? ('Chad #' + crapsSession.tokenId) : '',
  playerId: Math.random().toString(36).slice(2, 8),
  chadId: crapsSession ? crapsSession.tokenId : null,
  seat: 0,            // local player is always seat 0
  // Worker session data
  nonce: crapsSession ? crapsSession.nonce : null,
  sessionToken: crapsSession ? crapsSession.sessionToken : null,
  tokenId: crapsSession ? crapsSession.tokenId : null,
  player: crapsSession ? crapsSession.player : null,
  buyIn: crapsSession ? crapsSession.buyIn : 0,
};

// Remote player info: seat 1-3
const remotePlayers = {
  1: { name: '', nftName: '', chadId: null, stack: 0, uid: null },
  2: { name: '', nftName: '', chadId: null, stack: 0, uid: null },
  3: { name: '', nftName: '', chadId: null, stack: 0, uid: null },
};

// ── Agora Config ──
const AGORA_APP_ID = '7917341a0c9c46a08328cc9a33989d75';
let agoraClient = null;
let localAudioTrack = null;
let localVideoTrack = null;
let cameraOn = false;
let pttActive = false;

// ── Pip Patterns ──
const PIP_MAP = {
  1: [4],
  2: [2, 6],
  3: [2, 4, 6],
  4: [0, 2, 6, 8],
  5: [0, 2, 4, 6, 8],
  6: [0, 2, 3, 5, 6, 8],
};

function renderDie(faceEl, value) {
  faceEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (PIP_MAP[value] && PIP_MAP[value].includes(i)) pip.style.display = 'block';
    faceEl.appendChild(pip);
  }
}

// Init dice to 5,5
renderDie(document.getElementById('face1'), 5);
renderDie(document.getElementById('face2'), 5);

// ── Chip Selection ──
function selectChip(value) {
  STATE.selectedChip = value;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.chip[data-value="${value}"]`).classList.add('selected');
}

// ── Bet Placement (server-side validated) ──
async function placeBet(zone) {
  if (STATE.isRolling) return;
  if (!STATE.nonce) { dealerSay("No active session!", 'sad'); return; }
  const amount = STATE.selectedChip;
  if (STATE.stack < amount) { dealerSay("Not enough chips!", 'sad'); return; }
  if (zone.startsWith('place') && STATE.phase === 'comeout') {
    dealerSay("Place bets open after point.", 'neutral'); return;
  }

  // Track pending bet optimistically for responsive UI
  STATE.stack -= amount;
  STATE.bets[zone] = (STATE.bets[zone] || 0) + amount;
  // Also track as pending for the next roll
  if (!STATE._pendingBets) STATE._pendingBets = {};
  STATE._pendingBets[zone] = (STATE._pendingBets[zone] || 0) + amount;
  renderAllBetChips();
  updateLocalPlayerUI();
  addChatMsg('system', `${STATE.nftName || STATE.playerName} bet ${amount} on ${formatBetName(zone)}`);
}

function formatBetName(zone) {
  const names = {
    pass:'PASS LINE', field:'FIELD',
    place4:'PLACE 4', place5:'PLACE 5', place6:'PLACE 6',
    place8:'PLACE 8', place9:'PLACE 9', place10:'PLACE 10',
    hardways:'HARD WAYS'
  };
  return names[zone] || zone.toUpperCase();
}

// Render colored chip tokens on each bet zone for all players
function renderAllBetChips() {
  const zones = ['pass','field','place4','place5','place6','place8','place9','place10','hardways'];
  for (const zone of zones) {
    const container = document.getElementById('chips-' + zone);
    if (!container) continue;
    container.innerHTML = '';
    // Local player (seat 0)
    if (STATE.bets[zone] && STATE.bets[zone] > 0) {
      const chip = document.createElement('div');
      chip.className = 'bet-chip-token p0';
      chip.textContent = STATE.bets[zone];
      container.appendChild(chip);
    }
    // Remote players (seats 1-3)
    for (let s = 1; s <= 3; s++) {
      const rb = STATE.remoteBets[s];
      if (rb && rb[zone] && rb[zone] > 0) {
        const chip = document.createElement('div');
        chip.className = 'bet-chip-token p' + s;
        chip.textContent = rb[zone];
        container.appendChild(chip);
      }
    }
  }
}

function clearBets() {
  if (STATE.isRolling) return;
  for (const zone of Object.keys(STATE.bets)) STATE.stack += STATE.bets[zone];
  STATE.bets = {};
  STATE._pendingBets = {};
  renderAllBetChips();
  updateLocalPlayerUI();
}

function updateLocalPlayerUI() {
  document.getElementById('stack-0').textContent = STATE.stack + ' chips';
}

// ── Dice Roll (server-side via Worker — no client RNG) ──
async function rollDice() {
  if (STATE.isRolling) return;
  if (!STATE.nonce) { dealerSay("No active session!", 'sad'); return; }
  if (Object.keys(STATE.bets).length === 0) {
    dealerSay("Place a bet first!", 'neutral'); return;
  }
  STATE.isRolling = true;
  document.getElementById('rollBtn').disabled = true;
  const die1El = document.getElementById('die1');
  const die2El = document.getElementById('die2');
  die1El.classList.add('rolling');
  die2El.classList.add('rolling');

  // Visual animation while waiting for server
  const cycleInterval = setInterval(() => {
    renderDie(document.getElementById('face1'), Math.floor(Math.random()*6)+1);
    renderDie(document.getElementById('face2'), Math.floor(Math.random()*6)+1);
  }, 60);

  try {
    // Send new bets to Worker — Worker validates against stack, generates dice, resolves
    const res = await fetchWithTimeout(WORKER_URL + '/craps/roll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nonce: STATE.nonce,
        newBets: STATE._pendingBets || {},
        sessionToken: STATE.sessionToken,
      }),
    });
    STATE._pendingBets = {}; // Clear pending after sending
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Roll failed');

    // Let animation run a bit
    await new Promise(r => setTimeout(r, 1200));
    clearInterval(cycleInterval);

    const [d1, d2] = data.dice;
    STATE.dice = [d1, d2];
    renderDie(document.getElementById('face1'), d1);
    renderDie(document.getElementById('face2'), d2);
    die1El.classList.remove('rolling');
    die2El.classList.remove('rolling');

    // Sync authoritative state from Worker — server is the source of truth
    STATE.stack = data.stack;
    STATE.phase = data.phase;
    STATE.point = data.point || null;

    const r = data.resolution;
    const total = data.total;

    // Use server-authoritative bet state (not client-tracked)
    if (data.bets) STATE.bets = data.bets;
    // Remove zeroed bets for clean display
    for (const k of Object.keys(STATE.bets)) {
      if (STATE.bets[k] === 0) delete STATE.bets[k];
    }

    // Update puck
    if (STATE.phase === 'point' && STATE.point) {
      document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jipton.png';
      document.getElementById('pointDisplay').textContent = 'POINT: ' + STATE.point;
    } else {
      document.getElementById('puckImg').src = 'assets/Oldjipt/Craps/jiptoff.png';
      document.getElementById('pointDisplay').textContent = '';
    }

    addChatMsg('roll', `Dice: ${d1} + ${d2} = ${total}${data.isHard ? ' (HARD)' : ''}`);
    if (r.message) {
      dealerSay(r.message, r.wins.length > 0 ? 'happy' : r.losses.length > 0 ? 'sad' : 'neutral');
    }

    // Flash animations
    await new Promise(r2 => setTimeout(r2, 200));
    for (const key of r.wins) {
      const zone = document.querySelector(`[data-bet="${key}"]`);
      if (zone) zone.classList.add('win-flash');
    }
    for (const key of r.losses) {
      const zone = document.querySelector(`[data-bet="${key}"]`);
      if (zone) zone.classList.add('lose-flash');
    }

    renderAllBetChips();
    updateLocalPlayerUI();

    const netWin = r.netWin || 0;
    if (netWin > 0) showToast(`+${netWin}`, 'win', `Total: ${total}`);
    else if (netWin < 0) showToast(`${netWin}`, 'lose', `Total: ${total}`);

    // Clear flash classes after animation
    setTimeout(() => {
      document.querySelectorAll('.win-flash,.lose-flash').forEach(el => {
        el.classList.remove('win-flash','lose-flash');
      });
    }, 1500);

    // Check if busted
    if (STATE.stack <= 0 && Object.keys(STATE.bets).length === 0) {
      dealerSay("You're busted! Better luck next time.", 'sad');
      addChatMsg('system', `${STATE.nftName || STATE.playerName} busted out!`);
    }

  } catch (err) {
    clearInterval(cycleInterval);
    die1El.classList.remove('rolling');
    die2El.classList.remove('rolling');
    dealerSay('Roll failed: ' + (err.message || 'Network error'), 'sad');
  }

  STATE.isRolling = false;
  document.getElementById('rollBtn').disabled = false;
}

// Client-side resolution removed — all resolution happens server-side in the Worker.
// This prevents cheating: dice are generated server-side with crypto.getRandomValues(),
// bets are resolved server-side, and the authoritative stack comes from the Worker.

// ── Dealer ──
function dealerSay(text, mood) {
  document.getElementById('dealerSpeech').textContent = text;
  const m = {neutral:'jiptneutral.png',happy:'jipthappy.png',sad:'jiptsad.png'};
  document.getElementById('dealerImg').src = 'assets/Oldjipt/Craps/' + (m[mood]||m.neutral);
}
function getWinQuip() {
  return ["Winner winner!","Hot dice!","Pay the man!","Keep 'em coming!","Lucky roll!"][Math.floor(Math.random()*5)];
}
function getLoseQuip() {
  return ["House wins.","Tough break.","That's craps.","Dice are cold.","Better luck next roll."][Math.floor(Math.random()*5)];
}

// ── Toast ──
function showToast(text, type, sub) {
  const el = document.getElementById('resultToast');
  el.className = 'result-toast ' + type;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Chat ──
function addChatMsg(type, text, name, seatIndex) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (type==='system'?' system-msg':'') +
    (type==='roll'?' roll-msg':'') + (type==='win'?' win-msg':'') + (type==='lose'?' lose-msg':'');
  if (name) {
    const colorClass = typeof seatIndex === 'number' ? ' p'+seatIndex : ' p0';
    div.innerHTML = `<span class="msg-name${colorClass}">${escapeHtml(name)}:</span> <span class="msg-text">${escapeHtml(text)}</span>`;
  } else {
    div.innerHTML = `<span class="msg-text">${escapeHtml(text)}</span>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  addChatMsg('chat', text, STATE.nftName || STATE.playerName, 0);
  broadcastMessage({ type:'chat', name:STATE.nftName||STATE.playerName, text, seat:0 });
  input.value = '';
}

function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

// ── Cash Out (Worker-signed + on-chain claim) ──
async function cashOut() {
  if (STATE.isRolling) return;
  if (!STATE.nonce) { dealerSay("No active session!", 'sad'); return; }

  // Return bets to stack for display
  let betsOnTable = 0;
  for (const val of Object.values(STATE.bets)) betsOnTable += val;
  const totalPayout = STATE.stack + betsOnTable;

  if (!confirm(`Cash out ${totalPayout} cells?`)) return;

  document.getElementById('rollBtn').disabled = true;
  dealerSay("Cashing out...", 'neutral');

  try {
    // Ask Worker to sign the cashout
    const res = await fetchWithTimeout(WORKER_URL + '/craps/cashout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tokenId: STATE.tokenId,
        nonce: STATE.nonce,
        sessionToken: STATE.sessionToken,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Cashout failed');

    if (data.payout === 0) {
      addChatMsg('system', `${STATE.nftName || STATE.playerName} busted out. 0 cells returned.`);
      dealerSay("Better luck next time.", 'sad');
      sessionStorage.removeItem('craps_session');
      STATE.nonce = null;
      return;
    }

    // Call claimWinnings on-chain with oracle signature
    dealerSay("Claiming cells on-chain...", 'neutral');
    const signer = getSigner();
    if (!signer) throw new Error('Wallet not connected');
    const gamble = new ethers.Contract(GAMBLE_ADDRESS, GAMBLE_ABI, signer);
    const tx = await gamble.claimWinnings(STATE.tokenId, data.payout, data.nonce, data.signature);
    dealerSay("Confirming transaction...", 'neutral');
    await tx.wait();

    const profit = data.payout - STATE.buyIn;
    addChatMsg('system', `${STATE.nftName || STATE.playerName} cashed out ${data.payout} cells${profit > 0 ? ' (+' + profit + ' profit!)' : ''}.`);
    if (profit > 0) {
      dealerSay("Winner! See ya around, partner.", 'happy');
      showToast(`+${profit}`, 'win', 'Profit!');
    } else {
      dealerSay("See ya around, partner.", 'neutral');
    }

    sessionStorage.removeItem('craps_session');
    STATE.nonce = null;
    STATE.bets = {};
    renderAllBetChips();

  } catch (err) {
    dealerSay('Cashout failed: ' + (err.reason || err.message || 'Unknown error'), 'sad');
  }
  document.getElementById('rollBtn').disabled = false;
}

// ── Exit Table ──
function exitTable() {
  if (STATE.nonce && Object.keys(STATE.bets).length > 0) {
    if (!confirm('You have active bets. Cash out first or lose them. Exit anyway?')) return;
  }
  window.location.href = 'gamble.html';
}

// ── Wallet ──
function connectWallet() {
  if (STATE.player) {
    initPlayerFromSession();
  } else {
    dealerSay("Start a game from the Gamble Den first!", 'neutral');
  }
}

function initPlayerFromSession() {
  const btn = document.getElementById('walletBtn');
  if (STATE.player) {
    const addr = STATE.player;
    btn.textContent = addr.slice(0,6) + '...' + addr.slice(-4);
    btn.classList.add('connected');
  }
  if (STATE.chadId) {
    setChadPortrait(0, STATE.chadId);
    setPlayerName(0, STATE.nftName || 'Chad #' + STATE.chadId);
  }
  updateLocalPlayerUI();
  addChatMsg('system', `${STATE.nftName || STATE.playerName} joined the table with ${STATE.stack} cells.`);
  dealerSay("Welcome! Place your bets.", 'happy');
}

// ── Player Panel Helpers ──
function setChadPortrait(seat, chadId) {
  const img = document.getElementById('chad-' + seat);
  if (img) {
    img.onerror = function() { this.onerror=null; this.style.display='none'; };
    img.src = 'assets/chads/' + chadId + '.png';
    img.alt = 'Chad #' + chadId;
  }
  // Mark remote slot as occupied
  if (seat > 0) {
    const slot = document.getElementById('slot-' + seat);
    if (slot) { slot.classList.remove('empty'); slot.classList.add('occupied'); }
  }
}

function setPlayerName(seat, nftName) {
  const el = document.getElementById('name-' + seat);
  if (el) el.textContent = nftName || 'Unknown';
}

function setPlayerStack(seat, stack) {
  const el = document.getElementById('stack-' + seat);
  if (el) el.textContent = stack + ' chips';
}

function clearPlayerPanel(seat) {
  if (seat > 0) {
    const slot = document.getElementById('slot-' + seat);
    if (slot) { slot.classList.add('empty'); slot.classList.remove('occupied'); }
  }
  const img = document.getElementById('chad-' + seat);
  if (img) { img.src = ''; img.alt = ''; }
  setPlayerName(seat, 'Waiting...');
  const stack = document.getElementById('stack-' + seat);
  if (stack) stack.textContent = '';
}

// ===================================================================
//  AGORA — Audio (PTT) + Optional Shooter Video
// ===================================================================

async function initAgora() {
  if (!AGORA_APP_ID) return;
  agoraClient = AgoraRTC.createClient({ mode:'rtc', codec:'vp8' });

  agoraClient.on('user-published', async (user, mediaType) => {
    await agoraClient.subscribe(user, mediaType);
    if (mediaType === 'video') {
      // Show remote video in the shooter PiP on the felt
      const pip = document.getElementById('shooterPip');
      pip.classList.add('active');
      user.videoTrack.play('shooterPip');
    }
    if (mediaType === 'audio') user.audioTrack.play();
  });

  agoraClient.on('user-unpublished', (user, mediaType) => {
    if (mediaType === 'video') {
      document.getElementById('shooterPip').classList.remove('active');
    }
  });

  agoraClient.on('user-left', (user) => {
    const seat = findSeatByUid(user.uid);
    if (seat !== null) {
      clearPlayerPanel(seat);
      remotePlayers[seat].uid = null;
      remotePlayers[seat].name = '';
      remotePlayers[seat].nftName = '';
      remotePlayers[seat].chadId = null;
      delete STATE.remoteBets[seat];
      renderAllBetChips();
    }
    addChatMsg('system', 'A player left the table.');
  });
}

function getRemoteSeat(uid) {
  // Check if already assigned
  for (let s = 1; s <= 3; s++) {
    if (remotePlayers[s].uid === String(uid)) return s;
  }
  // Assign to first empty seat
  for (let s = 1; s <= 3; s++) {
    if (!remotePlayers[s].uid) {
      remotePlayers[s].uid = String(uid);
      // Assign random Chad portrait for remote
      const cid = (parseInt(String(uid).slice(-2),36) % 20) + 1;
      remotePlayers[s].chadId = cid;
      remotePlayers[s].nftName = 'Chad #' + cid;
      remotePlayers[s].stack = 1000;
      setChadPortrait(s, cid);
      setPlayerName(s, remotePlayers[s].nftName);
      setPlayerStack(s, remotePlayers[s].stack);
      addChatMsg('system', `${remotePlayers[s].nftName} joined (Seat ${s+1}).`);
      return s;
    }
  }
  return null; // table full
}

function findSeatByUid(uid) {
  for (let s = 1; s <= 3; s++) {
    if (remotePlayers[s].uid === String(uid)) return s;
  }
  return null;
}

async function joinRoom() {
  if (!AGORA_APP_ID) { addChatMsg('system','No Agora App ID.'); return; }
  try {
    if (!agoraClient) await initAgora();
    const channel = 'lastchad-craps-' + (window.location.hash.slice(1) || 'main');
    // Fetch token from worker for secured Agora authentication
    let token = null;
    try {
      const res = await fetchWithTimeout(WORKER_URL + '/agora/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channelName: channel, uid: STATE.playerId }),
      });
      const data = await res.json();
      if (data.token) token = data.token;
    } catch (e) { console.warn('Token fetch failed, trying without:', e); }
    await agoraClient.join(AGORA_APP_ID, channel, token, STATE.playerId);
    addChatMsg('system', `Joined room: ${channel}`);
  } catch (err) { addChatMsg('system', 'Join failed: ' + err.message); }
}

async function toggleCamera() {
  if (!agoraClient) {
    // Auto-join room first if not joined
    await joinRoom();
    if (!agoraClient) { addChatMsg('system','Could not join room.'); return; }
  }
  const btn = document.getElementById('camBtn');
  if (!cameraOn) {
    try {
      localVideoTrack = await AgoraRTC.createCameraVideoTrack();
      await agoraClient.publish([localVideoTrack]);
      // Show local video in the PiP
      const pip = document.getElementById('shooterPip');
      pip.classList.add('active');
      localVideoTrack.play('shooterPip');
      cameraOn = true;
      btn.textContent = 'CAM ON'; btn.classList.add('active');
    } catch (err) {
      if (err.name === 'NotAllowedError') addChatMsg('system','Camera permission denied. Enable in browser settings.');
      else addChatMsg('system','Camera error: '+err.message);
    }
  } else {
    if (localVideoTrack) { await agoraClient.unpublish([localVideoTrack]); localVideoTrack.close(); localVideoTrack=null; }
    document.getElementById('shooterPip').classList.remove('active');
    cameraOn = false;
    btn.textContent = 'SHOOTER CAM'; btn.classList.remove('active');
  }
}

// Push-to-Talk
(function initPTT() {
  const pttBtn = document.getElementById('pttBtn');
  let micDenied = false;
  async function startTalking() {
    if (pttActive || micDenied) return;
    // Auto-join room if not joined
    if (!agoraClient) {
      await joinRoom();
      if (!agoraClient) return;
    }
    try {
      localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
      await agoraClient.publish([localAudioTrack]);
      pttActive = true; pttBtn.classList.add('talking'); pttBtn.textContent = 'TALKING...';
    } catch (err) {
      if (err.name === 'NotAllowedError') {
        micDenied = true;
        addChatMsg('system','Mic permission denied. Enable in browser settings.');
      } else { addChatMsg('system','Mic error: '+err.message); }
    }
  }
  async function stopTalking() {
    if (!pttActive) return;
    if (localAudioTrack) { await agoraClient.unpublish([localAudioTrack]); localAudioTrack.close(); localAudioTrack=null; }
    pttActive = false; pttBtn.classList.remove('talking'); pttBtn.textContent = 'HOLD TO TALK';
  }
  pttBtn.addEventListener('mousedown', startTalking);
  pttBtn.addEventListener('mouseup', stopTalking);
  pttBtn.addEventListener('mouseleave', stopTalking);
  pttBtn.addEventListener('touchstart', (e)=>{e.preventDefault();startTalking()});
  pttBtn.addEventListener('touchend', (e)=>{e.preventDefault();stopTalking()});
  pttBtn.addEventListener('touchcancel', stopTalking);
})();

// ===================================================================
//  TABLE LOBBY — Public / Private tables
// ===================================================================

let currentTableCode = null;  // the Agora channel suffix
let tableIsPrivate = false;

function generateTableCode() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}

async function joinPublicTable() {
  currentTableCode = 'public-main';
  tableIsPrivate = false;
  enterTable();
  // Register presence
  try {
    await fetchWithTimeout(WORKER_URL + '/tables/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table: 'public-main', playerId: STATE.playerId }),
    });
  } catch (_) {}
}

function createPrivateTable() {
  currentTableCode = 'priv-' + generateTableCode();
  tableIsPrivate = true;
  const url = window.location.origin + window.location.pathname + '#' + currentTableCode;
  document.getElementById('inviteLink').textContent = url;
  document.getElementById('inviteArea').classList.add('show');
  document.getElementById('joinPrivateArea').classList.remove('show');
  document.getElementById('publicTableList').innerHTML = '';
}

function showJoinPrivate() {
  document.getElementById('joinPrivateArea').classList.add('show');
  document.getElementById('inviteArea').classList.remove('show');
  document.getElementById('publicTableList').innerHTML = '';
}

function joinPrivateTable() {
  const input = document.getElementById('privateCodeInput').value.trim();
  if (!input) return;
  if (input.includes('#')) {
    currentTableCode = input.split('#').pop();
  } else {
    currentTableCode = input;
  }
  tableIsPrivate = true;
  enterTable();
}

function copyInviteLink() {
  const link = document.getElementById('inviteLink').textContent;
  navigator.clipboard.writeText(link).then(() => {
    const msg = document.getElementById('copiedMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  });
}

function enterTable() {
  window.location.hash = currentTableCode || 'public-main';
  document.getElementById('tableLobby').classList.add('hidden');
  document.getElementById('tableWrapper').style.display = '';
  addChatMsg('system', `Table: ${currentTableCode}${tableIsPrivate ? ' (private)' : ' (public)'}`);
  startPresenceHeartbeat();
  // Auto-join Agora room
  joinRoom();
}

// Auto-join if URL has a hash (invite link)
(function checkHashJoin() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    currentTableCode = hash;
    tableIsPrivate = hash.startsWith('priv-');
    enterTable();
    fetchWithTimeout(WORKER_URL + '/tables/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table: hash, playerId: STATE.playerId }),
    }).catch(() => {});
  }
})();

// ── Lobby: fetch public table player counts ──
async function refreshLobbyTables() {
  const list = document.getElementById('publicTableList');
  if (!list || document.getElementById('tableLobby').classList.contains('hidden')) return;
  try {
    const res = await fetchWithTimeout(WORKER_URL + '/tables/list');
    const data = await res.json();
    list.innerHTML = '';
    for (const t of data.tables || []) {
      const row = document.createElement('div');
      row.className = 'lobby-table-row';
      row.innerHTML = `<span class="lobby-table-name">${t.label}</span><span class="lobby-table-players">${t.players} player${t.players !== 1 ? 's' : ''}</span>`;
      list.appendChild(row);
      if (t.name === 'public-main') {
        const countEl = document.getElementById('lobbyPlayerCount');
        if (countEl) countEl.textContent = t.players > 0 ? `(${t.players})` : '';
      }
    }
  } catch (_) {}
}
refreshLobbyTables();
setInterval(refreshLobbyTables, 10_000);

// ── Presence heartbeat: ping every 30s while at a table ──
let presenceInterval = null;
function startPresenceHeartbeat() {
  if (presenceInterval) clearInterval(presenceInterval);
  presenceInterval = setInterval(() => {
    if (!currentTableCode) return;
    fetchWithTimeout(WORKER_URL + '/tables/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table: currentTableCode, playerId: STATE.playerId }),
    }).catch(() => {});
  }, 30_000);
}
// Leave table on page unload
window.addEventListener('beforeunload', () => {
  if (currentTableCode) {
    navigator.sendBeacon(WORKER_URL + '/tables/leave',
      JSON.stringify({ table: currentTableCode, playerId: STATE.playerId }));
  }
});

renderDie(document.getElementById('face1'), 5);
renderDie(document.getElementById('face2'), 5);
if (AGORA_APP_ID) initAgora();

// Auto-reconnect wallet if session exists
if (crapsSession) {
  autoReconnect({
    onConnected: (address) => {
      STATE.player = address.toLowerCase();
      initPlayerFromSession();
    },
    onDisconnected: () => {},
    onChainChanged: () => {},
    onAccountsChanged: () => {},
  }).then(() => {
    if (STATE.chadId) initPlayerFromSession();
  });
} else {
  dealerSay("No active session. Return to the Gamble Den to buy in.", 'sad');
  document.getElementById('rollBtn').disabled = true;
}

window.placeBet = placeBet;
window.selectChip = selectChip;
window.clearBets = clearBets;
window.sendChat = sendChat;
window.toggleCamera = toggleCamera;
window.joinRoom = joinRoom;
window.joinPublicTable = joinPublicTable;
window.createPrivateTable = createPrivateTable;
window.showJoinPrivate = showJoinPrivate;
window.joinPrivateTable = joinPrivateTable;
window.copyInviteLink = copyInviteLink;
window.enterTable = enterTable;
window.exitTable = exitTable;

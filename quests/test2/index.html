<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test2 | Last Chad</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="../../nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      color: #f5e6c8;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #0a0a0f;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(92, 68, 9, 0.15) 0%, transparent 60%);
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10, 10, 15, 0.9);
      border-bottom: 2px solid #3d2e0a;
      backdrop-filter: blur(8px);
    }

    .header-title {
      font-size: 0.9rem;
      color: #c9a84c;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .main {
      position: relative;
      z-index: 1;
      margin-top: 80px;
      padding: 24px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 40px;
    }

    .quest-title {
      font-size: 0.7rem;
      color: #7ee8d4;
      margin-bottom: 20px;
      text-shadow: 0 0 8px rgba(126, 232, 212, 0.3);
      text-align: center;
    }

    .section-container {
      background: rgba(30, 20, 10, 0.8);
      border: 2px solid #7ee8d4;
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.15);
    }

    .section-name {
      font-size: 0.55rem;
      color: #c9a84c;
      margin-bottom: 16px;
      text-shadow: 0 0 4px rgba(201, 168, 76, 0.2);
    }

    .section-image {
      width: 100%;
      max-width: 500px;
      height: auto;
      border: 1px solid #7ee8d4;
      border-radius: 4px;
      margin-bottom: 16px;
      display: none;
    }

    .section-image.visible {
      display: block;
    }

    .dialogue {
      font-size: 0.35rem;
      color: #f5e6c8;
      line-height: 1.6;
      margin-bottom: 20px;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-btn {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.3) 0%, rgba(201, 168, 76, 0.1) 100%);
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 16px;
      font-size: 0.35rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      text-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    .choice-btn:hover {
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.4) 0%, rgba(201, 168, 76, 0.2) 100%);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.3);
      transform: translateY(-2px);
    }

    .choice-btn:active {
      transform: translateY(0);
    }

    .double-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .loading {
      text-align: center;
      font-size: 0.35rem;
      color: #7ee8d4;
      padding: 40px;
    }

    .back-btn {
      background: rgba(126, 232, 212, 0.2);
      border: 2px solid #7ee8d4;
      color: #7ee8d4;
      padding: 12px 24px;
      font-size: 0.3rem;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(126, 232, 212, 0.3);
      box-shadow: 0 0 12px rgba(126, 232, 212, 0.3);
    }

    @media (max-width: 768px) {
      .double-choices {
        grid-template-columns: 1fr;
      }
      .main {
        padding: 16px;
      }
    }
  
    /* Wallet button */
    .wallet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 18px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,220,120,0.4), 0 2px 6px rgba(0,0,0,0.5);
    }
    .wallet-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .wallet-btn.connected { background: linear-gradient(180deg, #2e5c2e 0%, #1a3d1a 100%); border-color: #4caf50; color: #a5d6a7; font-size: 0.5rem; }
    .wallet-wrapper { position: relative; }
    .disconnect-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: linear-gradient(180deg, #1e1608 0%, #140f05 100%); border: 2px solid #5c4409; border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.7); z-index: 110; min-width: 160px; }
    .disconnect-dropdown.show { display: block; }
    .disconnect-btn { width: 100%; padding: 12px 16px; font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: #e53935; background: none; border: none; cursor: pointer; text-align: center; transition: background 0.15s; }
    .disconnect-btn:hover { background: rgba(229,57,53,0.15); }
    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: linear-gradient(180deg, #1e1608 0%, #140f05 100%); border: 3px solid #5c4409; border-radius: 8px; padding: 28px 24px; max-width: 380px; width: 100%; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    .modal-title { font-size: 0.7rem; color: #c9a84c; text-align: center; margin-bottom: 24px; }
    .wallet-option { display: flex; align-items: center; gap: 14px; width: 100%; padding: 14px 16px; margin-bottom: 10px; font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #f5e6c8; background: rgba(61,46,10,0.3); border: 2px solid #3d2e0a; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .wallet-option:hover { border-color: #8b6914; background: rgba(92,68,9,0.3); }
    .wallet-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .modal-close { display: block; margin: 16px auto 0; font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: #5c4409; background: none; border: none; cursor: pointer; padding: 8px; }
    .modal-close:hover { color: #c9a84c; }
    /* Level-up stat buttons */
    .lu-stat-btn { display: flex; align-items: center; gap: 14px; width: 100%; padding: 14px 16px; margin-bottom: 10px; font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #f5e6c8; background: rgba(61,46,10,0.3); border: 2px solid #3d2e0a; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .lu-stat-btn:hover { border-color: #8b6914; background: rgba(92,68,9,0.3); }
    .lu-stat-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .lu-stat-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .lu-points { font-size: 0.45rem; color: #c9a84c; text-align: center; margin-bottom: 6px; line-height: 2; }
    .lu-token  { font-size: 0.38rem; color: #8a7a5a; text-align: center; margin-bottom: 16px; }
    .loading-text-sm { font-size: 0.4rem; color: #8a7a5a; text-align: center; padding: 8px 0; }
    /* CLAIM XP section */
    .claim-xp-btn {
      width: 100%; padding: 16px 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.65rem, 2.5vw, 0.85rem);
      color: #fff;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 50%, #5c4409 100%);
      border: 3px solid #d4a017; border-radius: 6px; cursor: pointer;
      text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
      box-shadow: inset 0 2px 0 rgba(255,220,120,0.4), inset 0 -2px 0 rgba(0,0,0,0.4), 0 4px 0 #3d2e0a, 0 6px 15px rgba(0,0,0,0.5);
      transition: all 0.2s; touch-action: manipulation; margin-bottom: 12px;
    }
    .claim-xp-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 50%, #6b5010 100%); border-color: #f5e6c8; }
    .claim-xp-btn:active { transform: translateY(3px); }
    .claim-xp-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .quest-completed-banner { background: rgba(76,175,80,0.1); border: 2px solid #4caf50; border-radius: 6px; padding: 16px; text-align: center; font-size: 0.5rem; color: #4caf50; line-height: 2; margin-bottom: 16px; }
    .intro-wallet-note { font-size: 0.38rem; color: #8a7a5a; margin-bottom: 14px; line-height: 2; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="header">
    <div class="header-title">⚔️ Test2</div>
    <div class="nav-menu" id="navMenu"></div>
  </div>

  <div class="main">
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    <h1 class="quest-title">Test2</h1>
    <div id="questContainer" class="loading">Loading quest...</div>
  </div>

  <script src="../../nav.js"></script>
  <script>
    // Strip image data from sections — images are served as files in /images/
    const questData = {"name":"Test2","sections":[{"id":1771428639565,"name":"1","dialogue":"Line 1\nLine 2","selectedChoice":"single","buttonName":"End","button1Name":"Choice A","button2Name":"Choice B","nextSectionId":null,"choice1NextSectionId":null,"choice2NextSectionId":null,"passNextSectionId":null,"failNextSectionId":null}]};
    const sectionMap = {};
    let currentSectionId = null;

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>"']/g, function(m) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
      });
    }

    // Build section map
    questData.sections.forEach(section => {
      sectionMap[section.id] = section;
    });

    function findNextSection(section, choiceType = null) {
      if (!section) return null;

      if (section.selectedChoice === 'single') {
        return sectionMap[section.nextSectionId] || null;
      } else if (section.selectedChoice === 'double' && choiceType) {
        const nextId = choiceType === 1 ? section.choice1NextSectionId : section.choice2NextSectionId;
        return sectionMap[nextId] || null;
      } else if (section.selectedChoice === 'dice' && choiceType) {
        const nextId = choiceType === 'pass' ? section.passNextSectionId : section.failNextSectionId;
        return sectionMap[nextId] || null;
      }

      return null;
    }

    function displaySection(sectionId = null) {
      if (!sectionId && questData.sections.length > 0) {
        sectionId = questData.sections[0].id;
      }

      const section = sectionMap[sectionId];
      if (!section) {
        document.getElementById('questContainer').innerHTML = '<div class="loading">Quest ended. Thanks for playing!</div>';
        return;
      }

      currentSectionId = sectionId;

      let html = `
        <div class="section-container">
          <div class="section-name">${escapeHtml(section.name)}</div>
      `;

      if (section.photo) {
        html += `<img src="images/${section.id}.png" alt="${escapeHtml(section.name)}" class="section-image visible">`;
      }

      html += `
          <div class="dialogue">${escapeHtml(section.dialogue || 'No dialogue...')}</div>
      `;

      if (section.selectedChoice === 'single') {
        const nextSection = findNextSection(section);
        html += `
          <div class="choices">
            <button class="choice-btn" onclick="displaySection(${nextSection ? nextSection.id : 'null'})">
              ${escapeHtml(section.buttonName || 'Continue')}
            </button>
          </div>
        `;
      } else if (section.selectedChoice === 'double') {
        const next1 = findNextSection(section, 1);
        const next2 = findNextSection(section, 2);
        html += `
          <div class="choices double-choices">
            <button class="choice-btn" onclick="displaySection(${next1 ? next1.id : 'null'})">
              ${escapeHtml(section.button1Name || 'Choice A')}
            </button>
            <button class="choice-btn" onclick="displaySection(${next2 ? next2.id : 'null'})">
              ${escapeHtml(section.button2Name || 'Choice B')}
            </button>
          </div>
        `;
      } else if (section.selectedChoice === 'dice') {
        html += `
          <div class="choices">
            <button class="choice-btn" onclick="handleDiceRoll('pass')" style="margin-bottom: 12px;">
              🎲 Roll Dice
            </button>
            <p style="text-align: center; font-size: 0.25rem; color: #a0963d; margin-top: 16px;">
              Need 6 + 5 + 4 to pass!
            </p>
          </div>
        `;
      }

      html += '</div>';
      document.getElementById('questContainer').innerHTML = html;
    }

    function handleDiceRoll(outcome) {
      const section = sectionMap[currentSectionId];
      const nextSection = findNextSection(section, outcome);

      // Simple dice roll animation
      let rolls = 0;
      const interval = setInterval(() => {
        const dice = Math.floor(Math.random() * 6) + 1;
        document.querySelector('.choice-btn').textContent = '🎲 ' + dice;
        rolls++;
        if (rolls > 10) {
          clearInterval(interval);
          displaySection(nextSection ? nextSection.id : null);
        }
      }, 100);
    }

    // Load first section
    displaySection();
  </script>

  <!-- Wallet Modal -->
  <div class="modal-overlay" id="walletModal">
    <div class="modal">
      <h2 class="modal-title">Connect Wallet</h2>
      <button class="wallet-option" data-wallet="rabby"><span class="wallet-icon" style="background:#7c6be6;">&#128176;</span>Rabby</button>
      <button class="wallet-option" data-wallet="core"><span class="wallet-icon" style="background:#e84142;">&#9889;</span>Core</button>
      <button class="wallet-option" data-wallet="metamask"><span class="wallet-icon" style="background:#f6851b;">&#129418;</span>MetaMask</button>
      <button class="wallet-option" data-wallet="walletconnect"><span class="wallet-icon" style="background:#3b99fc;">&#128279;</span>WalletConnect</button>
      <button class="modal-close" id="modalClose">CANCEL</button>
    </div>
  </div>

  <!-- Level Up Modal -->
  <div class="modal-overlay" id="levelUpModal">
    <div class="modal">
      <h2 class="modal-title">LEVEL UP!</h2>
      <div class="lu-points" id="luPointsLeft">1 POINT TO ASSIGN</div>
      <div class="lu-token" id="luTokenId"></div>
      <button class="lu-stat-btn" onclick="spendStatPoint(0)"><span class="lu-stat-icon" style="background:#c0392b;">&#9876;</span>STRENGTH +1</button>
      <button class="lu-stat-btn" onclick="spendStatPoint(1)"><span class="lu-stat-icon" style="background:#2980b9;">&#128218;</span>INTELLIGENCE +1</button>
      <button class="lu-stat-btn" onclick="spendStatPoint(2)"><span class="lu-stat-icon" style="background:#27ae60;">&#127939;</span>DEXTERITY +1</button>
      <button class="lu-stat-btn" onclick="spendStatPoint(3)"><span class="lu-stat-icon" style="background:#8e44ad;">&#128081;</span>CHARISMA +1</button>
      <div class="loading-text-sm" id="luStatus" style="display:none;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script>
    // ===== WALLET + XP INTEGRATION =====
    var QUEST_SLUG = 'test2';
    var AVAX_CHAIN_ID = '0xa869';
    var AVAX_CHAIN = { chainId: AVAX_CHAIN_ID, chainName: 'Avalanche Fuji Testnet', nativeCurrency: { name: 'Avalanche', symbol: 'AVAX', decimals: 18 }, rpcUrls: ['https://api.avax-test.network/ext/bc/C/rpc'], blockExplorerUrls: ['https://testnet.snowtrace.io/'] };
    var WALLETCONNECT_PROJECT_ID = '3aa99496af6ef381ca5d78f464777c45';
    var CONTRACT_ADDRESS = '0xE6A490A8D7fd9AAa70d095CC3e28a4974f9AfcE2';
    var READ_RPC = 'https://api.avax-test.network/ext/bc/C/rpc';
    var LASTCHAD_ABI = [
      'function ownerOf(uint256 tokenId) external view returns (address)',
      'function getPendingStatPoints(uint256 tokenId) external view returns (uint256)',
      'function spendStatPoint(uint256 tokenId, uint8 statIndex) external'
    ];
    var walletProvider = null, walletSigner = null, userAddress = null, chadId = null, _luPending = 0;

    (function() { var p = new URLSearchParams(window.location.search); var c = p.get('chad'); if (c && parseInt(c) > 0) { chadId = parseInt(c); var n = document.getElementById('chadName'); if (n) n.textContent = 'CHAD #' + c; } })();

    function truncateAddress(a) { return a.slice(0,6)+'...'+a.slice(-4); }
    function isMobile() { return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent); }

    async function switchToAvalanche(raw) {
      try { await raw.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: AVAX_CHAIN_ID }] }); }
      catch(err) { if (err.code === 4902) await raw.request({ method: 'wallet_addEthereumChain', params: [AVAX_CHAIN] }); else throw err; }
    }

    function onConnected(addr) {
      userAddress = addr;
      document.getElementById('walletBtn').textContent = truncateAddress(addr);
      document.getElementById('walletBtn').classList.add('connected');
      document.getElementById('walletModal').classList.remove('show');
      checkQuestCompletion();
    }

    function onDisconnected() {
      walletProvider = walletSigner = userAddress = null;
      document.getElementById('walletBtn').textContent = 'Connect Wallet';
      document.getElementById('walletBtn').classList.remove('connected');
      document.getElementById('disconnectDropdown').classList.remove('show');
    }

    async function connectInjected(name) {
      var raw = null;
      if (name === 'core' && (window.avalanche || (window.core && window.core.ethereum))) { raw = window.avalanche || window.core.ethereum; }
      else if (window.ethereum) {
        if (window.ethereum.providers && window.ethereum.providers.length) {
          for (var p of window.ethereum.providers) {
            if (name === 'rabby' && p.isRabby) { raw = p; break; }
            if (name === 'metamask' && p.isMetaMask && !p.isRabby) { raw = p; break; }
            if (name === 'core' && (p.isAvalanche || p.isCoreWallet)) { raw = p; break; }
          }
        }
        if (!raw) raw = window.ethereum;
      }
      if (!raw) { alert(name + ' wallet not detected.'); return; }
      try {
        var accounts = await raw.request({ method: 'eth_requestAccounts' });
        if (!accounts || accounts.length === 0) throw new Error('No accounts');
        await switchToAvalanche(raw);
        walletProvider = new ethers.providers.Web3Provider(raw);
        walletSigner = walletProvider.getSigner();
        onConnected(accounts[0]);
        raw.on('accountsChanged', function(a) { if (!a.length) onDisconnected(); else onConnected(a[0]); });
        raw.on('chainChanged', function() { window.location.reload(); });
      } catch(err) { if (err.code !== 4001) alert('Connection failed: ' + (err.message || err)); }
    }

    function loadWcScript() {
      if (window.WalletConnectEthereumProvider) return Promise.resolve();
      return new Promise(function(res, rej) { var s = document.createElement('script'); s.src = '../../assets/walletconnect-provider.js'; s.onload = res; s.onerror = function() { rej(new Error('WalletConnect load failed')); }; document.head.appendChild(s); });
    }

    async function connectWalletConnect() {
      try {
        await loadWcScript();
        var wc = await window.WalletConnectEthereumProvider.EthereumProvider.init({ projectId: WALLETCONNECT_PROJECT_ID, chains: [43113], showQrModal: true, rpcMap: { 43113: READ_RPC } });
        await wc.connect();
        walletProvider = new ethers.providers.Web3Provider(wc);
        walletSigner = walletProvider.getSigner();
        onConnected(await walletSigner.getAddress());
        wc.on('accountsChanged', function(a) { if (!a.length) onDisconnected(); else onConnected(a[0]); });
        wc.on('disconnect', onDisconnected);
      } catch(err) { alert('WalletConnect failed. Please try again.'); }
    }

    async function connectWallet(name) { if (name === 'walletconnect') { await connectWalletConnect(); return; } await connectInjected(name); }

    document.getElementById('walletBtn').addEventListener('click', function() { if (userAddress) document.getElementById('disconnectDropdown').classList.toggle('show'); else document.getElementById('walletModal').classList.add('show'); });
    document.getElementById('disconnectBtn').addEventListener('click', onDisconnected);
    document.getElementById('modalClose').addEventListener('click', function() { document.getElementById('walletModal').classList.remove('show'); });
    document.getElementById('walletModal').addEventListener('click', function(e) { if (e.target === document.getElementById('walletModal')) document.getElementById('walletModal').classList.remove('show'); });
    document.querySelectorAll('.wallet-option').forEach(function(b) { b.addEventListener('click', function() { document.getElementById('walletModal').classList.remove('show'); connectWallet(b.dataset.wallet); }); });
    document.addEventListener('click', function(e) { if (!e.target.closest('.wallet-wrapper')) document.getElementById('disconnectDropdown').classList.remove('show'); });

    // ===== QUEST COMPLETION TRACKING =====
    function getKey(tid) { return 'lc_q_' + QUEST_SLUG + '_' + tid; }
    function isQuestDone(tid) { return localStorage.getItem(getKey(tid)) === '1'; }
    function markQuestDone(tid) { localStorage.setItem(getKey(tid), '1'); }

    function checkQuestCompletion() {
      if (!chadId) return;
      var banner = document.getElementById('introCompletedBanner');
      var btn = document.getElementById('introStartBtn');
      var note = document.getElementById('introWalletNote');
      if (isQuestDone(chadId)) {
        document.getElementById('introCompletedId').textContent = chadId;
        if (banner) banner.style.display = 'block';
        if (btn) { btn.disabled = true; btn.textContent = 'COMPLETED'; }
        if (note) note.style.display = 'none';
      } else {
        if (banner) banner.style.display = 'none';
        if (btn) { btn.disabled = false; btn.textContent = 'START'; }
      }
    }
    checkQuestCompletion();

    // Auto-reconnect
    (async function() {
      var raw = window.ethereum || window.avalanche;
      if (!raw) return;
      try {
        var accs = await raw.request({ method: 'eth_accounts' });
        if (accs && accs.length > 0) { await switchToAvalanche(raw); walletProvider = new ethers.providers.Web3Provider(raw); walletSigner = walletProvider.getSigner(); onConnected(accs[0]); }
      } catch(e) {}
    })();

    // ===== CLAIM XP =====
    async function claimQuestXP() {
      var btn = document.getElementById('claimXpBtn');
      var statusEl = document.getElementById('claimXpStatus');
      if (!userAddress) { document.getElementById('walletModal').classList.add('show'); return; }
      if (!chadId) { if (statusEl) statusEl.textContent = 'Add ?chad=TOKEN_ID to URL to link your NFT.'; return; }
      if (isQuestDone(chadId)) { btn.disabled = true; btn.textContent = 'ALREADY CLAIMED'; return; }
      btn.disabled = true; btn.textContent = 'VERIFYING...';
      if (statusEl) statusEl.textContent = '';
      // Verify ownership
      try {
        var rp = new ethers.providers.JsonRpcProvider(READ_RPC);
        var rc = new ethers.Contract(CONTRACT_ADDRESS, LASTCHAD_ABI, rp);
        var owner = await rc.ownerOf(chadId);
        if (owner.toLowerCase() !== userAddress.toLowerCase()) {
          if (statusEl) statusEl.textContent = 'You do not own CHAD #' + chadId;
          btn.disabled = false; btn.textContent = 'CLAIM XP'; return;
        }
      } catch(e) { /* proceed */ }
      markQuestDone(chadId);
      btn.textContent = 'XP CLAIMED — CHAD #' + chadId;
      if (statusEl) statusEl.textContent = 'Score: ' + (typeof crewScore !== 'undefined' ? crewScore : 0) + ' pts recorded.';
      checkQuestCompletion();
      await checkAndShowLevelUp(chadId);
    }

    // ===== LEVEL-UP =====
    async function checkAndShowLevelUp(tokenId) {
      if (!tokenId || !userAddress) return;
      try {
        var rp = new ethers.providers.JsonRpcProvider(READ_RPC);
        var rc = new ethers.Contract(CONTRACT_ADDRESS, LASTCHAD_ABI, rp);
        var pending = await rc.getPendingStatPoints(tokenId);
        var pts = pending.toNumber ? pending.toNumber() : Number(pending);
        if (pts > 0) showLevelUpModal(tokenId, pts);
      } catch(e) { console.warn('Level-up check:', e); }
    }

    function showLevelUpModal(tokenId, pts) {
      _luPending = pts;
      document.getElementById('luPointsLeft').textContent = pts + ' POINT' + (pts !== 1 ? 'S' : '') + ' TO ASSIGN';
      document.getElementById('luTokenId').textContent = 'CHAD #' + tokenId;
      document.getElementById('luStatus').style.display = 'none';
      document.querySelectorAll('.lu-stat-btn').forEach(function(b) { b.disabled = false; });
      document.getElementById('levelUpModal').classList.add('show');
    }

    async function spendStatPoint(statIndex) {
      if (!userAddress || !chadId) return;
      var statusEl = document.getElementById('luStatus');
      statusEl.style.display = 'block'; statusEl.textContent = 'SIGNING...';
      document.querySelectorAll('.lu-stat-btn').forEach(function(b) { b.disabled = true; });
      try {
        var c = new ethers.Contract(CONTRACT_ADDRESS, LASTCHAD_ABI, walletSigner);
        var tx = await c.spendStatPoint(chadId, statIndex);
        statusEl.textContent = 'CONFIRMING...';
        await tx.wait();
        _luPending--;
        if (_luPending > 0) {
          document.getElementById('luPointsLeft').textContent = _luPending + ' POINT' + (_luPending !== 1 ? 'S' : '') + ' TO ASSIGN';
          statusEl.textContent = 'ASSIGNED! CHOOSE NEXT STAT.';
          document.querySelectorAll('.lu-stat-btn').forEach(function(b) { b.disabled = false; });
        } else {
          statusEl.textContent = 'ALL STATS ASSIGNED!';
          setTimeout(function() { document.getElementById('levelUpModal').classList.remove('show'); }, 1500);
        }
      } catch(err) {
        statusEl.textContent = err.code !== 4001 ? 'ERROR: ' + (err.reason || err.message || 'Failed') : 'CANCELLED';
        document.querySelectorAll('.lu-stat-btn').forEach(function(b) { b.disabled = false; });
      }
    }
  </script>
</body>
</html>

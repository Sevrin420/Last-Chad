<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Chad</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      overflow: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      margin: 0 auto;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }

    /* --- Buttons --- */
    .btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      font-size: clamp(0.7rem, 2.5vw, 1.4rem);
      letter-spacing: 2px;
      text-shadow:
        1px 1px 0 #000,
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        0 0 8px rgba(0, 0, 0, 0.6);
      border: 3px solid #8b6914;
      border-radius: 6px;
      transition: all 0.15s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    /* Gold/bronze medieval gradient */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #c9a84c 0%,
        #b8942d 15%,
        #a07d1e 40%,
        #8b6914 60%,
        #7a5c10 80%,
        #5c4409 100%
      );
      z-index: 0;
      transition: all 0.15s ease;
      pointer-events: none;
    }

    /* Shine sweep on hover */
    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      z-index: 1;
      transition: none;
      pointer-events: none;
    }

    .btn span {
      position: relative;
      z-index: 2;
    }

    /* Inner bevel highlight */
    .btn {
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 8px rgba(0, 0, 0, 0.5),
        0 0 0 1px #5c4409;
    }

    /* --- Hover --- */
    .btn:hover {
      border-color: #c9a84c;
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(201, 168, 76, 0.4),
        0 0 0 1px #8b6914;
    }

    .btn:hover::before {
      background: linear-gradient(
        180deg,
        #dabb5e 0%,
        #c9a84c 15%,
        #b8942d 40%,
        #a07d1e 60%,
        #8b6914 80%,
        #6b5010 100%
      );
    }

    .btn:hover::after {
      left: 120%;
      transition: left 0.5s ease;
    }

    /* --- Active / Click --- */
    .btn:active {
      transform: scale(0.95);
      border-color: #ffcc33;
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.5),
        inset 0 -1px 0 rgba(255, 220, 120, 0.2),
        0 1px 4px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(255, 200, 50, 0.5),
        0 0 40px rgba(255, 200, 50, 0.2);
    }

    .btn:active::before {
      background: linear-gradient(
        180deg,
        #7a5c10 0%,
        #8b6914 30%,
        #a07d1e 50%,
        #b8942d 70%,
        #c9a84c 100%
      );
    }

    /* --- Ripple animation on click --- */
    @keyframes ripple {
      0% {
        transform: scale(0);
        opacity: 0.6;
      }
      100% {
        transform: scale(4);
        opacity: 0;
      }
    }

    .enter-btn .ripple-effect {
      background: radial-gradient(circle, rgba(200, 200, 220, 0.6), transparent);
    }

    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 120, 0.6), transparent);
      width: 50px;
      height: 50px;
      pointer-events: none;
      z-index: 3;
      animation: ripple 0.6s ease-out forwards;
    }

    /* --- Enter button silver override --- */
    .enter-btn {
      border-color: #8a8a8a;
    }

    .enter-btn::before {
      background: linear-gradient(
        180deg,
        #c0c0c0 0%,
        #a8a8a8 15%,
        #909090 40%,
        #787878 60%,
        #686868 80%,
        #505050 100%
      );
    }

    .enter-btn {
      box-shadow:
        inset 0 2px 0 rgba(220, 220, 240, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 8px rgba(0, 0, 0, 0.5),
        0 0 0 1px #505050;
    }

    .enter-btn:hover {
      border-color: #c0c0c0;
      box-shadow:
        inset 0 2px 0 rgba(220, 220, 240, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(180, 180, 200, 0.4),
        0 0 0 1px #8a8a8a;
    }

    .enter-btn:hover::before {
      background: linear-gradient(
        180deg,
        #d4d4d4 0%,
        #c0c0c0 15%,
        #a8a8a8 40%,
        #909090 60%,
        #787878 80%,
        #606060 100%
      );
    }

    .enter-btn:active {
      border-color: #e0e0e0;
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.5),
        inset 0 -1px 0 rgba(220, 220, 240, 0.2),
        0 1px 4px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(200, 200, 220, 0.5),
        0 0 40px rgba(200, 200, 220, 0.2);
    }

    .enter-btn:active::before {
      background: linear-gradient(
        180deg,
        #606060 0%,
        #787878 30%,
        #909090 50%,
        #a8a8a8 70%,
        #c0c0c0 100%
      );
    }

    /* --- Button positions --- */
    .mint-btn {
      left: 7%;
      top: 72%;
      width: 36%;
      height: 8%;
    }

    .enter-btn {
      left: 55%;
      top: 72%;
      width: 36%;
      height: 8%;
    }

    /* --- Nav menu --- */
    .nav-wrapper {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 50;
    }

    .nav-toggle {
      width: 44px;
      height: 44px;
      background: rgba(10, 10, 15, 0.75);
      border: 2px solid #5c4409;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      backdrop-filter: blur(6px);
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .nav-toggle:hover {
      border-color: #c9a84c;
      background: rgba(30, 22, 8, 0.85);
    }

    .nav-toggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: #c9a84c;
      border-radius: 1px;
      transition: all 0.2s;
    }

    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: linear-gradient(180deg, rgba(30, 22, 8, 0.95) 0%, rgba(20, 15, 5, 0.98) 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
      min-width: 160px;
      overflow: hidden;
    }

    .nav-dropdown.show { display: block; }

    .nav-link {
      display: block;
      padding: 14px 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: #f5e6c8;
      text-decoration: none;
      transition: all 0.15s;
      border-bottom: 1px solid #3d2e0a;
    }

    .nav-link:last-child { border-bottom: none; }

    .nav-link:hover {
      background: rgba(92, 68, 9, 0.3);
      color: #c9a84c;
    }

    .nav-link.active {
      color: #c9a84c;
      background: rgba(92, 68, 9, 0.15);
    }
  </style>
</head>
<body>
  <div class="landing">
    <img src="assets/last_chad_background.jpg" alt="Last Chad" class="hero-image">

    <!-- Nav menu -->
    <div class="nav-wrapper">
      <button class="nav-toggle" id="navToggle">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-dropdown" id="navDropdown">
        <a href="mint.html" class="nav-link">MINT</a>
        <a href="enter.html" class="nav-link">ENTER</a>
        <a href="docs.html" class="nav-link">DOCS</a>
      </div>
    </div>

    <a href="mint.html" class="btn mint-btn" aria-label="Mint"><span>Mint</span></a>
    <a href="enter.html" class="btn enter-btn" aria-label="Enter"><span>Enter</span></a>
  </div>

  <script>
    try {
      // Nav menu toggle
      var navToggle = document.getElementById('navToggle');
      var navDropdown = document.getElementById('navDropdown');
      navToggle.addEventListener('click', function() {
        navToggle.classList.toggle('open');
        navDropdown.classList.toggle('show');
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-wrapper')) {
          navToggle.classList.remove('open');
          navDropdown.classList.remove('show');
        }
      });

      document.querySelectorAll('.btn').forEach(function(btn) {
        btn.addEventListener('click', function (e) {
          try {
            var ripple = document.createElement('div');
            ripple.classList.add('ripple-effect');
            var rect = this.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left - 25) + 'px';
            ripple.style.top = (e.clientY - rect.top - 25) + 'px';
            this.appendChild(ripple);
            setTimeout(function() { ripple.remove(); }, 700);
          } catch(err) {}
        });
      });
    } catch(err) {}
  </script>
</body>
</html>

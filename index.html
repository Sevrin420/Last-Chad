<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Pit Fighters</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'MedievalSharp', cursive, serif;
      overflow: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.3) 0%,
        rgba(0, 0, 0, 0.1) 40%,
        rgba(0, 0, 0, 0.5) 85%,
        rgba(0, 0, 0, 0.8) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 40px 20px 60px;
      width: 100%;
      max-width: 700px;
    }

    .title {
      text-align: center;
      margin-top: 20px;
    }

    .title h1 {
      font-size: clamp(3rem, 10vw, 5.5rem);
      color: #f5e6c8;
      text-shadow:
        3px 3px 0px #2a1a0a,
        -1px -1px 0px #2a1a0a,
        1px -1px 0px #2a1a0a,
        -1px 1px 0px #2a1a0a,
        0 0 20px rgba(255, 200, 100, 0.3);
      line-height: 1.1;
      letter-spacing: 2px;
    }

    .spacer {
      flex: 1;
    }

    .buttons {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 18px 50px;
      font-size: 1.5rem;
      font-family: 'MedievalSharp', cursive, serif;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.2s ease;
      position: relative;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      min-width: 180px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-mint {
      background: linear-gradient(180deg, #4caf50 0%, #2e7d32 50%, #1b5e20 100%);
      box-shadow:
        0 4px 0 #1a4d1e,
        0 6px 15px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-mint:hover {
      background: linear-gradient(180deg, #66bb6a 0%, #43a047 50%, #2e7d32 100%);
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 #1a4d1e,
        0 8px 20px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .btn-mint:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 #1a4d1e,
        0 3px 8px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .btn-enter {
      background: linear-gradient(180deg, #f44336 0%, #c62828 50%, #8e0000 100%);
      box-shadow:
        0 4px 0 #5d0000,
        0 6px 15px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-enter:hover {
      background: linear-gradient(180deg, #ef5350 0%, #e53935 50%, #c62828 100%);
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 #5d0000,
        0 8px 20px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .btn-enter:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 #5d0000,
        0 3px 8px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 480px) {
      .buttons {
        flex-direction: column;
        gap: 20px;
      }

      .btn {
        padding: 15px 40px;
        font-size: 1.3rem;
        min-width: 160px;
      }

      .content {
        padding: 30px 15px 40px;
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <img src="assets/hero.png" alt="Fantasy Pit Fighters - Pixel art arena with knight, elf, and orc fighters" class="hero-image">
    <div class="overlay"></div>
    <div class="content">
      <div class="title">
        <h1>Fantasy<br>Pit Fighters</h1>
      </div>
      <div class="spacer"></div>
      <div class="buttons">
        <button class="btn btn-mint">Mint</button>
        <button class="btn btn-enter">Enter</button>
      </div>
    </div>
  </div>
</body>
</html>

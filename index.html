<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Chad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      overflow: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      margin: 0 auto;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }

    /* --- Buttons --- */
    .btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      font-size: clamp(0.7rem, 2.5vw, 1.4rem);
      letter-spacing: 2px;
      text-shadow:
        1px 1px 0 #000,
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        0 0 8px rgba(0, 0, 0, 0.6);
      border: 4px solid #8b6914;
      border-radius: 0;
      transition: all 0.15s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    /* Gold/bronze medieval gradient */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #c9a84c 0%,
        #b8942d 15%,
        #a07d1e 40%,
        #8b6914 60%,
        #7a5c10 80%,
        #5c4409 100%
      );
      z-index: 0;
      transition: all 0.15s ease;
      pointer-events: none;
    }

    /* Shine sweep on hover */
    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      z-index: 1;
      transition: none;
      pointer-events: none;
    }

    .btn span {
      position: relative;
      z-index: 2;
    }

    /* Inner bevel highlight */
    .btn {
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #5c4409,
        0 6px 0 #3d2e0a,
        0 8px 15px rgba(0, 0, 0, 0.6);
    }

    /* --- Hover --- */
    .btn:hover {
      border-color: #c9a84c;
      box-shadow:
        inset 0 2px 0 rgba(255, 220, 120, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        0 4px 0 #6b5010,
        0 6px 0 #5c4409,
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(201, 168, 76, 0.4);
    }

    .btn:hover::before {
      background: linear-gradient(
        180deg,
        #dabb5e 0%,
        #c9a84c 15%,
        #b8942d 40%,
        #a07d1e 60%,
        #8b6914 80%,
        #6b5010 100%
      );
    }

    .btn:hover::after {
      left: 120%;
      transition: left 0.5s ease;
    }

    /* --- Active / Click --- */
    .btn:active {
      transform: translateY(4px);
      border-color: #ffcc33;
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.5),
        inset 0 -1px 0 rgba(255, 220, 120, 0.2),
        0 1px 0 #5c4409,
        0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(255, 200, 50, 0.5);
    }

    .btn:active::before {
      background: linear-gradient(
        180deg,
        #7a5c10 0%,
        #8b6914 30%,
        #a07d1e 50%,
        #b8942d 70%,
        #c9a84c 100%
      );
    }

    /* --- Ripple animation on click --- */
    @keyframes ripple {
      0% {
        transform: scale(0);
        opacity: 0.6;
      }
      100% {
        transform: scale(4);
        opacity: 0;
      }
    }

    .enter-btn .ripple-effect {
      background: radial-gradient(circle, rgba(200, 200, 220, 0.6), transparent);
    }

    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 120, 0.6), transparent);
      width: 50px;
      height: 50px;
      pointer-events: none;
      z-index: 3;
      animation: ripple 0.6s ease-out forwards;
    }

    /* --- Enter button silver override --- */
    .enter-btn {
      border-color: #8a8a8a;
      border-width: 4px;
    }

    .enter-btn::before {
      background: linear-gradient(
        180deg,
        #c0c0c0 0%,
        #a8a8a8 15%,
        #909090 40%,
        #787878 60%,
        #686868 80%,
        #505050 100%
      );
    }

    .enter-btn {
      box-shadow:
        inset 0 2px 0 rgba(220, 220, 240, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 4px 0 #505050,
        0 6px 0 #3a3a3a,
        0 8px 15px rgba(0, 0, 0, 0.6);
    }

    .enter-btn:hover {
      border-color: #c0c0c0;
      box-shadow:
        inset 0 2px 0 rgba(220, 220, 240, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        0 4px 0 #606060,
        0 6px 0 #505050,
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(180, 180, 200, 0.4);
    }

    .enter-btn:hover::before {
      background: linear-gradient(
        180deg,
        #d4d4d4 0%,
        #c0c0c0 15%,
        #a8a8a8 40%,
        #909090 60%,
        #787878 80%,
        #606060 100%
      );
    }

    .enter-btn:active {
      transform: translateY(4px);
      border-color: #e0e0e0;
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.5),
        inset 0 -1px 0 rgba(220, 220, 240, 0.2),
        0 1px 0 #505050,
        0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(200, 200, 220, 0.5);
    }

    .enter-btn:active::before {
      background: linear-gradient(
        180deg,
        #606060 0%,
        #787878 30%,
        #909090 50%,
        #a8a8a8 70%,
        #c0c0c0 100%
      );
    }

    /* --- Button positions --- */
    .mint-btn {
      left: 7%;
      top: 72%;
      width: 36%;
      height: 8%;
    }

    .enter-btn {
      left: 55%;
      top: 72%;
      width: 36%;
      height: 8%;
    }

    /* index.html: nav positioned over the hero image */
    .nav-wrapper { position: absolute; top: 12px; left: 12px; z-index: 50; }
  </style>
</head>
<body>
  <div class="landing">
    <img src="assets/last_chad_background.jpg" alt="Last Chad" class="hero-image">

    <!-- Nav menu -->
    <div id="nav-placeholder"></div>

    <a href="mint.html" class="btn mint-btn" aria-label="Mint"><span>Mint</span></a>
    <a href="enter.html" class="btn enter-btn" aria-label="Enter"><span>Enter</span></a>
  </div>

  <script>
    try {
      document.querySelectorAll('.btn').forEach(function(btn) {
        btn.addEventListener('click', function (e) {
          try {
            var ripple = document.createElement('div');
            ripple.classList.add('ripple-effect');
            var rect = this.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left - 25) + 'px';
            ripple.style.top = (e.clientY - rect.top - 25) + 'px';
            this.appendChild(ripple);
            setTimeout(function() { ripple.remove(); }, 700);
          } catch(err) {}
        });
      });
    } catch(err) {}
  </script>
  <script src="nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Pit Fighters</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
    }

    .landing {
      position: relative;
      width: 100%;
      margin: 0 auto;
    }

    .hero-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .click-area {
      position: absolute;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    .click-area:hover {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
    }

    .mint-btn {
      left: 7%;
      top: 85%;
      width: 36%;
      height: 9%;
    }

    .enter-btn {
      left: 55%;
      top: 85%;
      width: 36%;
      height: 9%;
    }
  </style>
</head>
<body>
  <div class="landing">
    <img src="assets/Picsart_26-02-06_20-37-20-976.jpg" alt="Fantasy Pit Fighters" class="hero-image">
    <a href="#mint" class="click-area mint-btn" aria-label="Mint"></a>
    <a href="#enter" class="click-area enter-btn" aria-label="Enter"></a>
  </div>
</body>
</html>

name = "last-chad-runner"
main = "runner-worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "RUNNER_KV"
id = "cbe3ee818c794fe78435aaf92c86d75b"
preview_id = "9b1944233e4d44f7a55389daf3048e67"

[vars]
LASTCHAD_ADDRESS      = "0x04DFED6F15866125b1f6d140bcb1AB90F7614252"
QUEST_REWARDS_ADDRESS = "0x1f3A741A5169B002C8F7563C7cD11a3081cD1E4B"
GAMBLE_ADDRESS        = "0x42Ae979c86cF4868F8648A1eec16567CbBF19698"
READ_RPC              = "https://api.avax-test.network/ext/bc/C/rpc"
GAME_BASE_URL         = "https://lastchad.xyz"
AGORA_APP_ID          = "7917341a0c9c46a08328cc9a33989d75"

# Secrets — never put these here. Set them with wrangler secret put:
#   npx wrangler secret put ORACLE_PRIVATE_KEY
#   npx wrangler secret put AGORA_APP_CERT
# Then derive the oracle address and call QuestRewards.setOracle(address).
#
# To create the KV namespace:
#   npx wrangler kv:namespace create RUNNER_KV
#   npx wrangler kv:namespace create RUNNER_KV --preview
# Then paste the returned IDs above.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Died — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      padding: 24px;
    }
    #died-img {
      max-width: min(90vw, 600px);
      max-height: 60vh;
      object-fit: contain;
      display: block;
      margin-bottom: 32px;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #died-img.loaded { opacity: 1; }
    #died-text {
      color: #c0392b;
      font-size: clamp(0.55rem, 2vw, 0.85rem);
      line-height: 2;
      opacity: 0;
      transition: opacity 1s ease 0.8s;
    }
    #died-text.show { opacity: 1; }
    #redirect-msg {
      margin-top: 20px;
      color: #555;
      font-size: clamp(0.4rem, 1.4vw, 0.55rem);
      opacity: 0;
      transition: opacity 0.8s ease 1.8s;
    }
    #redirect-msg.show { opacity: 1; }
    @media (min-width: 900px) {
      html { background: #050508; }
      body {
        max-width: min(56vh, 500px);
        margin-left: auto;
        margin-right: auto;
        border-left: 1px solid rgba(92, 68, 9, 0.25);
        border-right: 1px solid rgba(92, 68, 9, 0.25);
        box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
      }
    }
  </style>
</head>
<body>
  <img
    id="died-img"
    src="https://raw.githubusercontent.com/Sevrin420/Last-Chad/master/assets/died.jpg"
    alt="You Died"
    onload="this.classList.add('loaded')"
    onerror="this.classList.add('loaded')"
  />
  <div id="died-text">Thank you for playing Last Chad.</div>
  <div id="redirect-msg">Redirecting to market...</div>

  <script>
    var text = document.getElementById('died-text');
    var msg  = document.getElementById('redirect-msg');

    // Reveal text & redirect notice (CSS transitions handle timing)
    setTimeout(function() { text.classList.add('show'); }, 200);
    setTimeout(function() { msg.classList.add('show'); }, 200);

    // Redirect to market after 4 seconds
    setTimeout(function() {
      window.location.href = 'market.html';
    }, 4000);
  </script>
</body>
</html>

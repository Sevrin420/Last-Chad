<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ol' Jipt's Gamble — Last Chad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background-image: url('assets/mainbg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Press Start 2P', monospace;
      color: #ffe96a;
    }

    /* ── Jipt portrait image ── */
    #jipt-image {
      position: fixed;
      bottom: 43vh;
      left: 50%;
      transform: translateX(-50%);
      max-height: 52vh;
      max-width: 88vw;
      object-fit: contain;
      z-index: 50;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #jipt-image.visible { opacity: 1; }

    /* ── Enter The Den overlay ── */
    #enter-overlay {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      transition: opacity 0.8s ease;
    }
    #enter-overlay.hidden { opacity: 0; pointer-events: none; }

    #enter-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.8rem, 2.5vw, 1.2rem);
      color: #ffaa40;
      background: rgba(10, 10, 15, 0.75);
      border: 2px solid #ffaa40;
      padding: 1.2em 2em; cursor: pointer;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px #ffaa40, 0 0 24px rgba(255,150,30,0.5);
      box-shadow: 0 0 20px rgba(255,150,30,0.3), inset 0 0 20px rgba(255,150,30,0.05);
      animation: den-pulse 2s ease-in-out infinite;
      transition: transform 0.15s ease;
      outline: none;
      text-decoration: none;
    }
    #enter-btn:hover { transform: scale(1.06); }
    @keyframes den-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,150,30,0.3), inset 0 0 20px rgba(255,150,30,0.05); }
      50%       { box-shadow: 0 0 40px rgba(255,150,30,0.6), inset 0 0 30px rgba(255,150,30,0.12); }
    }

    /* ── Header ── */
    .game-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10, 10, 15, 0.9);
      border-bottom: 2px solid #3d2e0a;
      backdrop-filter: blur(8px);
    }

    /* ── Wallet button ── */
    .wallet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 18px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255, 220, 120, 0.4), 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .wallet-btn:hover {
      background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%);
      box-shadow: inset 0 1px 0 rgba(255, 220, 120, 0.5), 0 2px 10px rgba(201, 168, 76, 0.4);
    }
    .wallet-btn.connected {
      background: linear-gradient(180deg, #a07820 0%, #6b4f10 100%);
      border-color: #c9a84c;
      color: #ffe96a;
      font-size: 0.5rem;
    }
    .wallet-wrapper { position: relative; }
    .disconnect-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 110;
      min-width: 160px;
    }
    .disconnect-dropdown.show { display: block; }
    .disconnect-btn {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #e53935;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .disconnect-btn:hover { background: rgba(229, 57, 53, 0.15); }

    /* ── Wallet Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 3px solid #5c4409;
      border-radius: 8px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 105, 20, 0.15);
    }
    .modal-title {
      font-size: 0.7rem;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 24px;
    }
    .wallet-option {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #f5e6c8;
      background: rgba(61, 46, 10, 0.3);
      border: 2px solid #3d2e0a;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .wallet-option:hover {
      border-color: #8b6914;
      background: rgba(92, 68, 9, 0.3);
      box-shadow: 0 0 10px rgba(139, 105, 20, 0.2);
    }
    .wallet-option:active { transform: scale(0.97); }
    .wallet-icon {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .modal-close {
      display: block;
      margin: 16px auto 0;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #5c4409;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .modal-close:hover { color: #c9a84c; }

    /* ── Dialogue box — bottom section ── */
    #dialogue-box {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 42vh; z-index: 100;
      background: linear-gradient(180deg, rgba(15,10,5,0.92) 0%, rgba(10,8,4,0.98) 100%);
      border-top: 2px solid #c9a84c;
      display: flex; flex-direction: column;
      padding: 1.5em 2em; overflow: hidden;
      opacity: 0; pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #dialogue-box.visible {
      opacity: 1; pointer-events: auto;
      transform: translateY(0);
    }

    #dialogue-text {
      flex: 1; overflow-y: auto;
      font-size: 0.65rem;
      line-height: 2.2;
      color: #c9a84c;
    }

    #dialogue-text .npc-name {
      color: #e8c060; font-size: 0.7rem;
      margin-bottom: 0.4em; display: block;
    }

    /* ── Choice buttons ── */
    #choices {
      display: flex; flex-direction: column; gap: 10px;
      align-items: center; margin-top: 0.8em;
    }
    .choice-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.55rem, 1.5vw, 0.65rem);
      color: #0a0a0f;
      background: #c9a84c;
      border: none;
      border-bottom: 5px solid #7a6020;
      border-right: 5px solid #7a6020;
      padding: 14px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .choice-btn:hover {
      background: #e8c060;
      border-color: #5c4409;
    }
    .choice-btn:active {
      border-bottom-width: 2px;
      border-right-width: 2px;
      transform: translate(3px, 3px);
    }

    /* ── NFT selection grid ── */
    #nft-grid {
      display: flex; gap: 0.8em; flex-wrap: wrap;
      justify-content: center; margin-top: 0.6em;
      max-height: 18vh; overflow-y: auto;
    }
    .nft-card {
      width: 80px; height: 100px; border: 2px solid #555;
      border-radius: 6px; cursor: pointer; position: relative;
      overflow: hidden; transition: all 0.2s ease;
      background: rgba(0,0,0,0.5);
    }
    .nft-card img {
      width: 100%; height: 70%; object-fit: cover;
      image-rendering: pixelated;
    }
    .nft-card .nft-id {
      font-size: 0.4rem; text-align: center;
      padding: 2px; color: #ffe96a;
    }
    .nft-card:hover { border-color: #ffaa40; transform: scale(1.06); }
    .nft-card.selected {
      border-color: #ffaa40;
      box-shadow: 0 0 14px rgba(255,170,64,0.5);
    }

    /* ── Selected Chad display ── */
    #selected-chad {
      display: flex; align-items: center; gap: 1.2em;
      margin-top: 0.6em;
    }
    #selected-chad img {
      width: 90px; height: 90px; border: 2px solid #c9a84c;
      border-radius: 6px; image-rendering: pixelated;
      object-fit: cover;
    }
    #chad-info {
      font-size: clamp(0.5rem, 1.2vw, 0.65rem);
      line-height: 2.2;
    }
    #chad-info .cells-count {
      color: #c9a84c;
      font-size: clamp(0.6rem, 1.4vw, 0.75rem);
    }

    /* ── Wager slider ── */
    #wager-section {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5em; margin-top: 0.6em;
    }
    #wager-label {
      font-size: clamp(0.5rem, 1.2vw, 0.65rem);
      color: #ffaa40;
    }
    #wager-slider {
      width: 60%; max-width: 400px;
      accent-color: #ffaa40;
    }
    #wager-amount {
      font-size: clamp(0.65rem, 1.6vw, 0.85rem);
      color: #ffe96a;
    }

    /* ── Video overlay ── */
    #video-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.95);
      align-items: center; justify-content: center;
    }
    #video-overlay.active { display: flex; }
    #video-overlay video {
      max-width: 80vw; max-height: 70vh;
      border: 2px solid #c9a84c;
    }

    /* ── Result text ── */
    #result-overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.9);
    }
    #result-overlay.active { display: flex; }
    #result-text {
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      animation: result-pulse 0.6s ease-in-out infinite alternate;
    }
    #result-text.win { color: #6dffaa; }
    #result-text.lose { color: #e53935; }
    @keyframes result-pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    /* ── Loading spinner ── */
    .loading {
      color: #ffaa40; font-size: 0.6rem;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Mute button ── */
    #mute-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 8px 12px;
      background: rgba(10,10,15,0.7);
      border: 1px solid #3d2e0a;
      border-radius: 4px;
      color: #c9a84c;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #mute-btn:hover { border-color: #c9a84c; }

    /* ── Nav ── */
    .nav-wrapper { position: static; }
  </style>
</head>
<body>

  <img id="jipt-image" src="assets/Oldjipt/oldjiptcoin.jpg" alt="" />

  <!-- Enter The Den overlay -->
  <div id="enter-overlay">
    <button id="enter-btn">ENTER THE DEN</button>
  </div>

  <!-- Background music -->
  <audio id="bg-music" src="music/moody.mp3" loop></audio>

  <!-- Header -->
  <header class="game-header">
    <div id="nav-placeholder"></div>
    <button id="mute-btn">🔊</button>
    <div class="wallet-wrapper">
      <button class="wallet-btn" id="walletBtn">Connect Wallet</button>
      <div class="disconnect-dropdown" id="disconnectDropdown">
        <button class="disconnect-btn" id="disconnectBtn">DISCONNECT</button>
      </div>
    </div>
  </header>

  <!-- Dialogue -->
  <div id="dialogue-box">
    <div id="dialogue-text"></div>
    <div id="choices"></div>
  </div>

  <!-- Video overlay -->
  <div id="video-overlay">
    <video id="flip-video" playsinline muted>
      <source src="assets/Oldjipt/oldjiptvid.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Result overlay -->
  <div id="result-overlay">
    <div id="result-text"></div>
  </div>

  <!-- Sound effects -->
  <audio id="sfx-win" src="sound effects/youwin.wav" preload="auto"></audio>
  <audio id="sfx-lose" src="sound effects/youlose.wav" preload="auto"></audio>

  <!-- Wallet Modal -->
  <div class="modal-overlay" id="walletModal">
    <div class="modal">
      <h2 class="modal-title">Connect Wallet</h2>
      <button class="wallet-option" data-wallet="rabby">
        <span class="wallet-icon" style="background:#7c6be6;">&#128176;</span>
        Rabby
      </button>
      <button class="wallet-option" data-wallet="walletconnect">
        <span class="wallet-icon" style="background:#3b99fc;">&#128279;</span>
        WalletConnect
      </button>
      <button class="modal-close" id="modalClose">CANCEL</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script type="module">
    import { connectWallet, autoReconnect, disconnect,
             getSigner, truncateAddress } from './js/wallet.js';
    import { CONTRACT_ADDRESS, LASTCHAD_ABI, READ_RPC, GAMBLE_ADDRESS, GAMBLE_ABI } from './js/config.js';

    // ── Music & Enter ──
    const jiptImage  = document.getElementById('jipt-image');
    const bgMusic    = document.getElementById('bg-music');
    const enterOverlay = document.getElementById('enter-overlay');
    const dialogueBox = document.getElementById('dialogue-box');
    bgMusic.volume = 0.45;
    let hasEntered = false;

    const muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', () => {
      bgMusic.muted = !bgMusic.muted;
      muteBtn.textContent = bgMusic.muted ? '🔇' : '🔊';
    });

    document.getElementById('enter-btn').addEventListener('click', async () => {
      enterOverlay.classList.add('hidden');
      bgMusic.play().catch(() => {});
      hasEntered = true;

      // Fade in jipt image immediately
      jiptImage.classList.add('visible');

      // Show dialogue
      await delay(900);
      dialogueBox.classList.add('visible');
      await delay(400);
      showIntro();
    });

    function duckMusic(targetVol = 0.08, ms = 400) {
      const step = (bgMusic.volume - targetVol) / (ms / 30);
      const t = setInterval(() => {
        bgMusic.volume = Math.max(targetVol, +(bgMusic.volume - step).toFixed(3));
        if (bgMusic.volume <= targetVol) clearInterval(t);
      }, 30);
    }

    function restoreMusic(targetVol = 0.45, ms = 800) {
      const step = (targetVol - bgMusic.volume) / (ms / 30);
      const t = setInterval(() => {
        bgMusic.volume = Math.min(targetVol, +(bgMusic.volume + step).toFixed(3));
        if (bgMusic.volume >= targetVol) clearInterval(t);
      }, 30);
    }

    // ── State ──
    let selectedTokenId = null;
    let selectedCells   = 0;
    let wagerAmount     = 0;

    const CONTRACT_ABI = LASTCHAD_ABI;

    // ── DOM refs ──
    const dialogueText      = document.getElementById('dialogue-text');
    const choicesDiv        = document.getElementById('choices');
    const walletBtn         = document.getElementById('walletBtn');
    const walletModal       = document.getElementById('walletModal');
    const modalClose        = document.getElementById('modalClose');
    const disconnectDropdown = document.getElementById('disconnectDropdown');
    const disconnectBtn     = document.getElementById('disconnectBtn');

    let userAddress = null;

    function onConnected(addr) {
      userAddress = addr;
      walletBtn.textContent = truncateAddress(addr);
      walletBtn.classList.add('connected');
      walletModal.classList.remove('show');
      if (hasEntered) showIntro();
    }

    function onDisconnected() {
      userAddress = null;
      walletBtn.textContent = 'Connect Wallet';
      walletBtn.classList.remove('connected');
    }

    // ── Wallet modal events ──
    walletBtn.addEventListener('click', () => {
      if (userAddress) { disconnectDropdown.classList.toggle('show'); return; }
      walletModal.classList.add('show');
    });

    disconnectBtn.addEventListener('click', () => {
      disconnectDropdown.classList.remove('show');
      disconnect(onDisconnected);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.wallet-wrapper')) disconnectDropdown.classList.remove('show');
    });

    modalClose.addEventListener('click', () => walletModal.classList.remove('show'));
    walletModal.addEventListener('click', (e) => {
      if (e.target === walletModal) walletModal.classList.remove('show');
    });

    document.querySelectorAll('.wallet-option').forEach(opt => {
      opt.addEventListener('click', () => {
        walletModal.classList.remove('show');
        connectWallet(opt.dataset.wallet, { onConnected, onDisconnected });
      });
    });

    // ── Typewriter ──
    function typewrite(el, text, speed = 40) {
      return new Promise(resolve => {
        let i = 0;
        el.textContent = '';
        const timer = setInterval(() => {
          el.textContent += text[i];
          i++;
          if (i >= text.length) { clearInterval(timer); resolve(); }
        }, speed);
      });
    }

    // ── Dialogue helpers ──
    function clearDialogue() {
      dialogueText.innerHTML = '';
      choicesDiv.innerHTML = '';
    }

    async function showNpcText(lines) {
      clearDialogue();
      for (const line of lines) {
        const p = document.createElement('p');
        dialogueText.appendChild(p);
        await typewrite(p, line, 35);
        await delay(300);
      }
    }

    function showChoices(options) {
      choicesDiv.innerHTML = '';
      for (const opt of options) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', opt.action);
        choicesDiv.appendChild(btn);
      }
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── Flow: Intro ──
    async function showIntro() {
      await showNpcText([
        "So you've come to see ol' Jipt eh?",
        "How's about we play a game o' chance?"
      ]);
      showChoices([
        { label: "Let's flip old man", action: startCoinFlip },
        { label: "Let's shoot dice ya crazy bastard", action: () => {
          clearDialogue();
          const p = document.createElement('p');
          p.style.color = '#ffaa40';
          p.textContent = "Dice comin' soon... pick a flip for now!";
          dialogueText.appendChild(p);
          showChoices([
            { label: "Let's flip old man", action: startCoinFlip },
          ]);
        }}
      ]);
    }

    // ── Flow: Select NFT ──
    let _minWager = 1;
    let _maxWager = 50;

    async function startCoinFlip() {
      clearDialogue();
      const addr = userAddress;
      if (!addr) {
        const p = document.createElement('p');
        p.textContent = 'Connect your wallet first!';
        p.style.color = '#e53935';
        dialogueText.appendChild(p);
        return;
      }

      const loadMsg = document.createElement('p');
      loadMsg.className = 'loading';
      loadMsg.textContent = 'Loading your Chads...';
      dialogueText.appendChild(loadMsg);

      // Fetch owned NFTs
      const readProvider = new ethers.providers.JsonRpcProvider(READ_RPC);
      const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, readProvider);
      const gambleRead = new ethers.Contract(GAMBLE_ADDRESS, GAMBLE_ABI, readProvider);

      // Check that Gamble is authorized in LastChad — if not, flip() will always revert
      try {
        const authorized = await contract.authorizedGame(GAMBLE_ADDRESS);
        if (!authorized) {
          loadMsg.textContent = '';
          loadMsg.remove();
          const p = document.createElement('p');
          p.style.color = '#e53935';
          p.textContent = "The gambling den is closed for maintenance. Check back soon!";
          dialogueText.appendChild(p);
          console.error('Gamble contract not authorized in LastChad. Owner must call setGameContract(GAMBLE_ADDRESS, true).');
          return;
        }
      } catch (e) { /* RPC issue — proceed anyway */ }

      // Fetch on-chain wager limits so the slider is always in range
      try {
        _minWager = (await gambleRead.minWager()).toNumber();
        _maxWager = (await gambleRead.maxWager()).toNumber();
      } catch (e) { /* use defaults */ }

      let totalSupply;
      try {
        totalSupply = (await contract.totalSupply()).toNumber();
      } catch (e) {
        loadMsg.textContent = 'Error loading NFTs: ' + e.message;
        loadMsg.style.color = '#e53935';
        return;
      }

      const ownedTokens = [];
      for (let id = 1; id <= totalSupply; id++) {
        try {
          const owner = await contract.ownerOf(id);
          if (owner.toLowerCase() === addr.toLowerCase()) {
            const cells = (await contract.getCells(id)).toNumber();
            ownedTokens.push({ id, cells });
          }
        } catch (e) { /* burned or error */ }
      }

      loadMsg.remove();

      if (ownedTokens.length === 0) {
        const p = document.createElement('p');
        p.textContent = "You don't own any Chads! Go mint one first.";
        p.style.color = '#e53935';
        dialogueText.appendChild(p);
        return;
      }

      if (ownedTokens.every(t => t.cells <= 0)) {
        await showNpcText(["Heh, what is this a charity house? Get the fack outta here."]);
        showChoices([{ label: "Leave", action: () => { window.location.href = 'chadbase.html'; } }]);
        return;
      }

      const prompt = document.createElement('p');
      await typewrite(prompt, "Pick your Chad, brave soul...", 35);
      dialogueText.appendChild(prompt);

      // Show NFT grid
      const grid = document.createElement('div');
      grid.id = 'nft-grid';
      dialogueText.appendChild(grid);

      for (const token of ownedTokens) {
        const card = document.createElement('div');
        card.className = 'nft-card';
        card.innerHTML = `
          <img src="assets/chads/${token.id}.png" alt="Chad #${token.id}" />
          <div class="nft-id">#${token.id} (${token.cells} cells)</div>
        `;
        card.addEventListener('click', () => selectChad(token, ownedTokens));
        grid.appendChild(card);
      }
    }

    // ── Flow: Chad selected → show wager ──
    async function selectChad(token, allTokens) {
      selectedTokenId = token.id;
      selectedCells = token.cells;

      // Highlight selected card
      document.querySelectorAll('.nft-card').forEach((c, i) => {
        c.classList.toggle('selected', allTokens[i].id === token.id);
      });

      // Remove old selected-chad and wager sections
      const oldSel = document.getElementById('selected-chad');
      if (oldSel) oldSel.remove();
      const oldWager = document.getElementById('wager-section');
      if (oldWager) oldWager.remove();
      choicesDiv.innerHTML = '';

      if (token.cells <= 0) {
        await showNpcText(["Heh, what is this a charity house? Get the fack outta here."]);
        showChoices([{ label: "Leave", action: () => { window.location.href = 'chadbase.html'; } }]);
        return;
      }

      if (token.cells < _minWager) {
        await showNpcText([`You need at least ${_minWager} cell${_minWager === 1 ? '' : 's'} to play. Go earn some first!`]);
        showChoices([{ label: "Leave", action: () => { window.location.href = 'chadbase.html'; } }]);
        return;
      }

      const sliderMax = Math.min(token.cells, _maxWager);
      const sliderMin = _minWager;

      // Show selected chad
      const sel = document.createElement('div');
      sel.id = 'selected-chad';
      sel.innerHTML = `
        <img src="assets/chads/${token.id}.png" alt="Chad #${token.id}" />
        <div id="chad-info">
          <div>Chad #${token.id}</div>
          <div class="cells-count">${token.cells} cells</div>
        </div>
      `;
      dialogueText.appendChild(sel);

      // Show wager slider (clamped to on-chain limits)
      const wagerSec = document.createElement('div');
      wagerSec.id = 'wager-section';
      wagerSec.innerHTML = `
        <div id="wager-label">WAGER CELLS (max ${sliderMax})</div>
        <input type="range" id="wager-slider" min="${sliderMin}" max="${sliderMax}" value="${sliderMin}" />
        <div id="wager-amount">${sliderMin} cell${sliderMin === 1 ? '' : 's'}</div>
      `;
      dialogueText.appendChild(wagerSec);

      const slider = document.getElementById('wager-slider');
      const amountDisplay = document.getElementById('wager-amount');
      slider.addEventListener('input', () => {
        wagerAmount = parseInt(slider.value);
        amountDisplay.textContent = wagerAmount + (wagerAmount === 1 ? ' cell' : ' cells');
      });
      wagerAmount = sliderMin;

      showChoices([
        { label: "LET'S FLIP!", action: recordWagerAndFlip }
      ]);
    }

    // ── Flow: Record wager on-chain → flip ──
    async function recordWagerAndFlip() {
      choicesDiv.innerHTML = '';
      const signer = getSigner();
      if (!signer) { alert('Wallet not connected!'); return; }

      const statusEl = document.createElement('p');
      statusEl.className = 'loading';
      statusEl.textContent = 'Recording wager on-chain...';
      dialogueText.appendChild(statusEl);

      try {
        // Single on-chain call: spends cells, flips, awards cells if won
        const gamble = new ethers.Contract(GAMBLE_ADDRESS, GAMBLE_ABI, signer);
        const tx = await gamble.flip(selectedTokenId, wagerAmount);
        statusEl.textContent = 'Waiting for confirmation...';
        const receipt = await tx.wait();
        statusEl.remove();

        // Read outcome from the CoinFlip event emitted by Gamble.sol
        const iface = new ethers.utils.Interface(GAMBLE_ABI);
        const flipLog = receipt.logs
          .map(log => { try { return iface.parseLog(log); } catch { return null; } })
          .find(e => e && e.name === 'CoinFlip');
        const win = flipLog ? flipLog.args.won : false;

        // Show "here goes nothing" then a TAP button
        // video.play() MUST be called directly from a user tap on mobile
        clearDialogue();
        const hereGoes = document.createElement('p');
        dialogueText.appendChild(hereGoes);
        await typewrite(hereGoes, "Here goes nothing...", 50);
        await delay(600);

        const videoOverlay = document.getElementById('video-overlay');
        const video = document.getElementById('flip-video');

        await new Promise(resolve => {
          showChoices([{ label: 'FLIP THE COIN', action: () => {
            choicesDiv.innerHTML = '';
            // Unlock Web Audio on iOS — silent buffer is the most reliable technique
            try {
              const ACtx = window.AudioContext || window.webkitAudioContext;
              if (ACtx) {
                const ctx = new ACtx();
                const buf = ctx.createBuffer(1, 1, 22050);
                const src = ctx.createBufferSource();
                src.buffer = buf;
                src.connect(ctx.destination);
                src.start(0);
                ctx.resume().catch(() => {});
              }
            } catch (_) {}
            // Secondary: force-load + unlock each sfx element
            const sfxWin  = document.getElementById('sfx-win');
            const sfxLose = document.getElementById('sfx-lose');
            sfxWin.load();  sfxWin.play().then(() => sfxWin.pause()).catch(() => {});
            sfxLose.load(); sfxLose.play().then(() => sfxLose.pause()).catch(() => {});
            videoOverlay.classList.add('active');
            video.currentTime = 0;
            duckMusic(0.08);
            const p = video.play();
            if (p !== undefined) {
              p.catch(() => {
                // play still blocked — skip straight to result
                videoOverlay.classList.remove('active');
                restoreMusic(0.45, 200);
                resolve();
              });
            }
            video.addEventListener('ended', () => {
              videoOverlay.classList.remove('active');
              restoreMusic(0.45, 200);
              resolve();
            }, { once: true });
            video.addEventListener('error', () => {
              videoOverlay.classList.remove('active');
              restoreMusic(0.45, 200);
              resolve();
            }, { once: true });
          }}]);
        });

        await showResult(win);

      } catch (err) {
        statusEl.remove();
        const errP = document.createElement('p');
        const reason = err.reason || err.data?.message || err.error?.message || err.message || String(err);
        errP.textContent = 'Transaction failed: ' + reason;
        errP.style.color = '#e53935';
        dialogueText.appendChild(errP);
        showChoices([
          { label: "Try again", action: recordWagerAndFlip },
          { label: "Pick another Chad", action: startCoinFlip },
        ]);
      }
    }

    // ── Flow: Show result ──
    async function showResult(win) {
      const resultOverlay = document.getElementById('result-overlay');
      const resultText = document.getElementById('result-text');

      // Show win/lose immediately — no blockchain wait
      if (win) {
        resultText.textContent = 'YOU WIN!';
        resultText.className = 'win';
        duckMusic(0.06);
        const sfxWin = document.getElementById('sfx-win');
        sfxWin.currentTime = 0;
        sfxWin.play().catch(() => {});
        sfxWin.onended = () => restoreMusic();
      } else {
        resultText.textContent = 'YOU LOSE';
        resultText.className = 'lose';
        duckMusic(0.06);
        const sfxLose = document.getElementById('sfx-lose');
        sfxLose.currentTime = 0;
        sfxLose.play().catch(() => {});
        sfxLose.onended = () => restoreMusic();
      }

      resultOverlay.classList.add('active');
      await delay(3000);
      resultOverlay.classList.remove('active');

      // Cells were already awarded on-chain by Gamble.flip() — nothing to do here.

      await showPlayAgain(win);
    }

    // ── Flow: Play again ──
    async function showPlayAgain(lastWin) {
      await showNpcText([
        "Well that was fun...",
        "Play again?"
      ]);
      showChoices([
        { label: "Let's flip old man", action: startCoinFlip },
        { label: "Let's shoot dice ya crazy bastard", action: () => {
          clearDialogue();
          const p = document.createElement('p');
          p.style.color = '#ffaa40';
          p.textContent = "Dice comin' soon... pick a flip for now!";
          dialogueText.appendChild(p);
          showChoices([
            { label: "Let's flip old man", action: startCoinFlip },
          ]);
        }}
      ]);
    }

    // ── Init ──
    autoReconnect({ onConnected, onDisconnected });
  </script>
  <script src="nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avax Pie Face</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #f5c842;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 16px;
    }
    .screen.active { display: flex; }

    h1 {
      font-size: 1.1rem;
      color: #f5c842;
      text-align: center;
      margin-bottom: 24px;
      text-shadow: 0 0 12px #f5c84288;
      line-height: 1.8;
    }
    h2 {
      font-size: 0.75rem;
      color: #f5c842;
      margin-bottom: 16px;
      text-align: center;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #1a1a2e;
      border: 2px solid #f5c842;
      color: #f5c842;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      outline: none;
      border-radius: 4px;
    }
    input::placeholder { color: #7a6a20; }
    input:focus { border-color: #ffe066; box-shadow: 0 0 8px #f5c84244; }

    button {
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      transition: transform 0.1s, filter 0.1s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }

    .btn-primary {
      background: #f5c842;
      color: #0a0a0f;
      padding: 10px 20px;
      font-size: 0.6rem;
      width: 100%;
      margin-bottom: 10px;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.15); }

    .btn-secondary {
      background: transparent;
      color: #f5c842;
      border: 2px solid #f5c842;
      padding: 8px 16px;
      font-size: 0.5rem;
      width: 100%;
      margin-bottom: 10px;
    }
    .btn-secondary:hover:not(:disabled) { background: #f5c84222; }

    .btn-small {
      background: transparent;
      color: #aaa;
      border: 1px solid #555;
      padding: 6px 12px;
      font-size: 0.45rem;
      margin-top: 6px;
    }
    .btn-small:hover:not(:disabled) { color: #f5c842; border-color: #f5c842; }

    .error-msg {
      color: #ff5555;
      font-size: 0.45rem;
      text-align: center;
      margin-bottom: 10px;
      min-height: 1em;
      line-height: 1.6;
    }
    .info-msg {
      color: #aaffaa;
      font-size: 0.5rem;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #0a0a0f44;
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    .spinner-gold {
      border-color: #f5c84244;
      border-top-color: #f5c842;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LEADERBOARD ── */
    .leaderboard-panel {
      width: 100%;
      background: #111122;
      border: 2px solid #f5c84255;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
    }
    .leaderboard-panel h2 { margin-bottom: 10px; }
    .lb-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.45rem;
      padding: 4px 0;
      border-bottom: 1px solid #f5c84222;
      color: #ddd;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row .rank { color: #f5c842; min-width: 2em; }
    .lb-row .name { flex: 1; padding: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-row .score { color: #ffe066; }
    .lb-empty { font-size: 0.45rem; color: #666; text-align: center; padding: 8px 0; }
    .lb-loading { font-size: 0.45rem; color: #aaa; text-align: center; padding: 8px 0; }

    /* ── PRE-GAME ── */
    .pregame-info {
      font-size: 0.55rem;
      text-align: center;
      line-height: 2.2;
      color: #ddd;
      margin-bottom: 20px;
    }
    .pregame-info span { color: #f5c842; }

    /* ── GAME SCREEN ── */
    #screen-game {
      padding: 0;
      max-width: 420px;
      width: 100%;
    }

    .game-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 420px;
      padding: 8px 12px;
      background: #111122;
    }
    .hud-timer {
      font-size: 0.7rem;
      color: #f5c842;
      transition: color 0.3s;
    }
    .hud-timer.urgent { color: #ff4444; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
    .hud-score {
      font-size: 0.7rem;
      color: #ffe066;
    }

    /* ── BOARD ── */
    .board-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
    }
    .board-bg {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Face slots absolutely positioned over the background */
    .face-slot {
      position: absolute;
      perspective: 600px;
      cursor: pointer;
    }

    .face-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(90deg);
      transition: transform 0.35s ease;
    }
    .face-card.flipped-up   { transform: rotateX(0deg); }
    .face-card.flipped-down { transform: rotateX(90deg); }

    .face-front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .face-front img {
      width: 85%;
      height: 85%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 4px;
    }

    /* ── END SCREEN ── */
    .end-score-display {
      font-size: 1.2rem;
      color: #ffe066;
      margin: 16px 0;
      text-align: center;
    }
    .end-announce {
      font-size: 0.5rem;
      text-align: center;
      margin-bottom: 16px;
      line-height: 2;
      padding: 0 8px;
    }
    .end-announce.top10 { color: #ffe066; }
    .end-announce.nope  { color: #aaa; }

    /* emin overlay */
    #emin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 32px;
    }
    #emin-overlay.show { display: flex; }
    #emin-overlay p {
      font-size: 0.65rem;
      color: #ff6666;
      text-align: center;
      margin-bottom: 24px;
      line-height: 2;
    }
    #emin-overlay img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ff4444;
      margin-bottom: 20px;
    }

    /* divider */
    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #f5c84233;
      margin: 16px 0;
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     SCREEN 1: LOGIN
════════════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <h1>AVAX<br/>PIE FACE</h1>
  <input type="text" id="login-user" placeholder="Username" autocomplete="off" maxlength="20" />
  <input type="text" id="login-pass" placeholder="Password" autocomplete="off" maxlength="40" />
  <div class="error-msg" id="login-error"></div>
  <button class="btn-primary" id="btn-login">Login</button>
  <button class="btn-secondary" id="btn-create">Create Account</button>
  <hr class="divider" />
  <button class="btn-small" id="btn-show-lb-login">View Leaderboard</button>
  <div id="login-lb-panel" style="display:none; width:100%;"></div>
</div>

<!-- ════════════════════════════════════════
     SCREEN 2: PRE-GAME
════════════════════════════════════════ -->
<div id="screen-pregame" class="screen">
  <h1>AVAX<br/>PIE FACE</h1>
  <div class="pregame-info">
    Welcome, <span id="pg-username">—</span><br/>
    Attempts remaining: <span id="pg-attempts">—</span><br/>
    High Score: <span id="pg-highscore">—</span>
  </div>
  <div class="error-msg" id="pregame-error"></div>
  <button class="btn-primary" id="btn-start">Start Game</button>
  <button class="btn-small" id="btn-show-lb-pg">View Leaderboard</button>
  <div id="pg-lb-panel" style="display:none; width:100%;"></div>
  <hr class="divider" />
  <button class="btn-secondary" id="btn-back-login">Logout</button>
</div>

<!-- ════════════════════════════════════════
     SCREEN 3: GAME
════════════════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-hud">
    <div class="hud-timer" id="hud-timer">60s</div>
    <div class="hud-score" id="hud-score">0 pts</div>
  </div>
  <div class="board-wrap" id="board-wrap">
    <img class="board-bg" src="../../assets/Avaxpieface/piefacemain.jpg" alt="Pie Face Board" id="board-bg-img" draggable="false" />
    <!-- Face slots injected by JS -->
  </div>
</div>

<!-- ════════════════════════════════════════
     SCREEN 4: END
════════════════════════════════════════ -->
<div id="screen-end" class="screen">
  <h1>GAME OVER</h1>
  <div class="end-score-display" id="end-score">0</div>
  <div class="end-announce" id="end-announce"></div>
  <div id="end-lb-panel" style="width:100%;"></div>
  <hr class="divider" />
  <button class="btn-primary" id="btn-play-again" style="display:none;">Play Again</button>
  <button class="btn-secondary" id="btn-logout">Logout</button>
</div>

<!-- ════════════════════════════════════════
     EMIN OVERLAY
════════════════════════════════════════ -->
<div id="emin-overlay">
  <img src="../../assets/Avaxpieface/emin.png" alt="Emin" />
  <p>You have pied Emin...<br/>Where's your sense of respect!</p>
  <button class="btn-primary" id="btn-emin-ok" style="max-width:260px;">Accept Your Fate</button>
</div>

<script>
(function () {
  'use strict';

  // ── Constants ──────────────────────────────────────────────────
  const WORKER_URL      = 'https://last-chad-runner.severin20.workers.dev';
  const GAME_DURATION   = 60;          // seconds
  const THEORETICAL_MAX = Math.floor(GAME_DURATION / 0.9) * 10;  // ~666

  // Spawn/duration ramp  t=0 → t=60
  const SPAWN_START  = 2000; const SPAWN_END  = 600;
  const DUR_START    = 2500; const DUR_END    = 900;

  // Square layout (% of image dimensions)
  const SLOTS = [
    { left: '16%', top: '18%', width: '31%', height: '23%' },
    { left: '53%', top: '18%', width: '31%', height: '23%' },
    { left: '16%', top: '42%', width: '31%', height: '23%' },
    { left: '53%', top: '42%', width: '31%', height: '23%' },
    { left: '16%', top: '72%', width: '31%', height: '23%' },
    { left: '53%', top: '72%', width: '31%', height: '23%' },
  ];

  const FACES = [
    'Dominic.png','Jason.png','brandon.png',
    'avery.png','cg777.png','emin.png',
    'hillbilly.png','jonycsarker.png','vanho.png','vanya.png',
  ];
  const PIE_FACES = {
    'Dominic.png':     'dominicpie.png',
    'Jason.png':       'jasonpie.png',
    'brandon.png':     'brandonpie.png',
    'avery.png':       'averypie.png',
    'cg777.png':       'cg777pie.png',
    'emin.png':        'eminpie.png',
    'hillbilly.png':   'hillbillypie.png',
    'jonycsarker.png': 'sarkerpie.png',
    'vanho.png':       'vanhopie.png',
    'vanya.png':       'vanyapie.png',
  };
  const EMIN_FACE  = 'emin.png';
  const ASSET_BASE = '../../assets/Avaxpieface/';

  // ── Session state (in memory only — no localStorage) ───────────
  let sessionToken  = null;
  let currentUser   = null;
  let currentAttempts  = 0;
  let currentHighScore = 0;

  // ── Game state ─────────────────────────────────────────────────
  let gameActive       = false;
  let gameScore        = 0;
  let clickCount       = 0;
  let gameStartTime    = null;
  let timerInterval    = null;
  let spawnTimeout     = null;
  let faceTimers       = {};
  let slotState        = new Array(6).fill(null);
  let gameStartedViaUI = false;  // anti-console-cheat flag

  // ── API helpers ────────────────────────────────────────────────
  async function apiPost(path, body) {
    const res = await fetch(WORKER_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    return { status: res.status, data };
  }

  async function apiGet(path) {
    const res = await fetch(WORKER_URL + path);
    const data = await res.json();
    return { status: res.status, data };
  }

  // ── Utility ────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function setButtonLoading(btn, loading, originalText) {
    if (loading) {
      btn.disabled = true;
      btn.dataset.origText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>Loading...';
    } else {
      btn.disabled = false;
      btn.textContent = originalText || btn.dataset.origText || btn.textContent;
    }
  }

  // ── Screen helpers ─────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Leaderboard rendering ──────────────────────────────────────
  async function loadAndRenderLeaderboard(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    container.innerHTML = '<div class="leaderboard-panel"><h2>LEADERBOARD</h2>'
      + '<div class="lb-loading"><span class="spinner spinner-gold"></span>Loading...</div></div>';

    try {
      const { status, data } = await apiGet('/pieface/leaderboard');
      const lb = (status === 200 && data.ok) ? (data.leaderboard || []) : [];
      renderLeaderboardData(containerId, lb);
    } catch {
      renderLeaderboardData(containerId, []);
    }
  }

  function renderLeaderboardData(containerId, lb) {
    const container = document.getElementById(containerId);
    if (!container) return;
    let html = '<div class="leaderboard-panel"><h2>LEADERBOARD</h2>';
    if (lb.length === 0) {
      html += '<div class="lb-empty">No scores yet!</div>';
    } else {
      lb.forEach((entry, i) => {
        html += `<div class="lb-row">
          <span class="rank">#${i + 1}</span>
          <span class="name">${escHtml(entry.username)}</span>
          <span class="score">${entry.score}</span>
        </div>`;
      });
    }
    html += '</div>';
    container.innerHTML = html;
  }

  // ── LOGIN SCREEN ───────────────────────────────────────────────
  function setLoginError(msg) {
    document.getElementById('login-error').textContent = msg;
  }

  document.getElementById('btn-login').addEventListener('click', async () => {
    const uInput = document.getElementById('login-user').value.trim();
    const pInput = document.getElementById('login-pass').value;
    setLoginError('');
    if (!uInput || !pInput) { setLoginError('Enter username and password.'); return; }

    const btn = document.getElementById('btn-login');
    setButtonLoading(btn, true);
    try {
      const { status, data } = await apiPost('/pieface/login', { username: uInput, password: pInput });
      if (status === 200 && data.ok) {
        loginSuccess(data);
      } else {
        setLoginError(data.error || 'Login failed. Please try again.');
      }
    } catch {
      setLoginError('Network error. Please try again.');
    } finally {
      setButtonLoading(btn, false, 'Login');
    }
  });

  document.getElementById('btn-create').addEventListener('click', async () => {
    const uInput = document.getElementById('login-user').value.trim();
    const pInput = document.getElementById('login-pass').value;
    setLoginError('');
    if (!uInput || !pInput) { setLoginError('Enter username and password.'); return; }

    const btn = document.getElementById('btn-create');
    setButtonLoading(btn, true);
    try {
      const { status, data } = await apiPost('/pieface/register', { username: uInput, password: pInput });
      if (status === 200 && data.ok) {
        loginSuccess(data);
      } else {
        setLoginError(data.error || 'Registration failed. Please try again.');
      }
    } catch {
      setLoginError('Network error. Please try again.');
    } finally {
      setButtonLoading(btn, false, 'Create Account');
    }
  });

  document.getElementById('btn-show-lb-login').addEventListener('click', async () => {
    const panel = document.getElementById('login-lb-panel');
    const btn   = document.getElementById('btn-show-lb-login');
    if (panel.style.display === 'none') {
      panel.style.display = 'block';
      btn.textContent = 'Hide Leaderboard';
      await loadAndRenderLeaderboard('login-lb-panel');
    } else {
      panel.style.display = 'none';
      btn.textContent = 'View Leaderboard';
    }
  });

  function loginSuccess(data) {
    sessionToken       = data.sessionToken;
    currentUser        = data.username;
    currentAttempts    = data.attempts;
    currentHighScore   = data.highScore || 0;
    showPreGame();
  }

  // ── PRE-GAME SCREEN ────────────────────────────────────────────
  function showPreGame() {
    document.getElementById('pg-username').textContent  = currentUser;
    document.getElementById('pg-attempts').textContent  = currentAttempts;
    document.getElementById('pg-highscore').textContent = currentHighScore;
    document.getElementById('pregame-error').textContent = '';
    document.getElementById('pg-lb-panel').style.display = 'none';
    document.getElementById('btn-show-lb-pg').textContent = 'View Leaderboard';
    showScreen('screen-pregame');
  }

  document.getElementById('btn-start').addEventListener('click', async () => {
    document.getElementById('pregame-error').textContent = '';
    const btn = document.getElementById('btn-start');
    setButtonLoading(btn, true);
    try {
      const { status, data } = await apiPost('/pieface/use-attempt', {
        username: currentUser,
        sessionToken: sessionToken,
      });
      if (status === 200 && data.ok) {
        currentAttempts = data.attempts;
        gameStartedViaUI = true;
        startGame();
      } else {
        document.getElementById('pregame-error').textContent =
          data.error || 'Could not start game. Please try again.';
      }
    } catch {
      document.getElementById('pregame-error').textContent = 'Network error. Please try again.';
    } finally {
      setButtonLoading(btn, false, 'Start Game');
    }
  });

  document.getElementById('btn-back-login').addEventListener('click', () => {
    doLogout();
  });

  document.getElementById('btn-show-lb-pg').addEventListener('click', async () => {
    const panel = document.getElementById('pg-lb-panel');
    const btn   = document.getElementById('btn-show-lb-pg');
    if (panel.style.display === 'none') {
      panel.style.display = 'block';
      btn.textContent = 'Hide Leaderboard';
      await loadAndRenderLeaderboard('pg-lb-panel');
    } else {
      panel.style.display = 'none';
      btn.textContent = 'View Leaderboard';
    }
  });

  // ── BUILD BOARD SLOTS ──────────────────────────────────────────
  function buildBoard() {
    const wrap = document.getElementById('board-wrap');
    wrap.querySelectorAll('.face-slot').forEach(el => el.remove());

    SLOTS.forEach((pos, i) => {
      const slot = document.createElement('div');
      slot.className = 'face-slot';
      slot.id = `slot-${i}`;
      slot.style.left   = pos.left;
      slot.style.top    = pos.top;
      slot.style.width  = pos.width;
      slot.style.height = pos.height;

      const card = document.createElement('div');
      card.className = 'face-card';
      card.id = `card-${i}`;

      const front = document.createElement('div');
      front.className = 'face-front';

      const img = document.createElement('img');
      img.id = `face-img-${i}`;
      img.src = '';
      img.alt = 'face';

      front.appendChild(img);
      card.appendChild(front);
      slot.appendChild(card);

      slot.addEventListener('click', () => onSlotClick(i));
      wrap.appendChild(slot);
    });
  }

  // ── GAME LOGIC ─────────────────────────────────────────────────
  function startGame() {
    if (!gameStartedViaUI) return;  // anti-cheat: must go through UI
    gameScore     = 0;
    clickCount    = 0;
    gameStartTime = Date.now();
    gameActive    = true;
    slotState     = new Array(6).fill(null);
    faceTimers    = {};

    document.getElementById('hud-score').textContent = '0 pts';
    document.getElementById('hud-timer').textContent = '60s';
    document.getElementById('hud-timer').classList.remove('urgent');

    buildBoard();
    showScreen('screen-game');

    timerInterval = setInterval(() => {
      if (!gameActive) return;
      const elapsed   = (Date.now() - gameStartTime) / 1000;
      const remaining = Math.max(0, GAME_DURATION - elapsed);
      const timerEl   = document.getElementById('hud-timer');
      timerEl.textContent = Math.ceil(remaining) + 's';
      if (remaining <= 10) timerEl.classList.add('urgent');
      if (remaining <= 0)  endGame();
    }, 100);

    scheduleNextSpawn();
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function currentSpawnInterval() {
    const t = Math.min(1, (Date.now() - gameStartTime) / (GAME_DURATION * 1000));
    return lerp(SPAWN_START, SPAWN_END, t);
  }

  function currentFaceDuration() {
    const t = Math.min(1, (Date.now() - gameStartTime) / (GAME_DURATION * 1000));
    return lerp(DUR_START, DUR_END, t);
  }

  function scheduleNextSpawn() {
    if (!gameActive) return;
    const interval = currentSpawnInterval();
    spawnTimeout = setTimeout(() => {
      spawnFace();
      scheduleNextSpawn();
    }, interval);
  }

  function spawnFace() {
    if (!gameActive) return;
    const empty = [];
    for (let i = 0; i < 6; i++) {
      if (slotState[i] === null) empty.push(i);  // null = free; '__busy__' = animating, skip
    }
    if (empty.length === 0) return;

    const slotIdx = empty[Math.floor(Math.random() * empty.length)];
    const face    = FACES[Math.floor(Math.random() * FACES.length)];
    showFace(slotIdx, face);
  }

  function showFace(slotIdx, face) {
    slotState[slotIdx] = face;
    const img  = document.getElementById(`face-img-${slotIdx}`);
    const card = document.getElementById(`card-${slotIdx}`);
    if (!img || !card) return;

    img.src = ASSET_BASE + face;
    card.classList.remove('flipped-down');
    void card.offsetWidth;  // reflow
    card.classList.add('flipped-up');

    const dur = currentFaceDuration();
    if (faceTimers[slotIdx]) clearTimeout(faceTimers[slotIdx]);
    faceTimers[slotIdx] = setTimeout(() => hideFace(slotIdx), dur);
  }

  function hideFace(slotIdx) {
    slotState[slotIdx] = null;
    const card = document.getElementById(`card-${slotIdx}`);
    if (!card) return;
    card.classList.remove('flipped-up');
    card.classList.add('flipped-down');
    if (faceTimers[slotIdx]) {
      clearTimeout(faceTimers[slotIdx]);
      delete faceTimers[slotIdx];
    }
  }

  function onSlotClick(slotIdx) {
    if (!gameActive) return;
    const face = slotState[slotIdx];
    if (!face) return;

    // Cancel auto-hide timer; mark slot busy so nothing spawns during animation
    if (faceTimers[slotIdx]) {
      clearTimeout(faceTimers[slotIdx]);
      delete faceTimers[slotIdx];
    }
    slotState[slotIdx] = '__busy__';

    // Swap to the grossed-out reaction image
    const img = document.getElementById(`face-img-${slotIdx}`);
    if (img && PIE_FACES[face]) img.src = ASSET_BASE + PIE_FACES[face];

    // Play pie-drop animation, then resolve
    showPieAnimation(slotIdx, () => {
      const card = document.getElementById(`card-${slotIdx}`);
      if (card) {
        card.classList.remove('flipped-up');
        card.classList.add('flipped-down');
      }
      slotState[slotIdx] = null;  // free slot only after animation fully done
      if (face === EMIN_FACE) {
        triggerEmin();
      } else {
        gameScore  += 10;
        clickCount += 1;
        document.getElementById('hud-score').textContent = gameScore + ' pts';
      }
    });
  }

  function showPieAnimation(slotIdx, onComplete) {
    const slot = document.getElementById(`slot-${slotIdx}`);
    if (!slot) { onComplete(); return; }

    const pieEl = document.createElement('img');
    pieEl.src = ASSET_BASE + 'pie.png';
    pieEl.style.cssText = [
      'position:absolute',
      'left:0', 'top:-100%',
      'width:100%', 'height:100%',
      'object-fit:contain',
      'z-index:20',
      'pointer-events:none',
      'transition:top 0.5s ease-in',
    ].join(';');
    slot.appendChild(pieEl);

    // Force reflow then drop
    void pieEl.offsetWidth;
    pieEl.style.top = '0';

    setTimeout(() => {
      pieEl.remove();
      onComplete();
    }, 600);
  }

  function triggerEmin() {
    gameActive = false;
    clearInterval(timerInterval);
    clearTimeout(spawnTimeout);
    Object.values(faceTimers).forEach(clearTimeout);
    faceTimers = {};
    document.getElementById('emin-overlay').classList.add('show');
  }

  document.getElementById('btn-emin-ok').addEventListener('click', () => {
    document.getElementById('emin-overlay').classList.remove('show');
    finishGame();
  });

  function endGame() {
    if (!gameActive) return;
    gameActive = false;
    clearInterval(timerInterval);
    clearTimeout(spawnTimeout);
    Object.values(faceTimers).forEach(clearTimeout);
    faceTimers = {};
    finishGame();
  }

  async function finishGame() {
    // Anti-cheat: score must equal clickCount × 10, cap at theoretical max
    let finalScore = gameScore;
    if (finalScore !== clickCount * 10) finalScore = 0;
    if (finalScore > THEORETICAL_MAX)   finalScore = THEORETICAL_MAX;
    gameScore        = finalScore;
    gameStartedViaUI = false;

    // Show end screen immediately with score while API calls happen
    showScreen('screen-end');
    document.getElementById('end-score').textContent = finalScore + ' pts';

    const announceEl = document.getElementById('end-announce');
    announceEl.className = 'end-announce nope';
    announceEl.textContent = '';

    const endLbPanel     = document.getElementById('end-lb-panel');
    endLbPanel.innerHTML = '<div class="leaderboard-panel"><h2>LEADERBOARD</h2>'
      + '<div class="lb-loading"><span class="spinner spinner-gold"></span>Submitting score...</div></div>';

    const playAgainBtn = document.getElementById('btn-play-again');
    playAgainBtn.style.display = 'none';

    // Submit score
    try {
      const { status, data } = await apiPost('/pieface/score', {
        username:   currentUser,
        sessionToken: sessionToken,
        score:      finalScore,
        clickCount: clickCount,
      });

      if (status === 200 && data.ok) {
        if (data.onLeaderboard && data.rank > 0) {
          announceEl.className     = 'end-announce top10';
          announceEl.textContent   = `You're #${data.rank} on the leaderboard!`;
        } else {
          announceEl.className   = 'end-announce nope';
          announceEl.textContent = 'Not quite top 10 this time. Keep trying!';
        }
        // Update local high score tracking
        if (finalScore > currentHighScore) currentHighScore = finalScore;
      } else {
        announceEl.className   = 'end-announce nope';
        announceEl.textContent = data.error || 'Score could not be submitted.';
      }
    } catch {
      announceEl.className   = 'end-announce nope';
      announceEl.textContent = 'Network error submitting score.';
    }

    // Load fresh leaderboard
    await loadAndRenderLeaderboard('end-lb-panel');

    // Show play again if attempts remain
    if (currentAttempts > 0) {
      playAgainBtn.style.display = 'block';
      playAgainBtn.textContent   = `Play Again (${currentAttempts} left)`;
    }
  }

  // ── END SCREEN BUTTONS ─────────────────────────────────────────
  document.getElementById('btn-play-again').addEventListener('click', () => {
    showPreGame();
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    doLogout();
  });

  function doLogout() {
    sessionToken     = null;
    currentUser      = null;
    currentAttempts  = 0;
    currentHighScore = 0;
    gameStartedViaUI = false;
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-error').textContent = '';
    document.getElementById('login-lb-panel').style.display = 'none';
    document.getElementById('btn-show-lb-login').textContent = 'View Leaderboard';
    showScreen('screen-login');
  }

  // ── KEYBOARD ENTER SUPPORT ─────────────────────────────────────
  ['login-user', 'login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  });

})();
</script>
</body>
</html>

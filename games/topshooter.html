<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Top Shooter — Last Chad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; font-family:'Press Start 2P',monospace; overflow:hidden; touch-action:none; display:flex; flex-direction:column; align-items:center; height:100vh; height:100dvh; }
  #wrap { position:relative; width:480px; max-width:100vw; flex:1; display:flex; flex-direction:column; }
  canvas { display:block; width:100%; background:#111; flex:1; }
  #controls { display:flex; width:100%; height:72px; min-height:72px; background:#111; border-top:2px solid #c8a84e; }
  #controls button {
    flex:1; border:none; font-family:'Press Start 2P',monospace; font-size:11px;
    color:#fff; cursor:pointer; text-transform:uppercase; letter-spacing:1px;
    -webkit-user-select:none; user-select:none;
  }
  #btnLeft  { background:#1a1a2e; border-right:1px solid #333; }
  #btnShoot { background:#3a1a1a; border-right:1px solid #333; }
  #btnRight { background:#1a1a2e; }
  #controls button:active { filter:brightness(1.6); }
  #startOverlay {
    position:absolute; inset:0; background:rgba(0,0,0,.85); display:flex;
    flex-direction:column; align-items:center; justify-content:center; z-index:10;
  }
  #startOverlay h1 { color:#c8a84e; font-size:22px; margin-bottom:24px; text-shadow:0 0 12px #c8a84e; }
  #startOverlay p  { color:#aaa; font-size:9px; line-height:1.8; text-align:center; margin-bottom:28px; max-width:360px; }
  #startBtn {
    font-family:'Press Start 2P',monospace; font-size:14px; padding:14px 36px;
    background:#c8a84e; color:#000; border:none; cursor:pointer;
  }
  #startBtn:hover { background:#e0c060; }

  /* ── Result flash overlay ── */
  #result-overlay {
    display:none; position:absolute; inset:0; z-index:20;
    align-items:center; justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
  }
  #result-overlay.active { display:flex; }
  #result-text {
    font-family:'Press Start 2P',monospace;
    font-size:clamp(2rem, 8vw, 5rem);
    text-shadow:0 0 30px currentColor, 0 0 60px currentColor;
    animation:result-pulse 0.6s ease-in-out infinite alternate;
  }
  #result-text.win  { color:#6dffaa; }
  #result-text.lose { color:#e53935; }
  @keyframes result-pulse {
    from { transform:scale(1); }
    to   { transform:scale(1.08); }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="controls">
    <button id="btnLeft">&#9664; LEFT</button>
    <button id="btnShoot">SHOOT</button>
    <button id="btnRight">RIGHT &#9654;</button>
  </div>
  <div id="result-overlay"><span id="result-text"></span></div>
  <div id="startOverlay">
    <h1>TOP SHOOTER</h1>
    <p>Enemies descend from above!<br>Dodge their fire &amp; destroy them.<br><br>5 shots per clip &bull; 30 HP &bull; 90 seconds<br><br>Obstacles block bullets &amp; enemies!</p>
    <button id="startBtn">START</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');
  const overlay = document.getElementById('startOverlay');

  /* ── audio ── */
  const bgm = new Audio('../music/adventure.mp3');
  bgm.loop = true;
  bgm.volume = 0.25;
  const sfxWin = new Audio('../sound effects/youwin.wav');
  const sfxLose = new Audio('../sound effects/youlose.wav');
  sfxWin.volume = 0.5;
  sfxLose.volume = 0.5;
  let endSoundPlayed = false;

  function startMusic() {
    bgm.currentTime = 0;
    bgm.play().catch(() => {});
  }
  function stopMusic() { bgm.pause(); bgm.currentTime = 0; }
  const resultOverlay = document.getElementById('result-overlay');
  const resultText = document.getElementById('result-text');

  function playEndSound(win) {
    if (endSoundPlayed) return;
    endSoundPlayed = true;
    stopMusic();
    const sfx = win ? sfxWin : sfxLose;
    sfx.currentTime = 0;
    sfx.play().catch(() => {});

    // Flash result text
    resultText.textContent = win ? 'YOU WIN!' : 'YOU LOSE';
    resultText.className = win ? 'win' : 'lose';
    resultOverlay.classList.add('active');
    setTimeout(() => { resultOverlay.classList.remove('active'); }, 3000);
  }

  /* ── sizing ── */
  function resize() {
    const h = wrap.clientHeight - 72;
    canvas.width = 480;
    canvas.height = Math.max(h, 400);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  /* ── assets ── */
  const imgs = {};
  const names = ['Character','Enemy_01','Enemy_02','Enemy_03',
    'Obstacle_01','Obstacle_02','Hazard_01','Hazard_02','Hazard_03',
    'Barrier_01','Barrier_02','Barrier_03','bg'];
  let loaded = 0;
  names.forEach(n => {
    const img = new Image();
    img.onload = img.onerror = () => { loaded++; };
    img.src = 'endless runner/' + n + '.png';
    imgs[n] = img;
  });

  /* ── game state ── */
  const GAME_TIME = 90;
  const MAX_AMMO = 5;
  const MAX_LIVES = 30;
  const RELOAD_TIME = 1.2;
  const PLAYER_SPEED = 220;
  const BULLET_SPEED = 400;
  const SZ = 40; // entity size

  let player, enemies, obstacles, playerBullets, enemyBullets, particles;
  let lives, ammo, reloading, reloadTimer, kills;
  let elapsed, running, gameOver, won;
  let difficulty; // 0-1
  let spawnTimer, bgY;
  let inputLeft, inputRight, inputShoot;
  let shootCooldown;
  let lastTime;
  let invincibleTimer;

  const enemyImgs = ['Enemy_01','Enemy_02','Enemy_03'];
  const obstacleImgs = ['Obstacle_01','Obstacle_02','Hazard_01','Hazard_02','Hazard_03',
    'Barrier_01','Barrier_02','Barrier_03'];

  function init() {
    player = { x: W()/2, y: H()-SZ-10, w: SZ, h: SZ };
    enemies = [];
    obstacles = [];
    playerBullets = [];
    enemyBullets = [];
    particles = [];
    lives = MAX_LIVES;
    ammo = MAX_AMMO;
    reloading = false;
    reloadTimer = 0;

    kills = 0;
    elapsed = 0;
    running = true;
    gameOver = false;
    won = false;
    difficulty = 0;
    spawnTimer = 0;
    bgY = 0;
    inputLeft = inputRight = inputShoot = false;
    shootCooldown = 0;
    invincibleTimer = 0;
    endSoundPlayed = false;
    resultOverlay.classList.remove('active');
    lastTime = performance.now();
    placeObstacles();
  }

  function placeObstacles() {
    obstacles = [];
    const minGap = SZ * 3; // minimum 3 tile-widths between any two obstacles
    const pad = SZ * 2;    // keep away from left/right edges
    const maxY = H() - SZ - 10 - SZ * 4;
    const minY = 80;
    const rowH = (maxY - minY) / 4;
    for (let i = 0; i < 4; i++) {
      let ox, oy, tries = 0, ok = false;
      while (tries < 50) {
        ox = pad + Math.random() * (W() - pad * 2);
        oy = minY + rowH * i + Math.random() * rowH;
        ok = true;
        for (const ob of obstacles) {
          if (Math.abs(ox - ob.x) < minGap && Math.abs(oy - ob.y) < minGap) {
            ok = false; break;
          }
        }
        if (ok) break;
        tries++;
      }
      if (ok) {
        obstacles.push({
          x: ox, y: oy, w: SZ, h: SZ,
          img: obstacleImgs[Math.floor(Math.random()*obstacleImgs.length)]
        });
      }
    }
  }

  function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1,y2-y1); }

  function boxCollide(a, b) {
    return a.x - a.w/2 < b.x + b.w/2 &&
           a.x + a.w/2 > b.x - b.w/2 &&
           a.y - a.h/2 < b.y + b.h/2 &&
           a.y + a.h/2 > b.y - b.h/2;
  }

  /* ── difficulty curve ── */
  function getDifficulty(t) {
    if (t <= 40) return t / GAME_TIME;           // normal ramp 0-40s
    // after 40s: slow increase rate by 50%
    const base = 40 / GAME_TIME;                 // difficulty at t=40
    return Math.min(1, base + (t - 40) / (GAME_TIME * 2));
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ── spawning ── */
  function spawnEnemy() {
    const e = {
      x: SZ/2 + Math.random() * (W() - SZ),
      y: -SZ,
      w: SZ, h: SZ,
      img: enemyImgs[Math.floor(Math.random()*enemyImgs.length)],
      speed: lerp(40, 160, difficulty) + Math.random()*30,
      shootTimer: lerp(3, 0.8, difficulty) * (0.5 + Math.random()),
      hp: difficulty > 0.7 ? (Math.random() < 0.3 ? 2 : 1) : 1,
      vx: 0, // for obstacle avoidance
      avoiding: false
    };
    enemies.push(e);
  }

  /* ── update ── */
  function update(dt) {
    if (!running) return;

    elapsed += dt;
    difficulty = getDifficulty(elapsed);

    if (elapsed >= GAME_TIME) {
      won = true;
      gameOver = true;
      running = false;
      playEndSound(true);
      return;
    }

    // Player movement
    if (inputLeft)  player.x -= PLAYER_SPEED * dt;
    if (inputRight) player.x += PLAYER_SPEED * dt;
    player.x = Math.max(SZ/2, Math.min(W()-SZ/2, player.x));

    // Invincibility
    if (invincibleTimer > 0) invincibleTimer -= dt;

    // Shoot cooldown
    if (shootCooldown > 0) shootCooldown -= dt;

    // Reload
    if (reloading) {
      reloadTimer -= dt;
      if (reloadTimer <= 0) { ammo = MAX_AMMO; reloading = false; }
    }

    // Player shoot
    if (inputShoot && shootCooldown <= 0 && !reloading && ammo > 0) {
      playerBullets.push({ x: player.x, y: player.y - SZ/2, w:6, h:12, speed: BULLET_SPEED });
      ammo--;
      shootCooldown = 0.2;
      if (ammo <= 0) { reloading = true; reloadTimer = RELOAD_TIME; }
    }

    // Enemy spawning — ramps from every 2s to every 0.55s
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      if (difficulty > 0.55) spawnEnemy(); // double spawn mid-game
      if (difficulty > 0.9) spawnEnemy();  // triple spawn late-game
      spawnTimer = lerp(2.0, 0.55, difficulty);
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      // Obstacle avoidance
      let blocked = false;
      for (const ob of obstacles) {
        const dx = ob.x - e.x;
        const dy = ob.y - e.y;
        const d = Math.hypot(dx, dy);
        if (d < SZ * 1.5 && dy > 0 && dy < SZ * 2) {
          // Obstacle is below and close — steer around it
          blocked = true;
          e.vx = dx > 0 ? -100 : 100;
        }
      }
      if (!blocked) e.vx *= 0.9; // decelerate lateral avoidance

      e.x += e.vx * dt;
      e.y += e.speed * dt;
      e.x = Math.max(SZ/2, Math.min(W()-SZ/2, e.x));

      // Enemy shooting
      e.shootTimer -= dt;
      if (e.shootTimer <= 0 && e.y > 0 && e.y < H() - 100) {
        // Aim at player
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const bspd = 180;
        enemyBullets.push({
          x: e.x, y: e.y + SZ/2, w:6, h:6,
          vx: Math.cos(angle)*bspd, vy: Math.sin(angle)*bspd
        });
        e.shootTimer = lerp(2.5, 0.8, difficulty) * (0.5 + Math.random());
      }

      // Enemy off screen
      if (e.y > H() + SZ) { enemies.splice(i, 1); continue; }

      // Enemy crash into player
      if (invincibleTimer <= 0 && boxCollide(e, player)) {
        hurtPlayer();
        spawnParticles(e.x, e.y, '#f44', 8);
        enemies.splice(i, 1);
        continue;
      }

      // Enemy hit obstacle — just bounce off / stay above
      for (const ob of obstacles) {
        if (boxCollide(e, ob)) {
          e.y = ob.y - ob.h/2 - e.h/2 - 1;
          e.vx = (e.x < ob.x) ? -80 : 80;
        }
      }
    }

    // Update player bullets
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      b.y -= b.speed * dt;
      if (b.y < -20) { playerBullets.splice(i, 1); continue; }

      // Hit obstacle?
      let hitOb = false;
      for (const ob of obstacles) {
        if (boxCollide(b, ob)) { hitOb = true; spawnParticles(b.x, b.y, '#888', 3); break; }
      }
      if (hitOb) { playerBullets.splice(i, 1); continue; }

      // Hit enemy?
      let hitE = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        if (boxCollide(b, enemies[j])) {
          enemies[j].hp--;
          if (enemies[j].hp <= 0) {
            spawnParticles(enemies[j].x, enemies[j].y, '#ff4', 10);

            kills++;
            enemies.splice(j, 1);
          } else {
            spawnParticles(b.x, b.y, '#fa0', 4);
          }
          hitE = true; break;
        }
      }
      if (hitE) { playerBullets.splice(i, 1); continue; }
    }

    // Update enemy bullets
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.y > H()+20 || b.y < -20 || b.x < -20 || b.x > W()+20) {
        enemyBullets.splice(i, 1); continue;
      }

      // Hit obstacle?
      let hitOb = false;
      for (const ob of obstacles) {
        if (boxCollide(b, ob)) { hitOb = true; spawnParticles(b.x, b.y, '#888', 3); break; }
      }
      if (hitOb) { enemyBullets.splice(i, 1); continue; }

      // Hit player?
      if (invincibleTimer <= 0 && boxCollide(b, player)) {
        hurtPlayer();
        enemyBullets.splice(i, 1); continue;
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Background scroll
    bgY += 30 * dt;

    // Check game over
    if (lives <= 0) {
      gameOver = true;
      running = false;
      playEndSound(false);
    }
  }

  function hurtPlayer() {
    lives--;
    invincibleTimer = 1.0;
    spawnParticles(player.x, player.y, '#f66', 6);
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*200,
        vy: (Math.random()-0.5)*200,
        life: 0.4 + Math.random()*0.3,
        color, size: 2 + Math.random()*4
      });
    }
  }

  /* ── draw ── */
  function draw() {
    const w = W(), h = H();
    ctx.clearRect(0, 0, w, h);

    // Background
    if (imgs.bg.complete && imgs.bg.naturalWidth) {
      const bh = imgs.bg.height * (w / imgs.bg.width);
      const off = bgY % bh;
      for (let y = -bh + off; y < h; y += bh) {
        ctx.globalAlpha = 0.35;
        ctx.drawImage(imgs.bg, 0, y, w, bh);
      }
      ctx.globalAlpha = 1;
    }

    // Obstacles
    for (const ob of obstacles) {
      const img = imgs[ob.img];
      if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, ob.x - ob.w/2, ob.y - ob.h/2, ob.w, ob.h);
      } else {
        ctx.fillStyle = '#555';
        ctx.fillRect(ob.x - ob.w/2, ob.y - ob.h/2, ob.w, ob.h);
      }
      // Subtle border
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.strokeRect(ob.x - ob.w/2, ob.y - ob.h/2, ob.w, ob.h);
    }

    // Enemy bullets
    for (const b of enemyBullets) {
      ctx.fillStyle = '#f44';
      ctx.shadowColor = '#f44';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Player bullets
    for (const b of playerBullets) {
      ctx.fillStyle = '#4f4';
      ctx.shadowColor = '#4f4';
      ctx.shadowBlur = 6;
      ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
    }
    ctx.shadowBlur = 0;

    // Enemies
    for (const e of enemies) {
      const img = imgs[e.img];
      if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, e.x - e.w/2, e.y - e.h/2, e.w, e.h);
        // Red tint
        ctx.fillStyle = 'rgba(255,0,0,0.2)';
        ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
      } else {
        ctx.fillStyle = '#f44';
        ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
      }
    }

    // Player
    const blink = invincibleTimer > 0 && Math.floor(invincibleTimer * 10) % 2;
    if (!blink) {
      const pi = imgs.Character;
      if (pi && pi.complete && pi.naturalWidth) {
        ctx.drawImage(pi, player.x - player.w/2, player.y - player.h/2, player.w, player.h);
      } else {
        ctx.fillStyle = '#48f';
        ctx.fillRect(player.x - player.w/2, player.y - player.h/2, player.w, player.h);
      }
    }

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.6);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // HUD
    drawHUD();

    // Game over / win overlay
    if (gameOver) drawEndScreen();
  }

  function drawHUD() {
    const w = W();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, w, 44);

    ctx.font = '9px "Press Start 2P"';
    ctx.textBaseline = 'middle';

    // Timer
    const remain = Math.max(0, GAME_TIME - elapsed);
    const mins = Math.floor(remain / 60);
    const secs = Math.floor(remain % 60);
    ctx.fillStyle = remain < 15 ? '#f44' : '#c8a84e';
    ctx.textAlign = 'left';
    ctx.fillText(mins + ':' + String(secs).padStart(2,'0'), 8, 15);

    // Lives
    ctx.fillStyle = lives <= 5 ? '#f44' : '#4f4';
    ctx.fillText('HP:' + lives, 8, 34);

    // Ammo — bottom-left of canvas
    const ammoY = H() - 38;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, ammoY - 18, 160, 40);
    ctx.textAlign = 'left';
    if (reloading) {
      ctx.font = '10px "Press Start 2P"';
      ctx.fillStyle = '#fa0';
      ctx.fillText('RELOADING', 8, ammoY - 6);
      // Reload progress bar — orange
      const reloadPct = 1 - (reloadTimer / RELOAD_TIME);
      const barW = 140, barH = 12;
      ctx.fillStyle = '#333';
      ctx.fillRect(8, ammoY + 4, barW, barH);
      ctx.fillStyle = '#fa0';
      ctx.fillRect(8, ammoY + 4, barW * reloadPct, barH);
      ctx.strokeStyle = '#fa0';
      ctx.lineWidth = 1;
      ctx.strokeRect(8, ammoY + 4, barW, barH);
    } else {
      ctx.font = '10px "Press Start 2P"';
      ctx.fillStyle = '#fc0';
      ctx.fillText('AMMO', 8, ammoY - 6);
      // Fat yellow ammo bars
      const barW = 22, barH = 14, gap = 6, startX = 8;
      for (let i = 0; i < MAX_AMMO; i++) {
        const bx = startX + i * (barW + gap);
        if (i < ammo) {
          ctx.fillStyle = '#fc0';
          ctx.fillRect(bx, ammoY + 4, barW, barH);
        } else {
          ctx.fillStyle = '#333';
          ctx.fillRect(bx, ammoY + 4, barW, barH);
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 1;
          ctx.strokeRect(bx, ammoY + 4, barW, barH);
        }
      }
    }
    ctx.font = '9px "Press Start 2P"';
    ctx.textBaseline = 'middle';

    // Score / Kills
    ctx.textAlign = 'right';
    ctx.fillStyle = '#c8a84e';
    ctx.fillText('K:' + kills, w - 8, 15);

    // Difficulty bar
    const barW = 80;
    const barX = w/2 - barW/2;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, 30, barW, 6);
    const dc = difficulty > 0.7 ? '#f44' : difficulty > 0.4 ? '#fa0' : '#4f4';
    ctx.fillStyle = dc;
    ctx.fillRect(barX, 30, barW * difficulty, 6);
    ctx.strokeStyle = '#666';
    ctx.strokeRect(barX, 30, barW, 6);
  }

  function drawEndScreen() {
    const w = W(), h = H();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, w, h);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (won) {
      ctx.font = '18px "Press Start 2P"';
      ctx.fillStyle = '#c8a84e';
      ctx.fillText('SURVIVED!', w/2, h/2 - 50);
      ctx.font = '10px "Press Start 2P"';
      ctx.fillStyle = '#fff';
      ctx.fillText('Kills: ' + kills, w/2, h/2);
      ctx.fillText('Lives left: ' + lives, w/2, h/2 + 25);
    } else {
      ctx.font = '18px "Press Start 2P"';
      ctx.fillStyle = '#f44';
      ctx.fillText('GAME OVER', w/2, h/2 - 50);
      ctx.font = '10px "Press Start 2P"';
      ctx.fillStyle = '#fff';
      ctx.fillText('Kills: ' + kills, w/2, h/2);
      ctx.fillText('Survived: ' + Math.floor(elapsed) + 's', w/2, h/2 + 25);
    }

    ctx.font = '9px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TAP TO RESTART', w/2, h/2 + 70);
  }

  /* ── input ── */
  const btnL = document.getElementById('btnLeft');
  const btnR = document.getElementById('btnRight');
  const btnS = document.getElementById('btnShoot');

  function pDown(e) { e.preventDefault(); }

  // Touch / mouse for buttons
  btnL.addEventListener('pointerdown', e => { pDown(e); inputLeft = true; });
  btnL.addEventListener('pointerup', () => inputLeft = false);
  btnL.addEventListener('pointerleave', () => inputLeft = false);

  btnR.addEventListener('pointerdown', e => { pDown(e); inputRight = true; });
  btnR.addEventListener('pointerup', () => inputRight = false);
  btnR.addEventListener('pointerleave', () => inputRight = false);

  btnS.addEventListener('pointerdown', e => { pDown(e); inputShoot = true; });
  btnS.addEventListener('pointerup', () => inputShoot = false);
  btnS.addEventListener('pointerleave', () => inputShoot = false);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') inputLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd') inputRight = true;
    if (e.key === ' ' || e.key === 'ArrowUp') { inputShoot = true; e.preventDefault(); }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') inputLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd') inputRight = false;
    if (e.key === ' ' || e.key === 'ArrowUp') inputShoot = false;
  });

  // Restart on tap when game over
  canvas.addEventListener('pointerdown', () => {
    if (gameOver) { init(); startMusic(); }
  });

  /* ── game loop ── */
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  /* ── start ── */
  document.getElementById('startBtn').addEventListener('click', () => {
    overlay.style.display = 'none';
    init();
    startMusic();
    requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>

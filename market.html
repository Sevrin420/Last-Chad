<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market | Last Chad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      color: #f5e6c8;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #3b2a14;
      background-image:
        linear-gradient(45deg, #4a3520 25%, transparent 25%),
        linear-gradient(-45deg, #4a3520 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2e1e0e 75%),
        linear-gradient(-45deg, transparent 75%, #2e1e0e 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      image-rendering: pixelated;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(90,65,30,0.4) 0%, transparent 70%),
        linear-gradient(180deg, rgba(30,20,10,0.3) 0%, rgba(30,20,10,0.6) 100%);
    }

    /* --- Header --- */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(30,20,10,0.9);
      border-bottom: 2px solid #5c4409;
      backdrop-filter: blur(8px);
    }

    .wallet-wrapper { position: relative; }

    .wallet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      padding: 10px 18px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,220,120,0.4), 0 2px 6px rgba(0,0,0,0.5);
      touch-action: manipulation;
    }
    .wallet-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .wallet-btn.connected {
      background: linear-gradient(180deg, #2e5c2e 0%, #1a3d1a 100%);
      border-color: #4caf50;
      color: #a5d6a7;
      font-size: 0.65rem;
    }

    .disconnect-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px); right: 0;
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 110;
      min-width: 160px;
    }
    .disconnect-dropdown.show { display: block; }
    .disconnect-btn {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #e53935;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    .disconnect-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Main --- */
    .main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 100px 20px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-title {
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #d4a017;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(212,160,23,0.5);
    }
    .page-sub {
      font-size: 0.55rem;
      color: #8a7a5a;
      text-align: center;
      margin-bottom: 28px;
    }

    /* --- Collection Toggle --- */
    .collection-toggle {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .coll-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      padding: 13px 32px;
      background: rgba(10,8,3,0.6);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #8a7a5a;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 150px;
      text-align: center;
    }
    .coll-btn:hover { border-color: #d4a017; color: #d4a017; }
    .coll-btn.active {
      background: linear-gradient(180deg, #2a1e08 0%, #1a1005 100%);
      border-color: #d4a017;
      color: #d4a017;
      box-shadow: 0 0 14px rgba(212,160,23,0.2);
    }

    /* --- Tabs --- */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid #5c4409;
    }
    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 10px 18px;
      background: transparent;
      border: 2px solid transparent;
      border-bottom: none;
      color: #8a7a5a;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: #d4a017; }
    .tab-btn.active {
      background: rgba(30,20,10,0.8);
      border-color: #5c4409;
      border-bottom: 2px solid #3b2a14;
      color: #d4a017;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* --- Stat filter bar --- */
    .stat-filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px 14px;
      background: rgba(10,8,3,0.4);
      border: 1px solid #3a2a0a;
      border-radius: 4px;
    }
    .stat-filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-filter-group label {
      font-size: 0.42rem;
      color: #8a7a5a;
      white-space: nowrap;
    }
    .stat-filter-group select {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      padding: 5px 8px;
      background: rgba(10,8,3,0.8);
      border: 1px solid #5c4409;
      border-radius: 3px;
      color: #f5e6c8;
      outline: none;
    }
    .stat-filter-group select option { background: #1e1608; }
    .reset-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      padding: 5px 9px;
      background: transparent;
      border: 1px solid #5c4409;
      border-radius: 3px;
      color: #8a7a5a;
      cursor: pointer;
      margin-left: auto;
    }
    .reset-btn:hover { color: #d4a017; border-color: #d4a017; }

    /* --- Filter bar --- */
    .filter-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 8px 12px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
    }
    .filter-bar select option { background: #1e1608; }
    .filter-bar input::placeholder { color: #5c4409; }

    /* --- NFT Grid --- */
    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    .nft-card {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .nft-card:hover { border-color: #d4a017; transform: translateY(-2px); }

    .nft-card-thumb {
      cursor: pointer;
      display: block;
    }
    .nft-card-thumb img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      image-rendering: pixelated;
      background: #0a0803;
    }
    .nft-card-thumb:hover img { opacity: 0.85; }

    .nft-card-body { padding: 10px 12px; }

    .nft-card-name {
      font-size: 0.55rem;
      color: #f5e6c8;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .nft-card-name:hover { color: #d4a017; }

    /* Stat badges */
    .stat-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stat-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.36rem;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .sb-str { background: rgba(200,50,50,0.2);  color: #e57373; border: 1px solid rgba(198,40,40,0.5); }
    .sb-int { background: rgba(50,100,200,0.2); color: #90caf9; border: 1px solid rgba(21,101,192,0.5); }
    .sb-dex { background: rgba(50,180,80,0.2);  color: #a5d6a7; border: 1px solid rgba(46,125,50,0.5); }
    .sb-cha { background: rgba(150,50,200,0.2); color: #ce93d8; border: 1px solid rgba(123,31,162,0.5); }
    .sb-lvl { background: rgba(212,160,23,0.15); color: #d4a017; border: 1px solid rgba(139,105,20,0.5); }

    .nft-card-price {
      font-size: 0.65rem;
      color: #d4a017;
      margin-bottom: 3px;
    }
    .nft-last-sale {
      font-size: 0.38rem;
      color: #5c4409;
      margin-bottom: 8px;
    }
    .nft-card-seller {
      font-size: 0.38rem;
      color: #5c4409;
      margin-bottom: 10px;
    }

    .buy-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 8px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
    }
    .buy-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .my-listing-badge {
      font-size: 0.38rem;
      color: #4caf50;
      margin-bottom: 6px;
    }

    .update-price-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px;
      background: transparent;
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #90caf9;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .update-price-btn:hover { background: rgba(90,138,175,0.15); }

    .update-price-form { display: none; margin-top: 6px; }
    .update-price-form.show { display: block; }
    .update-price-input {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px 10px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
      margin-bottom: 5px;
    }
    .update-price-confirm {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      padding: 7px;
      background: linear-gradient(180deg, #1a3a5c 0%, #0e2340 100%);
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #90caf9;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .update-price-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .update-price-cancel {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      padding: 5px;
      background: none;
      border: 1px solid #5c4409;
      border-radius: 4px;
      color: #8a7a5a;
      cursor: pointer;
    }

    .delist-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px;
      background: transparent;
      border: 2px solid #e53935;
      border-radius: 4px;
      color: #e53935;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .delist-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Empty / loading --- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #5c4409;
      font-size: 0.6rem;
      line-height: 2.5;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* --- Detail Modal --- */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.82);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .detail-overlay.show { display: flex; }

    .detail-box {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #d4a017;
      border-radius: 8px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #5c4409;
      flex-shrink: 0;
    }
    .detail-title { font-size: 0.75rem; color: #d4a017; }
    .detail-close {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      background: none;
      border: none;
      color: #8a7a5a;
      cursor: pointer;
      padding: 4px 8px;
    }
    .detail-close:hover { color: #f5e6c8; }

    .detail-body {
      display: flex;
      gap: 24px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .detail-img-col { flex: 0 0 200px; }
    .detail-img-col img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
      image-rendering: pixelated;
      background: #0a0803;
      border: 2px solid #5c4409;
      display: block;
    }

    .detail-info-col { flex: 1; min-width: 200px; }
    .detail-name { font-size: 0.7rem; color: #f5e6c8; margin-bottom: 18px; }

    .detail-stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-stat-label {
      font-size: 0.42rem;
      width: 32px;
      flex-shrink: 0;
    }
    .detail-stat-label.str { color: #e57373; }
    .detail-stat-label.int { color: #90caf9; }
    .detail-stat-label.dex { color: #a5d6a7; }
    .detail-stat-label.cha { color: #ce93d8; }

    .detail-stat-bar-wrap {
      flex: 1;
      height: 7px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .detail-stat-bar { height: 100%; border-radius: 2px; }
    .detail-stat-bar.str { background: #e57373; }
    .detail-stat-bar.int { background: #90caf9; }
    .detail-stat-bar.dex { background: #a5d6a7; }
    .detail-stat-bar.cha { background: #ce93d8; }

    .detail-stat-val {
      font-size: 0.48rem;
      color: #f5e6c8;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .detail-divider { border: none; border-top: 1px solid #3a2a0a; margin: 14px 0; }

    .detail-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }
    .detail-meta-label { font-size: 0.42rem; color: #8a7a5a; }
    .detail-meta-val   { font-size: 0.48rem; color: #f5e6c8; }
    .detail-meta-val.gold { color: #d4a017; }

    .detail-footer {
      padding: 14px 20px;
      border-top: 1px solid #5c4409;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .detail-buy-btn {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 11px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      min-width: 140px;
    }
    .detail-buy-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .detail-buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .detail-delist-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 11px 16px;
      background: transparent;
      border: 2px solid #e53935;
      border-radius: 4px;
      color: #e53935;
      cursor: pointer;
    }
    .detail-delist-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Coming Soon --- */
    .coming-soon {
      text-align: center;
      padding: 80px 20px;
    }
    .coming-soon .cs-icon { font-size: 2.5rem; margin-bottom: 20px; display: block; }
    .coming-soon h3 { font-size: 0.75rem; color: #d4a017; margin-bottom: 16px; }
    .coming-soon p  { font-size: 0.5rem; color: #8a7a5a; line-height: 2.5; max-width: 380px; margin: 0 auto; }

    /* --- Sell Panel --- */
    .sell-section { max-width: 520px; }
    .sell-section h2 { font-size: 0.75rem; color: #d4a017; margin-bottom: 20px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.55rem;
      color: #8a7a5a;
      margin-bottom: 8px;
    }
    .form-group select,
    .form-group input {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 14px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
    }
    .form-group select:focus,
    .form-group input:focus { border-color: #d4a017; }
    .form-group select option { background: #1e1608; }

    .nft-preview-row {
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(10,8,3,0.5);
      border: 1px solid #5c4409;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 18px;
    }
    .nft-preview-row img {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: 4px;
      image-rendering: pixelated;
      background: #0a0803;
      border: 1px solid #5c4409;
    }
    .nft-preview-info { font-size: 0.55rem; line-height: 2; }
    .nft-preview-info .label { color: #8a7a5a; }
    .nft-preview-info .value { color: #f5e6c8; }

    .fee-note { font-size: 0.45rem; color: #5c4409; margin-bottom: 18px; line-height: 2; }

    .approve-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 12px;
      background: linear-gradient(180deg, #2e5c2e 0%, #1a3d1a 100%);
      border: 2px solid #4caf50;
      border-radius: 4px;
      color: #a5d6a7;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .approve-btn:hover { background: linear-gradient(180deg, #3a7a3a 0%, #254f25 100%); }
    .approve-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .list-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 12px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
    }
    .list-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .list-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-msg {
      font-size: 0.5rem;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 4px;
      line-height: 2;
      display: none;
    }
    .status-msg.info  { display: block; background: rgba(212,160,23,0.1); border: 1px solid #d4a017; color: #d4a017; }
    .status-msg.ok    { display: block; background: rgba(76,175,80,0.1);  border: 1px solid #4caf50;  color: #a5d6a7; }
    .status-msg.error { display: block; background: rgba(229,57,53,0.1);  border: 1px solid #e53935;  color: #ef9a9a; }

    .connect-prompt { text-align: center; padding: 60px 20px; }
    .connect-prompt p { font-size: 0.6rem; color: #8a7a5a; line-height: 2.5; }

    /* --- Wallet modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #d4a017;
      border-radius: 8px;
      padding: 28px;
      width: 90%;
      max-width: 360px;
    }
    .modal-title { font-size: 0.8rem; color: #d4a017; text-align: center; margin-bottom: 24px; }
    .wallet-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #f5e6c8;
      background: rgba(255,255,255,0.04);
      border: 1px solid #5c4409;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .wallet-option:hover { border-color: #d4a017; background: rgba(212,160,23,0.08); }
    .modal-close {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #8a7a5a;
      background: none;
      border: 1px solid #5c4409;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <header class="header">
    <div id="nav-placeholder"></div>
    <div class="wallet-wrapper">
      <button class="wallet-btn" id="walletBtn">CONNECT</button>
      <div class="disconnect-dropdown" id="disconnectDropdown">
        <button class="disconnect-btn" id="disconnectBtn">DISCONNECT</button>
      </div>
    </div>
  </header>

  <!-- Wallet Modal -->
  <div class="modal-overlay" id="walletModal">
    <div class="modal-box">
      <div class="modal-title">CONNECT WALLET</div>
      <button class="wallet-option" data-wallet="metamask">🦊 MetaMask</button>
      <button class="wallet-option" data-wallet="core">🔷 Core Wallet</button>
      <button class="wallet-option" data-wallet="walletconnect">🔗 WalletConnect</button>
      <button class="modal-close" id="modalClose">CANCEL</button>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-box">
      <div class="detail-header">
        <div class="detail-title" id="detailTitle">—</div>
        <button class="detail-close" id="detailClose">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-img-col">
          <img id="detailImg" src="" alt="">
        </div>
        <div class="detail-info-col">
          <div class="detail-name" id="detailName">—</div>
          <div id="detailStats"></div>
          <hr class="detail-divider">
          <div id="detailMeta"></div>
        </div>
      </div>
      <div class="detail-footer" id="detailFooter"></div>
    </div>
  </div>

  <main class="main">
    <div class="page-title">NFT MARKET</div>
    <div class="page-sub">Buy &amp; sell Last Chad NFTs on-chain</div>

    <!-- Collection Toggle -->
    <div class="collection-toggle">
      <button class="coll-btn active" data-coll="chads">⚔ CHADS</button>
      <button class="coll-btn" data-coll="items">🎒 ITEMS</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="browse">BROWSE</button>
      <button class="tab-btn" data-tab="sell">SELL</button>
    </div>

    <!-- Browse Tab -->
    <div class="tab-panel active" id="tab-browse">

      <!-- Stat / XP filter bar (Chads only) -->
      <div class="stat-filter-bar" id="statFilterBar">
        <div class="stat-filter-group">
          <label>STR ≥</label>
          <select id="filterStr">
            <option value="0">Any</option>
            <option value="1">1+</option><option value="2">2+</option>
            <option value="3">3+</option><option value="4">4+</option><option value="5">5+</option>
          </select>
        </div>
        <div class="stat-filter-group">
          <label>INT ≥</label>
          <select id="filterInt">
            <option value="0">Any</option>
            <option value="1">1+</option><option value="2">2+</option>
            <option value="3">3+</option><option value="4">4+</option><option value="5">5+</option>
          </select>
        </div>
        <div class="stat-filter-group">
          <label>DEX ≥</label>
          <select id="filterDex">
            <option value="0">Any</option>
            <option value="1">1+</option><option value="2">2+</option>
            <option value="3">3+</option><option value="4">4+</option><option value="5">5+</option>
          </select>
        </div>
        <div class="stat-filter-group">
          <label>CHA ≥</label>
          <select id="filterCha">
            <option value="0">Any</option>
            <option value="1">1+</option><option value="2">2+</option>
            <option value="3">3+</option><option value="4">4+</option><option value="5">5+</option>
          </select>
        </div>
        <div class="stat-filter-group">
          <label>LVL ≥</label>
          <select id="filterLevel">
            <option value="1">Any</option>
            <option value="2">2+</option><option value="3">3+</option>
            <option value="4">4+</option><option value="5">5+</option>
          </select>
        </div>
        <button class="reset-btn" id="resetFilters">RESET</button>
      </div>

      <div class="filter-bar">
        <select id="filterSort">
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="level-desc">Level: High → Low</option>
          <option value="str-desc">STR: High → Low</option>
          <option value="int-desc">INT: High → Low</option>
          <option value="dex-desc">DEX: High → Low</option>
          <option value="cha-desc">CHA: High → Low</option>
        </select>
        <input type="text" id="filterSearch" placeholder="Search by name or ID..." style="flex:1;min-width:160px;">
      </div>

      <div class="nft-grid" id="listingsGrid">
        <div class="empty-state loading-dots">Loading listings</div>
      </div>
    </div>

    <!-- Sell Tab -->
    <div class="tab-panel" id="tab-sell">
      <div id="sellConnectPrompt" class="connect-prompt" style="display:none">
        <p>Connect your wallet<br>to list an NFT for sale.</p>
      </div>
      <div id="sellItemsMsg" class="coming-soon" style="display:none">
        <span class="cs-icon">🎒</span>
        <h3>ITEMS MARKETPLACE</h3>
        <p>ERC-1155 item selling is not yet supported. Check back soon.</p>
      </div>
      <div class="sell-section" id="sellForm" style="display:none">
        <h2>LIST A CHAD</h2>

        <div class="form-group">
          <label>Your Chad (Token ID)</label>
          <select id="sellToken">
            <option value="">Select token...</option>
          </select>
        </div>

        <div id="sellPreview" class="nft-preview-row" style="display:none">
          <img id="sellPreviewImg" src="" alt="NFT Preview">
          <div class="nft-preview-info">
            <div><span class="label">Name: </span><span class="value" id="sellPreviewName">—</span></div>
            <div><span class="label">Token: </span><span class="value" id="sellPreviewId">—</span></div>
            <div><span class="label">Status: </span><span class="value" id="sellPreviewStatus">—</span></div>
          </div>
        </div>

        <div class="form-group">
          <label>Price (AVAX)</label>
          <input type="number" id="sellPrice" placeholder="0.00" min="0" step="0.001">
        </div>

        <div class="fee-note" id="feeNote"></div>

        <button class="approve-btn" id="approveBtn" disabled>1. APPROVE MARKET</button>
        <button class="list-btn"    id="listBtn"    disabled>2. LIST FOR SALE</button>
        <div class="status-msg" id="sellStatus"></div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script type="module">
    import { connectWallet, autoReconnect, disconnect, truncateAddress } from './js/wallet.js';
    import { CONTRACT_ADDRESS, ITEMS_CONTRACT_ADDRESS, READ_RPC, MARKET_ADDRESS } from './js/config.js';

    const COLLECTIONS = {
      chads: { label: 'Last Chad', address: CONTRACT_ADDRESS,       imageBase: '/chads/' },
      items: { label: 'LC Items',  address: ITEMS_CONTRACT_ADDRESS, imageBase: '/items/' },
    };

    // ====================================================================
    // ABIs
    // ====================================================================
    const MARKET_ABI = [
      'function feeBps() view returns (uint256)',
      'function getListing(address nftContract, uint256 tokenId) view returns (tuple(address seller, address nftContract, uint256 tokenId, uint256 price, bool active))',
      'function buy(address nftContract, uint256 tokenId) payable',
      'function list(address nftContract, uint256 tokenId, uint256 price)',
      'function delist(address nftContract, uint256 tokenId)',
      'event Listed(address indexed nftContract, uint256 indexed tokenId, address indexed seller, uint256 price)',
      'event Sold(address indexed nftContract, uint256 indexed tokenId, address indexed buyer, address seller, uint256 price)',
      'event Delisted(address indexed nftContract, uint256 indexed tokenId, address seller)',
    ];

    const ERC721_ABI = [
      'function balanceOf(address owner) view returns (uint256)',
      'function tokenOfOwnerByIndex(address owner, uint256 index) view returns (uint256)',
      'function isApprovedForAll(address owner, address operator) view returns (bool)',
      'function setApprovalForAll(address operator, bool approved)',
      'function getApproved(uint256 tokenId) view returns (address)',
      'function ownerOf(uint256 tokenId) view returns (address)',
      'function getStats(uint256 tokenId) view returns (uint32 strength, uint32 intelligence, uint32 dexterity, uint32 charisma, bool assigned)',
      'function getExperience(uint256 tokenId) view returns (uint256)',
      'function getLevel(uint256 tokenId) view returns (uint256)',
      'function tokenName(uint256 tokenId) view returns (string)',
    ];

    // ====================================================================
    // State
    // ====================================================================
    let userAddress      = null;
    let signer           = null;
    let readProvider     = new ethers.providers.JsonRpcProvider(READ_RPC);
    let feeBps           = 500;
    let activeCollection = 'chads';
    let allListings      = [];

    const statsCache    = new Map(); // tokenId -> { str, int, dex, cha, level, xp, name }
    const lastSaleCache = new Map(); // "contract:tokenId" (lowercase) -> priceAvax string

    // ====================================================================
    // DOM refs
    // ====================================================================
    const walletBtn          = document.getElementById('walletBtn');
    const disconnectDropdown = document.getElementById('disconnectDropdown');
    const disconnectBtn      = document.getElementById('disconnectBtn');
    const walletModal        = document.getElementById('walletModal');
    const modalClose         = document.getElementById('modalClose');

    const listingsGrid  = document.getElementById('listingsGrid');
    const filterSort    = document.getElementById('filterSort');
    const filterSearch  = document.getElementById('filterSearch');
    const statFilterBar = document.getElementById('statFilterBar');
    const filterStr     = document.getElementById('filterStr');
    const filterInt     = document.getElementById('filterInt');
    const filterDex     = document.getElementById('filterDex');
    const filterCha     = document.getElementById('filterCha');
    const filterLevel   = document.getElementById('filterLevel');
    const resetFiltersBtn = document.getElementById('resetFilters');

    const sellConnectPrompt = document.getElementById('sellConnectPrompt');
    const sellItemsMsg      = document.getElementById('sellItemsMsg');
    const sellForm          = document.getElementById('sellForm');
    const sellToken         = document.getElementById('sellToken');
    const sellPrice         = document.getElementById('sellPrice');
    const sellPreview       = document.getElementById('sellPreview');
    const sellPreviewImg    = document.getElementById('sellPreviewImg');
    const sellPreviewName   = document.getElementById('sellPreviewName');
    const sellPreviewId     = document.getElementById('sellPreviewId');
    const sellPreviewStatus = document.getElementById('sellPreviewStatus');
    const approveBtn        = document.getElementById('approveBtn');
    const listBtn           = document.getElementById('listBtn');
    const sellStatus        = document.getElementById('sellStatus');
    const feeNote           = document.getElementById('feeNote');

    const detailOverlay = document.getElementById('detailOverlay');
    const detailClose   = document.getElementById('detailClose');
    const detailTitle   = document.getElementById('detailTitle');
    const detailImg     = document.getElementById('detailImg');
    const detailName    = document.getElementById('detailName');
    const detailStats   = document.getElementById('detailStats');
    const detailMeta    = document.getElementById('detailMeta');
    const detailFooter  = document.getElementById('detailFooter');

    // ====================================================================
    // Wallet
    // ====================================================================
    function onConnected(addr, sgn) {
      userAddress = addr;
      signer      = sgn;
      walletBtn.textContent = truncateAddress(addr);
      walletBtn.classList.add('connected');
      updateSellPanel();
      loadFee();
    }

    function onDisconnected() {
      userAddress = null;
      signer      = null;
      walletBtn.textContent = 'CONNECT';
      walletBtn.classList.remove('connected');
      updateSellPanel();
    }

    walletBtn.addEventListener('click', () => {
      if (userAddress) disconnectDropdown.classList.toggle('show');
      else walletModal.classList.add('show');
    });
    disconnectBtn.addEventListener('click', () => {
      disconnect();
      disconnectDropdown.classList.remove('show');
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.wallet-wrapper')) disconnectDropdown.classList.remove('show');
    });
    modalClose.addEventListener('click', () => walletModal.classList.remove('show'));
    walletModal.addEventListener('click', e => { if (e.target === walletModal) walletModal.classList.remove('show'); });
    document.querySelectorAll('.wallet-option').forEach(opt => {
      opt.addEventListener('click', () => {
        walletModal.classList.remove('show');
        connectWallet(opt.dataset.wallet, { onConnected, onDisconnected });
      });
    });

    // ====================================================================
    // Tabs
    // ====================================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ====================================================================
    // Collection toggle
    // ====================================================================
    document.querySelectorAll('.coll-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.coll-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCollection = btn.dataset.coll;
        statFilterBar.style.display = activeCollection === 'chads' ? 'flex' : 'none';
        updateSellPanel();
        loadListings();
      });
    });

    // ====================================================================
    // Stat filter listeners
    // ====================================================================
    [filterStr, filterInt, filterDex, filterCha, filterLevel, filterSort].forEach(el => {
      el.addEventListener('change', () => renderListings(allListings));
    });
    filterSearch.addEventListener('input', () => renderListings(allListings));
    resetFiltersBtn.addEventListener('click', () => {
      filterStr.value   = '0';
      filterInt.value   = '0';
      filterDex.value   = '0';
      filterCha.value   = '0';
      filterLevel.value = '1';
      filterSearch.value = '';
      filterSort.value  = 'price-asc';
      renderListings(allListings);
    });

    // ====================================================================
    // Marketplace fee
    // ====================================================================
    async function loadFee() {
      if (!MARKET_ADDRESS) return;
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        feeBps = (await market.feeBps()).toNumber();
      } catch (_) {}
    }

    // ====================================================================
    // Load listings from events
    // ====================================================================
    async function loadListings() {
      if (!MARKET_ADDRESS) {
        listingsGrid.innerHTML = '<div class="empty-state">Market contract not yet deployed.</div>';
        return;
      }
      if (activeCollection === 'items') {
        listingsGrid.innerHTML = '<div class="empty-state">Items marketplace coming soon.</div>';
        allListings = [];
        return;
      }

      listingsGrid.innerHTML = '<div class="empty-state loading-dots">Loading listings</div>';

      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const collAddr = COLLECTIONS.chads.address;
        const events   = await market.queryFilter(market.filters.Listed(collAddr), 0, 'latest');

        const seen   = new Set();
        const active = [];

        for (const ev of events.reverse()) {
          const key = ev.args.nftContract + ':' + ev.args.tokenId.toString();
          if (seen.has(key)) continue;
          seen.add(key);
          const listing = await market.getListing(ev.args.nftContract, ev.args.tokenId);
          if (listing.active) active.push(listing);
        }

        await Promise.all([
          loadStatsForListings(active),
          loadLastSales(market, collAddr),
        ]);

        allListings = active;
        renderListings(allListings);
      } catch (e) {
        listingsGrid.innerHTML = '<div class="empty-state">Failed to load listings.</div>';
        console.error(e);
      }
    }

    // ====================================================================
    // Batch load stats for all listed Chads
    // ====================================================================
    async function loadStatsForListings(listings) {
      const nft = new ethers.Contract(COLLECTIONS.chads.address, ERC721_ABI, readProvider);
      await Promise.all(listings.map(async l => {
        const tid = l.tokenId.toString();
        if (statsCache.has(tid)) return;
        try {
          const [stats, xp, level, name] = await Promise.all([
            nft.getStats(l.tokenId),
            nft.getExperience(l.tokenId),
            nft.getLevel(l.tokenId),
            nft.tokenName(l.tokenId),
          ]);
          statsCache.set(tid, {
            str:   stats.strength.toNumber(),
            int:   stats.intelligence.toNumber(),
            dex:   stats.dexterity.toNumber(),
            cha:   stats.charisma.toNumber(),
            xp:    xp.toNumber(),
            level: level.toNumber(),
            name:  name || '',
          });
        } catch (_) {
          statsCache.set(tid, { str: 0, int: 0, dex: 0, cha: 0, xp: 0, level: 1, name: '' });
        }
      }));
    }

    // ====================================================================
    // Load last sale prices from Sold events
    // ====================================================================
    async function loadLastSales(market, collAddr) {
      try {
        const soldEvents = await market.queryFilter(market.filters.Sold(collAddr), 0, 'latest');
        // Iterate oldest→newest so the last write wins (= most recent sale)
        for (const ev of soldEvents) {
          const key = ev.args.nftContract.toLowerCase() + ':' + ev.args.tokenId.toString();
          lastSaleCache.set(key, ethers.utils.formatEther(ev.args.price));
        }
      } catch (_) {}
    }

    // ====================================================================
    // Render listings with filters + sort
    // ====================================================================
    function renderListings(listings) {
      const sortBy   = filterSort.value;
      const search   = filterSearch.value.toLowerCase().trim();
      const minStr   = parseInt(filterStr.value)   || 0;
      const minInt   = parseInt(filterInt.value)   || 0;
      const minDex   = parseInt(filterDex.value)   || 0;
      const minCha   = parseInt(filterCha.value)   || 0;
      const minLevel = parseInt(filterLevel.value) || 1;

      let filtered = listings.filter(l => {
        const tid = l.tokenId.toString();
        const s   = statsCache.get(tid) || { str: 0, int: 0, dex: 0, cha: 0, level: 1, name: '' };

        if (s.str   < minStr)   return false;
        if (s.int   < minInt)   return false;
        if (s.dex   < minDex)   return false;
        if (s.cha   < minCha)   return false;
        if (s.level < minLevel) return false;

        if (search) {
          const nameHit = s.name.toLowerCase().includes(search);
          const idHit   = ('chad #' + tid).includes(search) || tid.includes(search);
          if (!nameHit && !idHit) return false;
        }

        return true;
      });

      // Sort
      const stat = key => l => (statsCache.get(l.tokenId.toString()) || {})[key] || 0;
      if (sortBy === 'price-asc')   filtered.sort((a, b) => a.price.lt(b.price) ? -1 : 1);
      if (sortBy === 'price-desc')  filtered.sort((a, b) => b.price.lt(a.price) ? -1 : 1);
      if (sortBy === 'level-desc')  filtered.sort((a, b) => stat('level')(b) - stat('level')(a));
      if (sortBy === 'str-desc')    filtered.sort((a, b) => stat('str')(b) - stat('str')(a));
      if (sortBy === 'int-desc')    filtered.sort((a, b) => stat('int')(b) - stat('int')(a));
      if (sortBy === 'dex-desc')    filtered.sort((a, b) => stat('dex')(b) - stat('dex')(a));
      if (sortBy === 'cha-desc')    filtered.sort((a, b) => stat('cha')(b) - stat('cha')(a));

      if (filtered.length === 0) {
        listingsGrid.innerHTML = '<div class="empty-state">No listings found.</div>';
        return;
      }

      listingsGrid.innerHTML = '';
      filtered.forEach(l => {
        const tid       = l.tokenId.toString();
        const imgSrc    = COLLECTIONS.chads.imageBase + tid + '.png';
        const priceAvax = ethers.utils.formatEther(l.price);
        const isOwn     = userAddress && l.seller.toLowerCase() === userAddress.toLowerCase();
        const s         = statsCache.get(tid) || { str: 0, int: 0, dex: 0, cha: 0, level: 1, name: '' };
        const lastSale  = lastSaleCache.get(l.nftContract.toLowerCase() + ':' + tid) || null;
        const displayName = s.name ? s.name : 'CHAD #' + tid;

        const card = document.createElement('div');
        card.className = 'nft-card';
        card.innerHTML = `
          <div class="nft-card-thumb" data-token="${tid}">
            <img src="${imgSrc}" alt="${displayName}" onerror="this.style.display='none'">
          </div>
          <div class="nft-card-body">
            ${isOwn ? '<div class="my-listing-badge">YOUR LISTING</div>' : ''}
            <div class="nft-card-name" data-token="${tid}">${displayName}</div>
            <div class="stat-badges">
              <span class="stat-badge sb-str">STR ${s.str}</span>
              <span class="stat-badge sb-int">INT ${s.int}</span>
              <span class="stat-badge sb-dex">DEX ${s.dex}</span>
              <span class="stat-badge sb-cha">CHA ${s.cha}</span>
              <span class="stat-badge sb-lvl">LV${s.level}</span>
            </div>
            <div class="nft-card-price">${priceAvax} AVAX</div>
            <div class="nft-last-sale">${lastSale ? 'Last: ' + lastSale + ' AVAX' : 'No prior sales'}</div>
            <div class="nft-card-seller">Seller: ${truncAddr(l.seller)}</div>
            ${isOwn ? `
              <button class="update-price-btn" data-contract="${l.nftContract}" data-token="${tid}">UPDATE PRICE</button>
              <div class="update-price-form" id="upf-${tid}">
                <input class="update-price-input" type="number" placeholder="New price (AVAX)" min="0.001" step="0.001" id="upi-${tid}">
                <button class="update-price-confirm" data-contract="${l.nftContract}" data-token="${tid}">CONFIRM</button>
                <button class="update-price-cancel" data-token="${tid}">CANCEL</button>
              </div>
              <button class="delist-btn" data-contract="${l.nftContract}" data-token="${tid}">DELIST</button>
            ` : `
              <button class="buy-btn" data-contract="${l.nftContract}" data-token="${tid}" data-price="${l.price}">
                ${userAddress ? 'BUY' : 'CONNECT TO BUY'}
              </button>
            `}
          </div>`;

        listingsGrid.appendChild(card);
      });

      // Buy / delist / update handlers
      listingsGrid.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', () => buyNFT(btn.dataset.contract, btn.dataset.token, btn.dataset.price, btn));
      });
      listingsGrid.querySelectorAll('.delist-btn').forEach(btn => {
        btn.addEventListener('click', () => delistNFT(btn.dataset.contract, btn.dataset.token, btn));
      });
      listingsGrid.querySelectorAll('.update-price-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('upf-' + btn.dataset.token).classList.toggle('show');
        });
      });
      listingsGrid.querySelectorAll('.update-price-confirm').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = document.getElementById('upi-' + btn.dataset.token).value;
          updatePrice(btn.dataset.contract, btn.dataset.token, val, btn);
        });
      });
      listingsGrid.querySelectorAll('.update-price-cancel').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('upf-' + btn.dataset.token).classList.remove('show');
        });
      });

      // Click image or name → detail modal
      listingsGrid.querySelectorAll('.nft-card-thumb, .nft-card-name').forEach(el => {
        el.addEventListener('click', () => {
          const listing = filtered.find(l => l.tokenId.toString() === el.dataset.token);
          if (listing) openDetailModal(listing);
        });
      });
    }

    // ====================================================================
    // Buy
    // ====================================================================
    async function buyNFT(nftContract, tokenId, price, btn) {
      if (!userAddress) { walletModal.classList.add('show'); return; }
      btn.disabled = true;
      btn.textContent = 'BUYING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.buy(nftContract, tokenId, { value: price });
        btn.textContent = 'CONFIRMING...';
        await tx.wait();
        btn.textContent = 'SOLD!';
        statsCache.clear();
        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'BUY';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Delist
    // ====================================================================
    async function delistNFT(nftContract, tokenId, btn) {
      if (!userAddress) return;
      btn.disabled = true;
      btn.textContent = 'DELISTING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.delist(nftContract, tokenId);
        await tx.wait();
        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'DELIST';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Update Price  (delist → relist, 2 transactions)
    // ====================================================================
    async function updatePrice(nftContract, tokenId, newPriceStr, btn) {
      if (!userAddress) return;
      const newPrice = parseFloat(newPriceStr);
      if (!newPrice || newPrice <= 0) { alert('Enter a valid price greater than 0.'); return; }

      btn.disabled = true;
      btn.textContent = 'DELISTING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx1 = await market.delist(nftContract, tokenId);
        await tx1.wait();

        btn.textContent = 'RELISTING...';
        const priceWei = ethers.utils.parseEther(newPriceStr);
        const tx2 = await market.list(nftContract, tokenId, priceWei);
        await tx2.wait();

        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'CONFIRM';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Detail Modal
    // ====================================================================
    function openDetailModal(listing) {
      const tid         = listing.tokenId.toString();
      const s           = statsCache.get(tid) || { str: 0, int: 0, dex: 0, cha: 0, level: 1, xp: 0, name: '' };
      const priceAvax   = ethers.utils.formatEther(listing.price);
      const isOwn       = userAddress && listing.seller.toLowerCase() === userAddress.toLowerCase();
      const lastSale    = lastSaleCache.get(listing.nftContract.toLowerCase() + ':' + tid) || null;
      const displayName = s.name ? s.name : 'CHAD #' + tid;
      const maxStat     = Math.max(s.str, s.int, s.dex, s.cha, 1);

      detailTitle.textContent = 'CHAD #' + tid;
      detailImg.src = COLLECTIONS.chads.imageBase + tid + '.png';
      detailImg.alt = displayName;
      detailName.textContent = displayName;

      detailStats.innerHTML = [
        statBarRow('STR', s.str, maxStat, 'str'),
        statBarRow('INT', s.int, maxStat, 'int'),
        statBarRow('DEX', s.dex, maxStat, 'dex'),
        statBarRow('CHA', s.cha, maxStat, 'cha'),
      ].join('');

      detailMeta.innerHTML = `
        <div class="detail-meta-row">
          <span class="detail-meta-label">LEVEL</span>
          <span class="detail-meta-val gold">${s.level}</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">EXPERIENCE</span>
          <span class="detail-meta-val">${s.xp} XP</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">LIST PRICE</span>
          <span class="detail-meta-val gold">${priceAvax} AVAX</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">LAST SALE</span>
          <span class="detail-meta-val">${lastSale ? lastSale + ' AVAX' : '—'}</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">SELLER</span>
          <span class="detail-meta-val">${truncAddr(listing.seller)}</span>
        </div>`;

      if (isOwn) {
        detailFooter.innerHTML = `<button class="detail-delist-btn" id="ddBtn">DELIST</button>`;
        document.getElementById('ddBtn').addEventListener('click', () => {
          detailOverlay.classList.remove('show');
          listingsGrid.querySelector(`.delist-btn[data-token="${tid}"]`)?.click();
        });
      } else {
        detailFooter.innerHTML = `<button class="detail-buy-btn" id="dbBtn">BUY — ${priceAvax} AVAX</button>`;
        document.getElementById('dbBtn').addEventListener('click', async e => {
          if (!userAddress) { walletModal.classList.add('show'); return; }
          const btn = e.currentTarget;
          btn.disabled = true;
          btn.textContent = 'BUYING...';
          try {
            const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
            const tx = await market.buy(listing.nftContract, listing.tokenId, { value: listing.price });
            btn.textContent = 'CONFIRMING...';
            await tx.wait();
            detailOverlay.classList.remove('show');
            statsCache.clear();
            loadListings();
          } catch (err) {
            btn.disabled = false;
            btn.textContent = 'BUY — ' + priceAvax + ' AVAX';
            alert('Transaction failed: ' + (err.reason || err.message));
          }
        });
      }

      detailOverlay.classList.add('show');
    }

    function statBarRow(label, val, max, cls) {
      const pct = Math.max(4, Math.round((val / max) * 100));
      return `
        <div class="detail-stat-row">
          <span class="detail-stat-label ${cls}">${label}</span>
          <div class="detail-stat-bar-wrap">
            <div class="detail-stat-bar ${cls}" style="width:${pct}%"></div>
          </div>
          <span class="detail-stat-val">${val}</span>
        </div>`;
    }

    detailClose.addEventListener('click', () => detailOverlay.classList.remove('show'));
    detailOverlay.addEventListener('click', e => {
      if (e.target === detailOverlay) detailOverlay.classList.remove('show');
    });

    // ====================================================================
    // Sell panel
    // ====================================================================
    function updateSellPanel() {
      sellConnectPrompt.style.display = 'none';
      sellItemsMsg.style.display      = 'none';
      sellForm.style.display          = 'none';

      if (activeCollection === 'items') {
        sellItemsMsg.style.display = 'block';
        return;
      }
      if (!userAddress) {
        sellConnectPrompt.style.display = 'block';
        return;
      }
      sellForm.style.display = 'block';
      populateSellTokens();
    }

    async function populateSellTokens() {
      sellToken.innerHTML = '<option value="">Loading...</option>';
      sellPreview.style.display = 'none';
      approveBtn.disabled = true;
      listBtn.disabled    = true;

      if (!userAddress) return;

      const collAddr = COLLECTIONS.chads.address;
      try {
        const nft = new ethers.Contract(collAddr, ERC721_ABI, readProvider);
        const bal = await nft.balanceOf(userAddress);
        sellToken.innerHTML = '<option value="">Select token...</option>';
        for (let i = 0; i < bal.toNumber(); i++) {
          const tokenId = await nft.tokenOfOwnerByIndex(userAddress, i);
          const name    = await nft.tokenName(tokenId).catch(() => '');
          const opt = document.createElement('option');
          opt.value       = tokenId.toString();
          opt.textContent = name || 'CHAD #' + tokenId.toString();
          sellToken.appendChild(opt);
        }
        if (bal.toNumber() === 0) {
          sellToken.innerHTML = '<option value="">No Chads in wallet</option>';
        }
      } catch {
        sellToken.innerHTML = '<option value="">Error loading tokens</option>';
      }
    }

    sellToken.addEventListener('change', async () => {
      const tokenId  = sellToken.value;
      const collAddr = COLLECTIONS.chads.address;
      approveBtn.disabled  = true;
      listBtn.disabled     = true;
      sellStatus.className = 'status-msg';

      if (!tokenId) { sellPreview.style.display = 'none'; return; }

      sellPreviewImg.src             = COLLECTIONS.chads.imageBase + tokenId + '.png';
      sellPreviewName.textContent    = 'CHAD #' + tokenId;
      sellPreviewId.textContent      = tokenId;
      sellPreview.style.display      = 'flex';

      try {
        const nft        = new ethers.Contract(collAddr, ERC721_ABI, readProvider);
        const approved   = await nft.isApprovedForAll(userAddress, MARKET_ADDRESS);
        const singleApp  = await nft.getApproved(tokenId);
        const isApproved = approved || singleApp.toLowerCase() === MARKET_ADDRESS.toLowerCase();

        const market  = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const listing = await market.getListing(collAddr, tokenId);
        if (listing.active) {
          sellPreviewStatus.textContent = 'Listed at ' + ethers.utils.formatEther(listing.price) + ' AVAX';
          showStatus('sellStatus', 'info', 'Already listed. Delist from Browse first.');
          return;
        }

        sellPreviewStatus.textContent = isApproved ? 'Approved ✓' : 'Not approved';
        approveBtn.disabled  = isApproved;
        approveBtn.textContent = isApproved ? '1. APPROVED ✓' : '1. APPROVE MARKET';
        listBtn.disabled     = !isApproved;
        updateFeeNote();
      } catch {
        sellPreviewStatus.textContent = 'Error checking status';
      }
    });

    sellPrice.addEventListener('input', updateFeeNote);

    function updateFeeNote() {
      const price = parseFloat(sellPrice.value);
      if (price > 0) {
        const fee    = price * feeBps / 10000;
        const payout = price - fee;
        feeNote.textContent = `Fee: ${fee.toFixed(4)} AVAX (${feeBps / 100}%)  |  You receive: ${payout.toFixed(4)} AVAX`;
      } else {
        feeNote.textContent = `Marketplace fee: ${feeBps / 100}%`;
      }
    }

    approveBtn.addEventListener('click', async () => {
      approveBtn.disabled    = true;
      approveBtn.textContent = 'APPROVING...';
      try {
        const nft = new ethers.Contract(COLLECTIONS.chads.address, ERC721_ABI, signer);
        const tx  = await nft.setApprovalForAll(MARKET_ADDRESS, true);
        showStatus('sellStatus', 'info', 'Waiting for approval confirmation...');
        await tx.wait();
        approveBtn.textContent = '1. APPROVED ✓';
        listBtn.disabled = false;
        showStatus('sellStatus', 'ok', 'Approved! Set your price and list.');
      } catch (e) {
        approveBtn.disabled    = false;
        approveBtn.textContent = '1. APPROVE MARKET';
        showStatus('sellStatus', 'error', e.reason || e.message);
      }
    });

    listBtn.addEventListener('click', async () => {
      const tokenId = sellToken.value;
      const price   = sellPrice.value;
      if (!tokenId || !price || parseFloat(price) <= 0) {
        showStatus('sellStatus', 'error', 'Select a token and enter a valid price.');
        return;
      }
      listBtn.disabled    = true;
      listBtn.textContent = 'LISTING...';
      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const priceWei = ethers.utils.parseEther(price);
        const tx       = await market.list(COLLECTIONS.chads.address, tokenId, priceWei);
        showStatus('sellStatus', 'info', 'Waiting for confirmation...');
        await tx.wait();
        listBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellStatus', 'ok', 'Listed! Check the Browse tab.');
        sellToken.value           = '';
        sellPreview.style.display = 'none';
        listBtn.disabled          = true;
        approveBtn.disabled       = true;
        loadListings();
      } catch (e) {
        listBtn.disabled    = false;
        listBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellStatus', 'error', e.reason || e.message);
      }
    });

    // ====================================================================
    // Helpers
    // ====================================================================
    function truncAddr(addr) {
      return addr ? addr.slice(0, 6) + '...' + addr.slice(-4) : '';
    }

    function showStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className  = 'status-msg ' + type;
      el.textContent = msg;
    }

    // ====================================================================
    // Init
    // ====================================================================
    loadListings();
    loadFee();
    autoReconnect({ onConnected, onDisconnected });
    sellConnectPrompt.style.display = 'block';
    sellForm.style.display = 'none';
  </script>
  <script src="nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market | Last Chad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      color: #f5e6c8;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('assets/mainbg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(90,65,30,0.4) 0%, transparent 70%),
        linear-gradient(180deg, rgba(30,20,10,0.3) 0%, rgba(30,20,10,0.6) 100%);
    }

    /* --- Header --- */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(30,20,10,0.9);
      border-bottom: 2px solid #5c4409;
      backdrop-filter: blur(8px);
    }

    .wallet-wrapper { position: relative; }

    .wallet-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      padding: 10px 18px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,220,120,0.4), 0 2px 6px rgba(0,0,0,0.5);
      touch-action: manipulation;
    }
    .wallet-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .wallet-btn.connected {
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border-color: #d4a017;
      color: #1a1005;
      font-size: 0.65rem;
    }

    .disconnect-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px); right: 0;
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 110;
      min-width: 160px;
    }
    .disconnect-dropdown.show { display: block; }
    .disconnect-btn {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #e53935;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    .disconnect-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Main --- */
    .main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 100px 20px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-title {
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #d4a017;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(212,160,23,0.5);
    }
    .page-sub {
      font-size: 0.55rem;
      color: #8a7a5a;
      text-align: center;
      margin-bottom: 28px;
    }

    /* --- Collection Toggle --- */
    .collection-toggle {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .coll-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      padding: 13px 32px;
      background: rgba(10,8,3,0.6);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #8a7a5a;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 150px;
      text-align: center;
    }
    .coll-btn:hover { border-color: #d4a017; color: #d4a017; }
    .coll-btn.active {
      background: linear-gradient(180deg, #2a1e08 0%, #1a1005 100%);
      border-color: #d4a017;
      color: #d4a017;
      box-shadow: 0 0 14px rgba(212,160,23,0.2);
    }

    /* --- Tabs --- */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid #5c4409;
    }
    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 10px 18px;
      background: transparent;
      border: 2px solid transparent;
      border-bottom: none;
      color: #8a7a5a;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: #d4a017; }
    .tab-btn.active {
      background: rgba(30,20,10,0.8);
      border-color: #5c4409;
      border-bottom: 2px solid #3b2a14;
      color: #d4a017;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }


    /* --- Filter bar --- */
    .filter-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 8px 12px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
    }
    .filter-bar select option { background: #1e1608; }
    .filter-bar input::placeholder { color: #5c4409; }

    /* --- NFT Grid --- */
    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    .nft-card {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #5c4409;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .nft-card:hover { border-color: #d4a017; transform: translateY(-2px); }

    .nft-card-thumb {
      cursor: pointer;
      display: block;
      position: relative;
    }
    .nft-card-thumb img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      image-rendering: pixelated;
      background: #0a0803;
    }
    .nft-card-thumb:hover img { opacity: 0.85; }

    .nft-card-body { padding: 10px 12px; }

    .nft-card-name {
      font-size: 0.55rem;
      color: #f5e6c8;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .nft-card-name:hover { color: #d4a017; }

    /* Stat badges */
    .stat-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stat-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.36rem;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .sb-str { background: rgba(200,50,50,0.2);  color: #e57373; border: 1px solid rgba(198,40,40,0.5); }
    .sb-int { background: rgba(50,100,200,0.2); color: #90caf9; border: 1px solid rgba(21,101,192,0.5); }
    .sb-dex { background: rgba(50,180,80,0.2);  color: #a5d6a7; border: 1px solid rgba(46,125,50,0.5); }
    .sb-cha { background: rgba(150,50,200,0.2); color: #ce93d8; border: 1px solid rgba(123,31,162,0.5); }
    .sb-lvl { background: rgba(212,160,23,0.15); color: #d4a017; border: 1px solid rgba(139,105,20,0.5); }
    .sb-cells { background: rgba(0,200,150,0.15); color: #4dd0a0; border: 1px solid rgba(0,150,100,0.5); }

    .collection-stats-box {
      background: rgba(30,20,10,0.85);
      border: 2px solid #5c4409;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #f5e6c8;
    }
    .collection-stats-box .stat-label { color: #9e8a6a; margin-right: 6px; }
    .collection-stats-box .stat-value { color: #4dd0a0; }

    .nft-card-price {
      font-size: 0.65rem;
      color: #d4a017;
      margin-bottom: 3px;
    }
    .nft-last-sale {
      font-size: 0.38rem;
      color: #5c4409;
      margin-bottom: 8px;
    }
    .nft-card-seller {
      font-size: 0.38rem;
      color: #5c4409;
      margin-bottom: 10px;
    }

    .buy-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 8px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      transition: all 0.2s;
    }
    .buy-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .my-listing-badge {
      font-size: 0.38rem;
      color: #4caf50;
      margin-bottom: 6px;
    }

    .eliminated-card { opacity: 0.6; }
    .eliminated-card .nft-card-thumb img { filter: grayscale(100%); }

    .eliminated-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      color: #ff4444;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border: 2px solid #ff4444;
      border-radius: 4px;
      pointer-events: none;
      z-index: 2;
    }

    .eliminated-badge {
      font-size: 0.38rem;
      color: #ff4444;
      margin-bottom: 6px;
    }

    .recent-sales-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #3d2e0a;
    }
    .section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #c9a84c;
      margin-bottom: 12px;
    }
    .recent-sales-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sale-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(30,20,10,0.6);
      border: 1px solid #3d2e0a;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.36rem;
      color: #f5e6c8;
    }
    .sale-row .sale-id { color: #c9a84c; }
    .sale-row .sale-price { color: #4dd0a0; }
    .sale-row .sale-buyer { color: #9e8a6a; }

    .update-price-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px;
      background: transparent;
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #90caf9;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .update-price-btn:hover { background: rgba(90,138,175,0.15); }

    .update-price-form { display: none; margin-top: 6px; }
    .update-price-form.show { display: block; }
    .update-price-input {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px 10px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
      margin-bottom: 5px;
    }
    .update-price-confirm {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      padding: 7px;
      background: linear-gradient(180deg, #1a3a5c 0%, #0e2340 100%);
      border: 2px solid #5c8aaf;
      border-radius: 4px;
      color: #90caf9;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .update-price-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .update-price-cancel {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      padding: 5px;
      background: none;
      border: 1px solid #5c4409;
      border-radius: 4px;
      color: #8a7a5a;
      cursor: pointer;
    }

    .delist-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 7px;
      background: transparent;
      border: 2px solid #e53935;
      border-radius: 4px;
      color: #e53935;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .delist-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Blinking loading --- */
    .loading {
      color: #ffaa40;
      font-size: 0.6rem;
      animation: blink 1s step-end infinite;
      text-align: center;
      margin-bottom: 16px;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* --- Empty / loading --- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #5c4409;
      font-size: 0.6rem;
      line-height: 2.5;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* --- Detail Modal --- */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.82);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .detail-overlay.show { display: flex; }

    .detail-box {
      background: linear-gradient(180deg, #1e1608 0%, #140f05 100%);
      border: 2px solid #d4a017;
      border-radius: 8px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #5c4409;
      flex-shrink: 0;
    }
    .detail-title { font-size: 0.75rem; color: #d4a017; }
    .detail-close {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      background: none;
      border: none;
      color: #8a7a5a;
      cursor: pointer;
      padding: 4px 8px;
    }
    .detail-close:hover { color: #f5e6c8; }

    .detail-body {
      display: flex;
      gap: 24px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .detail-img-col { flex: 0 0 200px; }
    .detail-img-col img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
      image-rendering: pixelated;
      background: #0a0803;
      border: 2px solid #5c4409;
      display: block;
    }

    .detail-info-col { flex: 1; min-width: 200px; }
    .detail-name { font-size: 0.7rem; color: #f5e6c8; margin-bottom: 18px; }

    .detail-stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-stat-label {
      font-size: 0.42rem;
      width: 32px;
      flex-shrink: 0;
    }
    .detail-stat-label.str { color: #e57373; }
    .detail-stat-label.int { color: #90caf9; }
    .detail-stat-label.dex { color: #a5d6a7; }
    .detail-stat-label.cha { color: #ce93d8; }

    .detail-stat-bar-wrap {
      flex: 1;
      height: 7px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .detail-stat-bar { height: 100%; border-radius: 2px; }
    .detail-stat-bar.str { background: #e57373; }
    .detail-stat-bar.int { background: #90caf9; }
    .detail-stat-bar.dex { background: #a5d6a7; }
    .detail-stat-bar.cha { background: #ce93d8; }

    .detail-stat-val {
      font-size: 0.48rem;
      color: #f5e6c8;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .detail-divider { border: none; border-top: 1px solid #3a2a0a; margin: 14px 0; }

    .detail-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }
    .detail-meta-label { font-size: 0.42rem; color: #8a7a5a; }
    .detail-meta-val   { font-size: 0.48rem; color: #f5e6c8; }
    .detail-meta-val.gold { color: #d4a017; }

    .detail-footer {
      padding: 14px 20px;
      border-top: 1px solid #5c4409;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .detail-buy-btn {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 11px;
      background: linear-gradient(180deg, #c9a84c 0%, #8b6914 100%);
      border: 2px solid #d4a017;
      border-radius: 4px;
      color: #1a1005;
      cursor: pointer;
      min-width: 140px;
    }
    .detail-buy-btn:hover { background: linear-gradient(180deg, #dabb5e 0%, #a07d1e 100%); }
    .detail-buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .detail-delist-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      padding: 11px 16px;
      background: transparent;
      border: 2px solid #e53935;
      border-radius: 4px;
      color: #e53935;
      cursor: pointer;
    }
    .detail-delist-btn:hover { background: rgba(229,57,53,0.15); }

    /* --- Coming Soon --- */
    .coming-soon {
      text-align: center;
      padding: 80px 20px;
    }
    .coming-soon .cs-icon { font-size: 2.5rem; margin-bottom: 20px; display: block; }
    .coming-soon h3 { font-size: 0.75rem; color: #d4a017; margin-bottom: 16px; }
    .coming-soon p  { font-size: 0.5rem; color: #8a7a5a; line-height: 2.5; max-width: 380px; margin: 0 auto; }

    /* --- Sell Panel --- */
    .sell-section { max-width: 520px; }
    .sell-section h2 { font-size: 0.75rem; color: #d4a017; margin-bottom: 20px; }

    /* Sell grid */
    .sell-nft-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .sell-grid-heading {
      grid-column: 1 / -1;
      font-size: 0.5rem;
      color: #8a7a5a;
      margin: 8px 0 4px;
    }
    .sell-nft-card {
      background: rgba(10,8,3,0.6);
      border: 2px solid #3d2e0a;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s;
      overflow: hidden;
      text-align: center;
    }
    .sell-nft-card:hover { border-color: #8b6914; }
    .sell-nft-card.selected { border-color: #d4a017; background: rgba(61,46,10,0.3); }
    .sell-nft-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      image-rendering: pixelated;
      display: block;
      background: #0a0803;
    }
    .sell-card-name {
      font-size: 0.38rem;
      color: #f5e6c8;
      padding: 6px 4px 2px;
      line-height: 1.6;
      word-break: break-word;
    }
    .sell-card-price {
      font-size: 0.35rem;
      padding: 2px 4px 6px;
    }
    .sell-card-price.listed { color: #d4a017; }
    .sell-card-price.unlisted { color: #5c4409; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.55rem;
      color: #8a7a5a;
      margin-bottom: 8px;
    }
    .form-group select,
    .form-group input {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 14px;
      background: rgba(10,8,3,0.8);
      border: 2px solid #5c4409;
      border-radius: 4px;
      color: #f5e6c8;
      outline: none;
    }
    .form-group select:focus,
    .form-group input:focus { border-color: #d4a017; }
    .form-group select option { background: #1e1608; }

    .nft-preview-row {
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(10,8,3,0.5);
      border: 1px solid #5c4409;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 18px;
    }
    .nft-preview-row img {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: 4px;
      image-rendering: pixelated;
      background: #0a0803;
      border: 1px solid #5c4409;
    }
    .nft-preview-info { font-size: 0.55rem; line-height: 2; }
    .nft-preview-info .label { color: #8a7a5a; }
    .nft-preview-info .value { color: #f5e6c8; }

    .fee-note { font-size: 0.45rem; color: #5c4409; margin-bottom: 18px; line-height: 2; }

    .approve-btn {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 12px;
      background: linear-gradient(180deg, #2e5c2e 0%, #1a3d1a 100%);
      border: 2px solid #4caf50;

    }

    .list-btn {

    .connect-prompt { text-align: center; padding: 60px 20px; }
    .connect-prompt p { font-size: 0.6rem; color: #8a7a5a; line-height: 2.5; }

    .modal-overlay {
      display: none;

      inset: 0;

      color: #f5e6c8;
      background: rgba(255,255,255,0.04);
      border: 1px solid #5c4409;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;

      margin-top: 8px;
      width: 100%;
      padding: 10px;
      font-family: 'Press Start 2P', monospace;

      color: #8a7a5a;
      background: none;
      border: 1px solid #5c4409;
      border-radius: 4px;
      cursor: pointer;
    }

    /* === Desktop === */
    @media (min-width: 900px) {
      .main { max-width: clamp(900px, 80vw, 1400px); padding: 100px 3vw 80px; }
    }
  </style>
</head>
<body>

    <!-- Collection Toggle -->
    <div class="collection-toggle">

    <div class="tab-panel active" id="tab-browse">

          <img id="sellPreviewImg" src="" alt="NFT Preview">

            <div><span class="label">Token: </span><span class="value" id="sellPreviewId">—</span></div>
            <div><span class="label">Status: </span><span class="value" id="sellPreviewStatus">—</span></div>
          </div>
        </div>

        <div class="form-group">
          <label>Price (AVAX)</label>
          <input type="number" id="sellPrice" placeholder="0.00" min="0" step="0.001">
        </div>

        <div class="fee-note" id="feeNote"></div>

        <button class="approve-btn" id="approveBtn" disabled>1. APPROVE MARKET</button>
        <button class="list-btn"    id="listBtn"    disabled>2. LIST FOR SALE</button>
        <div class="status-msg" id="sellStatus"></div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script type="module">
    import { connectWallet, autoReconnect, disconnect, truncateAddress, getSigner } from './js/wallet.js';
    import { CONTRACT_ADDRESS, ITEMS_CONTRACT_ADDRESS, READ_RPC, MARKET_ADDRESS, MARKET_ABI } from './js/config.js';

    const COLLECTIONS = {
      chads: { label: 'Last Chad', address: CONTRACT_ADDRESS,       imageBase: '/assets/chads/framed/' },
      items: { label: 'LC Items',  address: ITEMS_CONTRACT_ADDRESS, imageBase: '/assets/items/' },
    };

    // ====================================================================
    // ABIs
    // ====================================================================

    const ERC1155_ABI = [
      'function balanceOf(address account, uint256 id) view returns (uint256)',
      'function isApprovedForAll(address account, address operator) view returns (bool)',
      'function setApprovalForAll(address operator, bool approved)',
    ];

    const knownItems = { '1': "Cindy's Code" };

    const ERC721_ABI = [
      'function balanceOf(address owner) view returns (uint256)',
      'function totalSupply() view returns (uint256)',
      'function tokenOfOwnerByIndex(address owner, uint256 index) view returns (uint256)',
      'function isApprovedForAll(address owner, address operator) view returns (bool)',
      'function setApprovalForAll(address operator, bool approved)',
      'function getApproved(uint256 tokenId) view returns (address)',
      'function ownerOf(uint256 tokenId) view returns (address)',
      'function getStats(uint256 tokenId) view returns (uint32 strength, uint32 intelligence, uint32 dexterity, uint32 charisma, bool assigned)',
      'function getLevel(uint256 tokenId) view returns (uint256)',
      'function getClosedCells(uint256 tokenId) view returns (uint256)',
      'function tokenName(uint256 tokenId) view returns (string)',
      'function eliminated(uint256 tokenId) view returns (bool)',
      'function getOpenCells(uint256 tokenId) view returns (uint256)',
    ];

    // ====================================================================
    // State
    // ====================================================================
    let userAddress      = null;
    let signer           = null;
    let readProvider     = new ethers.providers.JsonRpcProvider(READ_RPC);
    let feeBps           = 500;
    let activeCollection = 'chads';
    let allListings      = [];
    let allListings1155  = [];
    let selectedChadId   = null;
    let selectedItemId   = null;

    const statsCache    = new Map(); // tokenId -> { str, int, dex, cha, level, xp, name }
    const lastSaleCache = new Map(); // "contract:tokenId" (lowercase) -> priceAvax string

    // ====================================================================
    // DOM refs
    // ====================================================================
    const walletBtn          = document.getElementById('walletBtn');
    const disconnectDropdown = document.getElementById('disconnectDropdown');
    const disconnectBtn      = document.getElementById('disconnectBtn');

    const listingsGrid     = document.getElementById('listingsGrid');
    const filterSort       = document.getElementById('filterSort');
    const filterSearch     = document.getElementById('filterSearch');
    const collectionStats  = document.getElementById('collectionStats');

    const sellConnectPrompt   = document.getElementById('sellConnectPrompt');
    const loadMsg             = document.getElementById('loadMsg');
    const sellItemForm        = document.getElementById('sellItemForm');
    const sellItemToken       = document.getElementById('sellItemToken');
    const sellItemPrice       = document.getElementById('sellItemPrice');
    const sellItemPreview     = document.getElementById('sellItemPreview');
    const sellItemPreviewImg  = document.getElementById('sellItemPreviewImg');
    const sellItemPreviewName = document.getElementById('sellItemPreviewName');
    const sellItemPreviewStatus = document.getElementById('sellItemPreviewStatus');
    const approveItemBtn      = document.getElementById('approveItemBtn');
    const listItemBtn         = document.getElementById('listItemBtn');
    const sellItemStatus      = document.getElementById('sellItemStatus');
    const itemFeeNote         = document.getElementById('itemFeeNote');
    const sellForm            = document.getElementById('sellForm');
    const sellToken         = document.getElementById('sellToken');
    const sellPrice         = document.getElementById('sellPrice');
    const sellPreview       = document.getElementById('sellPreview');
    const sellPreviewImg    = document.getElementById('sellPreviewImg');
    const sellPreviewName   = document.getElementById('sellPreviewName');
    const sellPreviewId     = document.getElementById('sellPreviewId');
    const sellPreviewStatus = document.getElementById('sellPreviewStatus');
    const approveBtn        = document.getElementById('approveBtn');
    const listBtn           = document.getElementById('listBtn');
    const sellStatus        = document.getElementById('sellStatus');
    const feeNote           = document.getElementById('feeNote');

    const detailOverlay = document.getElementById('detailOverlay');
    const detailClose   = document.getElementById('detailClose');
    const detailTitle   = document.getElementById('detailTitle');
    const detailImg     = document.getElementById('detailImg');
    const detailName    = document.getElementById('detailName');
    const detailStats   = document.getElementById('detailStats');
    const detailMeta    = document.getElementById('detailMeta');
    const detailFooter  = document.getElementById('detailFooter');

    // ====================================================================
    // Wallet
    // ====================================================================
    function onConnected(addr) {
      userAddress = addr;
      signer      = getSigner();
      walletBtn.textContent = truncateAddress(addr);
      walletBtn.classList.add('connected');
      updateSellPanel();
      loadFee();
    }

    function onDisconnected() {
      userAddress = null;
      signer      = null;
      walletBtn.textContent = 'CONNECT';
      walletBtn.classList.remove('connected');
      updateSellPanel();
    }

    walletBtn.addEventListener('click', () => {
      if (userAddress) disconnectDropdown.classList.toggle('show');
      else openWalletModal();
    });
    disconnectBtn.addEventListener('click', () => {
      disconnect();
      disconnectDropdown.classList.remove('show');
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.wallet-wrapper')) disconnectDropdown.classList.remove('show');
    });
    document.addEventListener('wallet-selected', e => connectWallet(e.detail.wallet, { onConnected, onDisconnected }));

    // ====================================================================
    // Tabs
    // ====================================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ====================================================================
    // Collection toggle
    // ====================================================================
    document.querySelectorAll('.coll-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.coll-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCollection = btn.dataset.coll;
        updateSellPanel();
        loadListings();
      });
    });

    // ====================================================================
    // Filter / sort listeners
    // ====================================================================
    function rerender() {
      if (activeCollection === 'items') renderListings1155(allListings1155);
      else renderListings(allListings);
    }
    filterSort.addEventListener('change', rerender);
    filterSearch.addEventListener('input', rerender);

    // ====================================================================
    // Marketplace fee
    // ====================================================================
    async function loadFee() {
      if (!MARKET_ADDRESS) return;
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        feeBps = (await market.feeBps()).toNumber();
      } catch (_) {}
    }

    // ====================================================================
    // queryFilter that paginates in 2000-block chunks if the RPC
    // ====================================================================
    // Load listings via on-chain enumeration (getActiveListings / getActiveListings1155).
    // Pages through all results in chunks of PAGE_SIZE so a single view call
    // is never too large.  No event-log scanning → no block-range RPC issues.
    // ====================================================================
    const PAGE_SIZE = 500;

    async function loadListings() {
      if (!MARKET_ADDRESS) {
        listingsGrid.innerHTML = '<div class="empty-state">Market contract not yet deployed.</div>';
        return;
      }
      if (activeCollection === 'items') {
        return loadListings1155();
      }

      listingsGrid.innerHTML = '<div class="empty-state loading-dots">Loading listings</div>';

      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const collAddr = COLLECTIONS.chads.address;
        const active   = [];
        let   offset   = 0;

        // Page through until we have fetched everything
        while (true) {
          const [page, total] = await market.getActiveListings(collAddr, offset, PAGE_SIZE);
          for (const l of page) active.push(l);
          offset += page.length;
          if (offset >= total.toNumber()) break;
        }

        await Promise.all([
          loadStatsForListings(active),
          loadLastSales(market, collAddr),
        ]);

        allListings = active;
        renderListings(allListings);
      } catch (e) {
        listingsGrid.innerHTML = '<div class="empty-state">Failed to load listings.</div>';
        console.error(e);
      }
    }

    // ====================================================================
    // Load ERC-1155 item listings via on-chain enumeration
    // ====================================================================
    async function loadListings1155() {
      listingsGrid.innerHTML = '<div class="empty-state loading-dots">Loading listings</div>';
      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const collAddr = COLLECTIONS.items.address;
        const active   = [];
        let   offset   = 0;

        while (true) {
          const [page, total] = await market.getActiveListings1155(collAddr, offset, PAGE_SIZE);
          for (const l of page) active.push(l);
          offset += page.length;
          if (offset >= total.toNumber()) break;
        }

        allListings1155 = active;
        renderListings1155(allListings1155);
      } catch (e) {
        listingsGrid.innerHTML = '<div class="empty-state">Failed to load listings.</div>';
        console.error(e);
      }
    }

    function renderListings1155(listings) {
      collectionStats.style.display = 'none';
      const searchVal = filterSearch.value.trim().toLowerCase();
      const sortVal   = filterSort.value;

      let filtered = listings.filter(l => {
        if (!searchVal) return true;
        const name = (knownItems[l.tokenId.toString()] || 'Item #' + l.tokenId).toLowerCase();
        return name.includes(searchVal);
      });

      filtered = [...filtered].sort((a, b) => {
        const pa = parseFloat(ethers.utils.formatEther(a.price));
        const pb = parseFloat(ethers.utils.formatEther(b.price));
        if (sortVal === 'price-asc')  return pa - pb;
        if (sortVal === 'price-desc') return pb - pa;
        return 0;
      });

      if (filtered.length === 0) {
        listingsGrid.innerHTML = '<div class="empty-state">No items listed yet.</div>';
        return;
      }

      listingsGrid.innerHTML = filtered.map(l => {
        const tid       = l.tokenId.toString();
        const name      = knownItems[tid] || 'Item #' + tid;
        const priceAvax = ethers.utils.formatEther(l.price);
        const isOwn     = userAddress && l.seller.toLowerCase() === userAddress.toLowerCase();
        const imgSrc    = `/assets/items/${tid}.jpg`;

        return `
          <div class="listing-card">
            <img src="${imgSrc}" class="card-img" alt="${name}" onerror="this.style.opacity='0.3'">
            <div class="card-body">
              <div class="card-name">${name}</div>
              <div class="card-price">${priceAvax} AVAX</div>
              <div class="card-seller">Seller: ${truncAddr(l.seller)}</div>
              ${isOwn
                ? `<button class="delist-btn" data-token="${tid}" data-contract="${COLLECTIONS.items.address}">DELIST</button>`
                : `<button class="buy-btn" data-token="${tid}" data-contract="${COLLECTIONS.items.address}" data-seller="${l.seller}" data-price="${l.price}">BUY</button>`
              }
            </div>
          </div>`;
      }).join('');

      listingsGrid.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', () => buyItem(btn.dataset.contract, btn.dataset.token, btn.dataset.seller, btn.dataset.price, btn));
      });
      listingsGrid.querySelectorAll('.delist-btn').forEach(btn => {
        btn.addEventListener('click', () => delistItem(btn.dataset.contract, btn.dataset.token, btn));
      });
    }

    async function buyItem(nftContract, tokenId, seller, price, btn) {
      if (!userAddress) { openWalletModal(); return; }
      btn.disabled = true;
      btn.textContent = 'BUYING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.buy1155(nftContract, tokenId, seller, { value: price });
        btn.textContent = 'CONFIRMING...';
        await tx.wait();
        btn.textContent = 'SOLD!';
        loadListings1155();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'BUY';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    async function delistItem(nftContract, tokenId, btn) {
      if (!userAddress) return;
      btn.disabled = true;
      btn.textContent = 'DELISTING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.delist1155(nftContract, tokenId);
        await tx.wait();
        loadListings1155();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'DELIST';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Batch load stats for all listed Chads
    // ====================================================================
    async function loadStatsForListings(listings) {
      const nft = new ethers.Contract(COLLECTIONS.chads.address, ERC721_ABI, readProvider);
      await Promise.all(listings.map(async l => {
        const tid = l.tokenId.toString();
        if (statsCache.has(tid)) return;
        try {
          const [stats, xp, level, closedCells, openCells, name, dead] = await Promise.all([
            nft.getStats(l.tokenId),
            nft.getExperience(l.tokenId),
            nft.getLevel(l.tokenId),
            nft.getClosedCells(l.tokenId),
            nft.getOpenCells(l.tokenId),
            nft.tokenName(l.tokenId),
            nft.eliminated(l.tokenId),
          ]);
          const closed = closedCells.toNumber();
          const open   = openCells.toNumber();
          statsCache.set(tid, {
            str:   stats.strength.toNumber(),
            int:   stats.intelligence.toNumber(),
            dex:   stats.dexterity.toNumber(),
            cha:   stats.charisma.toNumber(),
            xp:    xp.toNumber(),
            level: level.toNumber(),
            cells: closed,
            openCells: open,
            totalCells: closed + open,
            name:  name || '',
            eliminated: dead,
          });
        } catch (_) {
          statsCache.set(tid, { str: 0, int: 0, dex: 0, cha: 0, xp: 0, level: 1, cells: 0, openCells: 0, totalCells: 0, name: '', eliminated: false });
        }
      }));
    }

    // ====================================================================
    // Load last sale prices from Sold events (best-effort, non-critical)
    // ====================================================================
    let recentSales = []; // [{ tokenId, buyer, seller, price, blockNumber }]

    async function loadLastSales(market, collAddr) {
      try {
        const latest = await market.provider.getBlockNumber();
        const from   = Math.max(0, latest - 500_000);
        const soldEvents = await market.queryFilter(market.filters.Sold(collAddr), from, 'latest');
        recentSales = [];
        for (const ev of soldEvents) {
          const key = ev.args.nftContract.toLowerCase() + ':' + ev.args.tokenId.toString();
          const priceAvax = ethers.utils.formatEther(ev.args.price);
          lastSaleCache.set(key, priceAvax);
          recentSales.push({
            tokenId: ev.args.tokenId.toString(),
            buyer: ev.args.buyer,
            seller: ev.args.seller,
            price: priceAvax,
            blockNumber: ev.blockNumber,
          });
        }
        recentSales.sort((a, b) => b.blockNumber - a.blockNumber); // newest first
        renderRecentSales();
      } catch (_) {}
    }

    function renderRecentSales() {
      const section = document.getElementById('recentSalesSection');
      const list = document.getElementById('recentSalesList');
      if (!recentSales.length || activeCollection !== 'chads') {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      const display = recentSales.slice(0, 10); // show last 10
      list.innerHTML = display.map(s => {
        const name = (statsCache.get(s.tokenId) || {}).name || '';
        const label = name ? name : 'CHAD #' + s.tokenId;
        return `<div class="sale-row">
          <span class="sale-id">${label}</span>
          <span class="sale-price">${s.price} AVAX</span>
          <span class="sale-buyer">${truncAddr(s.buyer)}</span>
        </div>`;
      }).join('');
    }

    // ====================================================================
    // Render listings with filters + sort
    // ====================================================================
    function updateCollectionStats(listings) {
      if (!listings.length || activeCollection !== 'chads') {
        collectionStats.style.display = 'none';
        return;
      }
      let sum = 0, count = 0;
      let floorWei = null;
      for (const l of listings) {
        const s = statsCache.get(l.tokenId.toString());
        if (s && !s.eliminated) { sum += s.totalCells; count++; }
        if (!floorWei || l.price.lt(floorWei)) floorWei = l.price;
      }
      const avg = count > 0 ? (sum / count).toFixed(1) : '0';
      const floor = floorWei ? ethers.utils.formatEther(floorWei) : '—';
      collectionStats.style.display = 'flex';
      collectionStats.innerHTML =
        `<span><span class="stat-label">FLOOR:</span> <span class="stat-value">${floor} AVAX</span></span>` +
        `<span><span class="stat-label">LISTED:</span> <span class="stat-value">${count} CHADS</span></span>` +
        `<span><span class="stat-label">AVG TOTAL CELLS:</span> <span class="stat-value">${avg}</span></span>` +
        `<span><span class="stat-label">TOTAL CELLS (ALL LISTED):</span> <span class="stat-value">${sum}</span></span>`;
    }

    function renderListings(listings) {
      updateCollectionStats(listings);
      const sortBy = filterSort.value;
      const search = filterSearch.value.toLowerCase().trim();

      let filtered = listings.filter(l => {
        if (!search) return true;
        const tid = l.tokenId.toString();
        const s   = statsCache.get(tid) || { name: '' };
        const nameHit = s.name.toLowerCase().includes(search);
        const idHit   = ('chad #' + tid).includes(search) || tid.includes(search);
        return nameHit || idHit;
      });

      // Sort
      const stat = key => l => (statsCache.get(l.tokenId.toString()) || {})[key] || 0;
      if (sortBy === 'price-asc')   filtered.sort((a, b) => a.price.lt(b.price) ? -1 : 1);
      if (sortBy === 'price-desc')  filtered.sort((a, b) => b.price.lt(a.price) ? -1 : 1);
      if (sortBy === 'cells-asc')   filtered.sort((a, b) => stat('cells')(a) - stat('cells')(b));
      if (sortBy === 'cells-desc')  filtered.sort((a, b) => stat('cells')(b) - stat('cells')(a));
      if (sortBy === 'total-asc')   filtered.sort((a, b) => stat('totalCells')(a) - stat('totalCells')(b));
      if (sortBy === 'total-desc')  filtered.sort((a, b) => stat('totalCells')(b) - stat('totalCells')(a));

      if (filtered.length === 0) {
        listingsGrid.innerHTML = '<div class="empty-state">No listings found.</div>';
        return;
      }

      listingsGrid.innerHTML = '';
      filtered.forEach(l => {
        const tid       = l.tokenId.toString();
        const imgSrc    = COLLECTIONS.chads.imageBase + tid + '.png';
        const priceAvax = ethers.utils.formatEther(l.price);
        const isOwn     = userAddress && l.seller.toLowerCase() === userAddress.toLowerCase();
        const s         = statsCache.get(tid) || { str: 0, int: 0, dex: 0, cha: 0, level: 1, name: '' };
        const lastSale  = lastSaleCache.get(l.nftContract.toLowerCase() + ':' + tid) || null;
        const displayName = s.name ? s.name : 'CHAD #' + tid;

        const isDead = s.eliminated;

        const card = document.createElement('div');
        card.className = 'nft-card' + (isDead ? ' eliminated-card' : '');
        card.innerHTML = `
          <div class="nft-card-thumb" data-token="${tid}">
            <img src="${imgSrc}" alt="${displayName}" onerror="this.style.display='none'">
            ${isDead ? '<div class="eliminated-overlay">ELIMINATED</div>' : ''}
          </div>
          <div class="nft-card-body">
            ${isDead ? '<div class="eliminated-badge">ELIMINATED</div>' : ''}
            ${isOwn ? '<div class="my-listing-badge">YOUR LISTING</div>' : ''}
            <div class="nft-card-name" data-token="${tid}">CHAD #${tid}${s.name ? ' — ' + s.name : ''}</div>
            <div class="stat-badges">
              <span class="stat-badge sb-str">STR ${s.str}</span>
              <span class="stat-badge sb-int">INT ${s.int}</span>
              <span class="stat-badge sb-dex">DEX ${s.dex}</span>
              <span class="stat-badge sb-cha">CHA ${s.cha}</span>
              <span class="stat-badge sb-lvl">LV${s.level}</span>
              <span class="stat-badge sb-cells">${s.totalCells} CELLS</span>
            </div>
            <div class="nft-card-price">${priceAvax} AVAX</div>
            <div class="nft-last-sale">${lastSale ? 'Last: ' + lastSale + ' AVAX' : 'No prior sales'}</div>
            <div class="nft-card-seller">Seller: ${truncAddr(l.seller)}</div>
            ${isOwn ? `
              <button class="update-price-btn" data-contract="${l.nftContract}" data-token="${tid}">UPDATE PRICE</button>
              <div class="update-price-form" id="upf-${tid}">
                <input class="update-price-input" type="number" placeholder="New price (AVAX)" min="0.001" step="0.001" id="upi-${tid}">
                <button class="update-price-confirm" data-contract="${l.nftContract}" data-token="${tid}">CONFIRM</button>
                <button class="update-price-cancel" data-token="${tid}">CANCEL</button>
              </div>
              <button class="delist-btn" data-contract="${l.nftContract}" data-token="${tid}">DELIST</button>
            ` : `
              <button class="buy-btn" data-contract="${l.nftContract}" data-token="${tid}" data-price="${l.price}" ${isDead ? 'disabled' : ''}>
                ${isDead ? 'ELIMINATED' : (userAddress ? 'BUY' : 'CONNECT TO BUY')}
              </button>
            `}
          </div>`;

        listingsGrid.appendChild(card);
      });

      // Buy / delist / update handlers
      listingsGrid.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', () => buyNFT(btn.dataset.contract, btn.dataset.token, btn.dataset.price, btn));
      });
      listingsGrid.querySelectorAll('.delist-btn').forEach(btn => {
        btn.addEventListener('click', () => delistNFT(btn.dataset.contract, btn.dataset.token, btn));
      });
      listingsGrid.querySelectorAll('.update-price-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('upf-' + btn.dataset.token).classList.toggle('show');
        });
      });
      listingsGrid.querySelectorAll('.update-price-confirm').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = document.getElementById('upi-' + btn.dataset.token).value;
          updatePrice(btn.dataset.contract, btn.dataset.token, val, btn);
        });
      });
      listingsGrid.querySelectorAll('.update-price-cancel').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('upf-' + btn.dataset.token).classList.remove('show');
        });
      });

      // Click image or name → detail modal
      listingsGrid.querySelectorAll('.nft-card-thumb, .nft-card-name').forEach(el => {
        el.addEventListener('click', () => {
          const listing = filtered.find(l => l.tokenId.toString() === el.dataset.token);
          if (listing) openDetailModal(listing);
        });
      });
    }

    // ====================================================================
    // Buy
    // ====================================================================
    async function buyNFT(nftContract, tokenId, price, btn) {
      if (!userAddress) { openWalletModal(); return; }
      btn.disabled = true;
      btn.textContent = 'BUYING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.buy(nftContract, tokenId, { value: price });
        btn.textContent = 'CONFIRMING...';
        await tx.wait();
        btn.textContent = 'SOLD!';
        statsCache.clear();
        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'BUY';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Delist
    // ====================================================================
    async function delistNFT(nftContract, tokenId, btn) {
      if (!userAddress) return;
      btn.disabled = true;
      btn.textContent = 'DELISTING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx = await market.delist(nftContract, tokenId);
        await tx.wait();
        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'DELIST';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Update Price  (delist → relist, 2 transactions)
    // ====================================================================
    async function updatePrice(nftContract, tokenId, newPriceStr, btn) {
      if (!userAddress) return;
      const newPrice = parseFloat(newPriceStr);
      if (!newPrice || newPrice <= 0) { alert('Enter a valid price greater than 0.'); return; }

      btn.disabled = true;
      btn.textContent = 'DELISTING...';
      try {
        const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const tx1 = await market.delist(nftContract, tokenId);
        await tx1.wait();

        btn.textContent = 'RELISTING...';
        const priceWei = ethers.utils.parseEther(newPriceStr);
        const tx2 = await market.list(nftContract, tokenId, priceWei);
        await tx2.wait();

        loadListings();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'CONFIRM';
        alert('Transaction failed: ' + (e.reason || e.message));
      }
    }

    // ====================================================================
    // Detail Modal
    // ====================================================================

      const priceAvax   = ethers.utils.formatEther(listing.price);

        statBarRow('STR', s.str, maxStat, 'str'),
        statBarRow('INT', s.int, maxStat, 'int'),
        statBarRow('DEX', s.dex, maxStat, 'dex'),
        statBarRow('CHA', s.cha, maxStat, 'cha'),
      ].join('');

      detailMeta.innerHTML = `
        <div class="detail-meta-row">
          <span class="detail-meta-label">LEVEL</span>
          <span class="detail-meta-val gold">${s.level}</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">EXPERIENCE</span>
          <span class="detail-meta-val">${s.xp} XP</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">LIST PRICE</span>
          <span class="detail-meta-val gold">${priceAvax} AVAX</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">LAST SALE</span>
          <span class="detail-meta-val">${lastSale ? lastSale + ' AVAX' : '—'}</span>
        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-label">SELLER</span>
          <span class="detail-meta-val">${truncAddr(listing.seller)}</span>
        </div>`;

      if (isOwn) {
        detailFooter.innerHTML = `<button class="detail-delist-btn" id="ddBtn">DELIST</button>`;
        document.getElementById('ddBtn').addEventListener('click', () => {
          detailOverlay.classList.remove('show');
          listingsGrid.querySelector(`.delist-btn[data-token="${tid}"]`)?.click();
        });
      } else {
        detailFooter.innerHTML = `<button class="detail-buy-btn" id="dbBtn">BUY — ${priceAvax} AVAX</button>`;
        document.getElementById('dbBtn').addEventListener('click', async e => {
          if (!userAddress) { openWalletModal(); return; }
          const btn = e.currentTarget;
          btn.disabled = true;
          btn.textContent = 'BUYING...';
          try {
            const market = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
            const tx = await market.buy(listing.nftContract, listing.tokenId, { value: listing.price });
            btn.textContent = 'CONFIRMING...';
            await tx.wait();
            detailOverlay.classList.remove('show');
            statsCache.clear();
            loadListings();
          } catch (err) {
            btn.disabled = false;
            btn.textContent = 'BUY — ' + priceAvax + ' AVAX';
            alert('Transaction failed: ' + (err.reason || err.message));
          }
        });
      }

      detailOverlay.classList.add('show');
    }

    function statBarRow(label, val, max, cls) {
      const pct = Math.max(4, Math.round((val / max) * 100));
      return `
        <div class="detail-stat-row">
          <span class="detail-stat-label ${cls}">${label}</span>
          <div class="detail-stat-bar-wrap">
            <div class="detail-stat-bar ${cls}" style="width:${pct}%"></div>
          </div>
          <span class="detail-stat-val">${val}</span>
        </div>`;
    }

    detailClose.addEventListener('click', () => detailOverlay.classList.remove('show'));
    detailOverlay.addEventListener('click', e => {
      if (e.target === detailOverlay) detailOverlay.classList.remove('show');
    });

    // ====================================================================
    // Sell panel
    // ====================================================================
    function updateSellPanel() {
      sellConnectPrompt.style.display = 'none';
      sellItemForm.style.display      = 'none';
      sellForm.style.display          = 'none';
      const gridEl = document.getElementById('myNftGrid');

      if (!userAddress) {
        sellConnectPrompt.style.display = 'block';
        loadMsg.style.display = 'none';
        gridEl.style.display = 'none';
        return;
      }
      loadMsg.style.display = 'block';
      gridEl.style.display = 'none';
      buildSellGrid();
    }

    async function buildSellGrid() {
      const gridEl = document.getElementById('myNftGrid');
      gridEl.innerHTML = '';

      const marketCt = MARKET_ADDRESS
        ? new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider)
        : null;

      const chads = [];
      const items = [];

      // Load owned Chads
      try {
        const nft   = new ethers.Contract(COLLECTIONS.chads.address, ERC721_ABI, readProvider);
        const bal   = await nft.balanceOf(userAddress);
        if (bal.gt(0)) {
          const count = bal.toNumber();
          const checks = [];
          for (let idx = 0; idx < count; idx++) {
            checks.push(
              nft.tokenOfOwnerByIndex(userAddress, idx)
                .then(async tokenId => {
                  const i = tokenId.toNumber();
                  const o = userAddress; // known owner
                  const name = await nft.tokenName(i).catch(() => '');
                  let price = null;
                  if (marketCt) {
                    const lst = await marketCt.getListing(COLLECTIONS.chads.address, i).catch(() => null);
                    if (lst && lst.active) price = ethers.utils.formatEther(lst.price) + ' AVAX';
                  }
                  chads.push({ id: i, name: name || 'CHAD #' + i, price });
                })
                .catch(() => {})
            );
          }
          await Promise.all(checks);
          chads.sort((a, b) => a.id - b.id);
        }
      } catch (e) { console.error('buildSellGrid chads:', e); }

      // Silently populate chad select for form use
      populateSellTokens();

      // Load owned Items
      try {
        for (const [id, name] of Object.entries(knownItems)) {
          const itemCt = new ethers.Contract(COLLECTIONS.items.address, ERC1155_ABI, readProvider);
          const bal    = await itemCt.balanceOf(userAddress, id).catch(() => ethers.BigNumber.from(0));
          if (bal.gt(0)) {
            let price = null;
            if (marketCt) {
              const lst = await marketCt.getListing1155(COLLECTIONS.items.address, id, userAddress).catch(() => null);
              if (lst && lst.active) price = ethers.utils.formatEther(lst.price) + ' AVAX';
            }
            items.push({ id, name, price });
          }
        }
      } catch (e) { console.error('buildSellGrid items:', e); }

      // Silently populate item select for form use
      populateSellItems();

      loadMsg.style.display = 'none';
      gridEl.style.display = 'grid';

      if (chads.length === 0 && items.length === 0) {
        gridEl.innerHTML = '<div style="grid-column:1/-1;font-size:0.45rem;color:#8a7a5a;text-align:center;padding:20px 0">No NFTs in wallet</div>';
        return;
      }

      let html = '';
      if (chads.length > 0) {
        html += '<div class="sell-grid-heading">YOUR CHADS</div>';
        for (const c of chads) {
          const priceHtml = c.price
            ? `<div class="sell-card-price listed">Listed: ${c.price}</div>`
            : '<div class="sell-card-price unlisted">Not listed</div>';
          html += `<div class="sell-nft-card" data-type="chad" data-token="${c.id}">
            <img src="${COLLECTIONS.chads.imageBase}${c.id}.png" alt="${c.name}">
            <div class="sell-card-name">${c.name}</div>
            ${priceHtml}
          </div>`;
        }
      }
      if (items.length > 0) {
        html += '<div class="sell-grid-heading">YOUR ITEMS</div>';
        for (const it of items) {
          const priceHtml = it.price
            ? `<div class="sell-card-price listed">Listed: ${it.price}</div>`
            : '<div class="sell-card-price unlisted">Not listed</div>';
          html += `<div class="sell-nft-card" data-type="item" data-token="${it.id}">
            <img src="${COLLECTIONS.items.imageBase}${it.id}.jpg" alt="${it.name}">
            <div class="sell-card-name">${it.name}</div>
            ${priceHtml}
          </div>`;
        }
      }
      gridEl.innerHTML = html;

      gridEl.querySelectorAll('.sell-nft-card').forEach(card => {
        card.addEventListener('click', () => {
          gridEl.querySelectorAll('.sell-nft-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          const type = card.dataset.type;
          const tid  = card.dataset.token;
          if (type === 'chad') {
            selectedChadId = tid;
            sellItemForm.style.display = 'none';
            sellForm.style.display     = 'block';
            sellToken.value = tid;
            sellToken.dispatchEvent(new Event('change'));
            sellForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          } else {
            selectedItemId = tid;
            sellForm.style.display     = 'none';
            sellItemForm.style.display = 'block';
            sellItemToken.value = tid;
            sellItemToken.dispatchEvent(new Event('change'));
            sellItemForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        });
      });
    }

    async function populateSellTokens() {
      sellToken.innerHTML = '<option value="">Loading...</option>';
      sellPreview.style.display = 'none';
      approveBtn.disabled = true;
      listBtn.disabled    = true;

      if (!userAddress) return;

      const collAddr = COLLECTIONS.chads.address;
      try {
        const nft   = new ethers.Contract(collAddr, ERC721_ABI, readProvider);
        const bal   = await nft.balanceOf(userAddress);
        if (bal.eq(0)) {
          sellToken.innerHTML = '<option value="">No Chads in wallet</option>';
          return;
        }
        // Use ERC721Enumerable tokenOfOwnerByIndex for O(owned) lookup
        const count = bal.toNumber();
        const owned = [];
        const checks = [];
        for (let idx = 0; idx < count; idx++) {
          checks.push(
            nft.tokenOfOwnerByIndex(userAddress, idx)
              .then(tid => { owned.push(tid.toNumber()); })
              .catch(() => {})
          );
        }
        await Promise.all(checks);

        sellToken.innerHTML = '<option value="">Select token...</option>';
        let hasAny = false;
        for (const tid of owned) {
          const [name, dead] = await Promise.all([
            nft.tokenName(tid).catch(() => ''),
            nft.eliminated(tid).catch(() => false),
          ]);
          const opt  = document.createElement('option');
          opt.value       = tid;
          opt.textContent = (name || 'CHAD #' + tid) + (dead ? ' [ELIMINATED]' : '');
          opt.disabled    = dead;
          sellToken.appendChild(opt);
          hasAny = true;
        }
        if (!hasAny) {
          sellToken.innerHTML = '<option value="">No Chads in wallet</option>';
        }
      } catch (err) {
        console.error('populateSellTokens error:', err);
        sellToken.innerHTML = '<option value="">Error loading tokens</option>';
      }
    }

    async function populateSellItems() {
      sellItemToken.innerHTML = '<option value="">Loading...</option>';
      sellItemPreview.style.display = 'none';
      approveItemBtn.disabled = true;
      listItemBtn.disabled    = true;
      if (!userAddress) return;
      try {
        const items = new ethers.Contract(COLLECTIONS.items.address, ERC1155_ABI, readProvider);
        sellItemToken.innerHTML = '<option value="">Select item...</option>';
        let found = false;
        for (const [id, name] of Object.entries(knownItems)) {
          const bal = await items.balanceOf(userAddress, id);
          if (bal.toNumber() > 0) {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = name + ' (#' + id + ')';
            sellItemToken.appendChild(opt);
            found = true;
          }
        }
        if (!found) sellItemToken.innerHTML = '<option value="">No items in wallet</option>';
      } catch {
        sellItemToken.innerHTML = '<option value="">Error loading items</option>';
      }
    }

    sellItemToken.addEventListener('change', async () => {
      const tokenId = sellItemToken.value || selectedItemId;
      approveItemBtn.disabled  = true;
      listItemBtn.disabled     = true;
      sellItemStatus.className = 'status-msg';
      if (!tokenId) { sellItemPreview.style.display = 'none'; return; }

      const name = knownItems[tokenId] || 'Item #' + tokenId;
      sellItemPreviewImg.src              = `/assets/items/${tokenId}.jpg`;
      sellItemPreviewName.textContent     = name;
      sellItemPreview.style.display       = 'flex';

      try {
        const items    = new ethers.Contract(COLLECTIONS.items.address, ERC1155_ABI, readProvider);
        const approved = await items.isApprovedForAll(userAddress, MARKET_ADDRESS);
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const listing  = await market.getListing1155(COLLECTIONS.items.address, tokenId, userAddress);
        if (listing.active) {
          sellItemPreviewStatus.textContent = 'Listed at ' + ethers.utils.formatEther(listing.price) + ' AVAX';
          showStatus('sellItemStatus', 'info', 'Already listed. Delist from Browse first.');
          return;
        }
        sellItemPreviewStatus.textContent = approved ? 'Approved ✓' : 'Not approved';
        approveItemBtn.disabled  = approved;
        approveItemBtn.textContent = approved ? '1. APPROVED ✓' : '1. APPROVE MARKET';
        listItemBtn.disabled     = !approved;
        updateItemFeeNote();
      } catch {
        sellItemPreviewStatus.textContent = 'Error checking status';
      }
    });

    sellItemPrice.addEventListener('input', updateItemFeeNote);

    function updateItemFeeNote() {
      const price = parseFloat(sellItemPrice.value);
      if (price > 0) {
        const fee    = price * feeBps / 10000;
        const payout = price - fee;
        itemFeeNote.textContent = `Fee: ${fee.toFixed(4)} AVAX (${feeBps / 100}%)  |  You receive: ${payout.toFixed(4)} AVAX`;
      } else {
        itemFeeNote.textContent = `Marketplace fee: ${feeBps / 100}%`;
      }
    }

    approveItemBtn.addEventListener('click', async () => {
      if (!signer) { openWalletModal(); return; }
      approveItemBtn.disabled    = true;
      approveItemBtn.textContent = 'APPROVING...';
      try {
        const items = new ethers.Contract(COLLECTIONS.items.address, ERC1155_ABI, signer);
        const tx    = await items.setApprovalForAll(MARKET_ADDRESS, true);
        showStatus('sellItemStatus', 'info', 'Waiting for approval confirmation...');
        await tx.wait();
        approveItemBtn.textContent = '1. APPROVED ✓';
        listItemBtn.disabled = false;
        showStatus('sellItemStatus', 'ok', 'Approved! Set your price and list.');
      } catch (e) {
        approveItemBtn.disabled    = false;
        approveItemBtn.textContent = '1. APPROVE MARKET';
        showStatus('sellItemStatus', 'error', e.reason || e.message);
      }
    });

    listItemBtn.addEventListener('click', async () => {
      if (!signer) { openWalletModal(); return; }
      const tokenId = sellItemToken.value || selectedItemId;
      const price   = sellItemPrice.value;
      if (!tokenId || !price || parseFloat(price) <= 0) {
        showStatus('sellItemStatus', 'error', 'Select an item and enter a valid price.');
        return;
      }
      listItemBtn.disabled    = true;
      listItemBtn.textContent = 'LISTING...';
      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const priceWei = ethers.utils.parseEther(price);
        const tx       = await market.list1155(COLLECTIONS.items.address, tokenId, priceWei);
        showStatus('sellItemStatus', 'info', 'Waiting for confirmation...');
        await tx.wait();
        listItemBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellItemStatus', 'ok', 'Listed! Check the Browse tab.');
        sellItemToken.value           = '';
        sellItemPreview.style.display = 'none';
        listItemBtn.disabled          = true;
        approveItemBtn.disabled       = true;
        loadListings1155();
      } catch (e) {
        listItemBtn.disabled    = false;
        listItemBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellItemStatus', 'error', e.reason || e.message);
      }
    });

    sellToken.addEventListener('change', async () => {
      const tokenId  = sellToken.value || selectedChadId;
      const collAddr = COLLECTIONS.chads.address;
      approveBtn.disabled  = true;
      listBtn.disabled     = true;
      sellStatus.className = 'status-msg';

      if (!tokenId) { sellPreview.style.display = 'none'; return; }

      sellPreviewImg.src             = COLLECTIONS.chads.imageBase + tokenId + '.png';
      sellPreviewName.textContent    = 'CHAD #' + tokenId;
      sellPreviewId.textContent      = tokenId;
      sellPreview.style.display      = 'flex';

      try {
        const nft        = new ethers.Contract(collAddr, ERC721_ABI, readProvider);
        const approved   = await nft.isApprovedForAll(userAddress, MARKET_ADDRESS);
        const singleApp  = await nft.getApproved(tokenId);
        const isApproved = approved || singleApp.toLowerCase() === MARKET_ADDRESS.toLowerCase();

        const market  = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, readProvider);
        const listing = await market.getListing(collAddr, tokenId);
        if (listing.active) {
          sellPreviewStatus.textContent = 'Listed at ' + ethers.utils.formatEther(listing.price) + ' AVAX';
          showStatus('sellStatus', 'info', 'Already listed. Delist from Browse first.');
          return;
        }

        sellPreviewStatus.textContent = isApproved ? 'Approved ✓' : 'Not approved';
        approveBtn.disabled  = isApproved;
        approveBtn.textContent = isApproved ? '1. APPROVED ✓' : '1. APPROVE MARKET';
        listBtn.disabled     = !isApproved;
        updateFeeNote();
      } catch {
        sellPreviewStatus.textContent = 'Error checking status';
      }
    });

    sellPrice.addEventListener('input', updateFeeNote);

    function updateFeeNote() {
      const price = parseFloat(sellPrice.value);
      if (price > 0) {
        const fee    = price * feeBps / 10000;
        const payout = price - fee;
        feeNote.textContent = `Fee: ${fee.toFixed(4)} AVAX (${feeBps / 100}%)  |  You receive: ${payout.toFixed(4)} AVAX`;
      } else {
        feeNote.textContent = `Marketplace fee: ${feeBps / 100}%`;
      }
    }

    approveBtn.addEventListener('click', async () => {
      if (!signer) { openWalletModal(); return; }
      approveBtn.disabled    = true;
      approveBtn.textContent = 'APPROVING...';
      try {
        const nft = new ethers.Contract(COLLECTIONS.chads.address, ERC721_ABI, signer);
        const tx  = await nft.setApprovalForAll(MARKET_ADDRESS, true);
        showStatus('sellStatus', 'info', 'Waiting for approval confirmation...');
        await tx.wait();
        approveBtn.textContent = '1. APPROVED ✓';
        listBtn.disabled = false;
        showStatus('sellStatus', 'ok', 'Approved! Set your price and list.');
      } catch (e) {
        approveBtn.disabled    = false;
        approveBtn.textContent = '1. APPROVE MARKET';
        showStatus('sellStatus', 'error', e.reason || e.message);
      }
    });

    listBtn.addEventListener('click', async () => {
      if (!signer) { openWalletModal(); return; }
      const tokenId = sellToken.value || selectedChadId;
      const price   = sellPrice.value;
      if (!tokenId || !price || parseFloat(price) <= 0) {
        showStatus('sellStatus', 'error', 'Select a token and enter a valid price.');
        return;
      }
      listBtn.disabled    = true;
      listBtn.textContent = 'LISTING...';
      try {
        const market   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, signer);
        const priceWei = ethers.utils.parseEther(price);
        const tx       = await market.list(COLLECTIONS.chads.address, tokenId, priceWei);
        showStatus('sellStatus', 'info', 'Waiting for confirmation...');
        await tx.wait();
        listBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellStatus', 'ok', 'Listed! Check the Browse tab.');
        sellToken.value           = '';
        sellPreview.style.display = 'none';
        listBtn.disabled          = true;
        approveBtn.disabled       = true;
        loadListings();
      } catch (e) {
        listBtn.disabled    = false;
        listBtn.textContent = '2. LIST FOR SALE';
        showStatus('sellStatus', 'error', e.reason || e.message);
      }
    });

    // ====================================================================
    // Helpers
    // ====================================================================
    function truncAddr(addr) {
      return addr ? addr.slice(0, 6) + '...' + addr.slice(-4) : '';
    }

    function showStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className  = 'status-msg ' + type;
      el.textContent = msg;
    }

    // ====================================================================
    // Init
    // ====================================================================
    loadListings();
    loadFee();
    autoReconnect({ onConnected, onDisconnected });
    sellConnectPrompt.style.display = 'block';
    sellForm.style.display = 'none';
  </script>
  <script src="js/wallet-modal.js"></script>
  <script src="nav.js"></script>
</body>
</html>
